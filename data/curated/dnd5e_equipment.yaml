# D&D 5e (2024 PHB) — armor, common weapons, languages (ch. 6 equipment).
# Armor Class: light = base + DEX; medium = base + min(DEX, 2); heavy = base (no DEX).
armor:
- id: none
  label: Unarmored
  category: none
  base_ac: 10
  add_dex: true
- id: padded
  label: Padded
  category: light
  base_ac: 11
  add_dex: true
- id: leather
  label: Leather
  category: light
  base_ac: 11
  add_dex: true
- id: studded_leather
  label: Studded Leather
  category: light
  base_ac: 12
  add_dex: true
- id: hide
  label: Hide
  category: medium
  base_ac: 12
  dex_cap: 2
- id: chain_shirt
  label: Chain Shirt
  category: medium
  base_ac: 13
  dex_cap: 2
- id: scale_mail
  label: Scale Mail
  category: medium
  base_ac: 14
  dex_cap: 2
- id: breastplate
  label: Breastplate
  category: medium
  base_ac: 14
  dex_cap: 2
- id: half_plate
  label: Half Plate
  category: medium
  base_ac: 15
  dex_cap: 2
- id: ring_mail
  label: Ring Mail
  category: heavy
  base_ac: 14
- id: chain_mail
  label: Chain Mail
  category: heavy
  base_ac: 16
  strength: 13
- id: splint
  label: Splint
  category: heavy
  base_ac: 17
  strength: 15
- id: plate
  label: Plate
  category: heavy
  base_ac: 18
  strength: 15
shield_ac: 2
