  - {id: defense, label: Defense}
  - {id: dueling, label: Dueling}
  - {id: greatweaponfighting, label: Great Weapon Fighting}
  - {id: interception, label: Interception}
  - {id: protection, label: Protection}
  - {id: thrownweaponfighting, label: Thrown Weapon Fighting}
  - {id: unarmedfighting, label: Unarmed Fighting}

origin_feats:
  - {id: alert, label: Alert}
  - {id: crafter, label: Crafter}
  - {id: healer, label: Healer}
  - {id: lucky, label: Lucky}
  - {id: magic_initiate_cleric, label: Magic Initiate (Cleric)}
  - {id: magic_initiate_druid, label: Magic Initiate (Druid)}
  - {id: magic_initiate_wizard, label: Magic Initiate (Wizard)}
  - {id: musician, label: Musician}
  - {id: savage_attacker, label: Savage Attacker}
  - {id: skilled, label: Skilled}
  - {id: tavern_brawler, label: Tavern Brawler}
  - {id: tough, label: Tough}

