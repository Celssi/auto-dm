  awaken:
    title: Awaken
    level: 5
    school: Transmutation
    classes: Bard, Druid
    casting_time: 8 hours
    range: Touch
    components: V, S, M (an agate worth 1,000+ GP,
    duration: Instantaneous
    text: You spend the casting time tracing magical pathways within a precious gemstone, and then touch
