      (no action required), manifest it again, or have the Incapacitated condition. When you manifest
      the Fmanation and as a Bonus Action on your subsequent turns, you can choose another creature you
      can see in the Emanation. The target must succeed on a Constitution saving throw against your spell
      save DC or take Cold damage and, if the creature is Large or smaller, be pushed up to 15 feet away
      from you. To determine this damage, roll anumber of d6s equal to your Wisdom modifier (minimum of
      one die).
    level: 3
    class_id: druid
  aquaticaffinity:
    title: Aquatic Affinity
    text: The size of the Emanation created by your Wrath of the Sea increases to 10 feet. In addition,
