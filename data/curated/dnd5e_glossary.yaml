  symbol:
    title: Symbol
    level: 7
    school: Abjuration
    classes: Bard, Cleric, Druid, Wizard
    casting_time: 1 minute
    range: Touch
    components: V, S, M (powdered diamond worth
    duration: Until dispelled or triggered
    text: 'You inscribe a harmful glyph either on a surface (such as a section of floor or wall) or within
      an object that can be closed (such as a book or chest). The glyph can cover an areano larger than
      10 feet in diameter. If you choose an object, it must remain in place; if it is moved more than
