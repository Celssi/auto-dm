      The form lasts for 10 minutes. It ends early if you dismiss it (no action required), have the Incapacitated
      condition, or use this feature again. Whenever you assume your starry form, choose which of the
      following constellations glimmers on your body; your choice gives you certain benefits while in
      the form. Archer. A constellation of an archer appears on you. When you activate this form and as
      a Bonus Action on your subsequent turns while it lasts, you can make aranged spell attack, hurling
      a luminous arrow that targets one creature within 60 feet of yourself. On a hit, the attack deals
      Radiant damage equal to 1d8 plus your Wisdom modifier. Chalice. A constellation of a life-giving
      goblet appears on you. Whenever you cast a spell using a spell slot that restores Hit Points to
      a creature, you or another creature within 30 feet of you can regain Hit Points equal to 1d8 plus
      your Wisdom modifier. Dragon. A constellation of a wise dragon appears on you. When you make an
      Intelligence or a Wisdom check or a Constitution saving throw to maintain Concentration, you can
      treat aroll of 9 or lower on the d20 as a 10.
    level: 3
    class_id: druid
  cosmicomen:
    title: Cosmic Omen
    text: 'Whenever vou finish a Long Rest, you can consult your Star Map for omens and roll a die. Until
      you finish your next Long Rest, you gain access to a special Reaction based on whether you rolled
      an even or an odd number on the die: Weal (Even). Whenever a creature you can see within 30 feet
