    level: 18
    class_id: monk
  bodyandmind:
    title: Body And Mind
    text: You have developed your body and mind to new heights. Your Dexterity and Wisdom scores increase
      by 4, toa maximum of 25. CHAPTER 3 | CHARACTER CLASSES 102 104. WARRIOR OF MERCY SUBCLASS MONK SUBCLASSES
      A Monk subclass is a specialization that grants you features at certain levels, as specified in
      the subclass. This section presents the Warrior of Mercy, Warrior of Shadow, Warrior of the Elements,
      and Warrior of the Open Hand subclasses. WARRIOR OF MERCY Manipulate Forces of Life and Death Warriors
      of Mercy manipulate the life force of others. These Monks are wandering physicians, but they bring
      a swift end to their enemies. They often wear masks, presenting themselves as faceless bringers
      of life and death.
    level: 20
    class_id: monk
  handofharm:
    title: Hand Of Harm
    text: Once per turn when you hit a creature with an Unarmed Strike and deal damage, you can expend
