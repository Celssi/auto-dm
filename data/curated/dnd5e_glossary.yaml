    components: V, S, M (burning incense)
    duration: 10 minutes
    text: You grant the semblance of life to a corpse of your choice within range, allowing it to answer
      questions you pose. The corpse must have a mouth, and this spell fails if the deceased creature
      was Undead when it died. The spell also fails if the corpse was the target of this spell within
      the past 10 days. Until the spell ends, you can ask the corpse up to five questions. The corpse
      knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic,
      or repetitive, and the corpse is under no compulsion to offer a truthful answer if you are antagonistic
      toward it or it recognizes you as an enemy. This spell doesn’t return the creature’s soul to its
      body, only its animating spirit. Thus, the corpse can't learn new information, doesn’t comprehend
      anything that has happened since it died, and can’t speculate about future events.
  speakwithplants:
    title: Speak With Plants
    level: 3
    school: Transmutation
    classes: Bard, Druid, Ranger
    casting_time: Action
    range: Self
    components: V, S
    duration: 10 minutes
    text: You imbue plants in an immobile 30-foot Emanation with limited sentience and animation, giving
      them the ability to communicate with you and follow your simple commands. You can question plants
      about events in the spell’s area within the past day, gaining information about creatures that have
      passed, weather, and other circumstances. You can also turn Difficult Terrain caused by plant growth
      (such as thickets and undergrowth) into ordinary terrain that lasts for the duration. Or you can
      turn ordinary terrain where plants are present into Difficult Terrain that lasts for the duration.
      The spell doesn’t enable plants to uproot themselves and move about, but they can move their branches,
      tendrils, and stalks for you. If a Plant creature is in the area, you can communicate with it as
      if you shared a common language.
  spiderclimb:
    title: Spider Climb
    level: 2
    school: Transmutation
    classes: Sorcerer, Warlock, Wizard
    casting_time: Action
    range: Touch
    components: V, S, M (a drop of bitumen and a spider)
    duration: Concentration, up to 1 hour
    text: Until the spell ends, one willing creature you touch gains the ability to move up, down, and
      across vertical surfaces and along ceilings, while leaving its hands free. The target also gains
      a Climb Speed equal to its Speed. Using a Higher-Level Spell Slot. You can target one additional
      creature for each spell slot level about 2.
  spikegrowth:
    title: Spike Growth
    level: 2
    school: Transmutation
    classes: Druid, Ranger
    casting_time: Action
    range: 150 feet
    components: V, S, M (seven thorns)
    duration: Concentration, up to 10 minutes
    text: The ground in a 20-foot-radius Sphere centered on a point within range sprouts hard spikes and
      thorns. The area becomes Difficult Terrain for the duration. When a creature moves into or within
      the area, it takes 2d4 Piercing damage for every 5 feet it travels. The transformation of the ground
      is camouflaged to look natural. Any creature that can't see the area when the spell is cast must
      take a Search action and succeed on a Wisdom (Perception or Survival) check against your spell save
      DC to recognize the terrain as hazardous before entering it.
  spiritguardians:
    title: Spirit Guardians
    level: 3
    school: Conjuration
    classes: Cleric
    casting_time: Action
    range: Self
    components: V, S, M (a prayer scroll)
    duration: Concentration, up to 10 minutes
    text: Protective spirits flit around you in a 15-foot Emanation for the duration. If you are good
      or neutral, their spectral form appears angelic or fey (your choice). If you are evil, they appear
      fiendish. When you cast this spell, you can designate creatures to be unaffected by it. Any other
      creature’s Speed is halved in the Emanation, and whenever the Emanation enters a creature’s space
      and whenever a creature enters the Emanation or ends its turn there, the creature must make a Wisdom
      saving throw. On a failed save, the creature takes 3d8 Radiant damage (if you are good or neutral)
      or 3d8 Necrotic damage (if you are evil). On a successful save, the creature takes half as much
      damage. A creature makes this save only once per turn. Using a Higher-Level Spell Slot. The damage
      increases by 1d8 for each spell slot level above 3.
  spiritualweapon:
    title: Spiritual Weapon
    level: 2
    school: Evocation
    classes: Cleric
    casting_time: Bonus Action
    range: 60 feet
    components: V, S
    duration: Concentration, up to 1 minute
    text: You create a floating, spectral force that resembles a weapon of your choice and lasts for the
      duration. CHAPTER 7 | SPELLS 219 — ie. 320 The force appears within range in a space of your choice,
      and you can immediately make one melee spell attack against one creature within 5 feet of the force.
      On a hit, the target takes Force damage equal to 1d8 plus your spellcasting ability modifier. As
      a Bonus Action on your later turns, you can move the force up to 20 feet and repeat the attack against
      a creature within 5 feet of it. Using a Higher-Level Spell Slot. The damage increases by 1d8 for
      every slot level above 2.
  staggeringsmite:
