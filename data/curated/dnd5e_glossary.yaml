      can give the target the Prone condition or transport it up to 10 feet horizontally.
    level: 7
    class_id: fighter
  guardedmind:
    title: Guarded Mind
    text: You have Resistance to Psychic damage. Moreover, if you start your turn with the Charmed or
      Frightened condition, you can expend a Psionic Energy Die (no action required) and end every effect
      on yourself giving you those conditions.
    level: 10
    class_id: fighter
  bulwarkofforce:
    title: Bulwark Of Force
    text: You can shield yourself and others with telekinetic force. As a Bonus Action, you can choose
