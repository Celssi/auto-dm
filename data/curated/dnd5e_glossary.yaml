      on a point within range. Until the spell ends, a creature that enters the spell’s area for the first
      time on a turn or starts its turn there makes a Charisma saving throw. On a failed save, a creature
      can’t speak a deliberate lie while in the radius. You know whether a creature succeeds or fails
      on this save. An affected creature is aware of the spell and can avoid answering questions to which
      it would normally respond with a lie. Such a creature can be evasive yet must be truthful. CHAPTER
      7 | SPELLS 343 34-4 THE MULTIVERSE This appendix provides an overview of the multiverse, the overarching
      reality that encompasses D&D’s countless worlds and adventures. These realms are explored in greater
      detail in the Dungeon Master’s Guide, along with other planes like the Far Realm, Negative Plane,
      and Positive Plane. THE MATERIAL REALMS The philosophical and elemental forces of reality converge
      to create the following planes of existence: Material Plane. Most D&D adventures take place on the
      Material Plane, which holds the worlds of settings like Dragonlance, Eberron, the Forgotten Realms,
      and Greyhawk. There''s also room for any world your group creates. Magic and physical laws shape
      this plane''s diverse worlds. Feywild. This vibrant, idealized realm brims with life and emotion,
      which are most intense in the realm’s Domains of Delight. Shadowfell. This gloom-haunted realm holds
      grim wastelands, haunted ruins, and the infamous Domains of Dread. ‘TRANSITIVE PLANES The transitive
      planes serve as paths between planes: Astral Plane. This endless, silvery expanse links the Material
      Plane and the Outer Planes. Whole civilizations have arisen in this glimmering vastness, while others
      navigate the magical cosmos in spelljamming vessels. Ethereal Plane. This ghostly realm connects
      the Material Plane and the Inner Planes. The region where the Ethereal Plane overlaps with other
      planes is called the Border Ethereal, a place where creatures can glimpse visions of planes beyond.
      ‘THE INNER PLANES Elemental forces and the building blocks of reality originate from these Inner
      Planes: Elemental Plane of Air. Winds blow clouds and floating islands across this boundless sky.
      Elemental Plane of Earth. This maze of caverns winds through stone and untold mineral riches. Elemental
      Plane of Fire. An everlasting inferno, this realm blazes with life on volcanic islands. Elemental
      Plane of Water. This bottomless ocean churns with mysterious sea life.'
