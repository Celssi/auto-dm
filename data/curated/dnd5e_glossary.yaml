  necromancypaladin:
    title: Necromancy (Paladin)
    text: 'Casting Time: Bonus Action, which you take immediately after hitting a creature with a Melee
      weapon or an Unarmed Strike Range: Self Component: V Duration: 1 minute The target takes an extra
