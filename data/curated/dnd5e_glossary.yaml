      (Huge). ——— CR None (XP 0; PB equals your Proficiency Bonus) A BraZieR AFFECTED BY THE SPELL ANIMATE
      OBJECTS ANIMATED OBJECT Huge or Smaller Construct, Unaligned | AC 15 HP 10 (Medium or smaller),
