      Utterance. You can speak telepathically to any creature you can see within 60 feet of yourself.
      Your telepathic utterances are in a language you know, and the creature understands you only if
      it knows that language. Your communication doesn''t give the creature the ability to respond to
      you telepathically. Detect Thoughts. You always have the Detect Thoughts spell prepared. You can
      cast it without a spell slot or spell components, and you must finish a Long Rest before you can
      cast it in this way again. You can also cast it using spell slots you have of the appropriate level.
      Your spellcasting ability for the spell is the ability increased by this feat.'
  warcaster:
    title: War Caster
    category: 'General Feat (Prerequisite: Level 4+, Spellcasting or Pact'
    text: Magic Feature) You gain the following benefits. Ability Score Increase. Increase your Intelligence,
      Wisdom, or Charisma score by 1, to a maximum of 20. Concentration. You have Advantage on Constitution
      saving throws that you make to maintain Concentration. Reactive Spell. When a creature provokes
      an Opportunity Attack from you by leaving your reach, you can take a Reaction to cast a spell at
      the creature rather than making an Opportunity Attack. The spell must have a casting time of one
      action and must target only that creature. Somatic Components. You can perform the Somatic components
      of spells even when you have weapons or a Shield in one or both hands.
  weaponmaster:
    title: Weapon Master
    category: 'General Feat (Prerequisite: Level 4+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Strength or Dexterity
      score by 1, to a maximum of 20. Mastery Property. Your training with weapons allows you to use the
      mastery property of one kind of Simple or Martial weapon of your choice, provided you have proficiency
      with it. Whenever you finish a Long Rest, you can change the kind of weapon to another eligible
      kind. FIGHTING STYLE FEATS These feats are in the Fighting Style category.
  archery:
    title: Archery
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: You gain a +2 bonus to attack rolls you make with Ranged weapons.
  blindfighting:
    title: Blind Fighting
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: You have Blindsight with a range of 10 feet.
  defense:
    title: Defense
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: While you're wearing Light, Medium, or Heavy armor, you gain a +1 bonus to Armor Class.
  dueling:
    title: Dueling
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: When youre holding a Melee weapon in one hand and no other weapons, you gain a +2 bonus to damage
      rolls with that weapon.
  greatweaponfighting:
    title: Great Weapon Fighting
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: When you roll damage for an attack you make with a Melee weapon that you are holding with two
      hands, you can treat any 1 or 2 on a damage die as a 34. The weapon must have the Two-Handed or
      Versatile property to gain this benefit.
  interception:
    title: Interception
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: When a creature you can see hits another creature within 5 feet of you with an attack roll,
      you can take a Reaction to reduce the damage dealt to the target by 1d10 plus your Proficiency Bonus.
      You must be holding a Shield or a Simple or Martial weapon to use this Reaction.
  protection:
    title: Protection
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: When a creature you can see attacks a target other than you that is within 5 feet of you, you
      can take a Reaction to interpose your Shield if you're holding one. You impose Disadvantage on the
      triggering attack roll and all other attack rolls against the target until the start of your next
      turn if you remain within 5 feet of the target.
  thrownweaponfighting:
    title: Thrown Weapon Fighting
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: 'When you hit with a ranged attack roll using a weapon that has the Thrown property, you gaina
      +2 bonus to the damage roll. Two-WEAPON FIGHTING Fighting Style Feat (Prerequisite: Fighting Style
      Feature) When you make an extra attack as a result of using a weapon that has the Light property,
      you can add your ability modifier to the damage of that attack if you aren''t already adding it
      to the damage.'
  unarmedfighting:
    title: Unarmed Fighting
    category: 'Fighting Style Feat (Prerequisite: Fighting Style Feature)'
    text: When you hit with your Unarmed Strike and deal damage, you can deal Bludgeoning damage equal
      to 1d6 plus your Strength modifier instead of the normal damage of an Unarmed Strike. If you aren't
      holding any weapons or a Shield when you make the attack roll, the d6 becomes a d8. At the start
      of each of your turns, you can deal 1d4 Bludgeoning damage to one creature Grappled by you. EPIC
      BOON FEATS These feats are in the Epic Boon category.
  boonofcombatprowess:
    title: Boon Of Combat Prowess
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Peerless Aim. When you miss with an attack roll, you can hit instead.
      Once you use this benefit, you can’t use it again until the start of your next turn.
  boonofdimensionaliravel:
    title: Boon Of Dimensional Iravel
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Blink Steps. Immediately after you take the Attack action or the
      Magic action, you can teleport up to 5O feet to an unoccupied space you can see. CHAPTER 5 | FEATS
  boonofenergyresistance:
    title: Boon Of Energy Resistance
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: 'You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Energy Resistances. You gain Resistance to two of the following
      damage types of your choice: Acid, Cold, Fire, Lightning, Necrotic, Poison, Psychic, Radiant, or
      Thunder. Whenever you finish a Long Rest, you can change your choices. Energy Redirection. When
      you take damage of one of the types chosen for the Energy Resistances benefit, you can take a Reaction
      to direct damage of the same type toward another creature you can see within 60 feet of yourself
      that isn’t behind Total Cover. If you do so, that creature must succeed on a Dexterity saving throw
      (DC 8 plus your Constitution modifier and Proficiency Bonus) or take damage equal to 2d12 plus your
      Constitution modifier.'
  boonoffate:
    title: Boon Of Fate
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Improve Fate. When you or another creature within 60 feet of you
      succeeds on or fails a D20 Test, you can roll 2d4 and apply the total rolled as a bonus or penalty
      to the d20 roll. Once you use this benefit, you can't use it again until you roll Initiative or
      finish a Short or Long Rest.
  boonoffortitude:
    title: Boon Of Fortitude
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Fortified Health. Your Hit Point maximum increases by 40. In addition,
      whenever you regain Hit Points, you can regain additional Hit Points equal to your Constitution
      modifier. Once you've regained these additional Hit Points, you can't do so again until the start
      of your next turn.
  boonofirresistibleoffense:
    title: Boon Of Irresistible Offense
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Strength or Dexterity
      score by 1, to a maximum of 30. Overcome Defenses. The Bludgeoning, Piercing, and Slashing damage
      you deal always ignores Resistance. Overwhelming Strike. When you roll a 20 on the d20 for an attack
      roll, you can deal extra damage to the target equal to the ability score increased by this feat.
      The extra damage’s type is the same as the attack’s type.
  boonofrecovery:
    title: Boon Of Recovery
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Last Stand. When you would be reduced to O Hit Points, you can
      drop to 1 Hit Point instead and regain a number of Hit Points equal to half your Hit Point maximum.
      Once you use this benefit, you can’t use it again until you finish a Long Rest. Recover Vitality.
      You have a pool of ten d1Os. As a Bonus Action, you can expend dice from the pool, roll those dice,
      and regain a number of Hit Points equal to the roll’s total. You regain all the expended dice when
      you finish a Long Rest.
  boonofskill:
    title: Boon Of Skill
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. All-Around Adept. You gain proficiency in all skills. Expertise.
      Choose one skill in which you lack Expertise. You gain Expertise in that skill.
  boonofspeed:
    title: Boon Of Speed
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Escape Artist. As a Bonus Action, you can take the Disengage action,
      which also ends the Grappled condition on you. Quickness. Your Speed increases by 30 feet.
  boonofspellrecall:
    title: Boon Of Spell Recall
    category: 'Epic Boon Feat (Prerequisite: Level 19+, Spellcasting'
    text: Feature) You gain the following benefits. Ability Score Increase. Increase your Intelligence,
      Wisdom, or Charisma score by 1, to a maximum of 50. Free Casting. Whenever you cast a spell with
      a level 1—4 spell slot, roll 1d4. If the number you roll is the same as the slot’s level, the slot
      isn’t expended.
  boonofthenightspirit:
    title: Boon Of The Night Spirit
    category: 'Epic Boon Feat (Prerequisite: Level 19+)'
    text: 'You gain the following benefits. Ability Score Increase. Increase one ability score of your
      choice by 1, to a maximum of 30. Merge with Shadows. While within Dim Light or Darkness, you can
      give yourself the Invisible condition as a Bonus Action. The condition ends on you immediately after
      you take an action, a Bonus Action, or a Reaction. Shadowy Form. While within Dim Light or Darkness,
      you have Resistance to all damage except Psychic and Radiant. BOON OF [RUESIGHT Epic Boon Feat (Prerequisite:
      Level 19+) You gain the following benefits. Ability Score Increase. Increase one ability score of
      your choice by 1, to a maximum of 30. Truesight. You have Truesight with a range of 60 feet. CHAPTER
      5 | FEATS 211 IN THE SKIES OF EBERRON, THE INVENTOR VI AND HER FIXERS ESCAPE THE LORD OF BLADES
      ANDO A PLUMMETING AIRSHIP THAT BURNS WITH GREEN FLAME.! CHAPTER 6 HQUIPMENT HE RIGHT EQUIPMENT CAN
      MAKE THE j difference between success and failure for -» adventurers. This chapter provides rules
      and prices for weapons, armor, and other kinds of equip- ment that characters might purchase or
      find. The DM lets you know if a shop has an item for sale and whether it’s available at the listed
      price. COINS Characters often find coins on their adventures and can spend those coins in shops,
      inns, and other businesses. Coins come in different denominations based on the relative worth of
      their material. The Coin Values table lists coins and how much they''re worth relative to the Gold
      Piece, which is the game’s main coin. For example, 1OO Copper Pieces are worth 1 Gold Piece. A coin
      weighs about a third of an ounce, so fifty coins weigh a pound. Coin VALUES Coin Value in GP Copper
      Piece (CP) 1/100 Silver Piece (SP) 1/10 Electrum Piece (EP) 1/2 Gold Piece (GP) 1 Platinum Piece
      (PP) 10 WEAPONS The Weapons table in this section shows the game''s main weapons. The table lists
      the cost and weight of each weapon, as well as the following details: Category. Every weapon falls
      into a category: Simple or Martial. Weapon proficiencies are usually tied to one of these categories.
      For example, you might have proficiency with Simple weapons. Melee or Ranged. A weapon is classified
      as either Melee or Ranged. A Melee weapon is used to attack a target within 5 feet, whereas a Ranged
      weapon is used to attack at a greater distance. Oe SELLING EQUIPMENT Equipment fetches half its
      cost when sold. In contrast, trade goods and valuables—like gems and art objects—retain their full
      value in the marketplace. The Dungeon Master''s Guide has prices for magic items. aetna eee eet
      il ik ————_= y ; ry i é Damage. The table lists the amount of damage a weapon deals when an attacker
      hits with it as well as the type of that damage. Properties. Any properties a weapon has are listed
      in the Properties column. Each property is defined in the “Properties” section. Mastery. Each weapon
      has a mastery property, which is defined in the “Mastery Properties” section later in this chapter.
      To use that property, you must have a feature that lets you use it. WEAPON PROFICIENCY Anyone can
      wield a weapon, but you must have proficiency with it to add your Proficiency Bonus to an attack
      roll you make with it. A player character''s features can provide weapon proficiencies. A monster
      is proficient with any weapon in its stat block. PROPERTIES Here are definitions of the properties
      in the Proper- ties column of the Weapons table. AMMUNITION You can use a weapon that has the Ammunition
      property to make a ranged attack only if you have ammunition to fire from it. The type of ammunition
      required is specified with the weapon’s range. Each attack expends one piece of ammunition. Drawing
      the ammunition is part of the attack (you need a free hand to load a one-handed weapon). After a
      fight, you can spend 1 minute to recover half the ammunition (round down) you used in the fight;
      the rest is lost. FINESSE When making an attack with a Finesse weapon, use your choice of your Strength
      or Dexterity modifier for the attack and damage rolls. You must use the same modifier for both rolls.
      HEAVY You have Disadvantage on attack rolls with a Heavy weapon if it’s a Melee weapon and your
      Strength score isn’t at least 13 or if it’s a Ranged weapon and your Dexterity score isn''t at least
      13. LIGHT When you take the Attack action on your turn and attack with a Light weapon, you can make
      one extra attack as a Bonus Action later on the same turn. That extra attack must be made with a
      different CHAPTER 6 | EQUIPMENT 213'
features:
  unarmoreddefense:
    title: UNARMORED DEFENSE
    level: 1
    text: While you aren't wearing armor or wielding a Shield, your base Armor Class equals 10 plus your
      Dexterity and Wisdom modifiers.
  weaponmastery:
    title: WEAPON MASTERY
    level: 1
    text: brilliance of the greatest Rogues. Your training with weapons allows you to use the mastery
      properties of two kinds of weapons of your BECOMING A ROGUE... choice with which you have proficiency,
      such as Daggers and Shortbows. Whenever you finish a Long Rest, you can change the kinds of weapons
      you chose. For example, you could switch to using the mastery properties of Scimitars and Shortswords.
      AS A LEVEL 1 CHARACTER - Gain all the traits in the Core Rogue Traits table. - Gain the Rogue’s
      level 1 features, which are listed in the Rogue Features table. CHAPTER 3 | CHARACTER CLASSES I29
      — ROGUE FEATURES Proficiency Level Bonus _ Class Features Sneak Attack 1 +2 Expertise, Sneak Attack,
      Thieves’ Cant, Weapon Mastery 1d6 2 +2 Cunning Action 1d6 3 +2 Rogue Subclass, Steady Aim 2d6 4
