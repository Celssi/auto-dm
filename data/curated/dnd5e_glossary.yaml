      confers two extra attacks rather than one. ELDRITCH MIND You have Advantage on Constitution saving
      throws that you make to maintain Concentration. ELDRITCH SMITE Prerequisite: Level 5+ Warlock, Pact
      of the Blade Invocation Once per turn when you hit a creature with your pact weapon, you can expend
      a Pact Magic spell slot to deal an extra 1d8 Force damage to the target, plus another 1d8 per level
      of the spell slot, and you can give the target the Prone condition if it is Huge or smaller. ELDRITCH
      SPEAR Prerequisite: Level 2+ Warlock, a Warlock Cantrip That Deals Damage Choose one of your known
      Warlock cantrips that deals damage and has arange of 10+ feet. When you cast that spell, its range
      increases by a number of feet equal to 30 times your Warlock level. Repeatable. You can gain this
      invocation more than once. Each time you do so, choose a different eligible cantrip. FIENDISH VIGOR
      Prerequisite: Level 2+ Warlock You can cast False Life on yourself without expending a spell slot.
      When you cast the spell with this feature, you don''t roll the die for the Temporary Hit Points;
      you automatically get the highest number on the die. CHAPTER 3 | CHARACTER CLASSES 155 Se, _ hl
      156 GAZE OF Iwo MINDS Prerequisite: Level 5+ Warlock You can use a Bonus Action to touch a willing
      creature and perceive through its senses until the end of your next turn. As long as the creature
      is on the same plane of existence as you, you can take a Bonus Action on subsequent turns to maintain
      this connection, extending the duration until the end of your next turn. The connection ends if
      you don’t maintain it in this way. While perceiving through the other creature''s senses, you benefit
      from any special senses possessed by that creature, and you can cast spells as if you were in your
      space or the other creature’s space if the two of you are within 60 feet of each other. GIFT OF
      THE DEPTHS Prerequisite: Level 5+ Warlock You can breathe underwater, and you gain a Swim Speed
      equal to your Speed. You can also cast Water Breathing once without expending a spell slot. You
      regain the ability to cast it in this way again when you finish a Long Rest. GIFT OF THE PROTECTORS
