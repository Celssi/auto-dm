      + 4 A GOLIATH CLERIC CASTS SPIRITUAL WEAPON IN BATTLE WITH AN UMBER HULK. : e'
  starrywisp:
    title: Starry Wisp
    level: 0
    school: Evocation Cantrip
    classes: Bard, Druid
    casting_time: Action
    range: 60 feet
    components: V, S
    duration: Instantaneous
    text: You launch a mote of light at one creature or object within range. Make a ranged spell attack
      against the target. On a hit, the target takes 1d8 Radiant damage, and until the end of your next
      turn, it emits Dim Light in a 10-foot radius and can’t benefit from the Invisible condition. Cantrip
      Upgrade. The damage increases by 1d8 when you reach levels 5 (2d8), 11 (3d8), and 17 (4d 8).
  steelwindstrike:
    title: Steel Wind Strike
    level: 5
    school: Conjuration
    classes: Ranger, Wizard
    casting_time: Action
    range: 30 feet
    components: S, M (a Melee weapon worth 1+ SP)
    duration: Instantaneous
    text: You flourish the weapon used in the casting and then vanish to strike like the wind. Choose
      up to five creatures you can see within range. Make a melee spell attack against each target. On
      a hit, a target takes 6d10 Force damage. You then teleport to an unoccupied space you can see within
      5 feet of one of the targets.
  stinkingcloud:
    title: Stinking Cloud
    level: 5
    school: Conjuration
    classes: Bard, Sorcerer, Wizard
    casting_time: Action
    range: 90 feet
    components: V, S, M (a rotten egg)
    duration: Concentration, up to 1 minute
    text: You create a 20-foot-radius Sphere of yellow, nauseating gas centered on a point within range.
      The cloud is Heavily Obscured. The cloud lingers in the air for the duration or until a strong wind
      (such as the one created by Gust of Wind) disperses it. Each creature that starts its turn in the
      Sphere must succeed on a Constitution saving throw or have the Poisoned condition until the end
      of the current turn. While Poisoned in this way, the creature can't take an action or a Bonus Action.
  stoneshape:
    title: Stone Shape
    level: 4
    school: Transmutation
    classes: Cleric, Druid, Wizard
    casting_time: Action
    range: Touch
    components: V, S, M (soft clay)
    duration: Instantaneous
    text: 'You touch a stone object of Medium size or smaller or a section of stone no more than 5 feet
      in any dimension and form it into any shape you like. For example, you could shape a large rock
      into a weapon, statue, or coffer, or you could make a small passage through a wall that is 5 feet
      thick. You could also shape a stone door or its frame to seal the door shut. The object you create
      can have up to two hinges and a latch, but finer mechanical detail isn’t possible. STONESKIN Level
      4 Transmutation (Druid, Ranger, Sorcerer, Wizard) Casting Time: Action Range: Touch Components:
      V, S, M (diamond dust worth 100+ GP, which the spell consumes) Duration: Concentration, up to 1
      hour Until the spell ends, one willing creature you touch has Resistance to Bludgeoning, Piercing,
      and Slashing damage.'
  stormofvengeance:
    title: Storm Of Vengeance
    level: 9
    school: Conjuration
    classes: Druid
    casting_time: Action
    range: 1 mile
    components: V, S
    duration: Concentration, up to 1 minute
    text: A churning storm cloud forms for the duration, centered on a point within range and spreading
      to a radius of 300 feet. Each creature under the cloud when it appears must succeed on a Constitution
      saving throw or take 2d6 Thunder damage and have the Deafened condition for the duration. At the
      start of each of your later turns, the storm produces different effects, as detailed below. Turn
      2. Acidic rain falls. Each creature and object under the cloud takes 4d6 Acid damage. Turn 3. You
      call six bolts of lightning from the cloud to strike six different creatures or objects beneath
      it. Each target makes a Dexterily saving throw, taking 10d6 Lightning damage on a failed save or
      half as much damage on a successful one. Turn 4. Hailstones rain down. Each creature under the cloud
      takes 2d6 Bludgeoning damage. Turns 5-10. Gusts and freezing rain assail the area under the cloud.
      Each creature there takes 1d6 Cold damage. Until the spell ends, the area is Difficult Terrain and
      Heavily Obscured, ranged attacks with weapons are impossible there, and strong wind blows through
      the area.
  suggestion:
    title: Suggestion
    level: 2
    school: Enchantment
    classes: Bard, Sorcerer, Warlock, Wizard
    casting_time: Action
    range: 30 feet
    components: V, M (a drop of honey)
    duration: Concentration, up to 8 hours
    text: You suggest a course of activity—described in no more than 25 words—to one creature you can
      see within range that can hear and understand you. The suggestion must sound achievable and not
      involve anything that would obviously deal damage to the target or it allies. For example, you could
      say, “Fetch the key to the cult’s treasure vault, and give the key to me.” Or you could say, “Stop
      fighting, leave this library peacefully, and don’t return.” The target must succeed on a Wisdom
      saving throw or have the Charmed condition for the duration or until you or your allies deal damage
      to the target. The Charmed target pursues the suggestion to the best of its ability. The suggested
      activity can continue for the entire duration, but if the suggested activity can be completed in
      a shorter time, the spell ends for the target upon completing it. CHAPTER 7 | SPELLS Q21 322 ABERRANT
      Spirit (BEHOLDERKIN)
