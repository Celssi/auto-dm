      Reshape Reality. You may wish for something not included in any of the other effects. To do so,
      state your wish to the DM as precisely as possible. The DM has great latitude in ruling what occurs
      in such an instance; the greater the wish, the greater the likelihood that something goes wrong.
      This spell might simply fail, the effect you desire might be achieved only in part, or you might
