    level: 1
    class_id: paladin
  paladin_weaponmastery:
    title: Weapon Mastery
    text: Your training with weapons allows you to use the mastery properties of two kinds of weapons
      of your choice with which you have proficiency, such as Longswords and Javelins. Whenever you finish
