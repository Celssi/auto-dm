      Your Prepared Spells. Whenever you finish a Long Rest, you can change your list of prepared spells,
      replacing any of the spells there with spells from your spellbook. Spellcasting Ability. Intelligence
      is your spellcasting ability for your Wizard spells. Spellcasting Focus. You can use an Arcane Focus
      or your spellbook as a Spellcasting Focus for your Wizard spells. QHAPTER 3 | CHARACTER CLASSES
