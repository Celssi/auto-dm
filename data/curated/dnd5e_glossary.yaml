      an object, it transforms along with whatever it is wearing and carrying into that form, as long
      as the objects size is no larger than the creature''s size. The creature’s statistics become those
      of the object, and the creature has no memory of time spent in this form after the spell ends and
      it returns to normal. CHAPTER 7 | SPELLS 335 336 ‘TRUE RESURRECTION'
