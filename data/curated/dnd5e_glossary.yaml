  cunningaction:
    title: CUNNING ACTION
    level: 2
    text: 'Your quick thinking and agility allow you to move and act quickly. On your turn, you can take
      one of the following actions as a Bonus Action: Dash, Disengage, or Hide.'
  roguesubclass:
    title: ROGUE SUBCLASS
    level: 3
    text: You gain a Rogue subclass of your choice. The Arcane Trickster, Assassin, Soulknife, and Thief
      subclasses are detailed after this class’s description. A subclass is a specialization that grants
      you features at certain Rogue levels. For the rest of your career, you gain each of your subclass’s
      features that are of your Rogue level or lower.
  steadyaim:
    title: STEADY AIM
    level: 3
    text: As a Bonus Action, you give yourself Advantage on your next attack roll on the current turn.
      You can use this feature only if you haven’t moved during this turn, and after you use it, your
      Speed is O until the end of the current turn.
  cunningstrike:
    title: CUNNING STRIKE
    level: 5
    text: 'You''ve developed cunning ways to use your Sneak Attack. When you deal Sneak Attack damage,
      you can add one of the following Cunning Strike effects. Each effect has a die cost, which is the
      number of Sneak Attack damage dice you must forgo to add the effect. You remove the die before rolling,
      and the effect occurs immediately after the attack’s damage is dealt. For example, if you add the
      Poison effect, remove 1d6 from the Sneak Attack’s damage before rolling. If a Cunning Strike effect
      requires a saving throw, the DC equals 8 plus your Dexterity modifier and Proficiency Bonus. Poison
      (Cost: 1d6). You add a toxin to your strike, forcing the target to make a Constitution saving throw.
      On a failed save, the target has the Poisoned condition for 1 minute. At the end of each of its
      turns, the Poisoned target repeats the save, ending the effect on itself on a success. To use this
      effect, you must have a Poisoner’s Kit on your person. Trip (Cost: 1d6). If the target is Large
      or smaller, it must succeed on a Dexterity saving throw or have the Prone condition. Withdraw (Cost:
      1d6). Immediately after the attack, you move up to half your Speed without provoking Opportunity
      Attacks.'
  uncannydodge:
    title: UNCANNY DODGE
    level: 5
    text: When an attacker that you can see hits you with an attack roll, you can take a Reaction to halve
      the attack’s damage against you (round down).
  reliabletalent:
    title: RELIABLE TALENT
    level: 7
    text: Whenever you make an ability check that uses one of your skill or tool proficiencies, you can
      treat a d20 roll of 9 or lower as a 10.
  improvedcunningstrike:
    title: IMPROVED CUNNING STRIKE
    level: 11
    text: You can use up to two Cunning Strike effects when you deal Sneak Attack damage, paying the die
      cost for each effect.
  deviousstrikes:
    title: DEVIOUS STRIKES
    level: 14
    text: 'You''ve practiced new ways to use your Sneak Attack deviously. The following effects are now
      among your Cunning Strike options. Daze (Cost: 2d6). The target must succeed on a Constitution saving
      throw, or on its next turn, it can do only one of the following: move or take an action or a Bonus
      Action. Knock Out (Cost: 6d6). The target must succeed on a Constitution saving throw, or it has
      the Unconscious condition for 1 minute or until it takes any damage. The Unconscious target repeats
      the save at the end of each of its turns, ending the effect on itself on a success. Obscure (Cost:
      35d6). The target must succeed on a Dexterity saving throw, or it has the Blinded condition until
      the end of its next turn.'
  slipperymind:
    title: SLIPPERY MIND
    level: 15
    text: Your cunning mind is exceptionally difficult to control. You gain proficiency in Wisdom and
      Charisma saving throws.
  elusive:
    title: ELUSIVE
    level: 18
    text: You're so evasive that attackers rarely gain the upper hand against you. No attack roll can
      have Advantage against you unless you have the Incapacitated condition. LEVEL 19; EpIc BOON You
      gain an Epic Boon feat (see chapter 5) or another feat of your choice for which you qualify. Boon
      of the Night Spirit is recommended.
  strokeofluck:
    title: STROKE OF LUCK
    level: 20
    text: You have a marvelous knack for succeeding when you need to. If you fail a D20 Test, you can
      turn the roll into a 20. Once you use this feature, you can't use it again until you finish a Short
      or Long Rest. ROGUE SUBCLASSES A Rogue subclass is a specialization that grants you features at
      certain Rogue levels, as specified in the subclass. This section presents the Arcane Trickster,
      Assassin, Soulknife, and Thief subclasses. ARCANE IRICKSTER Enhance Stealth with Arcane Spells Some
      Rogues enhance their fine-honed skills of stealth and agility with spells, learning magical tricks
      to aid them in their trade. Some Arcane Tricksters use their talents as pickpockets and burglars,
      while others are pranksters.
  magehandlegerdemain:
    title: MAGE HAND LEGERDEMAIN
    level: 3
    text: When you cast Mage Hand, you can cast it as a Bonus Action, and you can make the spectral hand
      Invisible. You can control the hand as a Bonus Action, and through it, you can make Dexterity (Sleight
      of Hand) checks.
  magicalambush:
    title: MAGICAL AMBUSH
    level: 9
    text: If you have the Invisible condition when you cast a spell on acreature, it has Disadvantage
      on any saving throw it makes against the spell on the same turn.
  versatiletrickster:
    title: VERSATILE TRICKSTER
    level: 13
    text: You gain the ability to distract targets with your Mage Hand. When you use the Trip option of
      your Cunning Strike on a creature, you can also use that option on another creature within 5 feet
      of the spectral hand.
  spellthief:
    title: SPELL THIEF
    level: 17
    text: You gain the ability to magically steal the knowledge of how to cast a spell from another spellcaster.
      Immediately after a creature casts a spell that targets you or includes you in its area of effect,
      you can take a Reaction to force the creature to make an Intelligence saving throw. The DC equals
      your spell save DC. On a failed save, you negate the spell’s effect against you, and you steal the
      knowledge of the spell if it is at least level 1 and of a level you can cast (it doesn’t need to
      be a Wizard spell). For the next 8 hours, you have the spell prepared. The creature can't cast it
      until the 8 hours have passed. Once you steal a spell with this feature, you can’t use this feature
      again until you finish a Long Rest. ASSASSIN SUBCLASS ASSASSIN Practice the Grim Art of Death An
      Assassin’s training focuses on using stealth, poison, and disguise to eliminate foes with deadly
      efficiency. While some Rogues who follow this path are hired killers, spies, or bounty hunters,
      the capabilities of this subclass are equally useful for adventurers facing a variety of monstrous
      enemies.
  assassinate:
    title: ASSASSINATE
    level: 3
    text: Youre adept at ambushing a target, granting you the following benefits. Initiative. You have
      Advantage on Initiative rolls. Surprising Strikes. During the first round of each combat, you have
      Advantage on attack rolls against any creature that hasn’t taken a turn. If your Sneak Attack hits
      any target during that round, the target takes extra damage of the weapon's type equal to your Rogue
      level.
  assassinstools:
    title: ASSASSIN’S TOOLS
    level: 3
    text: You gain a Disguise Kit and a Poisoner’s Kit, and you have proficiency with them.
  infiltrationexpertise:
    title: INFILTRATION EXPERTISE
    level: 9
    text: You are expert at the following techniques that aid your infiltrations. Masterful Mimicry. You
      can unerringly mimic another person’s speech, handwriting, or both if you have spent at least 1
      hour studying them. Roving Aim. Your Speed isn’t reduced to O by using Steady Aim.
  envenomweapons:
    title: ENVENOM WEAPONS
    level: 13
    text: When you use the Poison option of your Cunning Strike, the target also takes 2d6 Poison damage
      whenever it fails the saving throw. This damage ignores Resistance to Poison damage.
  deathstrike:
    title: DEATH STRIKE
    level: 17
    text: When you hit with your Sneak Attack on the first round of a combat, the target must succeed
      on a Constitution saving throw (DC 8 plus your Dexterity modifier and Proficiency Bonus), or the
      attack’s damage is doubled against the target. SOULKNIFE Strike Foes with Psionic Blades A Soulknife
      strikes with the mind, cutting through barriers both physical and psychic. These Rogues discover
      psionic power within themselves and channel it to do their roguish work. As a Soulknife, your psionic
      abilities might have haunted you since childhood, revealing their full potential only as you experienced
      the stress of adventure. Or you might have sought out an order of psychic adepts and spent years
      learning how to manifest your power.
  psychicblades:
    title: PSYCHIC BLADES
    level: 3
    text: 'You can manifest shimmering blades of psychic energy. Whenever you take the Attack action or
      make an Opportunity Attack, you can manifest a Psychic Blade in your free hand and make the attack
      with that blade. The magic blade has the following traits: Weapon Category: Simple Melee Damage
      on a Hit: 1d6 Psychic plus the ability modifier used for the attack roll Properties: Finesse, Thrown
      (range 60/120 feet) Mastery: Vex (you can use this property, and it doesn''t count against the number
      of properties you can use with Weapon Mastery) The blade vanishes immediately after it hits or misses
      its target, and it leaves no mark if it deals damage. After you attack with the blade on your turn,
      you can make a melee or ranged attack with a second psychic blade as a Bonus Action on the same
      turn if your other hand is free to create it. The damage die of this bonus attack is 1d4 instead
      of 1d6.'
  soulblades:
    title: SOUL BLADES
    level: 9
    text: You can now use the following powers with your Psychic Blades. Homing Strikes. If you make an
      attack roll with your Psychic Blade and miss the target, you can roll one Psionic Energy Die and
      add the number rolled to the attack roll. If this causes the attack to hit, the die is expended.
      Psychic Teleportation. As a Bonus Action, you manifest a Psychic Blade, expend one Psionic Energy
      Die and roll it, and throw the blade at an unoccupied space you can see up to a number of feet away
      equal to 10 times the number rolled. You then teleport to that space, and the blade vanishes.
  psychicveil:
    title: PSYCHIC VEIL
    level: 13
    text: You can weave a veil of psychic static to mask yourself. As a Magic action, you gain the Invisible
      condition for 1 hour or until you dismiss this effect (no action required). This invisibility ends
      early immediately after you deal damage to a creature or you force a creature to make a saving throw.
      Once you use this feature, vou can’t do so again until you finish a Long Rest unless you expend
      a Psionic Energy Die (no action required) to restore your use of it.
  rendmind:
    title: REND MIND
    level: 17
    text: You can sweep your Psychic Blades through a creature’s mind. When you use your Psychic Blades
      to deal Sneak Attack damage to a creature, you can force that target to make a Wisdom saving throw
      (DC 8 plus your Dexterity modifier and Proficiency Bonus). If the save fails, the target has the
      Stunned condition for 1 minute. The Stunned target repeats the save at the end of each of its turns,
      ending the effect on itself on a success. Once you use this feature, you can’t do so again until
      you finish a Long Rest unless you expend three Psionic Energy Dice (no action required) to restore
      your use of it. ‘THIEF Hunt for Treasure as a Classic Adventurer A mix of burglar, treasure hunter,
      and explorer, you are the epitome of an adventurer. In addition to improving your agility and stealth,
      you gain abilities useful for delving into ruins and getting maximum benefit from the magic items
      you find there.
  fasthands:
    title: FAST HANDS
    level: 3
    text: As a Bonus Action, you can do one of the following. Sleight of Hand. Make a Dexterity (Sleight
      of Hand) check to pick a lock or disarm a trap with Thieves’ Tools or to pick a pocket. Use an Object.
      Take the Utilize action, or take the Magic action to use a magic item that requires that action.
  secondstorywork:
    title: SECOND-STORY WORK
    level: 3
    text: You've trained to get into especially hard-to-reach places, granting you these benefits. Climber.
      You gain a Climb Speed equal to your Speed. Jumper. You can determine your jump distance using your
      Dexterity rather than your Strength.
  supremesneak:
    title: SUPREME SNEAK
    level: 9
    text: 'You gain the following Cunning Strike option. Stealth Attack (Cost: 1d6). If you have the Hide
      action’s Invisible condition, this attack doesn’t end that condition on you if you end the turn
      behind Three-Quarters Cover or Total Cover.'
  usemaaicdevice:
    title: USE Maaic DEVICE
    level: 13
    text: 'You''ve learned how to maximize use of magic items, granting you the following benefits. Attunement.
      You can attune to up to four magic items at once. Charges. Whenever you use a magic item property
      that expends charges, roll 1d6. On a roll of 6, you use the property without expending the charges.
      Scrolls. You can use any Spell Scroll, using Intelligence as your spellcasting ability for the spell.
      If the spell is a cantrip or a level 1 spell, you can cast it reliably. If the scroll contains a
      higher-level spell, you must first succeed on an Intelligence (Arcana) check (DC 10 plus the spell’s
      level). On a successful check, you cast the spell from the scroll. On a failed check, the scroll
      disintegrates. LEVEL 1|7: ‘THIEF’S REFLEXES You are adept at laying ambushes and quickly escaping
      danger. You can take two turns during the first round of any combat. You take your first turn at
      your normal Initiative and your second turn at your Initiative minus 10. THIEF SUBCLASS bt ad fa
      QO ad SO A Dazzling Mage Fi ER | S v — of with Innate Magic CORE SORCERER [TRAITS Primary Ability
      Charisma Hit Point Die Saving Throw Proficiencies D6 per Sorcerer level Constitution and Charisma
      Choose 2: Arcana, Deception, Insight, Intimidation, Persuasion, or Religion Skill Proficiencies
      Weapon Proficiencies Simple weapons Armor Training None Choose A or B: (A) Spear, 2 Daggers, Arcane
      Focus (crystal), Dungeoneer’s Pack, and 28 GP; or (B) 50 GP Starting Equipment stamped into their
      being. Some Sorcerers can''t ~ name the origin of their power, while others trace it to strange
      events in their personal or family history. The blessing of a dragon or a dryad at a baby’s birth
      or the strike of lightning from a clear sky might spark a Sorcerer''s gift. So too might the sift
      of a deity, exposure to the strange magic of another plane of existence, or a glimpse into the inner
      workings of reality. Whatever the origin, the result is an indelible mark on the Sorcerer, a churning
      magic that can be passed down through generations. Sorcerers don’t learn magic; the raw, roiling
      power of magic is part of them. The essential art of a Sorcerer is learning to harness and channel
      that innate magic, allowing the Sorcerer to discover new and staggering ways to unleash their power.
      As Sorcerers master their innate magic, they grow more attuned to its origin, developing distinct
      powers that reflect its source. Sorcerers are rare. Some family lines produce exactly one Sorcerer
      in every generation, but most of the time, the talents of sorcery appear as a fluke. People who
      have this magical power soon discover that it doesn''t like to stay quiet. A Sorcerer’s magic wants
      to be wielded. G ORCERERS WIELD INNATE MAGIC THAT IS a AS A LEVEL 1 CHARACTER - Gain all the traits
      in the Core Sorcerer Traits table. | - Gain the Sorcerer’s level 1 features, which are | listed
      in the Sorcerer Features table. AS A MULTICLASS CHARACTER | - Gain the Hit Point Die from the Core
      Sorcerer Traits table. - Gain the Sorcerer’s level 1 features, which are listed in the Sorcerer
      Features table. See the multiclassing rules in chapter 2 to determine your available spell slots.
      SORCERER CLASS FEATURES As a Sorcerer, you gain the following class features when you reach the
      specified Sorcerer levels. These features are listed in the Sorcerer Features table. LEVEL |: SPELLCASTING
      Drawing from your innate magic, you can cast spells. See chapter 7 for the rules on spellcasting.
      The information below details how you use those rules with Sorcerer spells, which appear in the
      Sorcerer spell list later in the class’s description. Cantrips. You know four Sorcerer cantrips
      of your choice. Light, Prestidigitation, Shocking Grasp, and Sorcerous Burst are recommended. Whenever
      you gain a Sorcerer level, you can replace one of your cantrips from this feature with another Sorcerer
      cantrip of your choice. When you reach Sorcerer levels 4 and 10, you learn another Sorcerer cantrip
      of your choice, as shown in the Cantrips column of the Sorcerer Features table. Spell Slots. The
      Sorcerer Features table shows how many spell slots you have to cast your level 1+ spells. You regain
      all expended slots when you finish a Long Rest. Prepared Spells of Level 1+. You prepare the list
      of level 1+ spells that are available for you to cast with this feature. To start, choose two level
      1 Sorcerer spells. Burning Hands and Detect Magic are recommended. The number of spells on your
      list increases as you gain Sorcerer levels, as shown in the Prepared Spells column of the Sorcerer
      Features table. Whenever that number increases, choose additional CHAPTER 3 | CHARACTER CLASSES
