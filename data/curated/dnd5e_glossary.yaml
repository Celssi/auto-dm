    class_id: monk
  physicianstouch:
    title: Physician'S Touch
    text: 'Your Hand of Harm and Hand of Healing improve, as detailed below. Hand of Harm. When you use
      Hand of Harm on a creature, you can also give that creature the Poisoned condition until the end
      of your next turn. Hand of Healing. When you use Hand of Healing, you can also end one of the following
      conditions on the creature you heal: Blinded, Deafened, Paralyzed, Poisoned, or Stunned.'
    level: 6
    class_id: monk
  flurryofhealingandharm:
    title: Flurry Of Healing And Harm
    text: When you use Flurry of Blows, you can replace each of the Unarmed Strikes with a use of Hand
      of Healing without expending Focus Points for the healing. In addition, when you make an Unarmed
      Strike with Flurry of Blows and deal damage, you can use Hand of Harm with that strike without expending
      a Focus Point for Hand of Harm. You can still use Hand of Harm only once per turn. You can use these
      benefits a total number of times equal to your Wisdom modifier (minimum of once). You regain all
      expended uses when you finish a Long Rest.
    class_id: monk
  handofultimatemercy:
    title: Hand Of Ultimate Mercy
    text: 'Your mastery of life energy opens the door to the ultimate mercy. As a Magic action, you can
      touch the corpse of a creature that died within the past 24 hours and expend 5 Focus Points. The
      creature then returns to life with a number of Hit Points equal to 4d10 plus your Wisdom modifier.
      If the creature died with any of the following conditions, the creature revives with the conditions
      removed: Blinded, Deafened, Paralyzed, Poisoned, and Stunned. Once you use this feature, you can’t
      use it again until you finish a Long Rest. WARRIOR OF SHADOW Harness Shadow Power for Stealth and
      Subterfuge Warriors of Shadow practice stealth and subterfuge, harnessing the power of the Shadowfell.
      They are at home in darkness, able to draw gloom around themselves to hide, leap from shadow to
      shadow, and take on a wraithlike form.'
    level: 17
    class_id: monk
  shadowarts:
    title: Shadow Arts
    text: You have learned to draw on the power of the Shadowfell, gaining the following benefits. Darkness.
      You can expend 1 Focus Point to cast the Darkness spell without spell components. You can see within
      the spell’s area when you cast it with this feature. While the spell persists, you can move its
      area of Darkness to a space within 60 feet of yourself at the start of each of your turns. Darkvision.
      You gain Darkvision with a range of 60 feet. If you already have Darkvision, its range increases
      by 60 feet. Shadowy Figments. You know the Minor Illusion spell. Wisdom is your spellcasting ability
      for it.
    level: 3
    class_id: monk
  shadowstep:
    title: Shadow Step
    text: 'While entirely within Dim Light or Darkness, you can use a Bonus Action to teleport up to 60
      feet to an unoccupied space you can see that is also in Dim Light or Darkness. You then have Advantage
      on the next melee attack you make before the end of the current turn. LEVEL ll: IMPROVED SHADOW
      STEP You can draw on your Shadowfell connection to empower your teleportation. When you use your
      Shadow Step, you can expend I Focus Point to remove the requirement that you must start and end
      in Dim Light or Darkness for that use of the feature. As part of this Bonus Action, you can make
      an Unarmed Strike immediately after you teleport.'
    level: 6
    class_id: monk
  gloakofshadows:
    title: Gloak Of Shadows
    text: As a Magic action while entirely within Dim Light or Darkness, you can expend 3 Focus Points
      to shroud yourself with shadows for 1 minute, until you have the Incapacitated condition, or until
      you end your turn in Bright Light. While shrouded by these shadows, you gain the following benefits.
      Invisibility. You have the Invisible condition. Partially Incorporeal. You can move through occupied
      spaces as if they were Difficult Terrain. If you end your turn in such a space, you are shunted
      to the last unoccupied space you were in. Shadow Flurry. You can use your Flurry of Blows without
      expending any Focus Points. —— a ay | = w o WARRIOR OF SHADOW SUBCLASS 106 WARRIOR OF THE ELEMENTS
      SUBCLASS WARRIOR OF THE ELEMENTS Wield Strikes and Bursts of Elemental Power Warriors of the Elements
      tap into the power of the Elemental Planes. Harnessing their supernatural focus, these Monks momentarily
      tame the energy of the Elemental Chaos to empower themselves in and out of battle.
    level: 17
    class_id: monk
  elementalattunement:
    title: Elemental Attunement
    text: At the start of your turn, you can expend 1 Focus Point to imbue yourself with elemental energy.
      The energy lasts for 10 minutes or until you have the Incapacitated condition. You gain the following
      benefits while this feature is active. Reach. When you make an Unarmed Strike, your reach is 10
      feet greater than normal, as elemental energy extends from you. Elemental Strikes. Whenever you
      hit with your Unarmed Strike, you can cause it to deal your choice of Acid, Cold, Fire, Lightning,
      or Thunder damage rather than its normal damage type. When you deal one of these types with it,
      you can also force the target to make a Strength saving throw. On a failed save, you can move the
      target up to 10 feet toward or away from you, as elemental energy swirls around it.
    level: 3
    class_id: monk
  manipulateelements:
    title: Manipulate Elements
    text: You know the Elementalism spell. Wisdom is your spellcasting ability for it.
    level: 3
    class_id: monk
  elementalburst:
    title: Elemental Burst
    text: 'As a Magic action, you can expend 2 Focus Points to cause elemental energy to burst in a 20-foot-radius
      Sphere centered on a point within 120 feet of yourself. Choose a damage type: Acid, Cold, Fire,
      Lightning, or Thunder. Each creature in the Sphere must make a Dexterity saving throw. On a failed
      save, a creature takes damage of the chosen type equal to three rolls of your Martial Arts die.
      On a successful save, a creature takes half as much damage.'
    level: 6
    class_id: monk
  strideoftheelements:
    title: Stride Of The Elements
    text: While your Elemental Attunement is active, you also have a Fly Speed and a Swim Speed equal
      to your Speed.
    class_id: monk
  elementalepitome:
    title: Elemental Epitome
    text: 'While your Elemental Attunement is active, you also gain the following benefits. Damage Resistance.
      You gain Resistance to one of the following damage types of your choice: Acid, Cold, Fire, Lightning,
      or Thunder. At the start of each of your turns, you can change this choice. Destructive Stride.
      When you use your Step of the Wind, your Speed increases by 20 feet until the end of the turn. For
      that duration, any creature of your choice takes damage equal to one roll of your Martial Arts die
      when you enter a space within 5 feet of it. The damage type is your choice of Acid, Cold, Fire,
      Lightning, or Thunder. A creature can take this damage only once per turn. Empowered Strikes. Once
      on each of your turns, you can deal extra damage to a target equal to one roll of your Martial Arts
      die when you hit it with an Unarmed Strike. The extra damage is the same type dealt by that strike.
      WARRIOR OF THE OPEN HAND Master Unarmed Combat Techniques Warriors of the Open Hand are masters
      of unarmed combat. They learn techniques to push and trip their opponents and manipulate their own
      energ to protect themselves from harm.'
    level: 17
    class_id: monk
  openhandtechnique:
    title: Open Hand Technique
    text: Whenever you hit a creature with an attack granted by your Flurry of Blows, you can impose one
      of the following effects on that target. Addle. The target can’t make Opportunity Attacks until
      the start of its next turn. Push. The target must succeed on a Strength saving throw or be pushed
      up to 15 feet away from you. Topple. The target must succeed on a Dexterity saving throw or have
      the Prone condition.
    level: 3
    class_id: monk
  wholenessofbody:
    title: Wholeness Of Body
    text: You gain the ability to heal yourself. As a Bonus Action, you can roll your Martial Arts die.
      You regain a number of Hit Points equal to the number rolled plus your Wisdom modifier (minimum
      of 1 Hit Point regained). You can use this feature a number of times equal to your Wisdom modifier
      (minimum of once), and you regain all expended uses when you finish a Long Rest.
    level: 6
    class_id: monk
  fleetstep:
    title: Fleet Step
    text: When you take a Bonus Action other than Step of the Wind, you can also use Step of the Wind
      immediately after that Bonus Action.
    class_id: monk
  quiveringpalm:
    title: Quivering Palm
    text: 'You gain the ability to set up lethal vibrations in someone''s body. When you hit a creature
      with an Unarmed Strike, you can expend 4 Focus Points to start these imperceptible vibrations, which
      last for a number of days equal to your Monk level. The vibrations are harmless unless you take
      an action to end them. Alternatively, when you take the Attack action on your turn, you can forgo
      one of the attacks to end the vibrations. To end them, you and the target must be on the same plane
      of existence. When you end them, the target must make a Constitution saving throw, taking 1O0d12
      Force damage on a failed save or half as much damage on a Successful one. You can have only one
      creature under the effect of this feature at a time. You can end the vibrations harmlessly (no action
      required). ‘enn FE ———— : Oe a —_& ma JS / \ Fa F ‘ CORE PALADIN TRAITS Primary Ability Strength
      and Charisma Hit Point Die Saving Throw Proficiencies D10 per Paladin level Wisdom and Charisma
      Choose 2: Athletics, Insight, Intimidation, Medicine, Persuasion, or Religion Skill Proficiencies
      Weapon Proficiencies Simple and Martial weapons Light, Medium, and Heavy armor and Shields Armor
      Training Choose A or B: (A) Chain Mail, Shield, Longsword, 6 Javelins, Holy Symbol, Priest’s Pack,
      and 9 GP: or (B) 150 GP Starting Equipment stand against the forces of annihilation and -» corruption.
      Whether sworn before a god''s altar, in a sacred glade before nature spirits, orina moment of desperation
      and grief with the dead as the only witnesses, a Paladin’s oath is a powerful bond. It is a source
      of power that turns a devout watrior into a blessed champion. Paladins train to learn the skills
      of combat, mastering a variety of weapons and armor. Even so, their martial skills are secondary
      to the magical power they wield: power to heal the injured, smite their foes, and protect the helpless
      and those who fight at their side. Almost by definition, the life of a Paladin is an adventuring
      life, for every Paladin lives on the front lines of the cosmic struggle against annihilation. Fighters
      are rare enough among the ranks of a world’s armies, but even fewer people can claim the calling
      of a Paladin. When they do receive the call, these blessed folk turn from their former occupations
      and take up arms and magic. p ALADINS ARE UNITED BY THEIR OATHS TO BECOMING A PALADIN ... AS A'
    level: 17
    class_id: monk
  layonhands:
    title: Lay On Hands
    text: Your blessed touch can heal wounds. You have a pool of healing power that replenishes when you
      finish a Long Rest. With that pool, you can restore a total number of Hit Points equal to five times
      your Paladin level. As a Bonus Action, you can touch a creature | (which could be yourself) and
      draw power from the pool of healing to restore anumber of Hit Points to that creature, up to the
      maximum amount remaining in the pool. You can also expend 5 Hit Points from the pool of healing
      power to remove the Poisoned condition from the creature; those points don’t also restore Hit Points
      to the creature.
    level: 1
    class_id: paladin
