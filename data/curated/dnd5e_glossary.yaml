      mark on you, infusing you with simmering magic. As a Bonus Action, you can unleash that magic for
      1 minute, during which you gain the following benefits: - The spell save DC of your Sorcerer spells
      increases by l. - You have Advantage on the attack rolls of Sorcerer spells you cast. You can use
      this feature twice, and you regain all expended uses of it when you finish a Long Rest.'
  fontofmagic:
    title: FONT OF MAGIC
    level: 2
    text: You can tap into the wellspring of magic within yourself. This wellspring is represented by
      Sorcery Points, which allow you to create a variety of magical effects. You have 2 Sorcery Points,
      and you gain more as you reach higher levels, as shown in the Sorcery Points column of the Sorcerer
      Features table. You can't have more Sorcery Points than the number shown in the table for your level.
      You regain all expended Sorcery Points when you finish a Long Rest. You can use your Sorcery Points
      to fuel the options below, along with other features, such as Metamagic, that use those points.
      Converting Spell Slots to Sorcery Points. You can expend a spell slot to gain a number of Sorcery
      Points equal to the slot’s level (no action required). Creating Spell Slots. As a Bonus Action,
      you can transform unexpended Sorcery Points into one spell slot. The Creating Spell Slots table
      shows the cost of creating a spell slot of a given level, and it lists the minimum Sorcerer level
      you must be to create a slot. You can create a spell slot no higher than level 5. Any spell slot
      you create with this feature vanishes when you finish a Long Rest. CREATING SPELL SLOTS Spell Slot
      Sorcery Point Min. Sorcerer Level Cost Level 1 2 2 2 3 3 3 5 5 4 6 7 5 7 9
  metamagic:
    title: METAMAGIC
    level: 2
    text: Because your magic flows from within, you can alter your spells to suit your needs; you gain
      two Metamagic options of your choice from “Metamagic Options” later in this class’s description.
      You use the chosen options to temporarily modify spells you cast. To use an option, you must spend
      the number of Sorcery Points that it costs. You can use only one Metamagic option on a spell when
      you cast it unless otherwise noted in one of those options. Whenever you gain a Sorcerer level,
      you can replace one of your Metamagic options with one you don't know. You gain two more options
      at Sorcerer level 10 and two more at Sorcerer level 17.
  sorcerersubclass:
    title: SORCERER SUBCLASS
    level: 3
    text: You gain a Sorcerer subclass of your choice. The Aberrant Sorcery, Clockwork Sorcery, Draconic
      Sorcery, and Wild Magic Sorcery subclasses are detailed after this class’s description. A subclass
      is a specialization that grants you features at certain Sorcerer levels. For the rest of your career,
      you gain each of your subclass’s features that are of your Sorcerer level or lower.
  sorcerousrestoration:
    title: SORCEROUS RESTORATION
    level: 5
    text: When you finish a Short Rest, you can regain expended Sorcery Points, but no more than a number
      equal to half your Sorcerer level (round down). Once you use this feature, you can’t do so again
      until you finish a Long Rest.
  sorceryincarnate:
    title: SORCERY INCARNATE
    level: 7
    text: If you have no uses of Innate Sorcery left, you can use it if you spend 2 Sorcery Points when
      you take the Bonus Action to activate it. In addition, while your Innate Sorcery feature is active,
      you can use up to two of your Metamagic options on each spell you cast.
  arcaneapotheosis:
    title: ARCANE APOTHEOSIS
    level: 20
    text: 'While your Innate Sorcery feature is active, you can use one Metamagic option on each of your
      turns without spending Sorcery Points on it. METAMAGIC OPTIONS The following options are available
      to your Metamagic feature. The options are presented in alphabetical order. CAREFUL SPELL Cost:
      1 Sorcery Point When you cast a spell that forces other creatures to make a saving throw, you can
      protect some of those creatures from the spell’s full force. To do so, spend | Sorcery Point and
      choose a number of those creatures up to your Charisma modifier (minimum of one creature). A chosen
      creature automatically succeeds on its saving throw against the spell, and it takes no damage if
      it would normally take half damage on a successful save. DISTANT SPELL Cost: 1 Sorcery Point When
      you cast a spell that has a range of at least 5 feet, you can spend 1 Sorcery Point to double the
      spell’s range. Or when you cast a spell that has a range of Touch, you can spend 1 Sorcery Point
      to make the spell’s range 30 feet. CHAPTER 3 | CHARACTER CLASSES IAI —— 142 a ae EMPOWERED SPELL
      Cost: 1 Sorcery Point When you roll damage for a spell, you can spend 1 Sorcery Point to reroll
      a number of the damage dice up to your Charisma modifier (minimum of one), and you must use the
      new rolls. You can use Empowered Spell even if you''ve already used a different Metamagic option
      during the casting of the spell. EXTENDED SPELL Cost: 1 Sorcery Point When you cast a spell that
      has a duration of 1 minute or longer, you can spend | Sorcery Point to double its duration to a
      maximum duration of 24 hours. If the affected spell requires Concentration, you have Advantage on
      any saving throw you make to maintain that Concentration. CHAPTER 3 | CHARACTER CLASSES TIEIGHTENED
      SPELL Cost: 2 Sorcery Points When you cast a spell that forces a creature to make a saving throw,
      you can spend 2 Sorcery Points to give one target of the spell Disadvantage on Saves against the
      spell. QUICKENED SPELL Cost: 2 Sorcery Points When you cast a spell that has a casting time of an
      action, you can spend 2 Sorcery Points to change the casting time to a Bonus Action for this casting.
      You can’t modify a spell in this way if you’ve already cast a level 1+ spell on the current turn,
      nor can you cast a level 1+ spell on this turn after modifying a spell in this way. SEEKING SPELL
      Cost: 1 Sorcery Point If you make an attack roll for a spell and miss, you can spend 1 Sorcery Point
      to reroll the d20, and you must use the new roll. You can use Seeking Spell even if you''ve already
      used a different Metamagic option during the casting of the spell. SUBTLE SPELL Cost: 1 Sorcery
      Point When you cast a spell, you can spend 1 Sorcery Point to cast it without any Verbal, Somatic,
      or Material components, except Material components that are consumed by the spell or that have a
      cost specified in the spell. ‘TRANSMUTED SPELL Cost: I Sorcery Point When you cast a spell that
      deals a type of damage from the following list, you can spend 1 Sorcery Point to change that damage
      type to one of the other listed types: Acid, Cold, Fire, Lightning, Poison, Thunder. TWINNED SPELL
      Cost: 1 Sorcery Point When you cast a spell, such as Charm Person, that can be cast with a higher-level
      spell slot to target an additional creature, you can spend 1 Sorcery Point to increase the spell’s
      effective level by 1. SORCERER SPELL LIST This section presents the Sorcerer spell list. The spells
      are organized by spell level and then alphabetized, and each spell’s school of magic is listed.
      In the Special column, C means the spell requires Concentration, R means it’s a Ritual, and M means
      it requires a specific Material component. CANTRIPS (LEVEL O SORCERER SPELLS} Spell Acid Splash
      Blade Ward Chill Touch Dancing Lights Elementalism Fire Bolt Friends Light Mage Hand Mending Message
      Mind Sliver Minor Illusion Poison Spray Prestidigitation Ray of Frost Shocking Grasp Sorcerous Burst
