      can command the familiar to take the Attack action. Necrotic or Radiant Damage. Whenever the familiar
      deals Bludgeoning, Piercing, or Slashing damage, you can make it deal Necrotic or Radiant damage
      instead. Your Save DC. |If the familiar forces a creature to make a saving throw, it uses your spell
      save DC. CHAPTER 3 | CHARACTER CLASSES Resistance. When the familiar takes damage, you can take
