    level: 6
    class_id: druid
  stormborn:
    title: Stormborn
    text: Your Wrath of the Sea confers two more benefits while active, as detailed below. Flight. You
      gain a Fly Speed equal to your Speed. Resistance. You have Resistance to Cold, Lightning, and Thunder
      damage. CHAPTER 3 | CHARACTER CLASSES 87 ——————————— CIRCLE OF THE SEA SUBCLASS
    level: 10
    class_id: druid
  oceanicgift:
    title: Oceanic Gift
    text: Instead of manifesting the Emanation of Wrath of the Sea around yourself, you can manifest it
      around one willing creature within 60 feet of yourself. That creature gains all the benefits of
      the Emanation and uses your spell save DC and Wisdom modifier for it. In addition, you can manifest
      the Emanation around both the other creature and yourself if you expend two uses of your Wild Shape
      instead of one when manifesting it. CIRCLE OF THE STARS Harness Secrets Hidden in Constellations
      The Circle of the Stars has tracked heavenly patterns since time immemorial, discovering secrets
      hidden amid the constellations. By understanding these secrets, the Druids of this circle seek to
      harness the powers of the cosmos.
    level: 14
    class_id: druid
  starmap:
