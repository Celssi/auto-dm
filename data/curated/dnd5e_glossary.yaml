  naturessanctuary:
    title: Nature'S Sanctuary
    text: As a Magic action, you can expend a use of your Wild Shape and cause spectral trees and vines
      to appear in a 15-foot Cube on the ground within 120 feet of yourself. They last there for 1 minute
      or until you have the Incapacitated condition or die. You and your allies have Half Cover while
