    level: 15
    class_id: paladin
  elderchampion:
    title: Elder Champion
    text: As a Bonus Action, you can imbue your Aura of Protection with primal power, granting the benefits
      below for 1 minute or until you end them (no action required). Once you use this feature, you can’t
      use it again until you finish a Long Rest. You can also restore your use of it by expending a
    level: 20
    class_id: paladin
  spellslot:
    title: spell slot
    text: '(no action required). Diminish Defiance. Enemies in the aura have Disadvantage on saving throws
      against your spells and Channel Divinity options. Regeneration. At the start of each of your turns,
      you regain 10 Hit Points. Swift Spells. Whenever you cast a spell that has a casting time of an
      action, you can cast it using a Bonus Action instead. OATH OF VENGEANCE Punish Evildoers at Any
      Cost The Oath of Vengeance is a solemn commitment to punish those who have committed grievously
      evil acts. When evil armies slaughter helpless villagers, when a tyrant defies the will of the gods,
      when a thieves’ guild grows too violent, when a dragon rampages through the countryside—at times
      like these, paladins arise and swear an Oath of Vengeance to set right what has gone wrong. These
      paladins share the following tenets: - Show the wicked no mercy. - Fight injustice and its causes.
      - Aid those harmed by injustice.'
    level: 5
    class_id: paladin
  oathofvengeancespells:
    title: Oath Of Vengeance Spells
    text: The magic of your oath ensures you always have certain spells ready; when you reach a Paladin
      level specified in the Oath of Vengeance Spells table, you thereafter always have the listed spells
      prepared. OATH OF VENGEANCE SPELLS Paladin Level Spells 3 Bane, Hunter’s Mark 5 Hold Person, Misty
      Step 9 Haste, Protection from Energy 13 Banishment, Dimension Door 17 Hold Monster, Scrying
    level: 3
    class_id: paladin
  vowofenmity:
    title: Vow OF ENMITY
    text: When you take the Attack action, you can expend one use of your Channel Divinity to utter a
      vow of enmity against a creature you can see within 30 feet of yourself. You have Advantage on attack
      rolls against the creature for 1 minute or until you use this feature again. If the creature drops
      to O Hit Points before the vow ends, you can transfer the vow to a different creature within 30
      feet of yourself (no action required).
    level: 3
    class_id: paladin
  relentlessavenger:
    title: Relentless Avenger
    text: Your supernatural focus helps you close off a foe's retreat. When you hit a creature with an
      Opportunity Attack, you can reduce the creature's Speed to O until the end of the current turn.
      You can then move up to half your Speed as part of the same Reaction. This movement doesn’t provoke
      Opportunity Attacks.
    level: 7
    class_id: paladin
  soulofvengeance:
    title: Soul Of Vengeance
    text: Immediately after a creature under the effect of your Vow of Enmity hits or misses with an attack
      roll, you can take a Reaction to make a melee attack against that creature if it’s within range.
    level: 15
    class_id: paladin
  avengingangel:
    title: Avenging Angel
    text: As a Bonus Action, you gain the benefits below for 10 minutes or until you end them (no action
      required). Once you use this feature, you can’t use it again until you finish a Long Rest. You can
      also restore your use of it by expending a
    level: 20
    class_id: paladin
  ranger_spellcasting:
    title: Spellcasting
    text: You have learned to channel the magical essence of nature to cast spells. See chapter 7 for
      the rules on spellcasting. The information below details how you use those rules with Ranger spells,
      which appear in the Ranger spell list later in the class’s description. Spell Slots. The
    level: 1
    class_id: ranger
  rangerspellscurewoundsandensnaringstrikeare:
    title: Ranger spells. Cure Wounds and Ensnaring Strike are
    text: recommended. The number of spells on your list increases as you gain Ranger levels, as shown
      in the Prepared Spells column of the
    level: 1
    class_id: ranger
  favoredenemy:
    title: Favored Enemy
    text: You always have the Hunter's Mark spell prepared. You can cast it twice without expending a
      spell slot, and you regain all expended uses of this ability when you finish a Long Rest. The number
      of times you can cast the spell without a spell slot increases when you reach certain Ranger levels,
      as shown in the Favored Enemy column of the
    level: 1
    class_id: ranger
  ranger_weaponmastery:
    title: Weapon Mastery
    text: Your training with weapons allows you to use the mastery properties of two kinds of weapons
      of your choice with which you have proficiency, such as Longbows and Shortswords. Whenever you finish
      a Long Rest, you can change the kinds of weapons you chose. For example, you could switch to using
      the mastery properties of Scimitars and Longswords.
    level: 1
    class_id: ranger
  deftexplorer:
    title: Deft Explorer
    text: Thanks to your travels, you gain the following benefits. Expertise. Choose one of your skill
      proficiencies with which you lack Expertise. You gain Expertise in that skill. Languages. You know
      two languages of your choice from the language tables in chapter 2.
    level: 2
    class_id: ranger
  ranger_fightingstyle:
    title: Fighting Style
    text: You gain a Fighting Style feat of your choice (see chapter 5). Instead of choosing one of those
      feats, you can choose the option below. Druidic Warrior. You learn two Druid cantrips of your choice
      (see the Druid class's section for a list of CHAPTER 3 | CHARACTER CLASSES Favored Prepared —Spell
      Slots per Spell Level— Enemy Spells 1 2 3 4 5 2 2 2 —- —- —> — 2 3 2 —- — 2 4 3 —- —- —- — 2 5 3
