  warlock_spellcasting:
    title: Spellcasting
    level: 1
    class_id: warlock
    text: ability to cast spells. See chapter 7 for the rules on spellcasting. The information below details
      how you use those rules with Warlock spells, which appear in the Warlock spell list later in the
      class’s description.
  batteringroots:
    title: Battering Roots
    text: During your turn, your reach is 10 feet greater with any Melee weapon that has the Heavy or
      Versatile property, as tendrils of the World Tree extend from you. When you hit with such a weapon
      on your turn, you can activate the Push or Topple mastery property in addition to a different mastery
      property youre using with that weapon.
  feyreinforcements:
    title: Fey Reinforcements
    text: You can cast Summon Fey without a Material component. You can also cast it once without a spell
      slot, and you regain the ability to cast it in this way when you finish a Long Rest. Whenever you
      start casting the spell, you can modify it so that it doesn’t require Concentration. If you do so,
      the spell’s duration becomes 1 minute for that casting.
  illusoryreality:
    title: Illusory Reality
    text: 'You have learned to weave shadow magic into your illusions to give them a semi-reality. When
      you cast an Illusion spell with a spell slot, you can choose one inanimate, nonmagical object that
      is part of the illusion and make that object real. You can do this on your turn as a Bonus Action
      while the spell is ongoing. The object remains real for 1 minute, during ae ILLUSIONIST which it
      can''t deal damage or give any conditions. We 23s Suacass For example, you can create an illusion
      of a bridge over a chasm and then make it real and cross it. Not EVEN A WHITE DRAGON''S WRATH CAN
      CHILL THESE HEROES OF THE FORGOTTEN REALMS: LAERAL SILVERHAND, Drizzt Do’URDEN, ANO VAURA SAFAHR.'
  improvedshadowstep:
    title: Improved Shadow Step
    text: You can draw on your Shadowfell connection to empower your teleportation. When you use your
      Shadow Step, you can expend I Focus Point to remove the requirement that you must start and end
      in Dim Light or Darkness for that use of the feature. As part of this Bonus Action, you can make
      an Unarmed Strike immediately after you teleport.
  signaturespells:
    title: Signature Spells
    text: The number of spells on your list increases as you gain Wizard levels, as shown in the Prepared
      Spells column of the
  tacticalmaster:
    title: Tactical Master
    text: 'When you attack with a weapon whose mastery property you can use, you can replace that property
      with the Push, Sap, or Slow property for that attack. LEVEL 1]: Two EXTRA ATTACKS You can attack
      three times instead of once whenever you take the Attack action on your turn.'
  warmagic:
    title: War Magic
    text: When you take the Attack action on your turn, you can replace two of the attacks with a casting
      of one of your level 1 or level 2 Wizard spells that has a casting time of an action. CHAPTER 3
