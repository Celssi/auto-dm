      a feat that is a prerequisite for any of your other feats or features. CHAPTER 7 | SPELLS Q41 ia
      34-2 A HALFLING WARLOCK ZAPS A LOMBIE WITH THE GRASPING LIGHTNING OF WiTcH BOLT. Roll Redo. You
      undo a single recent event by forcing areroll of any die roll made within the last round (including
      your last turn). Reality reshapes itself to accommodate the new result. For example, a Wish spell
      could undo an ally’s failed saving throw or a foe’s Critical Hit. You can force the reroll to be
