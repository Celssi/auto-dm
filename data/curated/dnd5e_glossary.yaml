  antilifeshell:
    title: Antilife Shell
    level: 5
    school: Abjuration
    classes: Druid
    casting_time: Action
    range: Self
    components: V, S
    duration: Concentration, up to 1 hour
    text: An aura extends from you in a 10-foot Emanation for the duration. The aura prevents creatures
      other than Constructs and Undead from passing or reaching through it. An affected creature can cast
      spells or make attacks with Ranged or Reach weapons through the barrier. If you move so that an
      affected creature is forced to pass through the barrier, the spell ends.
  antimagicfield:
    title: Antimagic Field
    level: 8
    school: Abjuration
    classes: Cleric, Wizard
    casting_time: Action
    range: Self
    components: V, S, M (iron filings)
    duration: Concentration, up to 1 hour
    text: An aura of antimagic surrounds you in 10-foot Emanation. No one can cast spells, take Magic
      actions, or create other magical effects inside the aura, and those things can’t target or otherwise
      affect anything inside it. Magical properties of magic items don’t work inside the aura or on anything
      inside it. Areas of effect created by spells or other magic can't extend into the aura, and no one
      can teleport into or out of it or use planar travel there. Portals close temporarily while in the
      aura. Ongoing spells, except those cast by an Artifact or a deity, are suppressed in the area. While
      an effect is suppressed, it doesn’t function, but the time it spends suppressed counts against its
      duration. Dispel Magic has no effect on the aura, and the auras created by different Antimagic Field
      spells don’t nullify each other. CHAPTER 7 | SPELLS 241 24.2
  antipathysympathy:
    title: Antipathy/Sympathy
    level: 8
    school: Enchantment
    classes: Bard, Druid, Wizard
    casting_time: 1 hour
    range: 60 feet
    components: V, S, M (a mix of vinegar and honey)
    duration: 10 days
    text: 'As you cast the spell, choose whether it creates antipathy or sympathy, and target one creature
      or object that is Huge or smaller. Then specify a kind of creature, such as red dragons, goblins,
      or vampires. A creature of the chosen kind makes a Wisdom saving throw when it comes within 120
      feet of the target. Your choice of antipathy or sympathy determines what happens to a creature when
      it fails that save: Antipathy. The creature has the Frightened condition. The Frightened creature
      must use its movement on its turns to get as far away as possible from the target, moving by the
      safest route. Sympathy. The creature has the Charmed condition. The Charmed creature must use its
      movement on its turns to get as close as possible to the target, moving by the safest route. If
      the creature is within 5 feet of the target, the creature can’t willingly move away. If the target
      damages the Charmed creature, that creature can make a Wisdom saving throw to end the effect, as
      described below. Ending the Effect. If the Frightened or Charmed creature ends its turn more than
      120 feet away from the target, the creature makes a Wisdom saving throw. On a successful save, the
      creature is no longer affected by the target. A creature that successfully saves against this effect
      is immune to it for 1 minute, after which it can be affected again.'
  arcaneeye:
    title: Arcane Eye
    level: 4
    school: Divination
    classes: Wizard
    casting_time: Action
    range: 30 feet
    components: V, S, M (a bit of bat fur)
    duration: Concentration, up to 1 hour
    text: You create an Invisible, invulnerable eye within range that hovers for the duration. You mentally
      receive visual information from the eye, which can see in every direction. It also has Darkvision
      with a range of 30 feet. As a Bonus Action, you can move the eye up to 30 feet in any direction.
      A solid barrier blocks the eye’s movement, but the eye can pass through an opening as small as 1
      inch in diameter. CHAPTER 7 | SPELLS
  arcanegate:
    title: Arcane Gate
    level: 6
    school: Conjuration
    classes: Sorcerer, Warlock, Wizard
    casting_time: Action
    range: 500 feet
    components: V, S
    duration: Concentration, up to 10 minutes
    text: You create linked teleportation portals. Choose two Large, unoccupied spaces on the ground that
      you can see, one space within range and the other one within 10 feet of you. A circular portal opens
      in each of those spaces and remains for the duration. The portals are two-dimensional glowing rings
      filled with mist that blocks sight. They hover inches from the ground and are perpendicular to it.
      A portal is open on only one side (you choose which). Anything entering the open side of a portal
      exits from the open side of the other portal as if the two were adjacent to each other. As a Bonus
      Action, you can change the facing of the open sides.
  arcanelock:
    title: Arcane Lock
    level: 2
    school: Abjuration
    classes: Wizard
    casting_time: Action
    range: Touch
    components: V, S, M (gold dust worth 25+ GP, which
    duration: Until dispelled
    text: You touch a closed door, window, gate, container, or hatch and magically lock it for the duration.
      This lock can't be unlocked by any nonmagical means. You and any creatures you designate when you
      cast the spell can open and close the object despite the lock. You can also set a password that,
      when spoken within 5 feet of the object, unlocks it for 1 minute.
  arcanevigor:
    title: Arcane Vigor
    level: 2
    school: Abjuration
    classes: Sorcerer, Wizard
    casting_time: Bonus Action
    range: Self
    duration: Instantaneous
    text: You tap into your life force to heal yourself. Roll one or two of your unexpended Hit Point
      Dice, and regain a number of Hit Points equal to the roll’s total plus your spellcasting ability
      modifier. Those dice are then expended. Using a Higher-Level Spell Slot. The number of unexpended
      Hit Dice you can roll increases by one for each spell slot level above 2. A GOLIATH WARLOCK CALLS
      ON ARMOR OF AGATHYS AND ARMS OF MADAR TO BATTLE - ; FOES FROM THE DEEP.
  armorofagathys:
    title: Armor Of Agathys
    level: 1
    school: Abjuration
    classes: Warlock
    casting_time: Bonus Action
    range: Self
    components: V, S, M (a shard of blue glass)
    duration: 1 hour
    text: Protective magical frost surrounds you. You gain 5 Temporary Hit Points. If a creature hits
      you with a melee attack roll before the spell ends, the creature takes 5 Cold damage. The spell
      ends early if you have no Temporary Hit Points. Using a Higher-Level Spell Slot. The Temporary Hit
      Points and the Cold damage both increase by 5 for each spell slot level above 1.
  armsofhadar:
    title: Arms Of Hadar
    level: 1
    school: Conjuration
    classes: Warlock
    casting_time: Action
    range: Self
    components: V, S
    duration: Instantaneous
    text: Invoking Hadar, you cause tendrils to erupt from yourself. Each creature in a 10-foot Emanation
      originating from you makes a Strength saving throw. On a failed save, a target takes 2d6 Necrotic
      damage and can’t take Reactions until the start of its next turn. On a successful save, a target
      takes half as much damage only. Using a Higher-Level Spell Slot. The damage increases by Id6 for
      each spell slot level above 1.
  astralprojection:
    title: Astral Projection
    level: 9
    school: Necromancy
    classes: Cleric, Warlock, Wizard
    casting_time: 1] hour
    range: 10 feet
    components: V, S, M (for each of the spell’s targets,
    duration: Until dispelled
    text: You and up to eight willing creatures within range project your astral bodies into the Astral
      Plane (the spell ends instantly if you are already on that plane). Each target's body is left behind
      in a state of suspended animation; it has the Unconscious condition, doesn’t need food or air, and
      doesn’t age. A target’s astral form resembles its body in almost every way, replicating its game
      statistics and possessions. The principal difference is the addition of a silvery cord that trails
      from between the shoulder blades of the astral form. The cord fades from view after 1 foot. If the
      cord is cut—which happens only when an effect states that it does so—the target’s body and astral
      form both die. CHAPTER 7 | SPELLS 244 A target’s astral form can travel through the Astral Plane.
      The moment an astral form leaves that plane, the target’s body and possessions travel along the
      silver cord, causing the target to re-enter its body on the new plane. Any damage or other effects
      that apply to an astral form have no effect on the target’s body and vice versa. If a target’s body
      or astral form drops to O Hit Points, the spell ends for that target. The spell ends for all the
      targets if you take a Magic action to dismiss it. When the spell ends for a target who isn’t dead,
      the target reappears in its body and exits the state of suspended animation.
  augury:
    title: Augury
    level: 2
    school: Divination
    classes: Cleric, Druid, Wizard
    casting_time: 1 minute or Ritual
    range: Self
    components: V, S, M (specially marked sticks, bones,
    duration: Instantaneous
    text: You receive an omen from an otherworldly entity about the results of a course of action that
