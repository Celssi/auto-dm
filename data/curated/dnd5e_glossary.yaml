  discipleoflife:
    title: Disciple Of Life
    text: When a spell you cast with a spell slot restores Hit Points to a creature, that creature regains
      additional Hit Points on the turn you cast the spell. The additional Hit Points equal 2 plus the
      spell slot’s level.
    level: 3
    class_id: cleric
  lifedomainspells:
    title: Life Domain Spells
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the Life Domain Spells table, you thereafter always have the listed
      spells prepared. LIFE DOMAIN SPELLS Cleric Level Prepared Spells 3 Aid, Bless, Cure Wounds, Lesser
      Restoration Mass Healing Word, Revivify Aura of Life, Death Ward 9 Greater Restoration, Mass Cure
      Wounds
    level: 3
    class_id: cleric
  preservelife:
    title: Preserve Life
    text: As a Magic action, you present your Holy Symbol and expend a use of your Channel Divinity to
      evoke healing energy that can restore a number of Hit Points equal to five times your Cleric level.
      Choose Bloodied creatures within 30 feet of yourself (which can include vou), and divide those Hit
      Points among them. This feature can restore a creature to no more than half its Hit Point maximum.
      CHAPTER 3 | CHARACTER CLASSES 72 See Hine.
    level: 3
    class_id: cleric
  blessedhealer:
    title: Blessed Healer
    text: The healing spells you cast on others heal you as well. Immediately after you cast a spell with
      a spell slot that restores Hit Points to one or more creatures other than yourself, you regain Hit
      Points equal to 2 plus the spell slot's level.
    level: 6
    class_id: cleric
  supremehealing:
    title: Supreme Healing
    text: When you would normally roll one or more dice to restore Hit Points to a creature with a spell
      or Channel Divinity, don't roll those dice for the healing; instead use the highest number possible
      for each die. For example, instead of restoring 2d6 Hit Points to a creature with a spell, you restore
      12. Se 7 ae _——— -t- +> ~ - =< — — = aes = + LIGHT DOMAIN Bring Light to Banish Darkness The Light
      Domain emphasizes the divine power to bring about blazing fire and revelation. Clerics who wield
      this power are enlightened souls infused with radiance and the power of their deities’ discerning
      vision, charged with chasing away lies and burning away darkness. The Light Domain is associated
      with gods of truth, vigilance, beauty, insight, and renewal. Some of these gods are identified with
      the sun or as charioteers who guide the sun across the sky. Others are sentinels who pierce deception.
      Some are deities of beauty and artistry who teach that art is a vehicle for the soul’s improvement.
    level: 17
    class_id: cleric
  lightdomainspells:
    title: Light Domain Spells
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the Light Domain Spells table, you thereafter always have the
      listed spells prepared. LiGHT DOMAIN SPELLS Cleric Level Prepared Spells 3 Burning Hands, Faerie
      Fire, Scorching Ray, See Invisibility 5 Daylight, Fireball Arcane Eye, Wall of Fire 9 Flame Strike,
      Scrying
    level: 3
    class_id: cleric
  radianceofthedawn:
    title: Radiance Of The Dawn
    text: As a Magic action, you present your Holy Symbol and expend a use of your Channel Divinity to
      emit a flash of light in a 30-foot Emanation originating from yourself. Any magical Darkness—such
      as that created by the Darkness spell—in that area is dispelled. Additionally, each creature of
      your choice in that area must make a Constitution saving throw, taking Radiant damage equal to 2d10
      plus your Cleric level on a failed save or half as much damage on a successful one.
    level: 3
    class_id: cleric
  wardingflare:
    title: Warding Flare
    text: When a creature that you can see within 3O feet of yourself makes an attack roll, you can take
      a Reaction to impose Disadvantage on the attack roll, causing light to flare before it hits or misses.
      You can use this feature a number of times equal to your Wisdom modifier (minimum of once). You
      regain all expended uses when you finish a Long Rest.
    level: 3
    class_id: cleric
  improvedwardingflare:
    title: Improved Warding Flare
    text: You regain all expended uses of your Warding Flare when you finish a Short or Long Rest. In
      addition, whenever you use Warding Flare, you can give the target of the triggering attack a number
      of Temporary Hit Points equal to 2d6 plus your Wisdom modifier.
    level: 6
    class_id: cleric
  coronaoflight:
    title: Corona Of Light
    text: As a Magic action, you cause yourself to emit an aura of sunlight that lasts for 1 minute or
      until you dismiss it (no action required). You emit Bright Light in a 60-foot radius and Dim Light
      for an additional 30 feet. Your enemies in the Bright Light have Disadvantage on saving throws against
      your Radiance of the Dawn and any spell that deals Fire or Radiant damage. You can use this feature
      a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses
      when you finish a Long Rest. TRICKERY DOMAIN Make Mischief and Challenge Authority The Trickery
      Domain offers magic of deception, illusion, and stealth. Clerics who wield this magic are a disruptive
      force in the world, puncturing pride, mocking tyrants, freeing captives, and flouting hollow traditions.
      They prefer subterfuge and pranks to direct confrontation. Gods of trickery are mischief-makers
      and instigators who stand as a constant challenge to the accepted order among both gods and mortals.
      They embody the forces of change and social upheaval, and they're patrons of thieves, scoundrels,
      gamblers, rebels, and liberators. Religious orders that operate in secret, especially those that
      seek to undermine oppressive governments or hierarchies, also draw on the power of the Trickery
      Domain.
    level: 17
    class_id: cleric
  blessingofthetrickster:
    title: Blessing Of The [Trickster
    text: As a Magic action, you can choose yourself or a willing creature within 30 feet of yourself
      to have Advantage on Dexterity (Stealth) checks. This blessing lasts until you finish a Long Rest
      or you use this feature again.
    level: 3
    class_id: cleric
  invokeduplicity:
    title: Invoke Duplicity
    text: As a Bonus Action, you can expend one use of your Channel Divinity to create a perfect visual
      illusion of yourself in an unoccupied space you can see within 30 feet of yourself. The illusion
      is intangible and doesn’t occupy its space. It lasts for 1 minute, but it ends early if you dismiss
      it (no action required) or have the Incapacitated condition. The illusion is animated and mimics
      your expressions and Fa LIGHT DOMAIN ; iA _ Suspciass * gestures. While it persists, you gain the
      following benefits. Cast Spells. You can cast spells as though you were in the illusion’s space,
      but you must use your own senses. Distract. When both you and your illusion are within 5 feet of
      a creature that can see the illusion, you have Advantage on attack rolls against that creature,
      given how distracting the illusion is to the target. Move. As a Bonus Action, you can move the illusion
      up to 30 feet to an unoccupied space you can see that is within 120 feet of yourself.
    level: 3
    class_id: cleric
  trickerydomainspells:
    title: Trickery Domain Spells
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the Trickery Domain Spells table, you thereafter always have the
      listed spells prepared. TRICKERY DOMAIN SPELLS Cleric Level Prepared Spells 3 Charm Person, Disguise
      Self, Invisibility, Pass without Trace Hypnotic Pattern, Nondetection Confusion, Dimension Door
      9 Dominate Person, Modify Memory
    level: 3
    class_id: cleric
  tricksterstransposition:
    title: Trickster’S Transposition
    text: Whenever you take the Bonus Action to create or move the illusion of your Invoke Duplicity,
      you can teleport, swapping places with the illusion.
    level: 6
    class_id: cleric
  improvedduplicity:
    title: Improved Duplicity
    text: The illusion of your Invoke Duplicity has grown more powerful in the following ways. Shared
      Distraction. When you and your allies make attack rolls against a creature within 5 feet of the
      illusion, the attack rolls have Advantage. Healing Illusion. When the illusion ends, you or a creature
      of your choice within 5 feet of it regains a number of Hit Points equal to your Cleric level. WAR
      DOMAIN Inspire Valor and Smite Foes War has many manifestations. It can make heroes of ordinary
      people. It can be desperate and horrific, with acts of cruelty and cowardice eclipsing instances
      of excellence and courage. Clerics | TRICKERY DOMAIN | SUBCLASS who tap into the magic of the War
      Domain excel in battle, inspiring others to fight the good fight or offering acts of violence as
      prayers. Gods of the War Domain watch over warriors and reward them for their great deeds. They
      include champions of honor and chivalry as well as gods of destruction and pillage. Other war gods
      take a more neutral stance, promoting war in all its manifestations and supporting warriors in any
      circumstance.
    level: 17
    class_id: cleric
  guidedstrike:
    title: Guided Strike
    text: When you or a creature within 30 feet of you misses with an attack roll, you can expend one
      use of your Channel Divinity and give that roll a +10 bonus, potentially causing it to hit. When
      you use this feature to benefit another creature's attack roll, you must take a Reaction to do so.
    level: 3
    class_id: cleric
  wardomainspells:
    title: War Domain Spells
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the War Domain Spells table, you thereafter always have the listed
      spells prepared. WAR DOMAIN SPELLS Cleric Level Prepared Spells 3 Guiding Bolt, Magic Weapon, Shield
      of Faith, Spiritual Weapon 5 Crusader’s Mantle, Spirit Guardians 7 Fire Shield, Freedom of Movement
      9 Hold Monster, Steel Wind Strike
    level: 3
    class_id: cleric
  warpriest:
