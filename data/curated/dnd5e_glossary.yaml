  memorizespelllevel19epicboon:
    title: 'MEMORIZE SPELL LEVEL 19: Epic BooN'
    level: 5
    text: Whenever you finish a Short Rest, you can study your spellbook and replace one of the level
      1+ Wizard spells you have prepared for your Spellcasting feature with another level 1+ spell from
      the book. You gain an Epic Boon feat (see chapter 5) or another feat of your choice for which you
      qualify. Boon of Spell Recall is recommended.
  signaturespells:
    title: SIGNATURE SPELLS
    level: 20
    text: Choose two level 3 spells in your spellbook as your signature spells. You always have these
      spells prepared, and you can cast each of them once at level 3 without expending a spell slot. When
      you do so, you can't cast them in this way again until you finish a Short or Long Rest. To cast
      either spell at a higher level, you must expend a spell slot.
  spellmastery:
    title: SPELL MASTERY
    level: 18
    text: You have achieved such mastery over certain spells that you can cast them at will. Choose a
      level 1 and a level 2 spell in your spellbook that have a casting time of an action. You always
      have those spells prepared, and you can cast them at their lowest level without expending a spell
      slot. To cast either spell at a higher level, you must expend a spell slot. CHAPTER 3 | CHARACTER
