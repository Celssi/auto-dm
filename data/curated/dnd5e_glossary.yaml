      WITH THE GRASPING LIGHTNING OF WiTcH BOLT. Roll Redo. You undo a single recent event by forcing
      areroll of any die roll made within the last round (including your last turn). Reality reshapes
      itself to accommodate the new result. For example, a Wish spell could undo an ally’s failed saving
      throw or a foe’s Critical Hit. You can force the reroll to be made with Advantage or Disadvantage,
      and you choose whether to use the reroll or the original roll. Reshape Reality. You may wish for
      something not included in any of the other effects. To do so, state your wish to the DM as precisely
      as possible. The DM has great latitude in ruling what occurs in such an instance; the greater the
      wish, the greater the likelihood that something goes wrong. This spell might simply fail, the effect
      you desire might be achieved only in part, or you might suffer an unforeseen consequence as a result
      of how you worded the wish. For example, wishing that a villain were dead might propel you forward
      in time to a period when that villain is no longer alive, effectively removing you from the game.
      Similarly, wishing for a Legendary magic item or an Artifact might instantly transport you to the
      CHAPTER 7 | SPELLS presence of the item’s current owner. If your wish is granted and its effects
      have consequences for a whole community, region, or world, you are likely to attract powerful foes.
