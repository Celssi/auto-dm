    level: 1
    class_id: rogue
  magehandlegerdemain:
    title: Mage Hand Legerdemain
    text: When you cast Mage Hand, you can cast it as a Bonus Action, and you can make the spectral hand
      Invisible. You can control the hand as a Bonus Action, and through it, you can make Dexterity (Sleight
      of Hand) checks.
    level: 3
    class_id: rogue
  magicalambush:
    title: Magical Ambush
    text: If you have the Invisible condition when you cast a spell on acreature, it has Disadvantage
      on any saving throw it makes against the spell on the same turn.
    level: 9
    class_id: rogue
  versatiletrickster:
    title: Versatile Trickster
    text: You gain the ability to distract targets with your Mage Hand. When you use the Trip option of
      your Cunning Strike on a creature, you can also use that option on another creature within 5 feet
      of the spectral hand.
    level: 13
    class_id: rogue
  spellthief:
    title: Spell Thief
    text: You gain the ability to magically steal the knowledge of how to cast a spell from another spellcaster.
      Immediately after a creature casts a spell that targets you or includes you in its area of effect,
      you can take a Reaction to force the creature to make an Intelligence saving throw. The DC equals
      your spell save DC. On a failed save, you negate the spell’s effect against you, and you steal the
      knowledge of the spell if it is at least
    level: 17
    class_id: rogue
  andofa:
    title: and of a
    text: (it doesn’t need to be a Wizard spell). For the next 8 hours, you have the spell prepared. The
      creature can't cast it until the 8 hours have passed. Once you steal a spell with this feature,
      you can’t use this feature again until you finish a Long Rest. ASSASSIN SUBCLASS ASSASSIN Practice
      the Grim Art of Death An Assassin’s training focuses on using stealth, poison, and disguise to eliminate
      foes with deadly efficiency. While some Rogues who follow this path are hired killers, spies, or
      bounty hunters, the capabilities of this subclass are equally useful for adventurers facing a variety
      of monstrous enemies.
    level: 1
    class_id: rogue
  assassinate:
    title: Assassinate
    text: Youre adept at ambushing a target, granting you the following benefits. Initiative. You have
      Advantage on Initiative rolls. Surprising Strikes. During the first round of each combat, you have
      Advantage on attack rolls against any creature that hasn’t taken a turn. If your Sneak Attack hits
      any target during that round, the target takes extra damage of the weapon's type equal to your Rogue
      level.
    level: 3
    class_id: rogue
  assassinstools:
    title: Assassin’S Tools
    text: You gain a Disguise Kit and a Poisoner’s Kit, and you have proficiency with them.
    level: 3
    class_id: rogue
  infiltrationexpertise:
    title: Infiltration Expertise
    text: You are expert at the following techniques that aid your infiltrations. Masterful Mimicry. You
      can unerringly mimic another person’s speech, handwriting, or both if you have spent at least 1
      hour studying them. Roving Aim. Your Speed isn’t reduced to O by using Steady Aim.
    level: 9
    class_id: rogue
  envenomweapons:
    title: Envenom Weapons
    text: When you use the Poison option of your Cunning Strike, the target also takes 2d6 Poison damage
      whenever it fails the saving throw. This damage ignores Resistance to Poison damage.
    level: 13
    class_id: rogue
  deathstrike:
    title: Death Strike
    text: When you hit with your Sneak Attack on the first round of a combat, the target must succeed
      on a Constitution saving throw (DC 8 plus your Dexterity modifier and Proficiency Bonus), or the
      attack’s damage is doubled against the target. SOULKNIFE Strike Foes with Psionic Blades A Soulknife
      strikes with the mind, cutting through barriers both physical and psychic. These Rogues discover
      psionic power within themselves and channel it to do their roguish work. As a Soulknife, your psionic
      abilities might have haunted you since childhood, revealing their full potential only as you experienced
      the stress of adventure. Or you might have sought out an order of psychic adepts and spent years
      learning how to manifest your power.
    level: 17
    class_id: rogue
  psychicblades:
    title: Psychic Blades
    text: 'You can manifest shimmering blades of psychic energy. Whenever you take the Attack action or
      make an Opportunity Attack, you can manifest a Psychic Blade in your free hand and make the attack
      with that blade. The magic blade has the following traits: Weapon Category: Simple Melee Damage
      on a Hit: 1d6 Psychic plus the ability modifier used for the attack roll Properties: Finesse, Thrown
      (range 60/120 feet) Mastery: Vex (you can use this property, and it doesn''t count against the number
      of properties you can use with Weapon Mastery) The blade vanishes immediately after it hits or misses
      its target, and it leaves no mark if it deals damage. After you attack with the blade on your turn,
      you can make a melee or ranged attack with a second psychic blade as a Bonus Action on the same
      turn if your other hand is free to create it. The damage die of this bonus attack is 1d4 instead
      of 1d6.'
    level: 3
    class_id: rogue
  soulblades:
    title: Soul Blades
    text: You can now use the following powers with your Psychic Blades. Homing Strikes. If you make an
      attack roll with your Psychic Blade and miss the target, you can roll one Psionic Energy Die and
      add the number rolled to the attack roll. If this causes the attack to hit, the die is expended.
      Psychic Teleportation. As a Bonus Action, you manifest a Psychic Blade, expend one Psionic Energy
      Die and roll it, and throw the blade at an unoccupied space you can see up to a number of feet away
      equal to 10 times the number rolled. You then teleport to that space, and the blade vanishes.
    level: 9
    class_id: rogue
  psychicveil:
    title: Psychic Veil
    text: You can weave a veil of psychic static to mask yourself. As a Magic action, you gain the Invisible
      condition for 1 hour or until you dismiss this effect (no action required). This invisibility ends
      early immediately after you deal damage to a creature or you force a creature to make a saving throw.
      Once you use this feature, vou can’t do so again until you finish a Long Rest unless you expend
      a Psionic Energy Die (no action required) to restore your use of it.
    level: 13
    class_id: rogue
  rendmind:
    title: Rend Mind
    text: You can sweep your Psychic Blades through a creature’s mind. When you use your Psychic Blades
      to deal Sneak Attack damage to a creature, you can force that target to make a Wisdom saving throw
      (DC 8 plus your Dexterity modifier and Proficiency Bonus). If the save fails, the target has the
      Stunned condition for 1 minute. The Stunned target repeats the save at the end of each of its turns,
      ending the effect on itself on a success. Once you use this feature, you can’t do so again until
      you finish a Long Rest unless you expend three Psionic Energy Dice (no action required) to restore
      your use of it. ‘THIEF Hunt for Treasure as a Classic Adventurer A mix of burglar, treasure hunter,
      and explorer, you are the epitome of an adventurer. In addition to improving your agility and stealth,
      you gain abilities useful for delving into ruins and getting maximum benefit from the magic items
      you find there.
    level: 17
    class_id: rogue
  fasthands:
    title: Fast Hands
    text: As a Bonus Action, you can do one of the following. Sleight of Hand. Make a Dexterity (Sleight
      of Hand) check to pick a lock or disarm a trap with Thieves’ Tools or to pick a pocket. Use an Object.
      Take the Utilize action, or take the Magic action to use a magic item that requires that action.
    level: 3
    class_id: rogue
  secondstorywork:
    title: Second-Story Work
    text: You've trained to get into especially hard-to-reach places, granting you these benefits. Climber.
      You gain a Climb Speed equal to your Speed. Jumper. You can determine your jump distance using your
      Dexterity rather than your Strength.
    level: 3
    class_id: rogue
  supremesneak:
    title: Supreme Sneak
    text: 'You gain the following Cunning Strike option. Stealth Attack (Cost: 1d6). If you have the Hide
      action’s Invisible condition, this attack doesn’t end that condition on you if you end the turn
      behind Three-Quarters Cover or Total Cover.'
    level: 9
    class_id: rogue
  usemaaicdevice:
    title: USE Maaic DEVICE
    text: You've learned how to maximize use of magic items, granting you the following benefits. Attunement.
      You can attune to up to four magic items at once. Charges. Whenever you use a magic item property
      that expends charges, roll 1d6. On a roll of 6, you use the property without expending the charges.
      Scrolls. You can use any Spell Scroll, using Intelligence as your spellcasting ability for the spell.
      If the spell is a cantrip or a
    level: 13
    class_id: rogue
  sorcerer_spellcasting:
    title: Spellcasting
    text: Drawing from your innate magic, you can cast spells. See chapter 7 for the rules on spellcasting.
      The information below details how you use those rules with Sorcerer spells, which appear in the
      Sorcerer spell list later in the class’s description. Cantrips. You know four Sorcerer cantrips
      of your choice. Light, Prestidigitation, Shocking Grasp, and Sorcerous Burst are recommended. Whenever
      you gain a Sorcerer level, you can replace one of your cantrips from this feature with another Sorcerer
      cantrip of your choice. When you reach Sorcerer levels 4 and 10, you learn another Sorcerer cantrip
      of your choice, as shown in the Cantrips column of the
    level: 1
    class_id: sorcerer
  sorcererspellsburninghandsanddetectmagicare:
    title: Sorcerer spells. Burning Hands and Detect Magic are
    text: recommended. The number of spells on your list increases as you gain Sorcerer levels, as shown
      in the Prepared Spells column of the
    level: 1
    class_id: sorcerer
  innatesorcery:
    title: Innate Sorcery
    text: 'An event in your past left an indelible mark on you, infusing you with simmering magic. As
      a Bonus Action, you can unleash that magic for 1 minute, during which you gain the following benefits:
      - The spell save DC of your Sorcerer spells increases by l. - You have Advantage on the attack rolls
      of Sorcerer spells you cast. You can use this feature twice, and you regain all expended uses of
      it when you finish a Long Rest.'
    class_id: sorcerer
  fontofmagic:
    title: Font Of Magic
    text: You can tap into the wellspring of magic within yourself. This wellspring is represented by
      Sorcery Points, which allow you to create a variety of magical effects. You have 2 Sorcery Points,
      and you gain more as you reach higher levels, as shown in the Sorcery Points column of the
    level: 2
    class_id: sorcerer
  metamagic:
    title: Metamagic
    text: Because your magic flows from within, you can alter your spells to suit your needs; you gain
      two Metamagic options of your choice from “Metamagic Options” later in this class’s description.
      You use the chosen options to temporarily modify spells you cast. To use an option, you must spend
      the number of Sorcery Points that it costs. You can use only one Metamagic option on a spell when
      you cast it unless otherwise noted in one of those options. Whenever you gain a Sorcerer level,
      you can replace one of your Metamagic options with one you don't know. You gain two more options
      at Sorcerer
    level: 2
    class_id: sorcerer
  sorcerersubclass:
    title: Sorcerer Subclass
    text: You gain a Sorcerer subclass of your choice. The Aberrant Sorcery, Clockwork Sorcery, Draconic
      Sorcery, and Wild Magic Sorcery subclasses are detailed after this class’s description. A subclass
      is a specialization that grants you features at certain Sorcerer levels. For the rest of your career,
      you gain each of your subclass’s features that are of your Sorcerer level or lower.
    level: 3
    class_id: sorcerer
  sorcerousrestoration:
    title: Sorcerous Restoration
    text: When you finish a Short Rest, you can regain expended Sorcery Points, but no more than a number
      equal to half your Sorcerer level (round down). Once you use this feature, you can’t do so again
      until you finish a Long Rest.
    level: 5
    class_id: sorcerer
  sorceryincarnate:
    title: Sorcery Incarnate
    text: If you have no uses of Innate Sorcery left, you can use it if you spend 2 Sorcery Points when
      you take the Bonus Action to activate it. In addition, while your Innate Sorcery feature is active,
      you can use up to two of your Metamagic options on each spell you cast.
    level: 7
    class_id: sorcerer
  arcaneapotheosis:
    title: Arcane Apotheosis
    text: 'While your Innate Sorcery feature is active, you can use one Metamagic option on each of your
      turns without spending Sorcery Points on it. METAMAGIC OPTIONS The following options are available
      to your Metamagic feature. The options are presented in alphabetical order. CAREFUL SPELL Cost:
      1 Sorcery Point When you cast a spell that forces other creatures to make a saving throw, you can
      protect some of those creatures from the spell’s full force. To do so, spend | Sorcery Point and
      choose a number of those creatures up to your Charisma modifier (minimum of one creature). A chosen
      creature automatically succeeds on its saving throw against the spell, and it takes no damage if
      it would normally take half damage on a successful save. DISTANT SPELL Cost: 1 Sorcery Point When
      you cast a spell that has a range of at least 5 feet, you can spend 1 Sorcery Point to double the
      spell’s range. Or when you cast a spell that has a range of Touch, you can spend 1 Sorcery Point
      to make the spell’s range 30 feet. CHAPTER 3 | CHARACTER CLASSES IAI —— 142 a ae EMPOWERED SPELL
      Cost: 1 Sorcery Point When you roll damage for a spell, you can spend 1 Sorcery Point to reroll
      a number of the damage dice up to your Charisma modifier (minimum of one), and you must use the
      new rolls. You can use Empowered Spell even if you''ve already used a different Metamagic option
      during the casting of the spell. EXTENDED SPELL Cost: 1 Sorcery Point When you cast a spell that
      has a duration of 1 minute or longer, you can spend | Sorcery Point to double its duration to a
      maximum duration of 24 hours. If the affected spell requires Concentration, you have Advantage on
      any saving throw you make to maintain that Concentration. CHAPTER 3 | CHARACTER CLASSES TIEIGHTENED
      SPELL Cost: 2 Sorcery Points When you cast a spell that forces a creature to make a saving throw,
      you can spend 2 Sorcery Points to give one target of the spell Disadvantage on Saves against the
      spell. QUICKENED SPELL Cost: 2 Sorcery Points When you cast a spell that has a casting time of an
      action, you can spend 2 Sorcery Points to change the casting time to a Bonus Action for this casting.
      You can’t modify a spell in this way if you’ve already cast a level 1+ spell on the current turn,
      nor can you cast a level 1+ spell on this turn after modifying a spell in this way. SEEKING SPELL
      Cost: 1 Sorcery Point If you make an attack roll for a spell and miss, you can spend 1 Sorcery Point
      to reroll the d20, and you must use the new roll. You can use Seeking Spell even if you''ve already
      used a different Metamagic option during the casting of the spell. SUBTLE SPELL Cost: 1 Sorcery
      Point When you cast a spell, you can spend 1 Sorcery Point to cast it without any Verbal, Somatic,
      or Material components, except Material components that are consumed by the spell or that have a
      cost specified in the spell. ‘TRANSMUTED SPELL Cost: I Sorcery Point When you cast a spell that
      deals a type of damage from the following list, you can spend 1 Sorcery Point to change that damage
      type to one of the other listed types: Acid, Cold, Fire, Lightning, Poison, Thunder. TWINNED SPELL
      Cost: 1 Sorcery Point When you cast a spell, such as Charm Person, that can be cast with a higher-level
      spell slot to target an additional creature, you can spend 1 Sorcery Point to increase the spell’s
      effective level by 1. SORCERER SPELL LIST This section presents the Sorcerer spell list. The spells
      are organized by spell level and then alphabetized, and each spell’s school of magic is listed.
      In the Special column, C means the spell requires Concentration, R means it’s a Ritual, and M means
      it requires a specific Material component. CANTRIPS (LEVEL O SORCERER SPELLS} Spell Acid Splash
      Blade Ward Chill Touch Dancing Lights Elementalism Fire Bolt Friends Light Mage Hand Mending Message
      Mind Sliver Minor Illusion Poison Spray Prestidigitation Ray of Frost Shocking Grasp Sorcerous Burst
      Thunderclap True Strike School Evocation Abjuration Necromancy Illusion Transmutation Evocation
      Enchantment Evocation Conjuration Transmutation Transmutation Enchantment Illusion Necromancy Transmutation
      Evocation Evocation Evocation Evocation Divination'
    level: 20
    class_id: sorcerer
  sorcererspells:
    title: Sorcerer Spells
    text: Spell Burning Hands Charm Person Chromatic Orb Color Spray Comprehend Languages Detect Magic
      Disguise Self Expeditious Retreat False Life Feather Fall Fog Cloud Grease Ice Knife Jump Mage Armor
      Magic Missile Ray of Sickness Shield Silent Image Sleep School Evocation Enchantment Evocation Illusion
      Divination Divination Illusion Transmutation Necromancy Transmutation Conjuration Conjuration Conjuration
      Transmutation Abjuration Evocation Necromancy Abjuration Illusion Enchantment Special C Special
      M R C,R Spell Thunderwave Witch Bolt School Evocation Evocation
    level: 1
    class_id: sorcerer
  psionicspells:
    title: Psionic Spells
    text: When you reach a Sorcerer level specified in the Psionic Spells table, you thereafter always
      have the listed spells prepared. PsIONIC SPELLS Sorcerer Level Spells 3 Arms of Hadar, Calm Emotions,
      Detect Thoughts, Dissonant Whispers, Mind Sliver 5 Hunger of Hadar, Sending 7 Evard's Black Tentacles,
      Summon Aberration 9 Rary’s Telepathic Bond, Telekinesis
    level: 3
    class_id: sorcerer
  telepathicspeech:
    title: Telepathic Speech
    text: You can form a telepathic connection between your mind and the mind of another. As a Bonus Action,
      choose one creature you can see within 3O feet of yourself. You and the chosen creature can communicate
      telepathically with each other while the two of you are within a number of miles of each other equal
      to your Charisma modifier (minimum of 1 mile). To understand each other, you each must mentally
      use a language the other knows. The telepathic connection lasts for a number of minutes equal to
      your Sorcerer level. It ends early if you use this ability to form a connection with a different
      creature. ABERRANT SORCERY SUBCLASS 146
    level: 3
    class_id: sorcerer
  psionicsorcery:
    title: Psionic Sorcery
    text: When you cast any level 1+ spell from your Psionic Spells feature, you can cast it by expending
      a spell slot as normal or by spending a number of Sorcery Points equal to the spell’s level. If
      you cast the spell using Sorcery Points, it requires no Verbal or Somatic components, and it requires
      no Material components unless they are consumed by the spell or have a cost specified in it.
    level: 6
    class_id: sorcerer
  psychicdefenses:
    title: Psychic Defenses
    text: You have Resistance to Psychic damage, and you have Advantage on saving throws to avoid or end
      the Charmed or Frightened condition.
    level: 6
    class_id: sorcerer
  revelationinflesh:
    title: Revelation In Flesh
    text: You can unleash the aberrant truth hidden within yourself. As a Bonus Action, you can spend
      1 Sorcery Point or more to magically alter your body for 10 minutes. For each Sorcery Point you
      spend, you gain one of the following benefits of your choice, the effects of which last until the
      alteration ends. Aquatic Adaptation. You gain a Swim Speed equal to twice your Speed, and you can
      breathe underwater. Gills grow from your neck or flare behind your ears, and your fingers become
      webbed or you gsrow wriggling cilia. Glistening Flight. You gain a Fly Speed equal to your Speed,
      and you can hover. As you fly, your skin glistens with mucus or otherworldly light. See the Invisible.
      You can see any Invisible creature within 60 feet of yourself that isn’t behind Total Cover. Your
      eyes also turn black or become writhing sensory tendrils. Wormlike Movement. Your body, along with
      any equipment you are wearing or carrying, becomes slimy and pliable. You can move through any space
      as narrow as | inch, and you can spend 5 feet of movement to escape from nonmagical restraints or
      the Grappled condition.
    level: 14
    class_id: sorcerer
  warpingimplosion:
    title: Warping Implosion
    text: You can unleash a space-warping anomaly. As a Magic action, you teleport to an unoccupied space
      you can see within 120 feet of yourself. Immediately after you disappear, each creature within 30
      feet of the space you left must make a Strength saving throw against your spell save DC. On a failed
      save, a creature takes 3d10 Force damage and is pulled straight toward the space you left, ending
      in an unoccupied space as close to your former space as possible. On a successful save, the creature
      takes half as much damage only. Once you use this feature, you can’t do so again until you finish
      a Long Rest unless you spend 5 Sorcery Points (no action required) to restore your use of it. CHAPTER
      3 | CHARACTER CLASSES CLOCKWORK SORCERY | Channel Cosmic Forces of Order The cosmic force of order
      has suffused you with magic. That power arises from Mechanus or a realm like it—a plane of existence
      shaped entirely by clockwork efficiency. You or someone from your lineage might have become entangled
      in the machinations of modrons, the orderly beings who inhabit Mechanus. Perhaps your ancestor even
      took part in the Great Modron March. Whatever its origin within you, the power of order can seem
      strange to others, but for you, it’s part of a vast and glorious system.
    level: 18
    class_id: sorcerer
  clockworkspells:
    title: Clockwork Spells
    text: When you reach a Sorcerer level specified in the Clockwork Spells table, you thereafter always
      have the listed spells prepared. CLOCKWORK SPELLS Sorcerer Level Spells 3 Aid, Alarm, Lesser Restoration,
      Protection from Evil and Good 5 Dispel Magic, Protection from Energy 7 Freedom of Movement, Summon
      Construct 9 Greater Restoration, Wall of Force In addition, consult the Manifestations of Order
      table and choose or randomly determine a way your connection to order manifests while you are casting
      any of your Sorcerer spells. MANIFESTATIONS OF ORDER 1d6 Manifestation 1 Spectral cogwheels hover
      behind you. 2 The hands of a clock spin in your eyes. 3 Your skin glows with a brassy sheen. 4 Floating
      equations and geometric objects overlay your body. 5 Your Spellcasting Focus temporarily takes the
      form of a Tiny clockwork mechanism. 6 The ticking of gears or ringing of a clock can be heard by
      you and those affected by your magic.
    level: 3
    class_id: sorcerer
  restorebalance:
    title: Restore Balance
    text: Your connection to the plane of absolute order allows you to equalize chaotic moments. When
      a creature you can see within 60 feet of yourself is about to roll a d20 with Advantage or Disadvantage,
      you can take a Reaction to prevent the roll from being affected by Advantage and Disadvantage. You
      can use this feature a number of times equal to your Charisma modifier (minimum of once), and you
      regain all expended uses when you finish a Long Rest.
    level: 3
    class_id: sorcerer
  bastionoflaw:
    title: Bastion Of Law
    text: You can tap into the grand equation of existence to imbue a creature with a shimmering shield
      of order. As a Magic action, you can expend 1 to 5 Sorcery Points to create a magical ward around
      yourself or another creature you can see within 30 feet of yourself. The ward is represented by
      a number of d8s equal to the number of Sorcery Points spent to create it. When the warded creature
      takes damage, it can expend a number of those dice, roll them, and reduce the damage taken by the
      total rolled on those dice. The ward lasts until you finish a Long Rest or until you use this feature
      again.
    level: 6
    class_id: sorcerer
  tranceoforder:
    title: Trance Of Order
    text: You gain the ability to align your consciousness with the endless calculations of Mechanus.
      Asa Bonus Action, you can enter this state for 1 minute. For the duration, attack rolls against
