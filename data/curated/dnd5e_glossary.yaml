    level: 6
    class_id: druid
  moonlightstep:
    title: Moonlight Step
    text: You magically transport yourself, reappearing amid a burst of moonlight. As a Bonus Action,
      you teleport up to 30 feet to an unoccupied space you can see, and you have Advantage on the next
      attack roll you make before the end of this turn. You can use this feature a number of times equal
      to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a Long
