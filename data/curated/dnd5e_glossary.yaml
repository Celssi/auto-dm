      Power Commune Contagion Dispel Evil and Good Flame Strike Geas Greater Restoration Hallow Insect
      Plague Legend Lore Mass Cure Wounds Planar Binding Raise Dead Scrying Summon Celestial LEVEL 6 CLERIC
      SPELLS Spell Blade Barrier Create Undead Find the Path Forbiddance Harm Heal Heroes’ Feast Planar
