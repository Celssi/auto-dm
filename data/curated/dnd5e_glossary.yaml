  scholar:
    title: Scholar
    text: 'While studying magic, you also specialized in another field of study. Choose one of the following
      skills in which you have proficiency: Arcana, History, Investigation, Medicine, Nature, or Religion.
      You have Expertise in the chosen skill. EXPANDING AND REPLACING A SPELLBOOK The spells you add to
      your spellbook as you gain levels reflect your ongoing magical research, but you might find other
      spells during your adventures that you can add to the book. You could discover a Wizard spell on
      a Spell Scroll, for example, and then copy it into your spellbook. Copying a Spell into the Book.
      When you find a level 1+ Wizard spell, you can copy it into your spellbook if it''s of a level you
      can prepare and if you have time to copy it. For each level of the spell, the transcription takes
      2 hours and costs 50 GP. Afterward you can prepare the spell like the other spells in your spellbook.
      Copying the Book. You can copy a spell from your spellbook into another book. This is like copying
      a new spell into your spellbook but faster, since you already know how to cast the spell. You need
      spend only 1 hour and 10 GP for each level of the copied spell. If you lose your spellbook, you
      can use the same procedure to transcribe the Wizard spells that you have prepared into a new spellbook.
      Filling out the remainder of the new book requires you to find new spells to do so. For this reason,
      many wizards keep a backup spellbook. THE ELF QUEEN YOLANDE'
    level: 2
    class_id: wizard
  wizardsubclassawesareddragonwith:
