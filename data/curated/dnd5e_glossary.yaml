feats:
  alert:
    title: Alert
    category: Origin Feat
    text: You gain the following benefits. Initiative Proficiency. When you roll Initiative, you can add
      your Proficiency Bonus to the roll. Initiative Swap. Immediately after you roll Initiative, you
      can swap your Initiative with the Initiative of one willing ally in the same combat. You can’t make
      this swap if you or the ally has the Incapacitated condition.
  crafter:
    title: Crafter
    category: Origin Feat
    text: You gain the following benefits. Tool Proficiency. You gain proficiency with three different
      Artisan’s Tools of your choice from the Fast Crafting table. Discount. Whenever you buy a nonmasgical
      item, you receive a 20 percent discount on it. Fast Crafting. When you finish a Long Rest, you can
      craft one piece of gear from the Fast Crafting table, provided you have the Artisan’s Tools associated
      with that item and have proficiency with those tools. The item lasts until you finish another Long
      Rest, at which point the item falls apart. - P 7 Ha { FAST CRAFTING Crafted Gear Ladder, Torch Leatherworker's
      Tools Case, Pouch Block and Tackle Jug, Lamp Artisan’s Tools Carpenter’s Tools Mason's Tools Potter’s
      Tools Smith’s Tools Ball Bearings, Bucket, Caltrops, Grappling Hook, lron Pot Bell, Shovel, Tinder
      Box Basket, Rope, Net, Tent Club, Greatclub, Quarterstaff Tinker’s Tools Weaver's Tools Woodcarver’s
      Tools
  healer:
    title: Healer
    category: Origin Feat
    text: You gain the following benefits. Battle Medic. If you have a Healer’s Kit, you can expend one
      use of it and tend toa creature within > feet of yourself as a Utilize action. That creature can
      expend one of its Hit Point Dice, and you then roll that die. The creature regains a number of Hit
      Points equal to the roll plus your Proficiency Bonus. Healing Rerolls. Whenever you roll a die to
      determine the number of Hit Points you restore with a spell or with this feat’s Battle Medic benefit,
      you can reroll the die if it rolls a 1, and you must use the new roll. LucKY Origin Feat You gain
      the following benefits. Luck Points. You have a number of Luck Points equal to your Proficiency
      Bonus and can spend the points on the benefits below. You regain your expended Luck Points when
      you finish a Long Rest. Advantage. When you roll a d20 for a D20 Test, you can spend 1 Luck Point
      to give yourself Advantage on the roll. Disadvantage. When a creature rolls a d20 for an attack
      roll against you, you can spend 1 Luck Point to impose Disadvantage on that roll.
  magicinitiate:
    title: Magic Initiate
    category: Origin Feat
    text: You gain the following benefits. Two Cantrips. You learn two cantrips of your choice from the
      Cleric, Druid, or Wizard spell list. Intelligence, Wisdom, or Charisma is your spellcasting ability
      for this feat’s spells (choose when you select this feat). Level 1 Spell. Choose a level 1 spell
      from the same list you selected for this feat’s cantrips. You always have that spell prepared. You
      can cast it once without a spell slot, and you regain the ability to cast it in that way when you
      finish a Long Rest. You can also cast the spell using any spell slots you have. Spell Change. Whenever
      you gain a new level, you can replace one of the spells you chose for this feat with a different
      spell of the same level from the chosen spell list. Repeatable. You can take this feat more than
      once, but you must choose a different spell list each time.
  musician:
    title: Musician
    category: Origin Feat
    text: You gain the following benefits. Instrument Training. You gain proficiency with three Musical
      Instruments of your choice. Encouraging Song. As you finish a Short or Long Rest, you can play a
      song on a Musical Instrument with which you have proficiency and give Heroic Inspiration to allies
      who hear the song. The number of allies you can affect in this way equals your Proficiency Bonus.
      SAVAGE ATTACKER Origin Feat You've trained to deal particularly damaging strikes. Once per turn
      when you hit a target with a weapon, vou can roll the weapon’s damage dice twice and use either
      roll against the target.
  skilled:
    title: Skilled
    category: Origin Feat
    text: You gain proficiency in any combination of three skills or tools of your choice. Repeatable.
      You can take this feat more than once. CHAPTER 5 | FEATS 201 202 ‘TAVERN BRAWLER Origin Feat You
      gain the following benefits. Enhanced Unarmed Strike. When you hit with your Unarmed Strike and
      deal damage, you can deal Bludgeoning damage equal to 1d4 plus your Strength modifier instead of
      the normal damage of an Unarmed Strike. Damage Rerolls. Whenever you roll a damage die for your
      Unarmed Strike, you can reroll the die if it rolls a1, and you must use the new roll. Improvised
      Weaponry. You have proficiency with improvised weapons. Push. When you hit a creature with an Unarmed
      Strike as part of the Attack action on your turn, you can deal damage to the target and also push
      it 5 feet away from you. You can use this benefit only once per turn.
  tough:
    title: Tough
    category: Origin Feat
    text: Your Hit Point maximum increases by an amount equal to twice your character level when you gain
      this feat. Whenever you gain a character level thereafter, your Hit Point maximum increases by an
      additional 2 Hit Points. GENERAL FEATS These feats are in the General category.
  abilityscoreimprovement:
    title: Ability Score Improvement
    category: 'General Feat (Prerequisite: Level 4+)'
    text: Increase one ability score of your choice by 2, or increase two ability scores of your choice
      by 1. This feat can’t increase an ability score above 20. Repeatable. You can take this feat more
      than once.
  actor:
    title: Actor
    category: 'General Feat (Prerequisite: Level 4+, Charisma 13+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Charisma score by 1,
      to amaximum of 20. Impersonation. While you're disguised as a real or fictional person, you have
      Advantage on Charisma (Deception or Performance) checks to convince others that you are that person.
      Mimicry. You can mimic the sounds of other creatures, including speech. A creature that hears the
      mimicry must succeed on a Wisdom (Insight) check to determine the effect is faked (DC 8 plus your
      Charisma modifier and Proficiency Bonus). CHAPTER 5 | FEATS
  athlete:
    title: Athlete
    category: 'General Feat (Prerequisite: Level 4+, Strength or'
    text: Dexterity 13+) You gain the following benefits. Ability Score Increase. Increase your Strength
      or Dexterity score by 1, to amaximum of 20. Climb Speed. You gain a Climb Speed equal to your Speed.
      Hop Up. When you have the Prone condition, you can right yourself with only 5 feet of movement.
      Jumping. You can make a running Long or High Jump after moving only 5 feet.
  charger:
    title: Charger
    category: 'General Feat (Prerequisite: Level 4+, Strength or'
    text: 'Dexterity 13+) You gain the following benefits. Ability Score Increase. Increase your Strength
      or Dexterity score by 1, to amaximum of 20. Improved Dash. When you take the Dash action, your Speed
      increases by 10 feet for that action. Charge Attack. If you move at least 10 feet in a straight
      line toward a target immediately before hitting it with a melee attack roll as part of the Attack
      action, choose one of the following effects: gain a 1d8 bonus to the attack’s damage roll, or push
      the target up to 10 feet away if it is no more than one size larger than you. You can use this benefit
      only once on each of your turns.'
  chef:
    title: Chef
    category: 'General Feat (Prerequisite: Level 4+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Constitution or Wisdom
      score by 1, toa maximum of 20. Cook’s Utensils. You gain proficiency with Cook’s Utensils if you
      don’t already have it. Replenishing Meal. As part of a Short Rest, you can cook special food if
      you have ingredients and Cook’s Utensils on hand. You can prepare enough of this food for a number
      of creatures equal to 4 plus your Proficiency Bonus. At the end of the Short Rest, any creature
      who eats the food and spends one or more Hit Dice to regain Hit Points regains an extra 1d8 Hit
      Points. Bolstering Treats. With 1 hour of work or when you finish a Long Rest, you can cook a number
      of treats equal to your Proficiency Bonus if you have ingredients and Cook’s Utensils on hand. These
      special treats last 8 hours after being made. A creature can use a Bonus Action to eat one of those
      treats to gain anumber of Temporary Hit Points equal to your Proficiency Bonus.
  crossbowexpert:
    title: Crossbow Expert
    category: 'General Feat (Prerequisite: Level 4+, Dexterity 13+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Dexterity score by 1,
      to amaximum of 20. Ignore Loading. You ignore the Loading property of the Hand Crossbow, Heavy Crossbow,
      and Light Crossbow (all called crossbows elsewhere in this feat). If you're holding one of them,
      you can load a piece of ammunition into it even if you lack a free hand. Firing in Melee. Being
      within 5 feet of an enemy doesn't impose Disadvantage on your attack rolls with crossbows. Dual
      Wielding. When you make the extra attack of the Light property, you can add your ability modifier
      to the damage of the extra attack if that attack is with a crossbow that has the Light property
      and you aren't already adding that modifier to the damage.
  crusher:
    title: Crusher
    category: 'General Feat (Prerequisite: Level 4+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Strength or Constitution
      score by 1, to amaximum of 20. Push. Once per turn, when you hit a creature with an attack that
      deals Bludgeoning damage, you can move it 5 feet to an unoccupied space if the target is no more
      than one size larger than you. Enhanced Critical. When you score a Critical Hit that deals Bludgeoning
      damage to a creature, attack rolls against that creature have Advantage until the start of your
      next turn.
  defensiveduelist:
    title: Defensive Duelist
    category: 'General Feat (Prerequisite: Level 4+, Dexterity 13+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Dexterity score by 1,
      to a maximum of 20. Parry. If you're holding a Finesse weapon and another creature hits you with
      a melee attack, you can take a Reaction to add your Proficiency Bonus to your Armor Class, potentially
      causing the attack to miss you. You gain this bonus to your AC against melee attacks until the start
      of your next turn.
  dualwielder:
    title: Dual Wielder
    category: 'General Feat (Prerequisite: Level 4+, Strength or'
    text: Dexterity 15+) You gain the following benefits. Ability Score Increase. Increase your Strength
      or Dexterity score by 1, to a maximum of 20. Enhanced Dual Wielding. When you take the Attack action
      on your turn and attack with a weapon that has the Light property, you can make one extra attack
      as a Bonus Action later on the same turn with a different weapon, which must be a Melee weapon that
      lacks the Two-Handed property. You don't add your ability modifier to the extra attack’s damage
      unless that modifier is negative. Quick Draw. You can draw or stow two weapons that lack the Two-Handed
      property when you would normally be able to draw or stow only one.
  durable:
    title: Durable
    category: 'General Feat (Prerequisite: Level 4+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Constitution score by
      1, to a maximum of 20. Defy Death. You have Advantage on Death Saving Throws. Speedy Recovery. As
      a Bonus Action, you can expend one of your Hit Point Dice, roll the die, and regain a number of
      Hit Points equal to the roll.
  elementaladept:
    title: Elemental Adept
    category: 'General Feat (Prerequisite: Level 4+, Spellcasting or Pact'
    text: 'Magic Feature) You gain the following benefits. Ability Score Increase. Increase your Intelligence,
      Wisdom, or Charisma score by 1, to amaximum of 20. Energy Mastery. Choose one of the following damage
      types: Acid, Cold, Fire, Lightning, or Thunder. Spells you cast ignore Resistance to damage of the
      chosen type. In addition, when you roll damage for a spell you cast that deals damage of that type,
      you can treat any 1 on a damage die as a 2. Repeatable. You can take this feat more than once, but
      you must choose a different damage type each time for Energy Mastery. CHAPTER 5 | FEATS 203 J =———"a...,'
  feytouched:
    title: Fey- Touched
    category: 'General Feat (Prerequisite: Level 4+)'
    text: Your exposure to the Feywild’s magic grants you the following benefits. Ability Score Increase.
      Increase your Intelligence, Wisdom, or Charisma score by 1, toa maximum of 20. Fey Magic. Choose
      one level 1 spell from the Divination or Enchantment school of magic. You always have that spell
      and the Misty Step spell prepared. You can cast each of these spells without expending a spell slot.
      Once you cast either spell in this way, you can't cast that spell in this way again until you finish
      a Long Rest. You can also cast these spells using spell slots you have of the appropriate level.
      The spells’ spellcasting ability is the ability increased by this feat.
  grappler:
    title: Grappler
    category: 'General Feat (Prerequisite: Level 4+, Strength or'
    text: Dexterity 13+) You gain the following benefits. Ability Score Increase. Increase your Strength
      or Dexterity score by 1, to a maximum of 20. Punch and Grab. When you hit a creature with an Unarmed
      Strike as part of the Attack action on your turn, you can use both the Damage and the Grapple option.
      You can use this benefit only once per turn. Attack Advantage. You have Advantage on attack rolls
      against a creature Grappled by you. Fast Wrestler. Your Speed isn't halved when you move a creature
      Grappled by you if the creature is your size or smaller.
  greatweaponmaster:
    title: Great Weapon Master
    category: 'General Feat (Prerequisite: Level 4+, Strength 13+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Strength score by 1,
      toa maximum of 20. Heavy Weapon Mastery. When you hit a creature with a weapon that has the Heavy
      property as part of the Attack action on your turn, you can cause the weapon to deal extra damage
      to the target. The extra damage equals your Proficiency Bonus. Hew. Immediately after you score
      a Critical Hit with a Melee weapon or reduce a creature to O Hit Points with one, you can make one
      attack with the Same weapon as a Bonus Action. CHAPTER 5 | FEATS
  heavilyarmored:
    title: Heavily Armored
    category: 'General Feat (Prerequisite: Level 4+, Medium Armor'
    text: Training) You gain the following benefits. Ability Score Increase. Increase your Constitution
      or Strength score by 1, to a maximum of 20. Armor Training. You gain training with Heavy armor.
  heavyarmormaster:
    title: Heavy Armor Master
    category: 'General Feat (Prerequisite: Level 4+, Heavy Armor'
    text: 'Training) You gain the following benefits. Ability Score Increase. Increase your Constitution
      or Strength score by 1, to a maximum of 20. Damage Reduction. When youre hit by an attack while
      you''re wearing Heavy armor, any Bludgeoning, Piercing, and Slashing damage dealt to you by that
      attack is reduced by an amount equal to your Proficiency Bonus. INSPIRING LEADER General Feat (Prerequisite:
      Level 4+, Wisdom or Charisma 15+) You gain the following benefits. Ability Score Increase. Increase
      your Wisdom or Charisma score by 1, to a maximum of 20. Bolstering Performance. When you finish
      a Short or Long Rest, you can give an inspiring performance: a speech, song, or dance. When you
      do so, choose up to six allies (which can include yourself) within 3O feet of yourself who witness
      the performance. The chosen creatures each gain Temporary Hit Points equal to your character level
      plus the modifier of the ability you increased with this feat.'
  keenmind:
    title: Keen Mind
    category: 'General Feat (Prerequisite: Level 4+, Intelligence 13+)'
    text: 'You gain the following benefits. Ability Score Increase. Increase your Intelligence score by
      1, toa maximum of 20. Lore Knowledge. Choose one of the following skills: Arcana, History, Investigation,
      Nature, or Religion. If you lack proficiency in the chosen skill, you gain proficiency in it, and
      if you already have proficiency in it, you gain Expertise in it. Quick Study. You can take the Study
      action asa Bonus Action.'
  lightlyarmored:
    title: Lightly Armored
    category: 'General Feat (Prerequisite: Level 4+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Strength or Dexterity
      score by 1, to a maximum of 20. Armor Training. You gain training with Light armor and Shields.
  mageslayer:
    title: Mage Slayer
    category: 'General Feat (Prerequisite: Level 4+)'
    text: 'You gain the following benefits. Ability Score Increase. Increase your Strength or Dexterity
      score by 1, to a maximum of 20. Concentration Breaker. When you damage a creature that is concentrating,
      it has Disadvantage on the saving throw it makes to maintain Concentration. Guarded Mind. If you
      fail an Intelligence, a Wisdom, or a Charisma saving throw, you can cause yourself to succeed instead.
      Once you use this benefit, you can''t use it again until you finish a Short or Long Rest. MARTIAL
      WEAPON [RAINING General Feat (Prerequisite: Level 4+) You gain the following benefits. Ability Score
      Increase. Increase your Strength or Dexterity score by 1, to a maximum of 20. Weapon Proficiency.
      You gain proficiency with Martial weapons.'
  mediumarmormaster:
    title: Medium Armor Master
    category: 'General Feat (Prerequisite: Level 4+, Medium Armor'
    text: Training) You gain the following benefits. Ability Score Increase. Increase your Strength or
      Dexterity score by 1, to a maximum of 20. Dexterous Wearer. While youre wearing Medium armor, you
      can add 3, rather than 2, to your AC if you have a Dexterity score of 16 or higher.
  moderatelyarmored:
    title: Moderately Armored
    category: 'General Feat (Prerequisite: Level 4+, Light Armor'
    text: Training) You gain the following benefits. Ability Score Increase. Increase your Strength or
      Dexterity score by 1, to amaximum of 20. Armor Training. You gain training with Medium armor.
  mountedcombatant:
    title: Mounted Combatant
    category: 'General Feat (Prerequisite: Level 4+)'
    text: 'You gain the following benefits. Ability Score Increase. Increase your Strength, Dexterity,
      or Wisdom score by 1, to a maximum of 20. Mounted Strike. While mounted, you have Advantage on attack
      rolls against any unmounted creature within 5 feet of your mount that is at least one size smaller
      than the mount. Leap Aside. If your mount is subjected to an effect that allows it to make a Dexterity
