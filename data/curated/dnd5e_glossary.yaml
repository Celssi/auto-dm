    text: combination. f ' “< ARCANE TRICKSTER SUBCLASS = ARCANE TRICKSTER SPELLCASTING Rogue Prepared
      —Spell Slots per Spell Level— Level Spells T 2 3 4 3 3 2 -— —- _- A 4 3 _- —. — 5 4 3 = th 6 4 3
