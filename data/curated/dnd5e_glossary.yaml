  cunningaction:
    title: Cunning Action
    text: 'Your quick thinking and agility allow you to move and act quickly. On your turn, you can take
      one of the following actions as a Bonus Action: Dash, Disengage, or Hide.'
    level: 2
    class_id: rogue
  roguesubclass:
    title: Rogue Subclass
    text: You gain a Rogue subclass of your choice. The Arcane Trickster, Assassin, Soulknife, and Thief
      subclasses are detailed after this class’s description. A subclass is a specialization that grants
      you features at certain Rogue levels. For the rest of your career, you gain each of your subclass’s
      features that are of your Rogue level or lower.
    level: 3
    class_id: rogue
  steadyaim:
    title: Steady Aim
    text: As a Bonus Action, you give yourself Advantage on your next attack roll on the current turn.
      You can use this feature only if you haven’t moved during this turn, and after you use it, your
      Speed is O until the end of the current turn.
    level: 3
    class_id: rogue
  cunningstrike:
    title: Cunning Strike
    text: 'You''ve developed cunning ways to use your Sneak Attack. When you deal Sneak Attack damage,
      you can add one of the following Cunning Strike effects. Each effect has a die cost, which is the
      number of Sneak Attack damage dice you must forgo to add the effect. You remove the die before rolling,
      and the effect occurs immediately after the attack’s damage is dealt. For example, if you add the
      Poison effect, remove 1d6 from the Sneak Attack’s damage before rolling. If a Cunning Strike effect
      requires a saving throw, the DC equals 8 plus your Dexterity modifier and Proficiency Bonus. Poison
      (Cost: 1d6). You add a toxin to your strike, forcing the target to make a Constitution saving throw.
      On a failed save, the target has the Poisoned condition for 1 minute. At the end of each of its
      turns, the Poisoned target repeats the save, ending the effect on itself on a success. To use this
      effect, you must have a Poisoner’s Kit on your person. Trip (Cost: 1d6). If the target is Large
      or smaller, it must succeed on a Dexterity saving throw or have the Prone condition. Withdraw (Cost:
      1d6). Immediately after the attack, you move up to half your Speed without provoking Opportunity
      Attacks.'
    level: 5
    class_id: rogue
  uncannydodge:
    title: Uncanny Dodge
    text: When an attacker that you can see hits you with an attack roll, you can take a Reaction to halve
      the attack’s damage against you (round down).
    level: 5
    class_id: rogue
  rogue_evasion:
    title: Evasion
    text: You can nimbly dodge out of the way of certain dangers. When youre subjected to an effect that
      allows you to make a Dexterity saving throw to take only half damage, you instead take no damage
      if you succeed on the saving throw and only half dam age if you fail. You can't use this feature
      if you have the Incapacitated condition.
    level: 7
    class_id: rogue
  reliabletalent:
    title: Reliable Talent
    text: Whenever you make an ability check that uses one of your skill or tool proficiencies, you can
      treat a d20 roll of 9 or lower as a 10.
    level: 7
    class_id: rogue
  improvedcunningstrike:
    title: Improved Cunning Strike
    text: You can use up to two Cunning Strike effects when you deal Sneak Attack damage, paying the die
      cost for each effect.
    level: 11
    class_id: rogue
  deviousstrikes:
    title: Devious Strikes
    text: 'You''ve practiced new ways to use your Sneak Attack deviously. The following effects are now
      among your Cunning Strike options. Daze (Cost: 2d6). The target must succeed on a Constitution saving
      throw, or on its next turn, it can do only one of the following: move or take an action or a Bonus
      Action. Knock Out (Cost: 6d6). The target must succeed on a Constitution saving throw, or it has
      the Unconscious condition for 1 minute or until it takes any damage. The Unconscious target repeats
      the save at the end of each of its turns, ending the effect on itself on a success. Obscure (Cost:
      35d6). The target must succeed on a Dexterity saving throw, or it has the Blinded condition until
      the end of its next turn.'
    level: 14
    class_id: rogue
  slipperymind:
    title: Slippery Mind
    text: Your cunning mind is exceptionally difficult to control. You gain proficiency in Wisdom and
      Charisma saving throws.
    level: 15
    class_id: rogue
  elusive:
    title: Elusive
    text: You're so evasive that attackers rarely gain the upper hand against you. No attack roll can
      have Advantage against you unless you have the Incapacitated condition. LEVEL 19; EpIc BOON You
      gain an Epic Boon feat (see chapter 5) or another feat of your choice for which you qualify. Boon
      of the Night Spirit is recommended.
    level: 18
    class_id: rogue
  strokeofluck:
    title: Stroke Of Luck
    text: You have a marvelous knack for succeeding when you need to. If you fail a D20 Test, you can
      turn the roll into a 20. Once you use this feature, you can't use it again until you finish a Short
      or Long Rest. ROGUE SUBCLASSES A Rogue subclass is a specialization that grants you features at
      certain Rogue levels, as specified in the subclass. This section presents the Arcane Trickster,
      Assassin, Soulknife, and Thief subclasses. ARCANE IRICKSTER Enhance Stealth with Arcane Spells Some
      Rogues enhance their fine-honed skills of stealth and agility with spells, learning magical tricks
      to aid them in their trade. Some Arcane Tricksters use their talents as pickpockets and burglars,
      while others are pranksters.
    level: 20
    class_id: rogue
  wizard:
    title: Wizard
    text: spells. Charm Person, Disguise Self, and Fog Cloud are recommended. The number of spells on
      your list increases as you gain Rogue levels, as shown in the Prepared Spells column of the Arcane
      Trickster Spellcasting table. Whenever that number increases, choose additional Wizard spells until
      the number of spells on your list matches the number in the Arcane Trickster Spellcasting table.
      The chosen spells must be of a level for which you have spell slots. For example, if youre a
    level: 1
    class_id: rogue
  rogueyourlistofpreparedspells:
    title: Rogue, your list of prepared spells
    text: can include five Wizard spells of
    level: 7
    class_id: rogue
  or2inany:
