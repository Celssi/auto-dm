source: player.pdf OCR
spells:
  acidsplash:
    title: Acid Splash
    level: 0
    school: Evocation Cantrip
    classes: Sorcerer, Wizard
    casting_time: Action
    range: 60 feet
    components: V, S
    duration: Instantaneous
    text: You create an acidic bubble at a point within range, where it explodes in a 5-foot-radius Sphere.
      Each creature in that Sphere must succeed on a Dexterity saving throw or take 1d6 Acid damage. Cantrip
      Upgrade. The damage increases by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6).
  aid:
    title: Aid
    level: 2
    school: Abjuration
    classes: Bard, Cleric, Druid, Paladin, Ranger’
    casting_time: Action
    range: 30 feet
    components: V, S, M (a strip of white cloth)
    duration: 8 hours
    text: Choose up to three creatures within range. Each target’s Hit Point maximum and current Hit Points
      increase by 5 for the duration. Using a Higher-Level Spell Slot. Each target’s Hit Points increase
      by 5 for each spell slot level above 2.
  alarm:
    title: Alarm
    level: 1
    school: Abjuration
    classes: Ranger, Wizard
    casting_time: 1 minute or Ritual
    range: 30 feet
    components: V, S, M (a bell and silver wire)
    duration: 8 hours
    text: 'You set an alarm against intrusion. Choose a door, a window, or an area within range that is
      no larger than a 20-foot Cube. Until the spell ends, an alarm alerts you whenever a creature touches
      or enters the warded area. When you cast the spell, you can designate creatures that won''t set
      off the alarm. You also choose whether the alarm is audible or mental: Audible Alarm. The alarm
      produces the sound of a handbell for 10 seconds within 60 feet of the warded area. Mental Alarm.
      You are alerted by a mental ping if you are within 1 mile of the warded area. This ping awakens
      you if you''re asleep.'
  alterself:
    title: Alter Self
    level: 2
    school: Transmutation
    classes: Sorcerer, Wizard
    casting_time: Action
    range: Self
    components: V, S
    duration: Concentration, up to 1 hour
    text: You alter your physical form. Choose one of the following options. Its effects last for the
      duration, during which you can take a Magic action to replace the option you chose with a different
      one. Aquatic Adaptation. You sprout gills and grow webs between your fingers. You can breathe underwater
      and gain a Swim Speed equal to your Speed. Change Appearance. You alter your appearance. You decide
      what you look like, including your height, weight, facial features, sound of your voice, hair length,
      coloration, and other distinguishing characteristics. You can make yourself appear as a member of
      another species, though none of your statistics change. You can’t appear as a creature of a different
      size, and your basic shape stays the same; if you're bipedal, you can’t use this spell to become
      quadrupedal, for instance. For the duration, you can take a Magic action to change your appearance
      in this way again. Natural Weapons. You grow claws (Slashing), fangs (Piercing), horns (Piercing),
      or hooves (Bludgeoning). When you use your Unarmed Strike to deal damage with that new growth, it
      deals Id6 damage of the type in parentheses instead of dealing the normal damage for your Unarmed
      Strike, and you use your spellcasting ability modifier for the attack and damage rolls rather than
      using Strength.
  animalfriendship:
    title: Animal Friendship
    level: 1
    school: Enchantment
    classes: Bard, Druid, Ranger
    casting_time: Action
    range: 30 feet
    components: V, S, M (a morsel of food)
    duration: 24 hours
    text: Target a Beast that you can see within range. The target must succeed on a Wisdom saving throw
      or have the Charmed condition for the duration. If you or one of your allies deals damage to the
      target, the spells ends. Using a Higher-Level Spell Slot. You can target one additional Beast for
      each spell slot level above 1. CHAPTER 7 | SPELLS 229 24.0
  animalmessenger:
    title: Animal Messenger
    level: 2
    school: Enchantment
    classes: Bard, Druid, Ranger
    casting_time: Action or Ritual
    range: 30 feet
    components: V, S, M (a morsel of food)
    duration: 24 hours
    text: A Tiny Beast of your choice that you can see within range must succeed on a Charisma saving
      throw, or it attempts to deliver a message for you (if the target's Challenge Rating isn't O, it
      automatically succeeds). You specify a location you have visited and a recipient who matches a general
      description, such as “a person dressed in the uniform of the town guard” or “a red-haired dwarf
      wearing a pointed hat.” You also communicate a message of up to twenty-five words. The Beast travels
      for the duration toward the specified location, covering about 25 miles per 24 hours or 5O miles
      if the Beast can fly. When the Beast arrives, it delivers your message to the creature that you
      described, mimicking your communication. If the Beast doesn’t reach its destination before the spell
      ends, the message is lost, and the Beast returns to where you cast the spell. Using a Higher-Level
      Spell Slot. The spell’s duration increases by 48 hours for each spell slot level above 2.
  animalshapes:
    title: Animal Shapes
    level: 8
    school: Transmutation
    classes: Druid
    casting_time: Action
    range: 30 feet
    components: V, S
    duration: 24 hours
    text: Choose any number of willing creatures that you can see within range. Each target shape-shifts
      into a Large or smaller Beast of your choice that has a Challenge Rating of 4 or lower. You can
      choose a different form for each target. On later turns, you can take a Magic action to transform
      the targets again. A target’s game statistics are replaced by the chosen Beast’s statistics, but
      the target retains its creature type; Hit Points; Hit Point Dice; alignment; ability to communicate;
      and Intelligence, Wisdom, and Charisma scores. The target’s actions are limited by the Beast form’s
      anatomy, and it can’t cast spells. The target’s equipment melds into the new form, and the target
      can’t use any of that equipment while in that form. The target gains a number of Temporary Hit Points
      equal to the Beast form’s Hit Points. The transformation lasts for the duration for each target,
      until the target has no Temporary Hit Points, or until the target leaves the form as a Bonus Action.
      CHAPTER 7 | SPELLS
  animatedead:
    title: Animate Dead
    level: 3
    school: Necromancy
    classes: Cleric, Wizard
    casting_time: '] minute'
    range: 10 feet
    components: V, S, M (a drop of blood, a piece of
    duration: Instantaneous
    text: 'Choose a pile of bones or a corpse of a Medium or Small Humanoid within range. The target becomes
      an Undead creature: a Skeleton if you chose bones or a Zombie if you chose a corpse (see appendix
      B for the stat blocks). On each of your turns, you can take a Bonus Action to mentally command any
      creature you made with this spell if the creature is within 60 feet of you (if you control multiple
      creatures, you can command any of them at the same time, issuing the same command to each one).
      You decide what action the creature will take and where it will move on its next turn, or you can
      issue a general command, such as to guard a chamber or corridor. If you issue no commands, the creature
      takes the Dodge action and moves only to avoid harm. Once given an order, the creature continues
      to follow it until its task is complete. The creature is under your control for 24 hours, after
      which it stops obeying any command you''ve given it. To maintain control of the creature for another
      24 hours, you must cast this spell on the creature again before the current 24-hour period ends.
      This use of the spell reasserts your control over up to four creatures you have animated with this
      spell rather than animating a new creature. Using a Higher-Level Spell Slot. You animate or reassert
      control over two additional Undead creatures for each spell slot level above 3. Each of the creatures
      must come from a different corpse or pile of bones.'
