      DRUID SUBCLASSES A Druid subclass is a specialization that grants you features at certain Druid
      levels, as specified in the subclass. Druids form loose associations, which they call circles. This
      section presents the Circle of the Land, Circle of the Moon, Circle of the Sea, and Circle of the
      Stars subclasses. CIRCLE OF THE LAND Celebrate Connection to the Natural World The Circle of the
      Land comprises mystics and sages who safeguard ancient knowledge and rites. These Druids meet within
      sacred circles of trees or standing stones to whisper primal secrets in Druidic. The circle’s wisest
      members preside as the chief priests of their communities.
  circleofthelandspells:
    title: CIRCLE OF THE LAND SPELLS
    level: 3
    text: 'Whenever you finish a Long Rest, choose one type of land: arid, polar, temperate, or tropical.
      Consult the table below that corresponds to the chosen type; you have the spells listed for your
      Druid level and lower prepared. ARID LAND Druid Level Circle Spells 3 Blur, Burning Hands, Fire
      Bolt 5 Fireball 7 Blight 9 Wall of Stone POLAR LAND Druid Level Circle Spells 3 Fog Cloud, Hold
      Person, Ray of Frost 5 Sleet Storm / Ice Storm 9 Cone of Cold TEMPERATE LAND Druid Level Circle
      Spells Misty Step, Shocking Grasp, Sleep Lightning Bolt 3 2 7 Freedom of Movement 9 Tree Stride
      TROPICAL LAND Druid Level Circle Spells 3 Acid Splash, Ray of Sickness, Web 5 Stinking Cloud 7 Polymorph
      9 Insect Plague'
  landsaid:
    title: LAND’S AID
    level: 3
    text: As a Magic action, you can expend a use of your Wild Shape and choose a point within 60 feet
      of yourself. Vitality-giving flowers and life-draining thorns appear for a moment in a 10-foot-radius
      Sphere centered on that point. Each creature of your choice in the Sphere must make a Constitution
      saving throw against your spell save DC, taking 2d6 Necrotic damage on a failed save or half as
      much damage on a successful one. One creature of your choice in that area regains 2d6 Hit Points.
      The damage and healing increase by 1d6 when you reach Druid levels 10 (3d6) and 14 (4d6).
  naturalrecovery:
    title: NATURAL RECOVERY
    level: 6
    text: You can cast one of the level 1+ spells that you have prepared from your Circle Spells feature
      without expending a spell slot, and you must finish a Long Rest before you do so again. In addition,
      when you finisha Short Rest, you can choose expended spell slots to recover. The spell slots can
      have a combined level that is equal to or less than half your Druid level (round up), and none of
      them can be level 6+. For example, if you're a level 6 Druid, you can recover up to three levels’
      worth of spell slots. You can recover a level 3 spell slot, a level 2 and a level 1 spell slot,
      or three level 1 spell slots. Once you recover spell slots with this feature, you can't do so again
      until you finish a Long Rest.
  naturesward:
    title: NATURE'S WARD
    level: 10
    text: You are immune to the Poisoned condition, and you have Resistance to a damage type associated
      with your current land choice in the Circle Spells feature, as shown in the Nature’s Ward table.
      NATURE’S WARD Land Type’ Resistance LandType _ Resistance Arid Fire Temperate Lightning re ae *
      Polar Cold Tropical Poison * CIRCLE OF THE LANO “SO SUBCLASS CIRCLE OF THE Moon SUBCLASS
  naturessanctuary:
    title: NATURE'S SANCTUARY
    level: 14
    text: As a Magic action, you can expend a use of your Wild Shape and cause spectral trees and vines
      to appear in a 15-foot Cube on the ground within 120 feet of yourself. They last there for 1 minute
      or until you have the Incapacitated condition or die. You and your allies have Half Cover while
      in that area, and your allies gain the current Resistance of your Nature's Ward while there. As
      a Bonus Action, you can move the Cube up to 60 feet to ground within 120 feet of yourself. CIRCLE
      OF THE MOON Adopt Animal Forms to Guard the Wilds Druids of the Circle of the Moon draw on lunar
      magic to transform themselves. Their order gathers under the moon to share news and perform rituals.
      Changeable as the moon, a Druid of this circle might prowl as a great cat one night, soar over the
      treetops as an eagle the next day, and then crash through undergrowth as a bear to drive off a trespassing
      monster. The wild is in the Druid’s blood.
  circleforms:
    title: CIRCLE FORMS
    level: 3
    text: You can channel lunar magic when you assume a Wild Shape form, granting you the benefits below.
      Challenge Rating. The maximum Challenge Rating for the form equals your Druid level divided by 3
      (round down). Armor Class. Until you leave the form, your AC equals 13 plus your Wisdom modifier
      if that total is higher than the Beast’s AC. Temporary Hit Points. You gain a number of Temporary
      Hit Points equal to three times your Druid level.
  circleofthemoonspells:
    title: CIRCLE OF THE MOON SPELLS
    level: 3
    text: When you reach a Druid level specified in the Circle of the Moon Spells table, you thereafter
      always have the listed spells prepared. In addition, you can cast the spells from this feature while
      you're in a Wild Shape form. CIRCLE OF THE MOON SPELLS Druid Level Prepared Spells 3 Cure Wounds,
      Moonbeam, Starry Wisp 5 Conjure Animals 7 Fount of Moonlight 9 Mass Cure Wounds A DRUID IN WOLF
      FORM HOWLS AT THE MOON.
  improvedcircleforms:
    title: IMPROVED CIRCLE FORMS
    level: 6
    text: While in a Wild Shape form, you gain the following benefits. Lunar Radiance. Each of your attacks
      in a Wild Shape form can deal its normal damage type or Radiant damage. You make this choice each
      time you hit with those attacks. Increased Toughness. You can add your Wisdom modifier to your Constitution
      saving throws.
  moonlightstep:
    title: MOONLIGHT STEP
    level: 10
    text: You magically transport yourself, reappearing amid a burst of moonlight. As a Bonus Action,
      you teleport up to 30 feet to an unoccupied space you can see, and you have Advantage on the next
      attack roll you make before the end of this turn. You can use this feature a number of times equal
      to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a Long
      Rest. You can also regain uses by expending a level 2+ spell slot for each use you want to restore
      (no action required).
  lunarform:
    title: LUNAR FORM
    level: 14
    text: The power of the moon suffuses you, granting you the following benefits. Improved Lunar Radiance.
      Once per turn, you can deal an extra 2d10 Radiant damage to a target you hit with a Wild Shape form’s
      attack. Shared Moonlight. Whenever you use Moonlight Step, you can also teleport one willing creature.
      That creature must be within 10 feet of you, and you teleport it to an unoccupied space you can
      see within 10 feet of your destination space. CIRCLE OF THE SEA Become One with Tides and Storms
      Druids of the Circle of the Sea draw on the tempestuous forces of oceans and storms. Some view themselves
      as embodiments of nature’s wrath, seeking vengeance against those who despoil nature. Others seek
      mystical unity with nature by attuning themselves to the ebb and flow of the tides, following the
      rush of currents and waves and listening to the inscrutable whispers and roars of the winds.
  circleoftheseaspells:
    title: CIRCLE OF THE SEA SPELLS
    level: 3
    text: When you reach a Druid level specified in the Circle of the Sea Spells table, you thereafter
      always have the listed spells prepared. CIRCLE OF THE SEA SPELLS Druid Level Prepared Spells 3 Fog
      Cloud, Gust of Wind, Ray of Frost, Shatter, Thunderwave Lightning Bolt, Water Breathing Control
      Water, Ice Storm Conjure Elemental, Hold Monster
  wrathofthesea:
    title: WRATH OF THE SEA
    level: 3
    text: As a Bonus Action, you can expend a use of your Wild Shape to manifest a 5-foot Emanation that
      takes the form of ocean spray that surrounds you for 10 minutes. It ends early if you dismiss it
      (no action required), manifest it again, or have the Incapacitated condition. When you manifest
      the Fmanation and as a Bonus Action on your subsequent turns, you can choose another creature you
      can see in the Emanation. The target must succeed on a Constitution saving throw against your spell
      save DC or take Cold damage and, if the creature is Large or smaller, be pushed up to 15 feet away
      from you. To determine this damage, roll anumber of d6s equal to your Wisdom modifier (minimum of
      one die).
  aquaticaffinity:
    title: AQUATIC AFFINITY
    level: 6
    text: The size of the Emanation created by your Wrath of the Sea increases to 10 feet. In addition,
      you gain a Swim Speed equal to your Speed.
  stormborn:
    title: STORMBORN
    level: 10
    text: Your Wrath of the Sea confers two more benefits while active, as detailed below. Flight. You
      gain a Fly Speed equal to your Speed. Resistance. You have Resistance to Cold, Lightning, and Thunder
      damage. CHAPTER 3 | CHARACTER CLASSES 87 ——————————— CIRCLE OF THE SEA SUBCLASS
  oceanicgift:
    title: OCEANIC GIFT
    level: 14
    text: Instead of manifesting the Emanation of Wrath of the Sea around yourself, you can manifest it
      around one willing creature within 60 feet of yourself. That creature gains all the benefits of
      the Emanation and uses your spell save DC and Wisdom modifier for it. In addition, you can manifest
      the Emanation around both the other creature and yourself if you expend two uses of your Wild Shape
      instead of one when manifesting it. CIRCLE OF THE STARS Harness Secrets Hidden in Constellations
      The Circle of the Stars has tracked heavenly patterns since time immemorial, discovering secrets
      hidden amid the constellations. By understanding these secrets, the Druids of this circle seek to
      harness the powers of the cosmos.
  starmap:
    title: STAR MAP
    level: 3
    text: You've created a star chart as part of your heavenly studies. It is a Tiny object, and you can
      use it as a Spellcasting Focus for your Druid spells. You determine its form by rolling on the Star
      Map table or by choosing one. While holding the map, you have the Guidance and Guiding Bolt spells
      prepared, and you can cast Guiding Bolt without expending a spell slot. You can cast it in that
      way a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended
      uses when you finish a Long Rest. If you lose the map, you can perform a 1-hour ceremony to magically
      create a replacement. This ceremony can be performed during a Short or Long Rest, and it destroys
      the previous map. STAR MAP 1d6 Map Form 1 Ascroll bearing depictions of constellations A stone tablet
      with fine holes drilled through it An owlbear hide tooled with stellar symbols A collection of maps
      bound in an ebony cover A crystal engraved with starry patterns nm &S& W PN A glass disk etched
      with constellations
  starryform:
    title: STARRY FORM
    level: 3
    text: As a Bonus Action, you can expend a use of your Wild Shape feature to take on a starry form
      rather than shape-shifting. While in your starry form, you retain your game statistics, but your
      body becomes luminous, your joints glimmer like stars, and glowing lines connect them as on a star
      chart. This form sheds Bright Light in a 10-foot radius and Dim Light for an additional 10 feet.
      The form lasts for 10 minutes. It ends early if you dismiss it (no action required), have the Incapacitated
      condition, or use this feature again. Whenever you assume your starry form, choose which of the
      following constellations glimmers on your body; your choice gives you certain benefits while in
      the form. Archer. A constellation of an archer appears on you. When you activate this form and as
      a Bonus Action on your subsequent turns while it lasts, you can make aranged spell attack, hurling
      a luminous arrow that targets one creature within 60 feet of yourself. On a hit, the attack deals
      Radiant damage equal to 1d8 plus your Wisdom modifier. Chalice. A constellation of a life-giving
      goblet appears on you. Whenever you cast a spell using a spell slot that restores Hit Points to
      a creature, you or another creature within 30 feet of you can regain Hit Points equal to 1d8 plus
      your Wisdom modifier. Dragon. A constellation of a wise dragon appears on you. When you make an
      Intelligence or a Wisdom check or a Constitution saving throw to maintain Concentration, you can
      treat aroll of 9 or lower on the d20 as a 10.
  cosmicomen:
    title: COSMIC OMEN
    level: 6
    text: 'Whenever vou finish a Long Rest, you can consult your Star Map for omens and roll a die. Until
      you finish your next Long Rest, you gain access to a special Reaction based on whether you rolled
      an even or an odd number on the die: Weal (Even). Whenever a creature you can see within 30 feet
      of you is about to make a D20 Test, you can take a Reaction to roll 1d6 and add the number rolled
      to the total. Woe (Odd). Whenever a creature you can see within 30 feet of you is about to make
      a D20 Test, you can take a Reaction to roll 1d6 and subtract the number rolled from the total. You
      can use this Reaction a number of times equal to your Wisdom modifier (minimum of once), and you
      regain all expended uses when you finish a Long Rest.'
  twinklingconstellations:
    title: TWINKLING CONSTELLATIONS
    level: 10
    text: The constellations of your Starry Form improve. The 1d8 of the Archer and the Chalice becomes
      2d8, and while the Dragon is active, you have a Fly Speed of 20 feet and can hover. Moreover, at
      the start of each of your turns while in your Starry Form, you can change which constellation glimmers
      on your body.
  fullofstars:
    title: FULL OF STARS
    level: 14
    text: 'While in your Starry Form, you become partially incorporeal, giving you Resistance to Bludgeoning,
      F eaeun eee rie. Grae Piercing, and Slashing damage. SUBCLASS aa < Lt) omad m O O Zz < Va) WN O
      2 O — “Y Se) Zz CORE FIGHTER IRAITS Primary Ability Hit Point Die Saving Throw Proficiencies Strength
      or Dexterity D10 per Fighter level Strength and Constitution Choose 2: Acrobatics, Animal Handling,
      Athletics, History, Insight, Intimidation, Persuasion, Perception, or Survival Skill Proficiencies
      Weapon Proficiencies Simple and Martial weapons Light, Medium, and Heavy armor and Shields Choose
      A, B, or C: (A) Chain Mail, Greatsword, Flail, 8 Javelins, Dungeoneer’s Pack, and 4 GP; (B) Studded
      Leather Armor, Scimitar, Shortsword, Longbow, 20 Arrows, Quiver, Dungeoneer’s Pack, and 11 GP; or
      (C) 155 GP Armor Training Starting Equipment IGHTERS RULE MANY BATTLEFIELDS. ) Questing knights,
      royal champions, elite sol- diers, and hardened mercenaries—as Fighters, they all share an unparalleled
      prowess with weapons and armor. And they are well acquainted with death, both meting it out and
      defying it. Fighters master various weapon techniques, and a well-equipped Fighter always has the
      right tool at hand for any combat situation. Likewise, a Fighter is adept with every form of armor.
      Beyond that basic degree of familiarity, each Fighter specializes in certain styles of combat. Some
      concentrate on archery, some on fighting with two weapons at once, and some on augmenting their
      martial skills with magic. This combination of broad ability and extensive specialization makes
      Fighters superior combatants. BECOMING A FIGHTER ... AS A LEVEL 1 CHARACTER - Gain all the traits
      in the Core Fighter Traits table. - Gain the Fighter’s level 1 features, which are listed in the
      Fighter Features table. AS A MULTICLASS CHARACTER - Gain the following traits from the Core Fighter
      Traits table: Hit Point Die, proficiency with Martial weapons, and training with Light and Medium
      armor and Shields. - Gain the Fighter’s level 1 features, which are listed in the Fighter Features
      table. '' FIGHTER CLASS FEATURES As a Fighter, you gain the following class features when you reach
      the specified Fighter levels. These features are listed on the Fighter Features table.'
  fightingstyle:
    title: FIGHTING STYLE
    level: 2
    text: You gain a Fighting Style feat of your choice (see chapter 5). Instead of choosing one of those
      feats, you can choose the option below. Druidic Warrior. You learn two Druid cantrips of your choice
      (see the Druid class's section for a list of CHAPTER 3 | CHARACTER CLASSES Favored Prepared —Spell
      Slots per Spell Level— Enemy Spells 1 2 3 4 5 2 2 2 —- —- —> — 2 3 2 —- — 2 4 3 —- —- —- — 2 5 3
      —- —- —> — 3 6 4 2 — ee 3 6 4 2 —- —- — 3 7 4 3 —- —- — 3 y A 3 —- —- — 4 9 4 3 2 —- — 4 9 4 3 2
      —- A 10 4 3 3 a A 10 4A 3 3 0 5 1 4 3 3 1 — 5 1 4 3 3 1 — 5 2 4 3 3 2 — 5 12 4 3 3 2 —— 6 14 A 3
      3 3 T 6 14 4 3 3 3 1 6 15 4 3 3 3 2 6 15 4 3 3 3 2 Druid spells). Guidance and Starry Wisp are recommended.
      The chosen cantrips count as Ranger spells for you, and Wisdom is your spellcasting ability for
      them. Whenever you gain a Ranger level, you can replace one of these cantrips with another Druid
      cantrip.
  secondwind:
    title: SECOND WIND
    level: 1
    text: You have a limited well of physical and mental stamina that you can draw on. As a Bonus Action,
      you can use it to regain Hit Points equal to 1d10 plus your Fighter level. You can use this feature
      twice. You regain one expended use when you finish a Short Rest, and you regain all expended uses
      when you finish a Long Rest. When you reach certain Fighter levels, you gain more uses of this feature,
      as shown in the Second Wind column of the Fighter Features table.
  actionsurge:
    title: ACTION SURGE
    level: 2
    text: You can push yourself beyond your norma! limits for amoment. On your turn, you can take one
      additional action, except the Magic action. Once you use this feature, you can’t do so again until
      you finish a Short or Long Rest. Starting at level 17, you can use it twice before a rest but only
      once on a turn.
  tacticalmind:
    title: TACTICAL MIND
    level: 2
    text: You have a mind for tactics on and off the battlefield. When you fail an ability check, you
      can expend a use of your Second Wind to push yourself toward success. Rather than regaining Hit
      Points, you roll ldlO and add the number rolled to the ability check, potentially turning it into
      a success. If the check still fails, this use of Second Wind isn’t expended. CHAPTER 3 | CHARACTER
      CLASSES OI eee ~ =—— 92 FIGHTER FEATURES Proficiency Second Weapon Level Bonus Class Features Wind
      Mastery 1 +2 Fighting Style, Second Wind, Weapon Mastery 2 3 2 +2 Action Surge (one use), Tactical
      Mind 2 3 3 +2 Fighter Subclass 2 3 4 +2 Ability Score Improvement 3 4 5 +3 Extra Attack, Tactical
      Shift 3 4 6 +3 Ability Score Improvement 3 4 7 +3 Subclass feature 3 A 8 +3 Ability Score Improvement
      3 A 9 +4 Indomitable (one use), Tactical Master 3 4 10 +4 Subclass feature A 5 1] +4 Two Extra Attacks
      4 b 12 +4 Ability Score Improvement 4 . 13 +5 Indomitable (two uses), Studied Attacks 4 5 14 +5
      Ability Score Improvement 4, 5 15 +5 Subclass feature 4 5 16 +5 Ability Score Improvement A 6 17
      +6 Action Surge (two uses), Indomitable (three uses) 4 6 18 +6 Subclass feature 4 6 19 +6 Epic Boon
      4. 6 20 +6 Three Extra Attacks 4 6
  fightersubclass:
    title: FIGHTER SUBCLASS
    level: 3
    text: You gain a Fighter subclass of your choice. The Battle Master, Champion, Eldritch Knight, and
      Psi Warrior subclasses are detailed after this class’s description. A subclass is a specialization
      that grants you features at certain Fighter levels. For the rest of your career, you gain each of
      your subclass'’s features that are of your Fighter level or lower.
  tacticalshift:
    title: TACTICAL SHIFT
    level: 5
    text: Whenever you activate your Second Wind with a Bonus Action, you can move up to half your Speed
      without provoking Opportunity Attacks.
  indomitable:
    title: INDOMITABLE
    level: 9
    text: If you fail a saving throw, you can reroll it witha bonus equal to your Fighter level. You must
      use the new roll, and you can’t use this feature again until you finish a Long Rest. CHAPTER 3 |
      CHARACTER CLASSES You can use this feature twice before a Long Rest starting at level 13 and three
      times before a Long Rest starting at level 17
  tacticalmaster:
    title: TACTICAL MASTER
    level: 9
    text: 'When you attack with a weapon whose mastery property you can use, you can replace that property
      with the Push, Sap, or Slow property for that attack. LEVEL 1]: Two EXTRA ATTACKS You can attack
      three times instead of once whenever you take the Attack action on your turn.'
  studiedattacks:
    title: STUDIED ATTACKS
    level: 13
    text: You study your opponents and learn from each attack you make. If you make an attack roll against
      a creature and miss, you have Advantage on your next attack roll against that creature before the
      end of your next turn.
  threeextraattacks:
    title: THREE EXTRA ATTACKS
    level: 20
    text: You can attack four times instead of once whenever you take the Attack action on your turn.
      —_—“ FIGHTER SUBCLASSES A Fighter subclass is a specialization that grants you features at certain
      levels, as specified in the subclass. This section presents the Battle Master, Champion, Eldritch
      Knight, and Psi Warrior subclasses. BATTLE MASTER Master Sophisticated Battle Maneuvers Battle Masters
      are students of the art of battle, learning martial techniques passed down through generations.
      [he most accomplished Battle Masters are well-rounded figures who combine their carefully honed
      combat skills with academic study in the fields of history, theory, and the arts.
  combatsuperiority:
    title: COMBAT SUPERIORITY
    level: 3
    text: Your experience on the battlefield has refined your fighting techniques. You learn maneuvers
      that are fueled by special dice called Superiority Dice. ——_ A FIGHTER STANDS BETWEEN AN ALLY AND
      THE ONSLAUGHT OF A BLACK ORAGON. Maneuvers. You learn three maneuvers of your choice from the “Maneuver
      Options” section later in this subclass’s description. Many maneuvers enhance an attack in some
      way. You can use only one maneuver per attack. You learn two additional maneuvers of your choice
      when you reach Fighter levels 7, 10, and 15. Each time you learn new maneuvers, you can also replace
      one maneuver you know with a different one. Superiority Dice. You have four Superiority Dice, which
      are d8s. A Superiority Die is expended when you use it. You regain all expended Superiority Dice
      when you finish a Short or Long Rest. You gain an additional Superiority Die when you reach Fighter
      levels 7 (five dice total) and 15 (six dice total). Saving Throws. If a maneuver requires a saving
      throw, the DC equals 8 plus your Strength or Dexterity modifier (your choice) and Proficiency Bonus.
      CHAPTER 3 | CHARACTER CLASSES 92 BATTLE MASTER SUBCLASS
  studentofwar:
    title: STUDENT OF WAR
    level: 3
    text: You gain proficiency with one type of Artisan’s Tools of your choice, and you gain proficiency
      in one skill of your choice from the skills available to Fighters at level 1.
  knowyourenemy:
    title: KNOW YOUR ENEMY
    level: 7
    text: As a Bonus Action, you can discern certain strengths and weaknesses of a creature you can see
      within 30 feet of yourself; you know whether that creature has any Immunities, Resistances, or Vulnerabilities,
      and if the creature has any, you know what they are. Once you use this feature, you can’t do so
      again until you finish a Long Rest. You can also restore a use of the feature by expending one Superiority
      Die (no action required).
  improvedcombatsuperiority:
    title: IMPROVED COMBAT SUPERIORITY
    level: 10
    text: Your Superiority Die becomes a d10.
  relentless:
    title: RELENTLESS
    level: 15
    text: Once per turn, when you use a maneuver, you can roll 1d8 and use the number rolled instead of
      expending a Superiority Die.
  ultimatecombatsuperiority:
    title: ULTIMATE COMBAT SUPERIORITY
    level: 18
    text: Your Superiority Die becomes a d12. MANEUVER OPTIONS The maneuvers are presented here in alphabetical
      order. Ambush. When you make a Dexterity (Stealth) check or an Initiative roll, you can expend one
      Superiority Die and add the die to the roll, unless you have the Incapacitated condition. Bait and
      Switch. When you're within 5 feet of a creature on your turn, you can expend one Superiority Die
      and switch places with that creature, provided you spend at least 5 feet of movement and the creature
      is willing and doesn’t have the Incapacitated condition. This movement doesn't provoke Opportunity
      Attacks. Roll the Superiority Die. Until the start of your next turn, you or the other creature
      (your choice) gains a bonus to AC equal to the number rolled. Commander's Strike. When you take
      the Attack action on your turn, you can replace one of your attacks to direct one of your companions
      to strike. When you do so, choose a willing creature who can see or hear you and expend one Superiority
      Die. That creature can immediately use its Reaction to make one attack with a weapon or an Unarmed
      Strike, adding the Superiority Die to the attack’s damage roll on a hit. Commanding Presence. When
      you make a Charisma (Intimidation, Performance, or Persuasion) check, you can expend one Superiority
      Die and add that die to the roll. Disarming Attack. When you hit a creature with an attack roll,
      you can expend one Superiority Die to attempt to disarm the target. Add the Superiority Die roll
      to the attack’s damage roll. ‘he target must succeed on a Strength saving throw or drop one object
      of your choice that it’s holding, with the object landing in its space. Distracting Strike. When
      you hit a creature with an attack roll, you can expend one Superiority Die to distract the target.
      Add the Superiority Die roll to the attack’s damage roll. The next attack roll against the target
      by an attacker other than you has Advantage if the attack is made before the start of your next
      turn. Evasive Footwork. As a Bonus Action, you can expend one Superiority Die and take the Disengage
      action. You also roll the die and add the number rolled to your AC until the start of your next
      turn. Feinting Attack. As a Bonus Action, you can expend one Superiority Die to feint, choosing
      one creature within 5 feet of yourself as your target. You have Advantage on your next attack roll
      against that target this turn. If that attack hits, add the Superiority Die to the attack’s damage
      roll. Goading Attack. When you hit a creature with an attack roll, you can expend one Superiority
      Die to attempt to goad the target into attacking you. Add the Superiority Die to the attack’s damage
      roll. The target must succeed on a Wisdom saving throw or have Disadvantage on attack rolls against
      targets other than you until the end of your next turn. Lunging Attack. As a Bonus Action, you can
      expend one Superiority Die and take the Dash action. If you move at least 5 feet in a straight line
      immediately before hitting with a melee attack as part of the Attack action on this turn, you can
      add the Superiority Die to the attack’s damage roll. Maneuvering Attack. When you hit a creature
      with an attack roll, you can expend one Superiority Die to maneuver one of your comrades into another
      position. Add the Superiority Die roll to the attack’s damage roll, and choose a willing creature
      who can see or hear you. That creature can use its Reaction to move up to half its Speed without
      provoking an Opportunity Attack from the target of your attack. ——— — Menacing Attack. When you
      hit a creature with an attack roll, you can expend one Superiority Die to attempt to frighten the
      target. Add the Superiority Die to the attack’s damage roll. The target must succeed on a Wisdom
      saving throw or have the Frightened condition until the end of your next turn. Parry. When another
      creature damages you with a melee attack roll, you can take a Reaction and expend one Superiority
      Die to reduce the damage by the number you roll on your Superiority Die plus your Strength or Dexterity
      modifier (your choice). Precision Attack. When you miss with an attack roll, you can expend one
      Superiority Die, roll that die, and add it to the attack roll, potentially causing the attack to
      hit. Pushing Attack. When you hit a creature with an attack roll using a weapon or an Unarmed Strike,
      you can expend one Superiority Die to attempt to drive the target back. Add the Superiority Die
      to the attack’s damage roll. If the target is Large or smaller, it must succeed on a Strength saving
      throw or be pushed up to 15 feet directly away from you. Rally. As a Bonus Action, you can expend
      one Superiority Die to bolster the resolve of a companion. Choose an ally of yours within 30 feet
      of yourself who can see or hear you. [That creature gains Temporary Hit Points equal to the Superiority
      Die roll plus half your Fighter level (round down). Riposte. When a creature misses you with a melee
      attack roll, you can take a Reaction and expend one Superiority Die to make a melee attack roll
      with a weapon or an Unarmed Strike against the creature. If you hit, add the Superiority Die to
      the attack’s damage. Sweeping Attack. When you hit a creature with a melee attack roll using a weapon
      or an Unarmed Strike, you can expend one Superiority Die to attempt to damage another creature.
      Choose another creature within 5 feet of the original target and within your reach. If the original
      attack roll would hit the second creature, it takes damage equal to the number you roll on your
      Superiority Die. The damage is of the same type dealt by the original attack. Tactical Assessment.
      When you make an Intelligence (History or Investigation) check or a Wisdom (Insight) check, you
      can expend one Superiority Die and add that die to the ability check. Trip Attack. When you hit
      a creature with an attack roll using a weapon or an Unarmed Strike, you can expend one Superiority
      Die and add the die to the attack’s damage roll. If the target is Large or smaller, it must succeed
      on a Strength saving throw or have the Prone condition. CHAPTER 3 | CHARACTER CLASSES 95 CHAMPION
      SUBCLASS CHAMPION Pursue Physical Excellence in Combat A Champion focuses on the development of
      martial prowess in a relentless pursuit of victory. Champions combine rigorous training with physical
      excellence to deal devastating blows, withstand peril, and garner glory. Whether in athletic contests
      or bloody battle, Champions strive for the crown of the victor.
  improvedcritical:
    title: IMPROVED CRITICAL
    level: 3
    text: Your attack rolls with weapons and Unarmed Strikes can score a Critical Hit on a roll of 19
      or 20 on the d20.
  remarkableathlete:
    title: REMARKABLE ATHLETE
    level: 3
    text: Thanks to your athleticism, you have Advantage on Initiative rolls and Strength (Athletics)
      checks. In addition, immediately after you score a Critical Hit, you can move up to half your Speed
      without provoking Opportunity Attacks.
  additionalfightingstyle:
    title: ADDITIONAL FIGHTING STYLE
    level: 7
    text: You gain another Fighting Style feat of your choice.
  heroicwarrior:
    title: HEROIC WARRIOR
    level: 10
    text: The thrill of battle drives you toward victory. During combat, you can give yourself Heroic
      Inspiration whenever you start your Lurn wilhout it.
  superiorcritical:
    title: SUPERIOR CRITICAL
    level: 15
    text: Your attack rolls with weapons and Unarmed Strikes can now score a Critical Hit on a roll of
      18-20 on the d20.
  survivor:
    title: SURVIVOR
    level: 18
    text: You attain the pinnacle of resilience in battle, giving you these benefits. Defy Death. You
      have Advantage on Death Saving Throws. Moreover, when you roll 18-20 on a Death Saving Throw, you
      gain the benefit of rolling a 20 on it. Heroic Rally. At the start of each of your turns, you regain
      Hit Points equal to 5 plus your Constitution modifier if you are Bloodied and have at least 1 Hit
      Point. ELDRITCH KNIGHT Support Combat Skills with Arcane Magic Eldritch Knights combine the martial
      mastery common to all Fighters with a careful study of magic. Their spells both complement and extend
      their combat skills, providing additional protection to shore up their armor and also allowing them
      to engage many foes at once with explosive magic.
  warbond:
    title: WAR BOND
    level: 3
    text: You learn a ritual that creates a magical bond between yourself and one weapon. You perform
      the ritual over the course of 1 hour, which can be done during a Short Rest. The weapon must be
      within your reach throughout the ritual, at the conclusion of which you touch the weapon and forge
      the bond. The bond fails if another Fighter is bonded to the weapon or if the weapon is a magic
      item to which someone else is attuned. Once you have bonded a weapon to yourself, you can’t be disarmed
      of that weapon unless you have the Incapacitated condition. If it is on the same plane of existence,
      you can summon that weapon.as a Bonus Action, causing it to teleport instantly to your hand. You
      can have up to two bonded weapons, but you can summon only one at atime with a Bonus Action. If
      you attempt to bond with a third weapon, you must break the bond with one of the other two.
  warmagio:
    title: WAR MAGIO
    level: 7
    text: When you take the Attack action on your turn, you can replace one of the attacks with a casting
      of one of your Wizard cantrips that has a casting time of an action.
  eldritchstrike:
    title: ELDRITCH STRIKE
    level: 10
    text: You learn how to make your weapon strikes undercut a creature's ability to withstand your spells.
      When you hit a creature with an attack using a weapon, that creature has Disadvantage on the next
      saving throw it makes against a spell you cast before the end of your next turn.
  arcanecharge:
    title: ARCANE CHARGE
    level: 15
    text: When you use your Action Surge, you can teleport up to 30 feet to an unoccupied space you can
      see. You can teleport before or after the additional action.
  improvedwarmagic:
    title: IMPROVED WAR MAGIC
    level: 18
    text: When you take the Attack action on your turn, you can replace two of the attacks with a casting
      of one of your level 1 or level 2 Wizard spells that has a casting time of an action. CHAPTER 3
      |CHARAOCTER OLASSES PSI WARRIOR Augment Physical Might with Psionic Power Psi Warriors awaken the
      power of their minds to augment their physical might. They harness this psionic power to infuse
      their weapon strikes, lash out with telekinetic energy, and create barriers of mental force.
  psionicpower:
    title: PSIONIC POWER
    level: 3
    text: You harbor a wellspring of psionic energy within yourself. It is represented by your Psionic
      Energy Dice, which fuel certain powers you have from this subclass. The Soulknife Energy Dice table
      shows the number of these dice you have when you reach certain Rogue levels, and the table shows
      the die size. SOULKNIFE ENERGY DICE Rogue Level Die Size Number 3 D6 4 2 D3 6 9 D8 8 1] D10 8 13
      D10 10 17 D1I2 12 Any features in this subclass that use a Psionic Energy Die use only the dice
      from this subclass. Some of your powers expend a Psionic Energy Die, as specified in a power’s description,
      and you can’t use a power if it requires you to use a die when your Psionic Energy Dice are all
      expended. You regain one of your expended Psionic Energy Dice when you finish a Short Rest, and
      you regain all of them when you finish a Long Rest. Psi-Bolstered Knack. If you fail an ability
      check using a skill or tool with which you have proficiency, you can roll one Psionic Energy Die
      and add the number rolled to the check, potentially turning failure into success. The die is expended
      only if the roll then succeeds. Psychic Whispers. You can establish telepathic communication between
      yourself and others. As a Magic action, choose one or more creatures you can see, up to a number
      of creatures equal to your Proficiency Bonus, and then roll one Psionic Energy Die. For a number
      of hours equal to the number rolled, the chosen creatures can speak telepathically with you, and
      you can speak telepathically with them. To send or receive a message (no action required), you and
      the other creature must be within 1 it Loe — ? “a r] ~- SOULKNIFE SUBCLASS . . *- < a ] mile of
      each other. A creature can end the telepathic connection at any time (no action required). The first
      time you use this power after each Long Rest, you don’t expend the Psionic Energy Die. All other
      times you use the power, you expend the die.
  telekineticadept:
    title: TELEKINETIC ADEPT
    level: 7
    text: You have mastered new ways to use your telekinetic abilities, detailed below. Psi-Powered Leap.
      As a Bonus Action, you gain a Fly Speed equal to twice your Speed until the end of the current turn.
      Once you take this Bonus Action, you can’t do so again until you finish a Short or Long Rest unless
      you expend a Psionic Energy Die (no action required) to restore your use of it. Telekinetic Thrust.
      When you deal damage to a target with your Psionic Strike, you can force the target to make a Strength
      saving throw (DC 8 plus your Intelligence modifier and Proficiency Bonus). On a failed save, you
      can give the target the Prone condition or transport it up to 10 feet horizontally.
  guardedmind:
    title: GUARDED MIND
    level: 10
    text: You have Resistance to Psychic damage. Moreover, if you start your turn with the Charmed or
      Frightened condition, you can expend a Psionic Energy Die (no action required) and end every effect
      on yourself giving you those conditions.
  bulwarkofforce:
    title: BULWARK OF FORCE
    level: 15
    text: You can shield yourself and others with telekinetic force. As a Bonus Action, you can choose
      creatures, including yourself, within 30 feet of yourself, up to a number of creatures equal to
      your Intelligence modifier (minimum of one creature). Each of the chosen creatures has Half Cover
      for 1 minute or until you have the Incapacitated condition. Once you use this feature, you can’t
      do so again unLil you finish a Long Rest unless you expenda Psionic Energy Die (no action required)
      to restore your use of it.
  telekineticmaster:
    title: TELEKINETIC MASTER
    level: 18
    text: 'You always have the Telekinesis spell prepared. With this feature, you can cast it without
      a spell slot or components, and your spellcasting ability for it is Intelligence. On each of your
      turns while you maintain Concentration on it, including the turn when you cast it, you can make
      one attack with a weapon as a Bonus Action. Once you cast the spell with this feature, you can’t
      do so inthis way again until you finish a Long Rest unless you expend a Psionic Energy Die (no action
      required) to restore your use of it. Psi WARRIOR SUBCLASS o | Li) < r ae < oe < 5 rg ” 0 Core MONK
      TRAITS Primary Ability Hit Point Die Saving Throw Proficiencies Dexterity and Wisdom D8 per Monk
      level Strength and Dexterity Choose 2: Acrobatics, Athletics, History, Insight, Religion, or Stealth
      Skill Proficiencies Simple weapons and Martial weapons that have the Light property Choose one type
      of Artisan’s Tools or Musical Instrument (see chapter 6) Weapon Proficiencies Tool Proficiencies
      Armor Training None Starting Equipment Choose Aor B: (A) Spear, 5 Daggers, Artisan’s Tools or Musical
      Instrument chosen for the tool proficiency above, Explorer’s Pack, and 11 GP; or (B) 50 GP ONKS
      USE RIGOROUS COMBAT TRAINING M and mental discipline to align themselves «» . « » with the multiverse
      and focus their internal reservoirs of power. Different Monks conceptualize this power in various
      ways: as breath, energy, life force, essence, or self, for example. Whether channeled as a striking
      display of martial prowess or as a subtler manifestation of defense and speed, this power infuses
      all that a Monk does. Monks focus their internal power to create extraordinary, even supernatural,
      effects. They channel uncanny speed and strength into their attacks, with or without the use of
      weapons. In a Monk’s hands, even the most basic weapons can become sophisticated implements of combat
      mastery. Many Monks find that a structured life of ascetic withdrawal helps them cultivate the physical
      and mental focus they need to harness their power. Other Monks believe that immersing themselves
      in the vibrant confusion of life helps to fuel their determination and discipline. Monks generally
      view adventures as tests of their physical and mental development. They are driven by a desire to
      accomplish a greater mission than merely slaying monsters and plundering treasure; they strive to
      turn themselves into living weapons. AS A LEVEL 1 CHARACTER - Gain all the traits in the Core Monk
      Traits table. - Gain the Monk’s level 1 features, which are listed in the Monk Features table. ~
      BECOMING A MONK ... gi | AS A MULTICLASS CHARACTER - Gain the Hit Point Die trait from the Core
      Monk Traits table. - Gain the Monk’s level 1 features, which are listed in the Monk Features table.
      MONK CLASS FEATURES As a Monk, you gain the following class features when you reach the specified
      Monk levels. These features are listed in the Monk Features table.'
  martialarts:
    title: MARTIAL ARTS
    level: 1
    text: 'Your practice of martial arts gives you mastery of combat styles that use your Unarmed Strike
      and Monk weapons, which are the following: - Simple Melee weapons - Martial Melee weapons that have
      the Light property You gain the following benefits while you are unarmed or wielding only Monk weapons
      and you aren''t wearing armor or wielding a Shield. Bonus Unarmed Strike. Youcan make an Unarmed
      Strike as a Bonus Action. Martial Arts Die. You can roll 1d6 in place of the normal damage of your
      Unarmed Strike or Monk weapons. This die changes as you gain Monk levels, as shown in the Martial
      Arts column of the Monk Features table. Dexterous Attacks. You can use your Dexterity modifier instead
      of your Strength modifier for the attack and damage rolls of your Unarmed Strikes and Monk weapons.
      In addition, when you use the Grapple or Shove option of your Unarmed Strike, you can use your Dexterity
      modifier instead of your Strength modifier to determine the save DC.'
  monksfocus:
    title: MONK’s Focus
    level: 2
    text: 'Your focus and martial training allow you to harness a well of extraordinary energy within
      yourself. This energy is represented by Focus Points. Your Monk level determines the number of points
      you have, as shown in the Focus Points column of the Monk Features table. OHAPTER 3 | CHARAOTER
      CLASSES IOI IO2 MONK FEATURES Proficiency Martial Focus Unarmored Level Bonus _ Class Features Arts
      Points Movement 7 +2 Martial Arts, Unarmored Defense 1d6 — — 2 +2 Monk’s Focus, Unarmored Movement,
      1d6 2 +10 ft. Uncanny Metabolism 3 +2 Deflect Attacks, Monk Subclass 1d6 3 ue tt: 4 +2 Ability Score
      Improvement, Slow Fall 1d6 4 +10 ft. 5 +3 Extra Attack, Stunning Strike 1d8 5 +10 ft. 6 +3 Empowered
      Strikes, Subclass feature 1d8 6 +15 ft. 7 +3 Evasion 1d8 7 +15 ft. 8 +3 Ability Score Improvement
      1d8 8 +15 ft. 9 +4 Acrobatic Movement 1d8 9 +15 ft. 10 +4 Heightened Focus, Self-Restoration 1d8
      10 +20 ft. 1] +4 Subclass feature 1d10 1 +20 ft. 12 +4 Ability Score Improvement 1d10 12 +20 ft.
      13 +5 Deflect Energy 1d10 13 +20 ft. 14 +5 Disciplined Survivor 1d10 14 +25 ft. 15 +5 Perfect Focus
      1d10 15 +25 ft. 16 +5 Ability Score Improvement 1d10 16 +25 ft. 17 +6 Subclass feature 1d12 17 +25
      ft. 18 +6 Superior Defense 1d12 18 +30 ft. 19 +6 Epic Boon 1d12 19 +30 ft. 20 +6 Body and Mind 1d12
      20 +30 ft. You can expend these points to enhance or fuel certain Monk features. You start knowing
      three such features: Flurry of Blows, Patient Defense, and Step of the Wind, each of which is detailed
      below. When you expend a Focus Point, it is unavailable until you finish a Short or Long Rest, at
      the end of which you regain all your expended points. Some features that use Focus Points require
      your target to make a saving throw. The save DC equals 8 plus your Wisdom modifier and Proficiency
      Bonus. Flurry of Blows. You can expend 1 Focus Point to make two Unarmed Strikes as a Bonus Action.
      Patient Defense. You can take the Disengage action as a Bonus Action. Alternatively, you can expend
      | Focus Point to take both the Disengage and the Dodge actions as a Bonus Action. Step of the Wind.
      You can take the Dash action as a Bonus Action. Alternatively, you can expend 1 Focus Point to take
      both the Disengage and Dash actions as a Bonus Action, and your jump distance is doubled for the
      turn.'
  unarmoredmovement:
    title: UNARMORED MOVEMENT
    level: 2
    text: Your speed increases by 10 feet while you aren't wearing armor or wielding a Shield. This bonus
      increases when you reach certain Monk levels, as shown on the Monk Features table. CHAPTER 3 | CHARACTER
      CLASSES
  uncannymetabolism:
    title: UNCANNY METABOLISM
    level: 2
    text: When you roll Initiative, you can regain all ex- pended Focus Points. When you do so, roll your
      Martial Arts die, and regain a number of Hit Points equal to your Monk level plus the number rolled.
      Once you use this feature, you can’t use it again until you finish a Long Rest.
  deflectattacks:
    title: DEFLECT ATTACKS
    level: 3
    text: When an attack roll hits you and its damage includes Bludgeoning, Piercing, or Slashing damage,
      you can take a Reaction to reduce the attack’s total damage against you. The reduction equals 1d10
      plus your Dexterity modifier and Monk level. If you reduce the damage to O, you can expend 1 Focus
      Point to redirect some of the attack’s force. If you do so, choose a creature you can see within
      5 feet of yourself if the attack was a melee attack ora creature you can see within 60 feet of yourself
      that isn’t behind Total Cover if the attack was a ranged attack. That creature must succeed on a
      Dexterity saving throw or take damage equal to two rolls of your Martial Arts die plus your Dexterity
      modifier. The damage is the same type dealt by the attack.
  monksubclass:
    title: MONK SUBCLASS
    level: 3
    text: You gain a Monk subclass of your choice. The Warrior of Mercy, Warrior of Shadow, Warrior of
      the Elements, and Warrior of the Open Hand subclasses are detailed after this class’s description.
      A subclass is a specialization that grants you features at certain Monk levels. For the rest of
      your career, you gain each of your subclass’s features that are of your Monk level or lower.
  slowfall:
    title: SLOW FALL
    level: 4
    text: You can take a Reaction when you fall to reduce any damage you take from the fall by an amount
      equal to five times your Monk level.
  stunningstrike:
    title: STUNNING STRIKE
    level: 5
    text: Once per turn when you hit a creature with a Monk weapon or an Unarmed Strike, you can expend
      1 Focus Point to attempt a stunning strike. The target must make a Constitution saving throw. On
      a failed save, the target has the Stunned condition until the start of your next turn. On a successful
      save, the target’s Speed is halved until the start of your next turn, and the next attack roll made
      against the target before then has Advantage.
  empoweredstrikes:
    title: EMPOWERED STRIKES
    level: 6
    text: Whenever vou deal damage with your Unarmed Strike, it can deal your choice of Force damage or
      its normal damage type.
  evasion:
    title: EVASION
    level: 7
    text: You can nimbly dodge out of the way of certain dangers. When youre subjected to an effect that
      allows you to make a Dexterity saving throw to take only half damage, you instead take no damage
      if you succeed on the saving throw and only half dam age if you fail. You can't use this feature
      if you have the Incapacitated condition.
  acrobaticmovement:
    title: ACROBATIC MOVEMENT
    level: 9
    text: While you aren't wearing armor or wielding a Shield, you gain the ability to move along vertical
      surfaces and across liquids on your turn without falling during the movement.
  heightenedfocus:
    title: HEIGHTENED Focus
    level: 10
    text: Your Flurry of Blows, Patient Defense, and Step of the Wind gain the following benefits. Flurry
      of Blows. You can expend 1 Focus Point to use Flurry of Blows and make three Unarmed Strikes with
      it instead of two. Patient Defense. When you expend a Focus Point to use Patient Defense, you gain
      a number of Temporary Hit Points equal to two rolls of your Martial Arts die. Step of the Wind.
      When you expend a Focus Point to use Step of the Wind, you can choose a willing creature within
      5 feet of yourself that is Large or smaller. You move the creature with you until the end of your
      turn. The creature’s movement doesn’t provoke Opportunity Attacks.
  selfrestoration:
    title: SELF-RESTORATION
    level: 10
    text: 'Through sheer force of will, you can remove one of the following conditions from yourself at
      the end of each of your turns: Charmed, Frightened, or Poisoned. In addition, forgoing food and
      drink doesn’t give you levels of Exhaustion.'
  deflectenergy:
    title: DEFLECT ENERGY
    level: 13
    text: You can now use your Deflect Attacks feature against attacks that deal any damage type, not
      just Bludgeoning, Piercing, or Slashing.
  disciplinedsurvivor:
    title: DISCIPLINED SURVIVOR
    level: 14
    text: Your physical and mental discipline grant you proficiency in all saving throws. Additionally,
      whenever you make a saving throw and fail, you can expend 1 Focus Point to reroll it, and you must
      use the new roll.
  perfectfocus:
    title: PERFECT FOCUS
    level: 15
    text: When you roll Initiative and don't use Uncanny Metabolism, you regain expended Focus Points
      until you have 4 if you have 3 or fewer.
  superiordefense:
    title: SUPERIOR DEFENSE
    level: 18
    text: At the start of your turn, you can expend 3 Focus Points to bolster yourself against harm for
      1 minute or until you have the Incapacitated condition. During that time, you have Resistance to
      all damage except Force damage.
  bodyandmind:
    title: BODY AND MIND
    level: 20
    text: You have developed your body and mind to new heights. Your Dexterity and Wisdom scores increase
      by 4, toa maximum of 25. CHAPTER 3 | CHARACTER CLASSES 102 104. WARRIOR OF MERCY SUBCLASS MONK SUBCLASSES
      A Monk subclass is a specialization that grants you features at certain levels, as specified in
      the subclass. This section presents the Warrior of Mercy, Warrior of Shadow, Warrior of the Elements,
      and Warrior of the Open Hand subclasses. WARRIOR OF MERCY Manipulate Forces of Life and Death Warriors
      of Mercy manipulate the life force of others. These Monks are wandering physicians, but they bring
      a swift end to their enemies. They often wear masks, presenting themselves as faceless bringers
      of life and death.
  handofharm:
    title: HAND OF HARM
    level: 3
    text: Once per turn when you hit a creature with an Unarmed Strike and deal damage, you can expend
      1 Focus Point to deal extra Necrotic damage equal to one roll of your Martial Arts die plus your
      Wisdom modifier.
  handofhealing:
    title: HAND OF HEALING
    level: 3
    text: As a Magic action, you can expend 1| Focus Point to touch a creature and restore a number of
      Hit Points equal to aroll of your Martial Arts die plus your Wisdom modifier. When you use your
      Flurry of Blows, you can replace one of the Unarmed Strikes with a use of this feature without expending
      a Focus Point for the healing.
  implementsofmercy:
    title: IMPLEMENTS OF MERCY
    level: 3
    text: You gain proficiency in the Insight and Medicine skills and proficiency with the Herbalism Kit.
  physicianstouch:
    title: PHYSICIAN'S TOUCH
    level: 6
    text: 'Your Hand of Harm and Hand of Healing improve, as detailed below. Hand of Harm. When you use
      Hand of Harm on a creature, you can also give that creature the Poisoned condition until the end
      of your next turn. Hand of Healing. When you use Hand of Healing, you can also end one of the following
      conditions on the creature you heal: Blinded, Deafened, Paralyzed, Poisoned, or Stunned. LEVEL I]:
      FLURRY OF HEALING AND HARM When you use Flurry of Blows, you can replace each of the Unarmed Strikes
      with a use of Hand of Healing without expending Focus Points for the healing. In addition, when
      you make an Unarmed Strike with Flurry of Blows and deal damage, you can use Hand of Harm with that
      strike without expending a Focus Point for Hand of Harm. You can still use Hand of Harm only once
      per turn. You can use these benefits a total number of times equal to your Wisdom modifier (minimum
      of once). You regain all expended uses when you finish a Long Rest.'
  handofultimatemercy:
    title: HAND OF ULTIMATE MERCY
    level: 17
    text: 'Your mastery of life energy opens the door to the ultimate mercy. As a Magic action, you can
      touch the corpse of a creature that died within the past 24 hours and expend 5 Focus Points. The
      creature then returns to life with a number of Hit Points equal to 4d10 plus your Wisdom modifier.
      If the creature died with any of the following conditions, the creature revives with the conditions
      removed: Blinded, Deafened, Paralyzed, Poisoned, and Stunned. Once you use this feature, you can’t
      use it again until you finish a Long Rest. WARRIOR OF SHADOW Harness Shadow Power for Stealth and
      Subterfuge Warriors of Shadow practice stealth and subterfuge, harnessing the power of the Shadowfell.
      They are at home in darkness, able to draw gloom around themselves to hide, leap from shadow to
      shadow, and take on a wraithlike form.'
  shadowarts:
    title: SHADOW ARTS
    level: 3
    text: You have learned to draw on the power of the Shadowfell, gaining the following benefits. Darkness.
      You can expend 1 Focus Point to cast the Darkness spell without spell components. You can see within
      the spell’s area when you cast it with this feature. While the spell persists, you can move its
      area of Darkness to a space within 60 feet of yourself at the start of each of your turns. Darkvision.
      You gain Darkvision with a range of 60 feet. If you already have Darkvision, its range increases
      by 60 feet. Shadowy Figments. You know the Minor Illusion spell. Wisdom is your spellcasting ability
      for it.
  shadowstep:
    title: SHADOW STEP
    level: 6
    text: 'While entirely within Dim Light or Darkness, you can use a Bonus Action to teleport up to 60
      feet to an unoccupied space you can see that is also in Dim Light or Darkness. You then have Advantage
      on the next melee attack you make before the end of the current turn. LEVEL ll: IMPROVED SHADOW
      STEP You can draw on your Shadowfell connection to empower your teleportation. When you use your
      Shadow Step, you can expend I Focus Point to remove the requirement that you must start and end
      in Dim Light or Darkness for that use of the feature. As part of this Bonus Action, you can make
      an Unarmed Strike immediately after you teleport.'
  gloakofshadows:
    title: GLOAK OF SHADOWS
    level: 17
    text: As a Magic action while entirely within Dim Light or Darkness, you can expend 3 Focus Points
      to shroud yourself with shadows for 1 minute, until you have the Incapacitated condition, or until
      you end your turn in Bright Light. While shrouded by these shadows, you gain the following benefits.
      Invisibility. You have the Invisible condition. Partially Incorporeal. You can move through occupied
      spaces as if they were Difficult Terrain. If you end your turn in such a space, you are shunted
      to the last unoccupied space you were in. Shadow Flurry. You can use your Flurry of Blows without
      expending any Focus Points. —— a ay | = w o WARRIOR OF SHADOW SUBCLASS 106 WARRIOR OF THE ELEMENTS
      SUBCLASS WARRIOR OF THE ELEMENTS Wield Strikes and Bursts of Elemental Power Warriors of the Elements
      tap into the power of the Elemental Planes. Harnessing their supernatural focus, these Monks momentarily
      tame the energy of the Elemental Chaos to empower themselves in and out of battle.
  elementalattunement:
    title: ELEMENTAL ATTUNEMENT
    level: 3
    text: At the start of your turn, you can expend 1 Focus Point to imbue yourself with elemental energy.
      The energy lasts for 10 minutes or until you have the Incapacitated condition. You gain the following
      benefits while this feature is active. Reach. When you make an Unarmed Strike, your reach is 10
      feet greater than normal, as elemental energy extends from you. Elemental Strikes. Whenever you
      hit with your Unarmed Strike, you can cause it to deal your choice of Acid, Cold, Fire, Lightning,
      or Thunder damage rather than its normal damage type. When you deal one of these types with it,
      you can also force the target to make a Strength saving throw. On a failed save, you can move the
      target up to 10 feet toward or away from you, as elemental energy swirls around it.
  manipulateelements:
    title: MANIPULATE ELEMENTS
    level: 3
    text: You know the Elementalism spell. Wisdom is your spellcasting ability for it.
  elementalburst:
    title: ELEMENTAL BURST
    level: 6
    text: 'As a Magic action, you can expend 2 Focus Points to cause elemental energy to burst in a 20-foot-radius
      Sphere centered on a point within 120 feet of yourself. Choose a damage type: Acid, Cold, Fire,
      Lightning, or Thunder. Each creature in the Sphere must make a Dexterity saving throw. On a failed
      save, a creature takes damage of the chosen type equal to three rolls of your Martial Arts die.
      On a successful save, a creature takes half as much damage. LEVEL I]: STRIDE OF THE ELEMENTS While
      your Elemental Attunement is active, you also have a Fly Speed and a Swim Speed equal to your Speed.'
  elementalepitome:
    title: ELEMENTAL EPITOME
    level: 17
    text: 'While your Elemental Attunement is active, you also gain the following benefits. Damage Resistance.
      You gain Resistance to one of the following damage types of your choice: Acid, Cold, Fire, Lightning,
      or Thunder. At the start of each of your turns, you can change this choice. Destructive Stride.
      When you use your Step of the Wind, your Speed increases by 20 feet until the end of the turn. For
      that duration, any creature of your choice takes damage equal to one roll of your Martial Arts die
      when you enter a space within 5 feet of it. The damage type is your choice of Acid, Cold, Fire,
      Lightning, or Thunder. A creature can take this damage only once per turn. Empowered Strikes. Once
      on each of your turns, you can deal extra damage to a target equal to one roll of your Martial Arts
      die when you hit it with an Unarmed Strike. The extra damage is the same type dealt by that strike.
      WARRIOR OF THE OPEN HAND Master Unarmed Combat Techniques Warriors of the Open Hand are masters
      of unarmed combat. They learn techniques to push and trip their opponents and manipulate their own
      energ to protect themselves from harm.'
  openhandtechnique:
    title: OPEN HAND TECHNIQUE
    level: 3
    text: Whenever you hit a creature with an attack granted by your Flurry of Blows, you can impose one
      of the following effects on that target. Addle. The target can’t make Opportunity Attacks until
      the start of its next turn. Push. The target must succeed on a Strength saving throw or be pushed
      up to 15 feet away from you. Topple. The target must succeed on a Dexterity saving throw or have
      the Prone condition.
  wholenessofbody:
    title: WHOLENESS OF BODY
    level: 6
    text: 'You gain the ability to heal yourself. As a Bonus Action, you can roll your Martial Arts die.
      You regain a number of Hit Points equal to the number rolled plus your Wisdom modifier (minimum
      of 1 Hit Point regained). You can use this feature a number of times equal to your Wisdom modifier
      (minimum of once), and you regain all expended uses when you finish a Long Rest. LEVEL ||]: FLEET
      STEP When you take a Bonus Action other than Step of the Wind, you can also use Step of the Wind
      immediately after that Bonus Action.'
  quiveringpalm:
    title: QUIVERING PALM
    level: 17
    text: 'You gain the ability to set up lethal vibrations in someone''s body. When you hit a creature
      with an Unarmed Strike, you can expend 4 Focus Points to start these imperceptible vibrations, which
      last for a number of days equal to your Monk level. The vibrations are harmless unless you take
      an action to end them. Alternatively, when you take the Attack action on your turn, you can forgo
      one of the attacks to end the vibrations. To end them, you and the target must be on the same plane
      of existence. When you end them, the target must make a Constitution saving throw, taking 1O0d12
      Force damage on a failed save or half as much damage on a Successful one. You can have only one
      creature under the effect of this feature at a time. You can end the vibrations harmlessly (no action
      required). ‘enn FE ———— : Oe a —_& ma JS / \ Fa F ‘ CORE PALADIN TRAITS Primary Ability Strength
      and Charisma Hit Point Die Saving Throw Proficiencies D10 per Paladin level Wisdom and Charisma
      Choose 2: Athletics, Insight, Intimidation, Medicine, Persuasion, or Religion Skill Proficiencies
      Weapon Proficiencies Simple and Martial weapons Light, Medium, and Heavy armor and Shields Armor
      Training Choose A or B: (A) Chain Mail, Shield, Longsword, 6 Javelins, Holy Symbol, Priest’s Pack,
      and 9 GP: or (B) 150 GP Starting Equipment stand against the forces of annihilation and -» corruption.
      Whether sworn before a god''s altar, in a sacred glade before nature spirits, orina moment of desperation
      and grief with the dead as the only witnesses, a Paladin’s oath is a powerful bond. It is a source
      of power that turns a devout watrior into a blessed champion. Paladins train to learn the skills
      of combat, mastering a variety of weapons and armor. Even so, their martial skills are secondary
      to the magical power they wield: power to heal the injured, smite their foes, and protect the helpless
      and those who fight at their side. Almost by definition, the life of a Paladin is an adventuring
      life, for every Paladin lives on the front lines of the cosmic struggle against annihilation. Fighters
      are rare enough among the ranks of a world’s armies, but even fewer people can claim the calling
      of a Paladin. When they do receive the call, these blessed folk turn from their former occupations
      and take up arms and magic. p ALADINS ARE UNITED BY THEIR OATHS TO BECOMING A PALADIN ... AS A LEVEL
      1 CHARACTER - Gain all the traits in the Core Paladin Traits table. - Gain the Paladin’s level 1
      features, which are listed in the Paladin Features table. AS A MULTICLASS CHARACTER - Gain the following
      traits from the Core Paladin Traits table: Hit Point Die, proficiency with Martial weapons, and
      training with Light and Medium armor and Shields. > - Gain the Paladin’s level 1 features, which
      are listed | in the Paladin Features table. See the multiclassing rules in chapter 2 to determine
      your available spell slots. PALADIN CLASS FEATURES As a Paladin, you gain the following class features
      when you reach the specified Paladin levels. These features are listed in the Paladin Features table.'
  layonhands:
    title: LAY ON HANDS
    level: 1
    text: 'Your blessed touch can heal wounds. You have a pool of healing power that replenishes when
      you finish a Long Rest. With that pool, you can restore a total number of Hit Points equal to five
      times your Paladin level. As a Bonus Action, you can touch a creature | (which could be yourself)
      and draw power from the pool of healing to restore anumber of Hit Points to that creature, up to
      the maximum amount remaining in the pool. You can also expend 5 Hit Points from the pool of healing
      power to remove the Poisoned condition from the creature; those points don’t also restore Hit Points
      to the creature. LEVEL |: SPELLCASTING You have learned to cast spells through prayer and meditation.
      See chapter 7 for the rules on spellcasting. The information below details how you use those rules
      with Paladin spells, which appear in the Paladin spell list later in the class''s description. .
      Spell Slots. The Paladin Features table shows how ‘% many spell slots you have to cast your level
      1+ spells. You regain all expended slots when you finish a Long Rest. - Prepared Spells of Level
      1+. You prepare the listof level 1+ spells that are available for you to cast with this feature.
      To start, choose two level 1 Paladin spells. Heroism and Searing Smite are recommended. The number
      of spells on your list increases as you gain Paladin levels, as shown in the Prepared Spells column
      of the Paladin Features table. Whenever that number increases, choose additional Paladin spells
      until the number of spells on your list matches the number in the Paladin Features table. The chosen
      spells must be of a level for which you have spell slots. For example, if you’re a level 5 Paladin,
      your list of prepared spells can include six Paladin spells of level 1 or 2 in any combination.
      If another Paladin feature gives you spells that you always have prepared, those spells don’t count
      against the number of spells you can prepare with this feature, but those spells otherwise count
      as Paladin spells for you. OHAPTER 3 | CHARAQTER QLASSES 109 PALADIN FEATURES Proficiency Level
      Bonus Class Features 1 +2 Lay On Hands, Spellcasting, Weapon Mastery 2 +2 Fighting Style, Paladin’s
      Smite 3 +2 Channel Divinity, Paladin Subclass 4 +2 Ability Score Improvement 5 +3 Extra Attack,
      Faithful Steed 6 +3 Aura of Protection 7 +3 Subclass feature 8 +3 Ability Score Improvement 9 +4
      Abjure Foes 10 +4 Aura of Courage 1] +4 Radiant Strikes 12 +4 Ability Score Improvement 13 +) _
      14 +5 Restoring Touch 15 +5 Subclass feature 16 +5 Ability Score Improvement yy +6 — 18 +6 Aura
      Expansion 19 +6 Epic Boon 20 +6 Subclass feature Changing Your Prepared Spells. Whenever you finish
      a Long Rest, you can replace one spell on your list with another Paladin spell for which you have
      spell slots. Spellcasting Ability. Charisma is your spellcasting ability for your Paladin spells.
      Spellcasting Focus. You can use a Holy Symbol as a Spellcasting Focus for your Paladin spells.'
  paladinssmite:
    title: PALADIN’S SMITE
    level: 2
    text: You always have the Divine Smite spell prepared. In addition, you can cast it without expending
      a spell slot, but you must finish a Long Rest before you can cast it in this way again.
  paladinsubclass:
    title: PALADIN SUBCLASS
    level: 3
    text: You gain a Paladin subclass of your choice. The Oath of Devotion, Oath of Glory, Oath of the
      Ancients, and Oath of Vengeance subclasses are detailed after this class’s description. A subclass
      is a specialization that grants you features at certain Paladin levels. For the rest of your career,
      you gain each of your subclass’s features that are of your Paladin level or lower.
  faithfulsteed:
    title: FAITHFUL STEED
    level: 5
    text: You can call on the aid of an otherworldly steed. You always have the Find Steed spell prepared.
      You can also cast the spell once without expending a spell slot, and you regain the ability to do
      so when you finish a Long Rest.
  auraofprotection:
    title: AURA OF PROTECTION
    level: 6
    text: You radiate a protective, unseeable aura in a 10-foot Emanation that originates from you. The
      aura is inactive while you have the Incapacitated condition. You and your allies in the aura gain
      a bonus to saving throws equal to your Charisma modifier (minimum bonus of +1). If another Paladin
      is present, a creature can benefit from only one Aura of Protection at a time; the creature chooses
      which aura while in them.
  abjurefoes:
    title: ABJURE FOES
    level: 9
    text: 'As a Magic action, you can expend one use of this class’s Channel Divinity to overwhelm foes
      with awe. As you present your Holy Symbol or weapon, G rrr en ee ee BREAKING YOUR OATH A Paladin
      tries to hold to the highest standards of conduct, but even the most dedicated are fallible. Sometimes
      a Paladin transgresses their oath. A Paladin who has broken a vow typically seeks absolution, spending
      an all-night vigil as a sign of penitence or undertaking a fast. After a rite of forgiveness, the
      Paladin starts fresh. If your Paladin unrepentantly violates their oath, talk to your DM. Your Paladin
      should probably take a more appropriate subclass or even aban- don the class and adopt another one.
      SE Se eee you can target a number of creatures equal to your Charisma modifier (minimum of one creature)
      that you can see within 60 feet of yourself. Each target must succeed on a Wisdom saving throw or
      have the Frightened condition for 1 minute or until it takes any damage. While Frightened in this
      way, a target can do only one of the following on its turns: move, take an action, or take a Bonus
      Action.'
  auraofcourage:
    title: AURA OF COURAGE
    level: 10
    text: 'You and your allies have Immunity to the Frightened condition while in your Aura of Protection.
      If a Frightened ally enters the aura, that condition has no effect on that ally while there. LEVEL
      Il: RADIANT STRIKES Your strikes now carry supernatural power. When you hit a target with an attack
      roll using a Melee weapon or an Unarmed Strike, the target takes an extra 1d8 Radiant damage.'
  restoringtouch:
    title: RESTORING TOUCH
    level: 14
    text: 'When you use Lay On Hands on a creature, you can also remove one or more of the following conditions
      from the creature: Blinded, Charmed, Deafened, Frightened, Paralyzed, or Stunned. You must expend
      5 Hit Points from the healing pool of Lay On Hands for each of these conditions you remove; those
      points don’t also restore Hit Points to the creature.'
  auraexpansion:
    title: AURA EXPANSION
    level: 18
    text: Your Aura of Protection is now a 3O-foot Emanation.
  oathofdevotionspells:
    title: OATH OF DEVOTION SPELLS
    level: 3
    text: The magic of your oath ensures you always have certain spells ready; when you reach a Paladin
      level specified in the Oath of Devotion Spells table, you | thereafter always have the listed spells
      prepared. ie OATH OF DEVOTION SPELLS Paladin Level Spells 3 Protection from Evil and Good, Shield
      of Faith Aid, Zone of Truth 9 Beacon of Hope, Dispel Magic 13 Freedom of Movement, Guardian of Faith
      17 Commune, Flame Strike
  sacredweapon:
    title: SACRED WEAPON
    level: 3
    text: When you take the Attack action, you can expend one use of your Channel Divinity to imbue one
      Melee weapon that you are holding with positive energy. For 10 minutes or until you use this feature
      ) OATH OF DEVOTION SUBCLASS eal OATH OF GLORY SUBCLASS again, you add your Charisma modifier to
      attack rolls you make with that weapon (minimum bonus of +1), and each time you hit with it, you
      cause it to deal its normal damage type or Radiant damage. The weapon also emits Bright Light in
      a 20-foot radius and Dim Light 20 feet beyond that. You can end this effect early (no action required).
      This effect also ends if you aren't carrying the weapon.
  auraofdevotion:
    title: AURA OF DEVOTION
    level: 7
    text: You and your allies have Immunity to the Charmed condition while in your Aura of Protection.
      If a Charmed ally enters the aura, that condition has no effect on that ally while there.
  smiteofprotection:
    title: SMITE OF PROTECTION
    level: 15
    text: Your magical smite now radiates protective energy. Whenever you cast Divine Smite, you and your
      allies have Half Cover while in your Aura of Protection. The aura has this benefit until the start
      of your next turn.
  holynimbus:
    title: HOLY NIMBUS
    level: 20
    text: 'As a Bonus Action, you can imbue your Aura of Protection with holy power, granting the benefits
      below for 10 minutes or until you end them (no action required). Once you use this feature, you
      can’t use it again until you finish a Long Rest. You can also restore your use of it by expending
      a level 5 spell slot (no action required). Holy Ward. You have Advantage on any saving throw you
      are forced to make by a Fiend or an Undead. Radiant Damage. Whenever an enemy starts its turn in
      the aura, that creature takes Radiant damage equal to your Charisma modifier plus your Proficiency
      Bonus. Sunlight. The aura is filled with Bright Light that is sunlight. OATH OF GLORY Strive for
      the Heights of Heroism Paladins who take the Oath of Glory believe they and their companions are
      destined to achieve glory through deeds of heroism. They train diligently and encourage their companions,
      so they''re all ready when destiny calls. These paladins share the following tenets: - Endeavor
      to be known by your deeds. - Face hardships with courage. - Inspire others to strive for glory.'
  inspiringsmite:
    title: INSPIRING SMITE
    level: 3
    text: Immediately after you cast Divine Smite, you can expend one use of your Channel Divinity and
      distribute Temporary Hit Points to creatures of your choice within 30 feet of yourself, which can
      include you. The total number of Temporary Hit Points equals 2d8 plus your Paladin level, divided
      among the chosen creatures however you like.
  oathofgloryspells:
    title: OATH OF GLORY SPELLS
    level: 3
    text: The magic of your oath ensures you always have certain spells ready; when you reach a Paladin
      level specified in the Oath of Glory Spells table, you thereafter always have the listed spells
      prepared. OATH OF GLORY SPELLS Paladin Level Spells 3 Guiding Bolt, Heroism 5 Enhance Ability, Magic
      Weapon 9 Haste, Protection from Energy 13 Compulsion, Freedom of Movement 17 Legend Lore, Yolande's
      Regal Presence
  peerlessathlete:
    title: PEERLESS ATHLETE
    level: 3
    text: As a Bonus Action, you can expend one use of your Channel Divinity to augment your athleticism.
      For 1 hour, you have Advantage on Strength (Athletics) and Dexterity (Acrobatics) checks, and the
      distance of your Long and High Jumps increases by 10 feet (this extra distance costs movement as
      normal).
  auraofalacrity:
    title: AURA OF ALACRITY
    level: 7
    text: Your Speed increases by 10 feet. In addition, whenever an ally enters your Aura of Protection
      for the first time on a turn or starts their turn there, the ally’s Speed increases by 10 feet until
      the end of their next turn.
  gloriousdefense:
    title: GLORIOUS DEFENSE
    level: 15
    text: You can turn defense into a sudden strike. When you or another creature you can see within 10
      feet of you is hit by an attack roll, you can take a Reaction to grant a bonus to the target's AC
      against that attack, potentially causing it to miss. The bonus equals your Charisma modifier (minimum
      of +1). If the attack misses, you can make one attack with a weapon against the attacker as part
      of this Reaction if the attacker is within your weapon's range. You can use this feature a number
      of times equal to your Charisma modifier (minimum of once), and you regain all expended uses when
      you finish a Long Rest.
  livinglegend:
    title: LIVING LEGEND
    level: 20
    text: 'You can empower yourself with the legends— whether true or exaggerated—of your great deeds.
      As a Bonus Action, you gain the benefits below for 10 minutes. Once you use this feature, you can’t
      use it again until you finish a Long Rest. You can also restore your use of it by expending a level
      5 spell slot (no action required). Charismatic. You are blessed with an otherworldly presence and
      have Advantage on all Charisma checks. Saving Throw Reroll. If you fail a saving throw, you can
      take a Reaction to reroll it. You must use this new roll. Unerring Strike. Once on each of your
      turns when you make an attack roll with a weapon and miss, you can cause that attack to hit instead.
      OATH OF THE ANCIENTS Preserve Life and Light in the World The Oath of the Ancients is as old as
      the first elves. Paladins who swear this oath cherish the light; they love the beautiful and life-giving
      things of the world more than any principles of honor, courage, and justice. They often adorn their
      armor and clothing with images of growing things—leaves. antlers, or flowers—to reflect their commitment
      to preserving life and light. These paladins share the following tenets: - Kindle the light of hope.
      - Shelter life. - Delight in art and laughter.'
  natureswrath:
    title: NATURES WRATH
    level: 3
    text: As a Magic action, you can expend one use of your Channel Divinity to conjure spectral vines
      around nearby creatures. Each creature of your choice that you can see within 15 feet of yourself
      must succeed on a Strength saving throw or have the Restrained condition for 1 minute. A Restrained
      creature repeats the save at the end of each of its turns, ending the effect on itself on a success.
  oathoftheancientsspells:
    title: OATH OF THE ANCIENTS SPELLS
    level: 3
    text: The magic of your oath ensures you always have certain spells ready; when you reach a Paladin
      level specified in the Oath of the Ancients Spells table, you thereafter always have the listed
      spells prepared. OATH OF THE ANCIENTS SPELLS Paladin Level Spells 3 Ensnaring Strike, Speak with
      Animals 5 Misty Step, Moonbeam 9 Plant Growth, Protection from Energy 13 Ice Storm, Stoneskin 17
      Commune with Nature, Tree Stride CHAPTER 3 | CHARACTER CLASSES II5 OATH OF THE ANCIENTS _ _SusBciass
  auraofwarding:
    title: AURA OF WARDING
    level: 7
    text: Ancient magic lies so heavily upon you that it forms an eldritch ward, blunting energy from
      beyond the Material Plane; you and your allies have Resistance to Necrotic, Psychic, and Radiant
      damage while in your Aura of Protection.
  undyingsentinel:
    title: UNDYING SENTINEL
    level: 15
    text: When you are reduced to O Hit Points and not killed outright, you can drop to 1 Hit Point instead,
      and you regain a number of Hit Points equal to three times your Paladin level. Once you use this
      feature, you can’t do so again until you finish a Long Rest. Additionally, you can’t be aged magically,
      and you cease visibly aging.
  elderchampion:
    title: ELDER CHAMPION
    level: 20
    text: 'As a Bonus Action, you can imbue your Aura of Protection with primal power, granting the benefits
      below for 1 minute or until you end them (no action required). Once you use this feature, you can’t
      use it again until you finish a Long Rest. You can also restore your use of it by expending a level
      5 spell slot (no action required). Diminish Defiance. Enemies in the aura have Disadvantage on saving
      throws against your spells and Channel Divinity options. Regeneration. At the start of each of your
      turns, you regain 10 Hit Points. Swift Spells. Whenever you cast a spell that has a casting time
      of an action, you can cast it using a Bonus Action instead. OATH OF VENGEANCE Punish Evildoers at
      Any Cost The Oath of Vengeance is a solemn commitment to punish those who have committed grievously
      evil acts. When evil armies slaughter helpless villagers, when a tyrant defies the will of the gods,
      when a thieves’ guild grows too violent, when a dragon rampages through the countryside—at times
      like these, paladins arise and swear an Oath of Vengeance to set right what has gone wrong. These
      paladins share the following tenets: - Show the wicked no mercy. - Fight injustice and its causes.
      - Aid those harmed by injustice.'
  oathofvengeancespells:
    title: OATH OF VENGEANCE SPELLS
    level: 3
    text: The magic of your oath ensures you always have certain spells ready; when you reach a Paladin
      level specified in the Oath of Vengeance Spells table, you thereafter always have the listed spells
      prepared. OATH OF VENGEANCE SPELLS Paladin Level Spells 3 Bane, Hunter’s Mark 5 Hold Person, Misty
      Step 9 Haste, Protection from Energy 13 Banishment, Dimension Door 17 Hold Monster, Scrying
  vowofenmity:
    title: Vow OF ENMITY
    level: 3
    text: When you take the Attack action, you can expend one use of your Channel Divinity to utter a
      vow of enmity against a creature you can see within 30 feet of yourself. You have Advantage on attack
      rolls against the creature for 1 minute or until you use this feature again. If the creature drops
      to O Hit Points before the vow ends, you can transfer the vow to a different creature within 30
      feet of yourself (no action required).
  relentlessavenger:
    title: RELENTLESS AVENGER
    level: 7
    text: Your supernatural focus helps you close off a foe's retreat. When you hit a creature with an
      Opportunity Attack, you can reduce the creature's Speed to O until the end of the current turn.
      You can then move up to half your Speed as part of the same Reaction. This movement doesn’t provoke
      Opportunity Attacks.
  soulofvengeance:
    title: SOUL OF VENGEANCE
    level: 15
    text: Immediately after a creature under the effect of your Vow of Enmity hits or misses with an attack
      roll, you can take a Reaction to make a melee attack against that creature if it’s within range.
  avengingangel:
    title: AVENGING ANGEL
    level: 20
    text: 'As a Bonus Action, you gain the benefits below for 10 minutes or until you end them (no action
      required). Once you use this feature, you can’t use it again until you finish a Long Rest. You can
      also restore your use of it by expending a level 5 spell slot (no action required). Flight. You
      sprout spectral wings on your back, have a Fly Speed of 60 feet, and can hover. Frightful Aura.
      Whenever an enemy starts its turn in your Aura of Protection, that creature must succeed on a Wisdom
      saving throw or have the Frightened condition for 1 minute or until it takes any damage. Attack
      rolls against the Frightened creature have Advantage. OATH OF VENGEANCE SUBCLASS CORE RANGER TRAITS
      '' Primary Ability Dexterity and Wisdom Hit Point Die Saving Throw Proficiencies D10 per Ranger
      level Strength and Dexterity Skill Proficiencies Choose 3: Animal Handling, Athletics, Insight,
      Investigation, Nature, Perception, Stealth, or Survival Weapon Proficiencies Simple and Martial
      weapons Armor Training Light and Medium armor and Shields Choose A or B: (A) Studded Leather Armor,
      Scimitar, Shortsword, Longbow, 20 Arrows, Quiver, Druidic Focus (sprig of mistletoe), Explorer’s
      Pack, and 7 GP; or (B) 150 GP Starting Equipment AR FROM BUSTLING CITIES, AMID THE H trees of trackless
      forests and across wide '' plains, Rangers keep their unending watch in the wilderness. Rangers
      learn to track their quarry as a predator does, moving stealthily through the wilds and hiding themselves
      in brush and rubble. Thanks to their connection with nature, Rangers can also cast spells that harness
      primal powers of the wilderness. A Ranger’s talents and magic are honed with deadly focus to protect
      the world from the ravages of monsters and tyrants. BECOMING A RANGER... As A LEVEL 1 CHARACTER
      - Gain all the traits in the Core Ranger Traits table. - Gain the Ranger’s level 1 features, which
      are listed in the Ranger Features table. As A MULTICLASS CHARACTER - Gain the following traits from
      the Core Ranger Traits table: Hit Point Die, proficiency with Martial weapons, proficiency in one
      skill of your choice from the Ranger’s skill list, and training with Light and Medium armor and
      Shields. - Gain the Ranger’s level 1 features, which are listed in the Ranger Features table. See
      the multiclassing rules in chapter 2 to determine your available spell slots. se 4 ~ RANGER CLASS
      FEATURES As a Ranger, you gain the following class features when you reach the specified Ranger
      levels. These features are listed in the Ranger Features table.'
  favoredenemy:
    title: FAVORED ENEMY
    level: 1
    text: You always have the Hunter's Mark spell prepared. You can cast it twice without expending a
      spell slot, and you regain all expended uses of this ability when you finish a Long Rest. The number
      of times you can cast the spell without a spell slot increases when you reach certain Ranger levels,
      as shown in the Favored Enemy column of the Ranger Features table. CHAPTER 3 | CHARACTER OLASSES
      I20 RANGER FEATURES Proficiency Level Bonus Class Features T +2 Spellcasting, Favored Enemy, Weapon
