  telekineticmaster:
    title: Telekinetic Master
    text: 'You always have the Telekinesis spell prepared. With this feature, you can cast it without
      a spell slot or components, and your spellcasting ability for it is Intelligence. On each of your
      turns while you maintain Concentration on it, including the turn when you cast it, you can make
