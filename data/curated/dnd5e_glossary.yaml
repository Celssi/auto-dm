  expertise:
    title: EXPERTISE ;
    level: 1
    text: 'Tool Proficiencies Thieves’ Tools You gain Expertise in two of your skill proficiencies ; of
      your choice. Sleight of Hand and Stealth are recommended if you have proficiency in them. At Rogue
      level 6, you gain Expertise in two more Armor Training Light armor Starting Equipment Choose A or
      B: (A) Leather Armor, 2 Daggers, Short- of your skill proficiencies of your choice. sword, Shortbow,
      20 Arrows, Quiver, Thieves’ Tools, Bur-'
  jackofalltrades:
    title: JACK OF ALL TRADES
    level: 2
    text: You can add half your Proficiency Bonus (round down) to any ability check you make that uses
      a skill proficiency you lack and that doesn’t otherwise use your Proficiency Bonus. For example,
      if you make a Strength (Athletics) check and lack Athletics proficiency, you can add half your Proficiency
      Bonus to the check.
  bardsubclass:
    title: BARD SUBCLASS
    level: 3
    text: You gain a Bard subclass of your choice. The College of Dance, College of Glamour, College of
      Lore, and College of Valor subclasses are detailed after this class’s description. A subclass is
      a specialization that srants you features at certain Bard levels. For the rest of your career, you
      gain each of your subclass’s features that are of your Bard level or lower. ee ESSE A BARD’S REPERTOIRE
      Does your Bard beat a drum while chanting the deeds of ancient heroes? Strum a lute while crooning
      romantic tunes? Perform arias of stirring power? Recite dramatic monologues from classic tragedies?
      Use the rhythm of a folk dance to coordinate the movement of allies in battle? Compose naughty limericks?
      When you play a Bard, consider the style of artistic performance you favor, the moods you might
      invoke, and the themes that inspire your own creations. Are your poems inspired by moments of natural
      beauty, or are they brooding reflections on loss? Do you prefer lofty hymns or rowdy tavern songs?
      Are you drawn to laments for the fallen or celebrations of joy? Do you dance merry jigs or perform
      elaborate interpretive choreography? Do you focus on one style of performance or strive to master
      them all? 7 aE
  fontofinspiration:
    title: FONT OF INSPIRATION
    level: 5
    text: You now regain all your expended uses of Bardic Inspiration when you finish a Short or Long
      Rest. In addition, you can expend a spell slot (no action required) to regain one expended use of
      Bardic Inspiration.
  countercharm:
    title: COUNTERCHARM
    level: 7
    text: You can use musical notes or words of power to disrupt mind-influencing effects. If you or a
      creature within 30 feet of you fails a saving throw against an effect that applies the Charmed or
      Frightened condition, you can take a Reaction to cause the save to be rerolled, and the new roll
      has Advantage.
  magicalsecrets:
    title: MAGICAL SECRETS
    level: 10
    text: You've learned secrets from various magical traditions. Whenever you reach a Bard level (including
      this level) and the Prepared Spells number in the Bard Features table increases, you can choose
      any of your new prepared spells from the Bard, Cleric, Druid, and Wizard spell lists, and the chosen
      spells count as Bard spells for you (see a class’s section for its spell list). In addition, whenever
      you replace a spell prepared for this class, you can replace it with a spell from those lists.
  superiorinspiration:
    title: SUPERIOR INSPIRATION
    level: 18
    text: When you roll Initiative, you regain expended uses of Bardic Inspiration until you have two
      if you have fewer than that. A BARD SHAPES INSPIRATION tr « -” AND IMAGINATION INTO MAGIC. ee
  wordsofcreation:
    title: WORDS OF CREATION
    level: 20
    text: 'You have mastered two of the Words of Creation: the words of life and death. You therefore
      always have the Power Word Heal and Power Word Kill spells prepared. When you cast either spell,
      you can target a second creature with it if that creature is within 10 feet of the first target.
      CHAPTER 3 | GCHARAOTER CLASSES 61 BARD SPELL LIST Spell This section presents the Bard spell list.
      The spells are organized by spell level and then alphabetized, and each spell’s school of magic
      is listed. In the Special column, C means the spell requires Concentration, R means it’s a Ritual,
      and M means it requires a specific Material component. Tasha’s Hideous Laughter Thunderwave Unseen
      Servant LEVEL 2 BARD SPELLS CANTRIPS (LEVEL O BARD SPELLS) a Spell School Special Animal Messenger
