      A Warlock subclass is a specialization that grants you features at certain Warlock levels, as specified
      in the subclass. This section presents the Archfey Patron, Celestial Patron, Fiend Patron, and Great
      Old One Patron subclasses. ARCHFEY PATRON Bargain with Whimsical Fey Your pact draws on the power
      of the Feywild. When you choose this subclass, you might make a deal with an archfey, such as the
      Prince of Frost; the Queen of Air and Darkness, ruler of the Gloaming Court: Titania of the Summer
      Court; or an ancient hag. Or you might call on a spectrum of Fey, weaving a web of favors and debts.
      Whoever they are, your patron is often inscrutable and whimsical.'
  archfeyspells:
    title: ARCHFEY SPELLS
    level: 3
    text: The magic of your patron ensures you always have certain spells ready; when you reach a Warlock
      level specified in the Archfey Spells table, you thereafter always have the listed spells prepared.
      ARCHFEY SPELLS Warlock Level Spells 3 Calm Emotions, Faerie Fire, Misty Step, Phantasmal Force,
      Sleep 5 Blink, Plant Growth 7 Dominate Beast, Greater Invisibility Dominate Person, Seeming
  stepsofthefey:
    title: STEPS OF THE FEY
    level: 3
    text: Your patron grants you the ability to move between the boundaries of the planes. You can cast
      Misty Step without expending a spell slot a number of times equal to your Charisma modifier (minimum
      of once), and you regain all expended uses when you finish a Long Rest. In addition, whenever you
      cast that spell, you can choose one of the following additional effects. Refreshing Step. Immediately
      after you teleport, you or one creature you can see within 10 feet of yourself gains 1d1O0 Temporary
      Hit Points. Taunting Step. Creatures within 5 feet of the space you left must succeed on a Wisdom
      saving throw against your spell save DC or have Disadvantage on attack rolls against creatures other
      than you until the start of your next turn.
  mistyescape:
    title: MIsTy ESCAPE
    level: 6
    text: You can cast Misty Step as a Reaction in response to taking damage. In addition, the following
      effects are now among your Steps of the Fey options. Disappearing Step. You have the Invisible condition
      until the start of your next turn or until immediately after you make an attack roll, deal damage,
      or cast a spell. Dreadful Step. Creatures within 5 feet of the space you left or the space you appear
      in (your choice) must succeed on a Wisdom saving throw against your spell save DC or take 2d10 Psychic
      damage.
  beguilingdefenses:
    title: BEGUILING DEFENSES
    level: 10
    text: Your patron teaches you how to guard your mind and body. You are immune to the Charmed condition.
      In addition, immediately after a creature you can see hits you with an attack roll, you can take
      a Reaction to reduce the damage you take by half (round down), and you can force the attacker to
      make a Wisdom saving throw against your spell save DC. On a failed save, the attacker takes Psychic
      damage equal to the damage you take. Once you use this Reaction, you can’t use it again until you
      finish a Long Rest unless you expend a Pact Magic spell slot (no action required) to restore your
      use of it. CHAPTER 3 | CHARACTER CLASSES 159 _—— ee ARCHFEY PATRON SUBCLASS
  bewitchingmagic:
    title: BEWITCHING MAGIC
    level: 14
    text: Your patron grants you the ability to weave your magic with teleportation. Immediately after
      you cast an Enchantment or Illusion spell using an action and a spell slot, you can cast Misty Step
      as part of the same action and without expending a spell slot. CELESTIAL PATRON Call on the Power
      of the Heavens Your pact draws on the Upper Planes, the realms of everlasting bliss. You might enter
      an agreement with an empyrean, a couatl, a sphinx, a unicorn, or another heavenly entity. Or you
      might call on numerous such beings as you pursue goals aligned with theirs. Your pact allows you
      to experience a hint of the holy light that illuminates the multiverse.
  celestialspells:
    title: CELESTIAL SPELLS
    level: 3
    text: The magic of your patron ensures you always have certain spells ready; when you reach a Warlock
      level specified in the Celestial Spells table, you thereafter always have the listed spells prepared.
      CELESTIAL SPELLS Warlock Level Spells 3 Aid, Cure Wounds, Guiding Bolt, Lesser Restoration, Light,
      Sacred Flame Daylight, Revivify Guardian of Faith, Wall of Fire Greater Restoration, Summon Celestial
  healinglight:
    title: HEALING LIGHT
    level: 3
    text: You gain the ability to channel celestial energy to heal wounds. You have a pool of d6s to fuel
      this healing. The number of dice in the pool equals 1 plus your Warlock level. As a Bonus Action,
      you can heal yourself or one creature you can See within 60 feet of yourself, expending dice from
      the pool. The maximum number of dice you can expend at once equals your Charisma modifier (minimum
      of one die). Roll the dice you expend, and restore a number of Hit Points equal to the roll’s total.
      Your pool regains all expended dice when you finish a Long Rest.
  radiantsoul:
    title: RADIANT SOUL
    level: 6
    text: Your link to your patron allows you to serve as a conduit for radiant energy. You have Resistance
      to Radiant damage. Once per turn, when a spell you cast deals Radiant or Fire damage, you can add
      your Charisma modifier to that spell’s damage against one of the spell’s targets.
  celestialresilience:
    title: CELESTIAL RESILIENCE
    level: 10
    text: You gain Temporary Hit Points whenever you use your Magical Cunning feature or finish a Short
      or Long Rest. These Temporary Hit Points equal your Warlock level plus your Charisma modifier. Additionally,
      choose up to five creatures you can see when you gain the points. Those creatures each gain Temporary
      Hit Points equal to half your Warlock level plus your Charisma modifier.
  searingvengeance:
    title: SEARING VENGEANCE
    level: 14
    text: When you or an ally within 60 feet of you is about to make a Death Saving Throw, you can unleash
      radiant energy to save the creature. The creature regains Hit Points equal to half its Hit Point
      maximum and can end the Prone condition on itself. Each creature of your choice that is within 30
      feet of the creature takes Radiant damage equal to 2d8 plus your Charisma modifier, and each has
      the Blinded condition until the end of the current turn. Once you use this feature, you can’t use
      it again until you finish a Long Rest. FIEND PATRON Make a Deal with the Lower Planes Your pact
      draws on the Lower Planes, the realms of perdition. You might forge a bargain with a demon lord
      such as Demogorgon or Orcus; an archdevil such as Asmodeus; or a pit fiend, balor, yugoloth, or
      night hag that is especially mighty. That patron’s aims are evil—the corruption or destruction of
      all things, ultimately including you—and your path is defined by the extent to which you strive
      against those aims.
  darkonesblessing:
    title: DARK ONE'S BLESSING
    level: 3
    text: When you reduce an enemy to O Hit Points, you gain Temporary Hit Points equal to your Charisma
      modifier plus your Warlock level (minimum of 1 Temporary Hit Point). You also gain this benefit
      if someone else reduces an enemy within 10 feet of you to O Hit Points.
  fiendspells:
    title: FIEND SPELLS
    level: 3
    text: The magic of your patron ensures you always have certain spells ready; when you reach a Warlock
      level specified in the Fiend Spells table, you thereafter always have the listed spells prepared.
      FIEND SPELLS Warlock Level Spells 3 Burning Hands, Command, Scorching Ray, Suggestion 5 Fireball,
      Stinking Cloud Fire Shield, Wall of Fire 9 Geas, Insect Plague Pa ‘ a — = - = - ~ > CELESTIAL PATRON
      SUBCLASS 161 FIEND PATRON SUBCLASS
  darkonesownluck:
    title: DARK ONE'S Own LUCK
    level: 6
    text: You can call on your fiendish patron to alter fate in your favor. When you make an ability check
      ora saving throw, you can use this feature to add 1d10 to your roll. You can do so after seeing
      the roll but before any of the roll’s effects occur. You can use this feature a number of times
      equal to your Charisma modifier (minimum of once), but you can use it no more than once per roll.
      You regain all expended uses when you finish a Long Rest.
  fiendishresilience:
    title: FIENDISH RESILIENCE
    level: 10
    text: Choose one damage type, other than Force, whenever you finish a Short or Long Rest. You have
      Resistance to that damage type until you choose a different one with this feature.
  hurlthroughhell:
    title: HURL THROUGH HELL
    level: 14
    text: Once per turn when you hit a creature with an attack roll, you can try to instantly transport
      the target through the Lower Planes. The target must succeed on a Charisma saving throw against
      your spell save DC, or the target disappears and hurtles through a nightmare landscape. The target
      takes 8d10 Psychic damage if it isn’t a Fiend, and it has the Incapacitated condition until the
      end of your next turn, when it returns to the space it previously occupied or the nearest unoccupied
      space. Once you use this feature, you can't use it again until you finish a Long Rest unless you
      expend a Pact Magic spell slot (no action required) to restore your use of it. GREAT OLD ONE PATRON
      Unearth Forbidden Lore of Ineffable Beings When you choose this subclass, you might bind yourself
      to an unspeakable being from the Far Realm or an elder god—a being such as Tharizdun, the Chained
      God; Zargon, the Returner; Hadar, the Dark Hunger; or Great Cthulhu. Or you might invoke several
      entities without yoking yourself to one. The motives of these beings are incomprehensible, and the
      Great Old One might be indifferent to your existence. But the secrets you've learned nevertheless
      allow you to draw strange magic from it.
  awakenedmind:
    title: AWAKENED MIND
    level: 3
    text: You can form a telepathic connection between your mind and the mind of another. As a Bonus Action,
      choose one creature you can See within 3O feet of yourself. You and the chosen creature can communicate
      telepathically with each other while the two of you are within a number of miles of each other equal
      to your Charisma modifier (minimum of 1 mile). To understand each other, you each must mentally
      use a language the other knows. The telepathic connection lasts for a number of minutes equal to
      your Warlock level. It ends early if you use this feature to connect with a different creature.
  greatoldonespells:
    title: GREAT OLD ONE SPELLS
    level: 3
    text: The magic of your patron ensures you always have certain spells ready; when you reach a Warlock
      level specified in the Great Old One Spells table, you thereafter always have the listed spells
      prepared. GREAT OLD ONE SPELLS Warlock Level Spells 3 Detect Thoughts, Dissonant Whispers, Phantasmal
      Force, Tasha’s Hideous Laughter Clairvoyance, Hunger of Hadar Confusion, Summon Aberration Modify
      Memory, Telekinesis
  psychicspells:
    title: PSYCHIC SPELLS
    level: 3
    text: When you cast a Warlock spell that deals damage, you can change its damage type to Psychic.
      In addition, when you cast a Warlock spell that is an Enchantment or Illusion, you can do so without
      Verbal or Somatic components.
  clairvoyantcombatant:
    title: CLAIRVOYANT COMBATANT
    level: 6
    text: When you form a telepathic bond with a creature using your Awakened Mind, you can force that
      creature to make a Wisdom saving throw against your spell save DC. On a failed save, the creature
      has Disadvantage on attack rolls against you, and you have Advantage on attack rolls against that
      creature for the duration of the bond. Once you use this feature, you can’t use it again until you
      finish a Short or Long Rest unless you expend a Pact Magic spell slot (no action required) to restore
      your use of it.
  eldritchhex:
    title: ELDRITCH HEX
    level: 10
    text: Your alien patron grants you a powerful curse. You always have the Hex spell prepared. When
      you cast Hex and choose an ability, the target also has Disadvantage on saving throws of the chosen
      ability for the duration of the spell.
  thoughtshield:
    title: THOUGHT SHIELD
    level: 10
    text: Your thoughts can’t be read by telepathy or other means unless you allow it. You also have Resistance
      to Psychic damage, and whenever a creature deals Psychic damage to you, that creature takes the
      Same amount of damage that you take.
  createthrall:
    title: CREATE THRALL
    level: 14
    text: 'When you cast Summon Aberration, you can modify it so that it doesn’t require Concentration.
      If you do so, the spell’s duration becomes 1 minute for that casting, and when summoned, the Aberration
      has a number of Temporary Hit Points equal to your Warlock level plus your Charisma modifier. In
      addition, the first time each turn the Aberration hits a creature under the effect of your Hex,
      the Aberration deals extra Psychic damage to the target equal to the bonus damage of that spell.
      GREAT OLD ONE PATRON SUBCLASS 163 ASS 6 ee CoreE WIZARD TRAITS Intelligence D6 per Wizard level
      Intelligence and Wisdom Primary Ability Hit Point Die Saving Throw Proficiencies Choose 2: Arcana,
      History, Insight, Investigation, Medicine, Nature, or Religion Skill Proficiencies Weapon Proficiencies
      Simple weapons Armor Training None Choose A or B: (A) 2 Daggers, Arcane Focus (Quarterstaft), Robe,
      Spellbook, Scholar’s Pack, and 5 GP; or (B) 55GP Starting Equipment IZARDS ARE DEFINED BY THEIR
      W exhaustive study of magic’s inner work- - | ings. They cast spells of explosive fire, arcing lightning,
      subtle deception, and spectacular transformations. Their magic conjures monsters from other planes
      of existence, glimpses the future, or forms protective barriers. Their mightiest spells change one
      substance into another, call meteors from the sky, or open portals to other worlds. Most Wizards
      share a scholarly approach to magic. They examine the theoretical underpinnings of magic, particularly
      the categorization of spells into schools of magic. Renowned Wizards such as Bigby, Tasha, Mordenkainen,
      and Yolande have built on their studies to invent iconic spells now used across the multiverse.
      The closest a Wizard is likely to come to an ordinary life is working as a sage or lecturer. Other
      Wizards sell their services as advisers, serve in military forces, or pursue lives of crime or domination.
      But the lure of knowledge calls even the most unadventurous Wizards from the safety of their libraries
      and laboratories and into crumbling ruins and lost cities. Most Wizards believe that their counterparts
      in ancient civilizations knew secrets of magic that have been lost to the ages, and discovering
      those secrets could unlock the path to a power greater than any magic available in the present age.
      BECOMING A WIZARD ... As A LEVEL 1 CHARACTER - Gain all the traits in the Core Wizard Traits table.
      - Gain the Wizard’s level 1 features, which are listed in the Wizard Features table. a i — - EE
      | — a “y As A MULTICLASS CHARACTER - Gain the Hit Point Die from the Core Wizard Traits table. -
      Gain the Wizard’s level 1 features, which are listed in the Wizard Features table. See the multiclassing
      rules in chapter 2 to determine your available spell slots. WIZARD CLASS FEATURES As a Wizard, you
      gain the following class features when you reach the specified Wizard levels. These features are
      listed in the Wizard Features table. LEVEL |]: SPELLCASTING As a student of arcane magic, you have
      learned to cast spells. See chapter 7 for the rules on spellcasting. The information below details
      how you use those rules with Wizard spells, which appear in the Wizard spell list later in the class''s
      description. Cantrips. You know three Wizard cantrips of your choice. Light, Mage Hand, and Ray
      of Frost are recommended. Whenever you finish a Long Rest, you can replace one of your cantrips
      from this feature with another Wizard cantrip of your choice. When you reach Wizard levels 4 and
      10, you learn another Wizard cantrip of your choice, as shown in the Cantrips column of the Wizard
      Features table. Spellbook. Your wizardly apprenticeship culminated in the creation of a unique book:
      your spellbook. It is a Tiny object that weighs 3 pounds, contains 100 pages, and can be read only
      by you or someone casting Identify. You determine the book’s appearance and materials, such as a
      gilt-edged tome or a collection of vellum bound with twine. The book contains the level 1+ spells
      you know. It starts with six level 1 Wizard spells of your choice. Detect Magic, Feather Fall, Mage
      Armor, Magic Missile, Sleep, and Thunderwave are recommended. Whenever you gain a Wizard level after
      1, add two Wizard spells of your choice to your spellbook. Each of these spells must be of a level
      for which you have spell slots, as shown in the Wizard Features table. The spells are the culmination
      of arcane research you do regularly. Spell Slots. The Wizard Features table shows how many spell
      slots you have to cast your level 1+ spells. You regain all expended slots when you finish a Long
      Rest. Prepared Spells of Level 1+. You prepare the list of level 1+ spells that are available for
      you to cast with this feature. To do so, choose four spells from your spellbook. The chosen spells
      must be of a level for which you have spell slots. CHAPTER 3 | CHARACTER CLASSES 165 166 WIZARD
      FEATURES Proficiency Level Bonus __ Class Features T +2 Spellcasting, Ritual Adept, Arcane Recovery
      2 +2 Scholar 3 +2 Wizard Subclass 4 +2 Ability Score Improvement 5 +3 Memorize Spell 6 +3 Subclass
