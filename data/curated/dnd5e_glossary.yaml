  paladinssmite:
    title: Paladin’S Smite
    text: You always have the Divine Smite spell prepared. In addition, you can cast it without expending
      a spell slot, but you must finish a Long Rest before you can cast it in this way again.
    level: 2
    class_id: paladin
  paladin_channeldivinity:
    title: Channel Divinity
    text: 'You can channel divine energy directly from the Outer Planes, using it to fuel magical effects.
      You start with one such effect: Divine Sense, which is described below. Other'
    level: 3
    class_id: paladin
  paladinsubclass:
    title: Paladin Subclass
    text: You gain a Paladin subclass of your choice. The Oath of Devotion, Oath of Glory, Oath of the
      Ancients, and Oath of Vengeance subclasses are detailed after this class’s description. A subclass
      is a specialization that grants you features at certain Paladin levels. For the rest of your career,
      you gain each of your subclass’s features that are of your Paladin level or lower.
    level: 3
    class_id: paladin
  paladin_extraattack:
    title: Extra Attack
    text: You can attack twice instead of once whenever you take the Attack action on your turn.
    level: 5
    class_id: paladin
  faithfulsteed:
    title: Faithful Steed
    text: You can call on the aid of an otherworldly steed. You always have the Find Steed spell prepared.
      You can also cast the spell once without expending a spell slot, and you regain the ability to do
      so when you finish a Long Rest.
    level: 5
    class_id: paladin
  auraofprotection:
    title: Aura Of Protection
    text: You radiate a protective, unseeable aura in a 10-foot Emanation that originates from you. The
      aura is inactive while you have the Incapacitated condition. You and your allies in the aura gain
      a bonus to saving throws equal to your Charisma modifier (minimum bonus of +1). If another Paladin
      is present, a creature can benefit from only one Aura of Protection at a time; the creature chooses
      which aura while in them.
    level: 6
    class_id: paladin
  abjurefoes:
    title: Abjure Foes
    text: 'As a Magic action, you can expend one use of this class’s Channel Divinity to overwhelm foes
      with awe. As you present your Holy Symbol or weapon, G rrr en ee ee BREAKING YOUR OATH A Paladin
      tries to hold to the highest standards of conduct, but even the most dedicated are fallible. Sometimes
      a Paladin transgresses their oath. A Paladin who has broken a vow typically seeks absolution, spending
      an all-night vigil as a sign of penitence or undertaking a fast. After a rite of forgiveness, the
      Paladin starts fresh. If your Paladin unrepentantly violates their oath, talk to your DM. Your Paladin
      should probably take a more appropriate subclass or even aban- don the class and adopt another one.
      SE Se eee you can target a number of creatures equal to your Charisma modifier (minimum of one creature)
      that you can see within 60 feet of yourself. Each target must succeed on a Wisdom saving throw or
      have the Frightened condition for 1 minute or until it takes any damage. While Frightened in this
      way, a target can do only one of the following on its turns: move, take an action, or take a Bonus
      Action.'
    level: 9
    class_id: paladin
  auraofcourage:
    title: Aura Of Courage
    text: 'You and your allies have Immunity to the Frightened condition while in your Aura of Protection.
      If a Frightened ally enters the aura, that condition has no effect on that ally while there. LEVEL
      Il: RADIANT STRIKES Your strikes now carry supernatural power. When you hit a target with an attack
      roll using a Melee weapon or an Unarmed Strike, the target takes an extra 1d8 Radiant damage.'
    level: 10
    class_id: paladin
  restoringtouch:
    title: Restoring Touch
    text: 'When you use Lay On Hands on a creature, you can also remove one or more of the following conditions
      from the creature: Blinded, Charmed, Deafened, Frightened, Paralyzed, or Stunned. You must expend
      5 Hit Points from the healing pool of Lay On Hands for each of these conditions you remove; those
      points don’t also restore Hit Points to the creature.'
    level: 14
    class_id: paladin
  auraexpansion:
    title: Aura Expansion
    text: Your Aura of Protection is now a 3O-foot Emanation.
    level: 18
    class_id: paladin
  paladinspells:
    title: Paladin Spells
    text: Spell Bless Command Compelled Duel Cure Wounds Detect Evil and Good Detect Magic Detect Poison
      and Disease Divine Favor Divine Smite Heroism Protection from Evil and Good Purify Food and Drink
      Searing Smite Shield of Faith Thunderous Smite Wrathful Smite
    level: 1
    class_id: paladin
  andmadethisoathfor:
    title: and made this oath. For
    text: 'others, the swearing of the oath is a formality, an official stamp on what was already in their
      hearts. OATH OF DEVOTION Uphold the Ideals of Justice and Order The Oath of Devotion binds Paladins
      to the ideals of justice and order. These Paladins meet the archetype of the knight in shining armor.
      They hold themselves to the highest standards of conduct, and some—for better or worse—hold the
      rest of the world to the same standards. Many who swear this oath are devoted to gods of law and
      good and use their gods’ tenets as the measure of personal devotion. Others hold angels as their
      ideals and incorporate images of angelic wings into their helmets or coats of arms. These paladins
      share the following tenets: - Let your word be your promise. - Protect the weak and never fear to
      act. - Let your honorable deeds be an example.'
    level: 3
    class_id: paladin
  oathofdevotionspells:
    title: Oath Of Devotion Spells
    text: The magic of your oath ensures you always have certain spells ready; when you reach a Paladin
      level specified in the Oath of Devotion Spells table, you | thereafter always have the listed spells
      prepared. ie OATH OF DEVOTION SPELLS Paladin Level Spells 3 Protection from Evil and Good, Shield
      of Faith Aid, Zone of Truth 9 Beacon of Hope, Dispel Magic 13 Freedom of Movement, Guardian of Faith
      17 Commune, Flame Strike
    level: 3
    class_id: paladin
  sacredweapon:
    title: Sacred Weapon
    text: When you take the Attack action, you can expend one use of your Channel Divinity to imbue one
      Melee weapon that you are holding with positive energy. For 10 minutes or until you use this feature
      ) OATH OF DEVOTION SUBCLASS eal OATH OF GLORY SUBCLASS again, you add your Charisma modifier to
      attack rolls you make with that weapon (minimum bonus of +1), and each time you hit with it, you
      cause it to deal its normal damage type or Radiant damage. The weapon also emits Bright Light in
      a 20-foot radius and Dim Light 20 feet beyond that. You can end this effect early (no action required).
      This effect also ends if you aren't carrying the weapon.
    level: 3
    class_id: paladin
  auraofdevotion:
    title: Aura Of Devotion
    text: You and your allies have Immunity to the Charmed condition while in your Aura of Protection.
      If a Charmed ally enters the aura, that condition has no effect on that ally while there.
    level: 7
    class_id: paladin
  smiteofprotection:
    title: Smite Of Protection
    text: Your magical smite now radiates protective energy. Whenever you cast Divine Smite, you and your
      allies have Half Cover while in your Aura of Protection. The aura has this benefit until the start
      of your next turn.
    level: 15
    class_id: paladin
  holynimbus:
    title: Holy Nimbus
    text: As a Bonus Action, you can imbue your Aura of Protection with holy power, granting the benefits
      below for 10 minutes or until you end them (no action required). Once you use this feature, you
      can’t use it again until you finish a Long Rest. You can also restore your use of it by expending
      a
    level: 20
    class_id: paladin
  spellslotnoactionrequired:
    title: spell slot (no action required).
    text: 'Holy Ward. You have Advantage on any saving throw you are forced to make by a Fiend or an Undead.
      Radiant Damage. Whenever an enemy starts its turn in the aura, that creature takes Radiant damage
      equal to your Charisma modifier plus your Proficiency Bonus. Sunlight. The aura is filled with Bright
      Light that is sunlight. OATH OF GLORY Strive for the Heights of Heroism Paladins who take the Oath
      of Glory believe they and their companions are destined to achieve glory through deeds of heroism.
      They train diligently and encourage their companions, so they''re all ready when destiny calls.
      These paladins share the following tenets: - Endeavor to be known by your deeds. - Face hardships
      with courage. - Inspire others to strive for glory.'
    level: 5
    class_id: paladin
  inspiringsmite:
    title: Inspiring Smite
    text: Immediately after you cast Divine Smite, you can expend one use of your Channel Divinity and
      distribute Temporary Hit Points to creatures of your choice within 30 feet of yourself, which can
      include you. The total number of Temporary Hit Points equals 2d8 plus your Paladin level, divided
      among the chosen creatures however you like.
    level: 3
    class_id: paladin
  oathofgloryspells:
    title: Oath Of Glory Spells
    text: The magic of your oath ensures you always have certain spells ready; when you reach a Paladin
      level specified in the Oath of Glory Spells table, you thereafter always have the listed spells
      prepared. OATH OF GLORY SPELLS Paladin Level Spells 3 Guiding Bolt, Heroism 5 Enhance Ability, Magic
      Weapon 9 Haste, Protection from Energy 13 Compulsion, Freedom of Movement 17 Legend Lore, Yolande's
      Regal Presence
    level: 3
    class_id: paladin
  peerlessathlete:
    title: Peerless Athlete
    text: As a Bonus Action, you can expend one use of your Channel Divinity to augment your athleticism.
      For 1 hour, you have Advantage on Strength (Athletics) and Dexterity (Acrobatics) checks, and the
