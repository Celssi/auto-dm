      you. However you gained fey magic, you are now a Fey Wanderer. Your joyful laughter brightens the
      hearts of the downtrodden, and your martial prowess strikes terror in your foes, for great is the
      mirth of the fey and dreadful is their fury.'
  dreadfulstrikes:
    title: DREADFUL STRIKES
    level: 3
    text: You can augment your weapon strikes with mind-scarring magic drawn from the murky hollows of
      the Feywild. When you hit a creature with a weapon, you can deal an extra 1d4 Psychic damage to
      the target, which can take this extra damage only once per turn. The extra damage increases to 1d6
      when you reach Ranger level 11.
  feywandererspells:
    title: FEY WANDERER SPELLS
    level: 3
    text: When you reach a Ranger level specified in the Fey Wanderer Spells table, you thereafter always
      have the listed spells prepared. FEY WANDERER SPELLS Ranger Level Spell 3 Charm Person 5 Misty Step
      9 Summon Fey 13 Dimension Door 17 Mislead You also possess a fey blessing. Choose it from the Feywild
      Gifts table or determine it randomly. FEYWILD GIFTS 1d6 Gift 1 ‘Illusory butterflies flutter around
      you while you take a Short or Long Rest. 2 Flowers bloom from your hair each dawn. 3. You faintly
      smell of cinnamon, lavender, nutmeg, or another comforting herb or spice. 4 Your shadow dances while
      no one is looking directly at it. 5 Horns or antlers sprout from your head. 6 Your skin and hair
      change color each dawn.
  otherworldlyglamour:
    title: OTHERWORLDLY GLAMOUR
    level: 3
    text: 'Whenever you make a Charisma check, you gain a bonus to the check equal to your Wisdom modifier
      (minimum of +1). You also gain proficiency in one of these skills of your choice: Deception, Performance,
      or Persuasion.'
  beguilingiwist:
    title: BEGUILING IWIST
    level: 7
    text: 'The magic of the Feywild guards your mind. You have Advantage on saving throws to avoid or
      end the Charmed or Frightened condition. In addition, whenever you or a creature you can see within
      120 feet of you succeeds on a saving throw to avoid or end the Charmed or Frightened condition,
      you can take a Reaction to force a different creature you can see within 120 feet of yourself to
      make a Wisdom save against your spell save DC. On a failed save, the target is Charmed or Frightened
      (your choice) for 1 minute. The target repeats the save at the end of each of its turns, ending
      the effect on itself on a success. LEVEL Il: FEY REINFORCEMENTS You can cast Summon Fey without
      a Material component. You can also cast it once without a spell slot, and you regain the ability
      to cast it in this way when you finish a Long Rest. Whenever you start casting the spell, you can
      modify it so that it doesn’t require Concentration. If you do so, the spell’s duration becomes 1
      minute for that casting.'
  mistywanderer:
    title: MIsTy WANDERER
    level: 15
    text: You can cast Misty Step without expending a spell slot. You can do so anumber of times equal
      to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish a Long
      Rest. In addition, whenever you cast Misty Step, you can bring along one willing creature you can
      see within oO feet of yourself. That creature teleports to an unoccupied space of your choice within
      5 feet of your destination space. GLOOM STALKER Draw on Shadow Magic to Fight Your Foes Gloom Stalkers
      are at home in the darkest places, wielding magic drawn from the Shadowfell to combat enemies that
      lurk in darkness.
  dreadambusher:
    title: DREAD AMBUSHER
    level: 3
    text: You have mastered the art of creating fearsome ambushes, granting you the following benefits.
      Ambusher’s Leap. At the start of your first turn of each combat, your Speed increases by 10 feet
      until the end of that turn. Dreadful Strike. When you attack a creature and hit it with a weapon,
      you can deal an extra 2d6 Psychic damage. You can use this benefit only once per turn, you can use
      it anumber of times equal to your Wisdom modifier (minimum of once), and you regain all expended
      uses when you finish a Long Rest. Initiative Bonus. When you roll Initiative, you can add your Wisdom
      modifier to the roll. SPF PTT errr f- FEY WANDERER SUBCLASS 126 GLOOM STALKER SUBCLASS
  gloomstalkerspells:
    title: GLOOM STALKER SPELLS
    level: 3
    text: When you reach a Ranger level specified in the Gloom Stalker Spells table, you thereafter always
      have the listed spells prepared. GLOOM STALKER SPELLS Ranger Level Spells 3 Disguise Self 5 Rope
      Trick 9 Fear 13 Greater Invisibility 17 Seeming
  umbralsight:
    title: UMBRAL SIGHT
    level: 3
    text: You gain Darkvision with a range of 60 feet. If you already have Darkvision when you gain this
      feature, its range increases by 60 feet. You are also adept at evading creatures that rely on Darkvision.
      While entirely in Darkness, you have the Invisible condition to any creature that relies on Darkvision
      to see you in that Darkness.
  ironmind:
    title: IRON MIND
    level: 7
    text: 'You have honed your ability to resist mind-altering powers. You gain proficiency in Wisdom
      saving throws. If you already have this proficiency, you instead gain proficiency in Intelligence
      or Charisma saving throws (your choice). LEVEL |]: STALKER’S FLURRY The Psychic damage of your Dreadful
      Strike becomes 2d8. In addition, when you use the Dreadful Strike effect of your Dread Ambusher
      feature, you can cause one of the following additional effects. Sudden Strike. You can make another
      attack with the same weapon against a different creature that is within 5 feet of the original target
      and that is within the weapon''s range. Mass Fear. The target and each creature within 10 feet of
      it must make a Wisdom saving throw against your spell save DC. On a failed save, a creature has
      the Frightened condition until the start of your next turn.'
  shadowydodge:
    title: SHADOWY DODGE
    level: 15
    text: When a creature makes an attack roll against you, you can take a Reaction to impose Disadvantage
      on that roll. Whether the attack hits or misses, you can then teleport up to 30 feet to an unoccupied
      space you can see. HUNTER Protect Nature and People from Destruction fe a You stalk prey in the
      wilds and elsewhere, using your abilities as a Hunter to protect nature and people everywhere from
      forces that would destroy them.
  hunterslore:
    title: HUNTER’S LORE
    level: 3
    text: You can call on the forces of nature to reveal certain strengths and weaknesses of your prey.
      While a creature is marked by your Hunter’s Mark, you know whether that creature has any Immunities,
      Resistances, or Vulnerabilities, and if the creature has any, you know what they are.
  huntersprey:
    title: HUNTER'S PREY
    level: 3
    text: You gain one of the following feature op- tions of your choice. Whenever you finish a Short
      or Long Rest, you can replace the chosen option with the other one. Colossus Slayer. Your tenacity
      can wear down even the most resilient foes. When you hit a creature with a weapon, the weapon deals
      an extra 1d8 damage to the target if it’s missing any of its Hit Points. You can deal this extra
      damage only once per turn. Horde Breaker. Once on each of your turns when you make an attack with
      a weapon, you can make another attack with the same weapon against a different creature that is
      within 5 feet of the original target, that is within the weapon’s range, and that you haven't attacked
      this turn.
  defensiveiactics:
    title: DEFENSIVE IACTICS
    level: 7
    text: 'You gain one of the following feature options of your choice. Whenever you finish a Short or
      Long Rest, you can replace the chosen option with the other one. Escape the Horde. Opportunity Attacks
      have Disadvantage against you. Multiattack Defense. When a creature hits you with an attack roll,
      that creature has Disadvantage on all other attack rolls against you this turn. LEVEL I]: SUPERIOR
      HUNTER’S PREY HUNTER” Once per turn when you deal damage to a creature SUBCLASS marked by your Hunter’s
      Mark, you can also deal ‘4 that spell’s extra damage to a different creature that you can see within
      30 feet of the first creature.'
