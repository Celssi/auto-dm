      is a specialization that grants you features at certain Sorcerer levels, as specified in the subclass.
      This section presents the Aberrant Sorcery, Clockwork Sorcery, Draconic Sorcery, and Wild Magic
      Sorcery subclasses. ABERRANT SORCERY Wield Unnatural Psionic Power An alien influence has wrapped
      its tendrils around your mind, giving you psionic power. You can now touch other minds with that
      power and alter the world around you. Will this power shine from you as a hopeful beacon to others?
      Or will you be a terror to those who feel the stab of your mind? Perhaps a psychic wind from the
      Astral Plane carried psionic energy to you, or you were exposed to the Far Realm’s warping influence.
      Alternatively, you were implanted with a mind flayer tadpole, but your transformation into a mind
      flayer never occurred; now the tadpole’s psionic power is yours. However you acquired this power,
      your mind Is aflame with it.'
  psionicspells:
    title: PSIONIC SPELLS
    level: 3
    text: When you reach a Sorcerer level specified in the Psionic Spells table, you thereafter always
      have the listed spells prepared. PsIONIC SPELLS Sorcerer Level Spells 3 Arms of Hadar, Calm Emotions,
      Detect Thoughts, Dissonant Whispers, Mind Sliver 5 Hunger of Hadar, Sending 7 Evard's Black Tentacles,
      Summon Aberration 9 Rary’s Telepathic Bond, Telekinesis
  telepathicspeech:
    title: TELEPATHIC SPEECH
    level: 3
    text: You can form a telepathic connection between your mind and the mind of another. As a Bonus Action,
      choose one creature you can see within 3O feet of yourself. You and the chosen creature can communicate
      telepathically with each other while the two of you are within a number of miles of each other equal
      to your Charisma modifier (minimum of 1 mile). To understand each other, you each must mentally
      use a language the other knows. The telepathic connection lasts for a number of minutes equal to
      your Sorcerer level. It ends early if you use this ability to form a connection with a different
      creature. ABERRANT SORCERY SUBCLASS 146
  psionicsorcery:
    title: PSIONIC SORCERY
    level: 6
    text: When you cast any level 1+ spell from your Psionic Spells feature, you can cast it by expending
      a spell slot as normal or by spending a number of Sorcery Points equal to the spell’s level. If
      you cast the spell using Sorcery Points, it requires no Verbal or Somatic components, and it requires
      no Material components unless they are consumed by the spell or have a cost specified in it.
  psychicdefenses:
    title: PSYCHIC DEFENSES
    level: 6
    text: You have Resistance to Psychic damage, and you have Advantage on saving throws to avoid or end
      the Charmed or Frightened condition.
  revelationinflesh:
    title: REVELATION IN FLESH
    level: 14
    text: You can unleash the aberrant truth hidden within yourself. As a Bonus Action, you can spend
      1 Sorcery Point or more to magically alter your body for 10 minutes. For each Sorcery Point you
      spend, you gain one of the following benefits of your choice, the effects of which last until the
      alteration ends. Aquatic Adaptation. You gain a Swim Speed equal to twice your Speed, and you can
      breathe underwater. Gills grow from your neck or flare behind your ears, and your fingers become
      webbed or you gsrow wriggling cilia. Glistening Flight. You gain a Fly Speed equal to your Speed,
      and you can hover. As you fly, your skin glistens with mucus or otherworldly light. See the Invisible.
      You can see any Invisible creature within 60 feet of yourself that isn’t behind Total Cover. Your
      eyes also turn black or become writhing sensory tendrils. Wormlike Movement. Your body, along with
      any equipment you are wearing or carrying, becomes slimy and pliable. You can move through any space
      as narrow as | inch, and you can spend 5 feet of movement to escape from nonmagical restraints or
      the Grappled condition.
  warpingimplosion:
    title: WARPING IMPLOSION
    level: 18
    text: You can unleash a space-warping anomaly. As a Magic action, you teleport to an unoccupied space
      you can see within 120 feet of yourself. Immediately after you disappear, each creature within 30
      feet of the space you left must make a Strength saving throw against your spell save DC. On a failed
      save, a creature takes 3d10 Force damage and is pulled straight toward the space you left, ending
      in an unoccupied space as close to your former space as possible. On a successful save, the creature
      takes half as much damage only. Once you use this feature, you can’t do so again until you finish
      a Long Rest unless you spend 5 Sorcery Points (no action required) to restore your use of it. CHAPTER
      3 | CHARACTER CLASSES CLOCKWORK SORCERY | Channel Cosmic Forces of Order The cosmic force of order
      has suffused you with magic. That power arises from Mechanus or a realm like it—a plane of existence
      shaped entirely by clockwork efficiency. You or someone from your lineage might have become entangled
      in the machinations of modrons, the orderly beings who inhabit Mechanus. Perhaps your ancestor even
      took part in the Great Modron March. Whatever its origin within you, the power of order can seem
      strange to others, but for you, it’s part of a vast and glorious system.
  clockworkspells:
    title: CLOCKWORK SPELLS
    level: 3
    text: When you reach a Sorcerer level specified in the Clockwork Spells table, you thereafter always
      have the listed spells prepared. CLOCKWORK SPELLS Sorcerer Level Spells 3 Aid, Alarm, Lesser Restoration,
      Protection from Evil and Good 5 Dispel Magic, Protection from Energy 7 Freedom of Movement, Summon
      Construct 9 Greater Restoration, Wall of Force In addition, consult the Manifestations of Order
      table and choose or randomly determine a way your connection to order manifests while you are casting
      any of your Sorcerer spells. MANIFESTATIONS OF ORDER 1d6 Manifestation 1 Spectral cogwheels hover
      behind you. 2 The hands of a clock spin in your eyes. 3 Your skin glows with a brassy sheen. 4 Floating
      equations and geometric objects overlay your body. 5 Your Spellcasting Focus temporarily takes the
      form of a Tiny clockwork mechanism. 6 The ticking of gears or ringing of a clock can be heard by
      you and those affected by your magic.
  restorebalance:
    title: RESTORE BALANCE
    level: 3
    text: Your connection to the plane of absolute order allows you to equalize chaotic moments. When
      a creature you can see within 60 feet of yourself is about to roll a d20 with Advantage or Disadvantage,
      you can take a Reaction to prevent the roll from being affected by Advantage and Disadvantage. You
      can use this feature a number of times equal to your Charisma modifier (minimum of once), and you
      regain all expended uses when you finish a Long Rest.
  bastionoflaw:
    title: BASTION OF LAW
    level: 6
    text: You can tap into the grand equation of existence to imbue a creature with a shimmering shield
      of order. As a Magic action, you can expend 1 to 5 Sorcery Points to create a magical ward around
      yourself or another creature you can see within 30 feet of yourself. The ward is represented by
      a number of d8s equal to the number of Sorcery Points spent to create it. When the warded creature
      takes damage, it can expend a number of those dice, roll them, and reduce the damage taken by the
      total rolled on those dice. The ward lasts until you finish a Long Rest or until you use this feature
      again.
  tranceoforder:
    title: TRANCE OF ORDER
    level: 14
    text: You gain the ability to align your consciousness with the endless calculations of Mechanus.
      Asa Bonus Action, you can enter this state for 1 minute. For the duration, attack rolls against
      you can’t benefit from Advantage, and whenever you make a D20 Test, you can treat a roll of 9 or
      lower on the d20 as a 10. Once you use this feature, you can't use it again until you finish a Long
      Rest unless you spend 5 Sorcery Points (no action required) to restore your use of it.
  clockworkcavalcade:
    title: CLOCKWORK CAVALCADE
    level: 18
    text: 'You momentarily summon spirits of order to expunge disorder around you. As a Magic action,
      you summon the spirits in a 5O-foot Cube originating from you. The spirits look like modrons or
      other Constructs of your choice. The spirits are intangible and invulnerable, and they create the
      effects below within the Cube before vanishing. Once you use this action, you can''t use it again
      until you finish a Long Rest unless you spend 7 Sorcery Points (no action required) to restore your
      use of it. Heal. The spirits restore up to 100 Hit Points, divided as you choose among any number
      of creatures of your choice in the Cube. Repair. Any damaged objects entirely in the Cube are repaired
      instantly. Dispel. Every spell of level 6 and lower ends on creatures and objects of your choice
      in the Cube. CLOCKWORK SORCERY Tins i : ~ SUBCLASS | - * DRACONIC SORCERY DRACONIC \ Breathe the
      Magic of Dragons SORCERY Your innate magic comes from the gift of a dragon. Perhaps an ancient dragon
      facing death bequeathed some of its magical power to you or your ancestor. You might have absorbed
      magic from a site infused with dragons’ power. Or perhaps you handled a treasure taken from a dragon’s
      hoard that was steeped in draconic power. Or you might have a dragon for an ancestor. SUBCLASS'
  draconicresilience:
    title: DRACONIC RESILIENCE
    level: 3
    text: The magic in your body manifests physical traits of your draconic gift. Your Hit Point maximum
      increases by 3, and it increases by 1 whenever you gain another Sorcerer level. Parts of you are
      also covered by dragon-like scales. While you aren’t wearing armor, your base Armor Class equals
      10 plus your Dexterity and Charisma modifiers.
  draconicspells:
    title: DRACONIC SPELLS
    level: 3
    text: When you reach a Sorcerer level specified in the Draconic Spells table, you thereafter always
      have the listed spells prepared. DRACONIC SPELLS Sorcerer Level Spells 3 Alter Self, Chromatic Orb,
      Command, Dragon’s Breath Fear, Fly 7 Arcane Eye, Charm Monster 9 Legend Lore, Summon Dragon
  elementalaffinity:
    title: ELEMENTAL AFFINITY
    level: 6
    text: 'Your draconic magic has an affinity with a damage type associated with dragons. Choose one
      of those types: Acid, Cold, Fire, Lightning, or Poison. You have Resistance to that damage type,
      and when you cast a spell that deals damage of that type, you can add your Charisma modifier to
      one damage roll of that spell.'
  dragonwings:
    title: DRAGON WINGS
    level: 14
    text: As a Bonus Action, you can cause draconic wings to appear on your back. The wings last for 1
      hour or until you dismiss them (no action required). For the duration, you have a Fly Speed of 60
      feet. Once you use this feature, you can't use it again until you finish a Long Rest unless you
      spend 3 Sorcery Points (no action required) to restore your use of it.
  dragoncompanion:
    title: DRAGON COMPANION
    level: 18
    text: You can cast Summon Dragon without a Material component. You can also cast it once without a
      spell slot, and you regain the ability to cast it in this way when you finish a Long Rest. Whenever
      you start casting the spell, you can modify it so that it doesn’t require Concentration. If you
      do so, the spell’s duration becomes | minute for that casting. WILD MAGIC SORCERY Unleash Chaotic
      Magic Your innate magic stems from the forces of chaos that underlie the order of creation. You
      or an ancestor might have endured exposure to raw magic, perhaps through a planar portal leading
      to Limbo or the Elemental Planes. Perhaps you were blessed by a fey being or marked by a demon.
      Or your magic could be a fluke with no apparent cause. Whatever its source, this magic churns within
      you, waiting for any outlet.
  wildmagicsurge:
    title: WILD MAGIC SURGE
    level: 3
    text: Your spellcasting can unleash surges of untamed magic. Once per turn, you can roll 1d20 immediately
      after you cast a Sorcerer spell with a spell slot. If you roll a 20, roll on the Wild Magic Surge
      table to create a magical effect. If the magical effect is a spell, it is too wild to be affected
      by your Metamagic.
  tidesofchaos:
    title: TIDES OF CHAOS
    level: 3
    text: You can manipulate chaos itself to give yourself Advantage on one D20 ‘lest before you roll
      the d20. Once you do so, you must cast a Sorcerer spell with a spell slot or finish a Long Rest
      before you can use this feature again. If you do cast a Sorcerer spell with a spell slot before
      you finish a Long Rest, you automatically roll on the Wild Magic Surge table.
  bendluck:
    title: BEND LUCK
    level: 6
    text: You have the ability to twist fate using your wild magic. Immediately after another creature
      you can see rolls the d20 for a D20 Test, you can take a Reaction and spend 1 Sorcery Point to roll
      1d4 and apply the number rolled as a bonus or penalty (your choice) to the d20 roll.
  controlledchaos:
    title: CONTROLLED CHAOS
    level: 14
    text: You gain a modicum of control over the surges of your wild magic. Whenever you roll on the Wild
      Magic Surge table, you can roll twice and use either number. WiLD MAGIC _ SORCERY SUBCLASS | 149
  tamedsurge:
    title: TAMED SURGE
    level: 18
    text: 'Immediately after you cast a Sorcerer spell witha spell slot, you can create an effect of your
      choice from the Wild Magic Surge table instead of rolling on that table. You can choose any effect
      in the table except for the final row, and if the chosen effect involves a roll, you must make it.
      Once you use this feature, you can’t do so again until you finish a Long Rest. WILD MAGIC SURGE
      1d100_ Effect 01—04 Roll on this table at the start of each of your turns for the next minute, ignoring
      this result on subsequent rolls. 05-08 Acreature that is Friendly toward you appears in a random
      unoccupied space within 60 feet of you. The creature is under the DM''s control and disappears 1
      minute later. Roll 1d4 to determine the creature: on a 1, a Modron Duodrone appears; on a2, a Flumph
      appears; on a 3, a Modron Monodrone appears; on a 4, a Unicorn appears. See the Monster Manual for
      the creature''s stat block. 09-12 For the next minute, you regain 5 Hit Points at the start of each
      of your turns. 13-16 Creatures have Disadvantage on saving throws against the next spell you cast
      in the next minute that involves a saving throw. 17-20 You are subjected to an effect that lasts
      for 1 minute unless its description says otherwise. Roll 1d8 to determine the effect: on a 1, you''re
      surrounded by faint, ethereal music only you and creatures within 5 feet of you can hear; on a 2,
      your size increases by one size category; on a 3, you grow a long beard made of feathers that remains
      until you Sneeze, at which point the feathers explode from your face and vanish; on a 4, you must
      shout when you speak; on a5, illusory butterflies flutter in the air within 10 feet of you; on a
      6, an eye appears on your forehead, granting you Advantage on Wisdom (Perception) checks; on an
      7, pink bubbles float out of your mouth whenever you speak; on an 8, your skin turns a vibrant shade
      of blue for 24 hours or until the effect is ended by a Remove Curse spell. 21-24 For the next minute,
      all your spells with a casting time of an action have a casting time of a Bonus Action. CHAPTER
      3 | CHARACTER CLASSES 1d100 25-28 29-32 33-36 37-40 41-44 45-48 49-52 33-56 3/—60 61-64 Effect You
      are transported to the Astral Plane until the end of your next turn. You then return to the space
      you previously occupied or the nearest unoccupied space if that space is occupied. The next time
      you cast a spell that deals damage within the next minute, don’t roll the spell’s damage dice for
      the damage. Instead use the highest number possible for each damage die. You have Resistance to
      all damage for the next minute. You turn into a potted plant until the start of your next turn.
      While you''re a plant, you have the Incapacitated condition and have Vulnerability to all damage.
      If you drop to 0 Hit Points, your pot breaks, and your form reverts. For the next minute, you can
      teleport up to 20 feet as a Bonus Action on each of your turns. You and up to three creatures you
      choose within 30 feet of you have the Invisible condition for 1 minute. This invisibility ends on
      a creature immediately after it makes an attack roll, deals damage, or casts a spell. A spectral
      shield hovers near you for the next minute, granting you a +2 bonus to AC and immunity to Magic
      Missile. You can take one extra action on this turn. You cast a random spell. If the spell normally
      requires Concentration, it doesn’t require Concentration in this case; the spell lasts for its full
      duration. Roll 1d10 to determine the spell: on a 1, Confusion; on a 2, Fireball; on a 3, Fog Cloud;
      on a4, Fly (cast on a random creature within 60 feet of you), on a5, Grease; on a 6, Levitate (cast
      on yourself); on a 7, Magic Missile (cast as a level 5 spell); on an 8, Mirror Image; on a 9, Polymorph
      (cast on yourself), and if you fail the saving throw, you turn into a Goat (see appendix B); on
      a 10, See Invisibility. For the next minute, any flammable, nonmagical object you touch that isn’t
      being worn or carried by another creature bursts into flame, takes 1d4 Fire damage, and is burning.
      Effect If you die within the next hour, you immediately revive as if by the Reincarnate spell. You
      have the Frightened condition until the end of your next turn. The DM determines the source of your
      fear. You teleport up to 60 feet to an unoccupied Space you can see. A random creature within 60
      feet of you has the Poisoned condition for 1d4 hours. You radiate Bright Light in a 30-foot radius
      for the next minute. Any creature that ends its turn within 5 feet of you has the Blinded condition
      until the end of its next turn. Up to three creatures of your choice that you can see within 30
      feet of you take 1d10 Necrotic damage. You regain Hit Points equal to the sum of the Necrotic damage
      dealt. THe SORCERER DELINA | aap MANIPULATES WILD MAGIC “4 TO CREATE UNPREDICTABLE WONDERS. Effect
      Up to three creatures of your choice that you can see within 30 feet of you take 4d10 Lightning
      damage. You and all creatures within 30 feet of you have Vulnerability to Piercing damage for the
      next minute. Roll 1d6: On a1, you regain 2d10 Hit Points; on a 2, one ally of your choice within
      300 feet of you regains 2d10 Hit Points; on a 3, you regain your lowest-level expended spell slot;
      on a 4, one ally of your choice within 300 feet of you regains their lowest-level expended spell
      s!ot; on a 5, you regain all your expended Sorcery Points; on a 6, all the effects of row 17-20
      affect you simultaneously. CORE WARLOCK TRAITS Primary Ability Hit Point Die Saving Throw Proficiencies
      Charisma D8 per Warlock level Wisdom and Charisma Choose 2: Arcana, Deception, History, Intimidation,
      Investigation, Nature, or Religion Skill Proficiencies Weapon Proficiencies Simple weapons Armor
      Training Light armor Starting Equipment Choose A or B: (A) Leather | Armor, Sickle, 2 Daggers, Arcane
      Focus (orb), Book (occult lore), Scholar''s Pack, and 15 GP; or (B) 100 GP ARLOCKS QUEST FOR KNOWLEDGE
      that lies hidden in the fabric of the multiverse. They often begin their search for magical power
      by delving into tomes of forbidden lore, dabbling in invocations meant to attract the power of extraplanar
      beings, or seeking places of power where the influence of these beings can be felt. In no time,
      each Warlock is drawn into a binding pact with a powerful patron. Drawing on the ancient knowledge
      of beings such as angels, archfey, demons, devils, hags, and alien entities of the Far Realm, Warlocks
      piece together arcane secrets to bolster their own power. Warlocks view their patrons as resources,
      as means to the end of achieving magical power. Some Warlocks respect, revere, or even love their
      patrons; some serve their patrons grudgingly; and some seek to undermine their patrons even as they
      wield the power their patrons have given them. Once a pact is made, a Warlock’s thirst for knowledge
      and power can''t be slaked with mere study. Most Warlocks spend their days pursuing greater power
      and deeper knowledge, which typically means some kind of adventure. BECOMING A WARLOCK ... AS A
      LEVEL 1 CHARACTER - Gain all the traits in the Core Warlock Traits table. - Gain the Warlock’s level
      1 features, which are listed in the Warlock Features table. ’ As A MULTICLASS CHARACTER a a aA Be
      he 4 va - Gain the following traits from the Core Warlock Traits table: Hit Point Die and training
      with Light armor. - Gain the Warlock’s level 1 features, which are listed in the Warlock Features
      table. See the multiclassing rules in chapter 2 to determine your available spell slots. WARLOCK
      CLASS FEATURES As a Warlock, you gain the following class features when you reach the specified
      Warlock levels. These features are listed in the Warlock Features table.'
  eldritchinvocations:
    title: ELDRITCH INVOCATIONS
    level: 1
    text: 'You have unearthed Eldritch Invocations, pieces of forbidden knowledge that imbue you with
      an abiding magical ability or other lessons. You gain one invocation of your choice, such as Pact
      of the Tome. Invocations are described in the “Eldritch Invocation Options” section later in this
      class’s description. Prerequisites. If an invocation has a prerequisite, you must meet it to learn
      that invocation. For example, if an invocation requires you to be a level 5+ Warlock, you can select
      the invocation once you reach Warlock level 5. Replacing and Gaining Invocations. Whenever you gain
      a Warlock level, you can replace one of your invocations with another one for which you qualify.
      You can''t replace an invocation if it’s a prerequisite for another invocation that you have. When
      you gain certain Warlock levels, you gain more invocations of your choice, as shown in the Invocations
      column of the Warlock Features table. You can''t pick the same invocation more than once unless
      its description says otherwise. LEVEL]: PAcT MAGIC Through occult ceremony, you have formed a pact
      with a mysterious entity to gain magical powers. The entity is a voice in the shadows—its identity
      unclear—but its boon to you is concrete: the ability to cast spells. See chapter 7 for the rules
      on spellcasting. The information below details how you use those rules with Warlock spells, which
      appear in the Warlock spell list later in the class’s description. Cantrips. You know two Warlock
      cantrips of your choice. Eldritch Blast and Prestidigitation are recommended. Whenever you gain
      a Warlock level, you can replace one of your cantrips from this feature with another Warlock cantrip
      of your choice. When you reach Warlock levels 4 and 10, you learn another Warlock cantrip of your
      choice, as shown in the Cantrips column of the Warlock Features table. OHAPTER 3 | CHARACTER CLASSES
      159 CyT oth, 154 WARLOCK FEATURES Proficiency Level Bonus _ Class Features 1 +2 Eldritch Invocations,
      Pact Magic 2 +2 Magical Cunning 3 +2 Warlock Subclass 4 +2 Ability Score Improvement ) +3 — 6 +3
      Subclass feature ] +3 — 8 +3 Ability Score Improvement 9 +4 Contact Patron 10 +4 Subclass feature
      11 +4 Mystic Arcanum (level 6 spell) 12 +4 Ability Score Improvement 13 +5 Mystic Arcanum (level
      7 spell) 14 +5 Subclass feature 15 +5 Mystic Arcanum (level 8 spell) 16 +5 Ability Score Improvement
      17 +6 Mystic Arcanum (level 9 spell) 18 +6 — 19 +6 Epic Boon 20 +6 Eldritch Master Spell Slots.
      The Warlock Features table shows how many spell slots you have to cast your Warlock spells of levels
      1-5. The table also shows the level of those slots, all of which are the same level. You regain
      all expended Pact Magic spell slots when you finish a Short or Long Rest. For example, when youre
      a level 5 Warlock, you have two level 3 spell slots. To cast the level 1 spell Witch Bolt, you must
      spend one of those slots, and you cast it as a level 3 spell. Prepared Spells of Level 1+. You prepare
      the list of level 1+ spells that are available for you to cast with this feature. To start, choose
      two level 1 Warlock spells. Charm Person and Hex are recommended. The number of spells on your list
      increases as you gain Warlock levels, as shown in the Prepared Spells column of the Warlock Features
      table. Whenever that number increases, choose additional Warlock spells until the number of spells
      on your list matches the number in the table. The chosen spells must be of a level no higher than
      what’s shown in the table’s Slot Level column for your level. When you reach level 6, for example,
      you learn a new Warlock spell, which can be of levels 1-3. If another Warlock feature gives you
      spells that you always have prepared, those spells don’t count against the number of spells youcan
      prepare with CHAPTER 3 | OQHARACTER CLASSES Eldritch Prepared Spell Slot Invocations Cantrips Spells
      Slots Level 1 2 2 1 3 2 3 2 I 3 2 4 2 2 3 3 5 2 2 5 3 6 2 3 5 3 7 2 3 6 3 8 2 4 6 3 9 2 4 7 3 10
      2 5 7 4 10 2 5 7 4 11 3 5 8 4 11 3 5 8 4 12 3 5 8 4 12 3 J 9 A 13 3 5 9 4 13 3 5 9 4 14 4 5 10 4
      14 4 5 10 4 15 4 5 10 4 15 4 5 this feature, but those spells otherwise count as Warlock spells
      for you. Changing Your Prepared Spells. Whenever you gain a Warlock level, you can replace one spell
      on your list with another Warlock spell of an eligible level. Spellcasting Ability. Charisma is
      the spellcasting ability for your Warlock spells. Spellcasting Focus. You can use an Arcane Focus
      as a Spellcasting Focus for your Warlock spells.'
  magicalcunning:
    title: MAGICAL CUNNING
    level: 2
    text: You can perform an esoteric rite for 1 minute. At the end of it, you regain expended Pact Magic
      spell slots but no more than a number equal to half your maximum (round up). Once you use this feature,
      you can’t do so again until you finish a Long Rest.
  warlocksubclass:
    title: WARLOCK SUBCLASS
    level: 3
    text: You gain a Warlock subclass of your choice. The Archfey Patron, Celestial Patron, Fiend Patron,
      and Great Old One Patron subclasses are detailed after this class’s description. A subclass is a
      specialization that grants you features at certain Warlock levels. For the rest of your career,
      you gain each of your subclass’s features that are of your Warlock level or lower.
  contactpatron:
    title: CONTACT PATRON
    level: 9
    text: 'In the past, you usually contacted your patron through intermediaries. Now you can communicate
      directly; you always have the Contact Other Plane spell prepared. With this feature, you can cast
      the spell without expending a spell slot to contact your patron, and you automatically succeed on
      the spell’s saving throw. Once you cast the spell with this feature, you can’t do so in this way
      again until you finish a Long Rest. LEVEL Il: MysT1c ARCANUM Your patron grants you a magical secret
      called an arcanum. Choose one level 6 Warlock spell as this arcanum. You can cast your arcanum spell
      once without expending a spell slot, and you must finish a Long Rest before you can cast it in this
      way again. As shown in the Warlock Features table, you gain another Warlock spell of your choice
      that can be cast in this way when you reach Warlock levels 13 (level 7 spell), 15 (level 8 spell),
      and 17 (level 9 spell). You regain all uses of your Mystic Arcanum when you finish a Long Rest.
      Whenever you gain a Warlock level, you can replace one of your arcanum spells with another Warlock
      spell of the same level.'
  eldritchmaster:
    title: ELDRITCH MASTER
    level: 20
    text: 'When you use your Magical Cunning feature, you regain all your expended Pact Magic spell slots.
      ELDRITCH INVOCATION OPTIONS Eldritch Invocation options appear in alphabetical order. AGONIZING
      BLAST Prerequisite: Level 2+ Warlock, a Warlock Cantrip That Deals Damage Choose one of your known
      Warlock cantrips that deals damage. You can add your Charisma modifier to that spells damage rolls.
      Repeatable. You can gain this invocation more than once. Each time you do so, choose a different
      eligible cantrip. ARMOR OF SHADOWS You can cast Mage Armor on yourself without expending a spell
      slot. ASCENDANT STEP Prerequisite: Level 5+ Warlock You can cast Levitate on yourself without expending
      a spell slot. DEVILS SIGHT Prerequisite: Level 2+ Warlock You can see normally in Dim Light and
      Darkness— both magical and nonmagical—within 120 feet of yourself. DEVOURING BLADE Prerequisite:
      Level 12+ Warlock, Thirsting Blade Invocation The Extra Attack of your Thirsting Blade invocation
      confers two extra attacks rather than one. ELDRITCH MIND You have Advantage on Constitution saving
      throws that you make to maintain Concentration. ELDRITCH SMITE Prerequisite: Level 5+ Warlock, Pact
      of the Blade Invocation Once per turn when you hit a creature with your pact weapon, you can expend
      a Pact Magic spell slot to deal an extra 1d8 Force damage to the target, plus another 1d8 per level
      of the spell slot, and you can give the target the Prone condition if it is Huge or smaller. ELDRITCH
      SPEAR Prerequisite: Level 2+ Warlock, a Warlock Cantrip That Deals Damage Choose one of your known
      Warlock cantrips that deals damage and has arange of 10+ feet. When you cast that spell, its range
      increases by a number of feet equal to 30 times your Warlock level. Repeatable. You can gain this
      invocation more than once. Each time you do so, choose a different eligible cantrip. FIENDISH VIGOR
      Prerequisite: Level 2+ Warlock You can cast False Life on yourself without expending a spell slot.
      When you cast the spell with this feature, you don''t roll the die for the Temporary Hit Points;
      you automatically get the highest number on the die. CHAPTER 3 | CHARACTER CLASSES 155 Se, _ hl
      156 GAZE OF Iwo MINDS Prerequisite: Level 5+ Warlock You can use a Bonus Action to touch a willing
      creature and perceive through its senses until the end of your next turn. As long as the creature
      is on the same plane of existence as you, you can take a Bonus Action on subsequent turns to maintain
      this connection, extending the duration until the end of your next turn. The connection ends if
      you don’t maintain it in this way. While perceiving through the other creature''s senses, you benefit
      from any special senses possessed by that creature, and you can cast spells as if you were in your
      space or the other creature’s space if the two of you are within 60 feet of each other. GIFT OF
      THE DEPTHS Prerequisite: Level 5+ Warlock You can breathe underwater, and you gain a Swim Speed
      equal to your Speed. You can also cast Water Breathing once without expending a spell slot. You
      regain the ability to cast it in this way again when you finish a Long Rest. GIFT OF THE PROTECTORS
      Prerequisite: Level 9+ Warlock, Pact of the Tome Invocation A new page appears in your Book of Shadows
      when you conjure it. With your permission, a creature can take an action to write its name on that
      page, which can contain a number of names equal to your Charisma modifier (minimum of one name).
      When any creature whose name is on the page is reduced to O Hit Points but not killed outright,
      the creature magically drops to 1 Hit Point instead. Once this magic is triggered, no creature can
      benefit from it until you finish a Long Rest. As a Magic action, you can erase a name on the page
      by touching it. INVESTMENT OF THE CHAIN MASTER Prerequisite: Level 5+ Warlock, Pact of the Chain
      Invocation When you cast Find Familiar, you infuse the summoned familiar with a measure of your
      eldritch power, granting the creature the following benefits. Aerial or Aquatic. The familiar gains
      either a Fly Speed or a Swim Speed (your choice) of 40 feet. Quick Attack. As a Bonus Action, you
      can command the familiar to take the Attack action. Necrotic or Radiant Damage. Whenever the familiar
      deals Bludgeoning, Piercing, or Slashing damage, you can make it deal Necrotic or Radiant damage
      instead. Your Save DC. |If the familiar forces a creature to make a saving throw, it uses your spell
      save DC. CHAPTER 3 | CHARACTER CLASSES Resistance. When the familiar takes damage, you can take
      a Reaction to grant it Resistance against that damage. LESSONS OF THE FIRST ONES Prerequisite: Level
      2+ Warlock You have received knowledge from an elder entity of the multiverse, allowing you to gain
      one Origin feat of your choice (see chapter 5). Repeatable. You can gain this invocation more than
      once. Each time you do so, choose a different Origin feat. LIFEDRINKER Prerequisite: Level 9+ Warlock,
      Pact of the Blade Invocation Once per turn when you hit a creature with your pact weapon, you can
      deal an extra 1d6 Necrotic, Psychic, or Radiant damage (your choice) to the creature, and you can
      expend one of your Hit Point Dice to roll it and regain a number of Hit Points equal to the roll
      plus your Constitution modifier (minimum of 1 Hit Point). MASK OF MANY FACES Prerequisite: Level
      2+ Warlock You can cast Disguise Self without expending a spell slot. MASTER OF MYRIAD FORMS Prerequisite:
      Level 5+ Warlock You can cast Alter Self without expending a spell slot. MIstTy VISIONS Prerequisite:
      Level 2+ Warlock You can cast Silent Image without expending a spell slot. ONE WITH SHADOWS Prerequisite:
      Level 5+ Warlock While you''re in an area of Dim Light or Darkness, you can cast Invisibility on
      yourself without expending a spell slot. OTHERWORLDLY LEAP Prerequisite: Level 2+ Warlock You can
      cast Jump on yourself without expending a spell slot. PACT OF THE BLADE As a Bonus Action, you can
      conjure a pact weapon in your hand—a Simple or Martial Melee weapon of your choice with which you
      bond—or create a bond with a magic weapon you touch; you can’t bond with a magic weapon if someone
      else is attuned to it or another Warlock is bonded with it. Until the bond ends, you have proficiency
      with the weapon, and you can use it as a Spellcasting Focus. Whenever you attack with the bonded
      weapon, you can use your Charisma modifier for the attack and damage rolls instead of using Strength
      or Dexterity; and you can cause the weapon to deal Necrotic, Psychic, or Radiant damage or its normal
      damage type. Your bond with the weapon ends if you use this feature’s Bonus Action again, if the
      weapon is more than 5 feet away from you for 1 minute or more, or if you die. A conjured weapon
      disappears when the bond ends. PACT OF THE CHAIN You learn the Find Familiar spell and can cast
      it as a Magic action without expending a spell slot. When you cast the spell, you choose one of
      the normal forms for your familiar or one of the following special forms: Imp, Pseudodragon, Quasit,
      Skeleton, Slaad Tadpole, Sphinx of Wonder, Sprite, or Venomous Snake (see appendix B for the familiar’s
      stat block). Additionally, when you take the Attack action, you can forgo one of your own attacks
      to allow your familiar to make one attack of its own with its Reaction. PACT OF THE TOME Stitching
      together strands of shadow, you conjure forth a book in your hand at the end of a Short or Long
      Rest. This Book of Shadows (you determine its appearance) contains eldritch magic that only you
      can access, granting you the benefits below. The book disappears if you conjure another book with
      this feature or if you die. Cantrips and Rituals. When the book appears, choose three cantrips,
      and choose two level 1 spells that have the Ritual tag. The spells can be from any class''s spell
      list, and they must be spells you don''t already have prepared. While the book is on your person,
      you have the chosen spells prepared, and they function as Warlock spells for you. Spellcasting Focus.
      You can use the book as a Spellcasting Focus. REPELLING BLAST Prerequisite: Level 2+ Warlock, a
      Warlock Cantrip That Deals Damage via an Attack Roll Choose one of your known Warlock cantrips that
      requires an attack roll. When you hit a Large or smaller creature with that cantrip, you can push
      the creature up to 10 feet straight away from you. Repeatable. You can gain this invocation more
      than once. Each time you do so, choose a different eligible cantrip. THIRSTING BLADE Prerequisite:
      Level 5+ Warlock, Pact of the Blade Invocation You gain the Extra Attack feature for your pact weapon
      only. With that feature, you can attack twice with the weapon instead of once when you take the
      Attack action on your turn. VISIONS OF DISTANT REALMS Prerequisite: Level 9+ Warlock You can cast
      Arcane Eye without expending a spell Slot. WHISPERS OF THE GRAVE Prerequisite: Level 7+ Warlock
      You can cast Speak with Dead without expending a spell slot. WITCH SIGHT Prerequisite: Level 15+
      Warlock You have Truesight with a range of 30 feet. WARLOCK SPELL LIST This section presents the
