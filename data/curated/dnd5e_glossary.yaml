      when you conjure it. With your permission, a creature can take an action to write its name on that
      page, which can contain a number of names equal to your Charisma modifier (minimum of one name).
      When any creature whose name is on the page is reduced to O Hit Points but not killed outright,
      the creature magically drops to 1 Hit Point instead. Once this magic is triggered, no creature can
      benefit from it until you finish a Long Rest. As a Magic action, you can erase a name on the page
      by touching it. INVESTMENT OF THE CHAIN MASTER Prerequisite: Level 5+ Warlock, Pact of the Chain
      Invocation When you cast Find Familiar, you infuse the summoned familiar with a measure of your
      eldritch power, granting the creature the following benefits. Aerial or Aquatic. The familiar gains
