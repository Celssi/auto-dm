  bestowcurse:
    title: Bestow Curse
    level: 3
    school: Necromancy
    classes: Bard, Cleric, Wizard
    casting_time: Action
    range: Touch
    components: V, S
    duration: Concentration, up to | minute
    text: 'You touch a creature, which must succeed on a Wisdom saving throw or become cursed for the
      duration. Until the curse ends, the target suffers one of the following effects of your choice:
      - Choose one ability. The target has Disadvantage on ability checks and saving throws made with
