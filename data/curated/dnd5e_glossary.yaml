      i Se ae —-. ABJURER SUBCLASS WIZARD SUBCLASSES A Wizard subclass is a specialization that grants
      you features at certain Wizard levels, as specified in the subclass. This section presents the Abjurer,
      Diviner, Evoker, and Illusionist subclasses. ABJURER | Shield Companions and Banish Foes Your study
      of magic is focused on spells that block, banish, or protect—ending harmful effects, banishing evil
      influences, and protecting the weak. Abjurers are sought when baleful spirits require exorcism,
      when locations must be guarded against magical spying, and when portals to other planes of existence
      must be closed. Adventuring parties value Abjurers for the protection they provide against a variety
      of hostile magic and other attacks.
    level: 8
    class_id: wizard
  abjurationsavant:
    title: Abjuration Savant
    text: Choose two Wizard spells from the Abjuration school, each of which must be no higher than level
      2, and add them to your spellbook for free. In addition, whenever you gain access to a new level
      of spell slots in this class, you can add one Wizard spell from the Abjuration school to your spellbook
      for free. The chosen spell must be of a level for which you have spell slots.
    level: 3
    class_id: wizard
  arcaneward:
    title: Arcane Ward
    text: You can weave magic around yourself for protection. When you cast an Abjuration spell with a
      spell slot, you can simultaneously use a strand of the spell's magic to create a magical ward on
      yourself that lasts until you finish a Long Rest. The ward has a Hit Point maximum equal to twice
      your Wizard level plus your Intelligence modifier. Whenever you take damage, the ward takes the
      damage instead, and if you have any Resistances or Vulnerabilities, apply them before reducing the
      ward’s Hil Points. If the damage reduces the ward to O Hit Points, you take any remaining damage.
      While the ward has O Hit Points, it can’t absorb damage, but its magic remains. Whenever you cast
      an Abjuration spell with a spell slot, the ward regains a number of Hit Points equal to twice the
      level of the spell slot. Alternatively, as a Bonus Action, you can expend a spell slot, and the
      ward regains a number of Hit Points equal to twice the level of the spell slot expended. Once you
      create the ward, you can't create it again until you finish a Long Rest.
    level: 3
    class_id: wizard
  projectedward:
    title: Projected Ward
    text: When a creature that you can see within 30 feet of yourself takes damage, you can take a Reaction
      to cause your Arcane Ward to absorb that damage. If this damage reduces the ward to O Hit Points,
      the warded creature takes any remaining damage. If that creature has any Resistances or Vulnerabilities,
      apply them before reducing the ward’s Hit Points.
    level: 6
    class_id: wizard
  spellbreaker:
    title: Spell Breaker
    text: You always have the Counterspell and Dispel Magic spells prepared. In addition, you can cast
      Dispel Magic as a Bonus Action, and you can add your Proficiency Bonus to its ability check. When
      you cast either spell with a spell slot, that slot isn’t expended if the spell fails to stop a spell.
    level: 10
    class_id: wizard
  spellresistance:
    title: Spell Resistance
    text: You have Advantage on saving throws against spells, and you have Resistance to the damage of
      spells. DIVINER Learn the Secrets of the Multiverse The counsel of a Diviner is sought by those
      who want a clearer understanding of the past, present, and future. As a Diviner, you strive to part
      the veils of space, time, and consciousness. You work to master spells of discernment, remote viewing,
      supernatural knowledge, and foresight.
    level: 14
    class_id: wizard
  divinationsavant:
    title: Divination Savant
    text: Choose two Wizard spells from the Divination school, each of which must be no higher than level
      2, and add them to your spellbook for free. In addition, whenever you gain access to anew level
      of spell slots in this class, you can add one Wizard spell from the Divination school to your spellbook
      for free. The chosen spell must be of a level for which youhave spell slots.
    level: 3
    class_id: wizard
  portent:
    title: Portent
    text: Glimpses of the future begin to press on your awareness. Whenever you finish a Long Rest, roll
      two d2Os and record the numbers rolled. You can replace any D2ZO lest made by you or a creature
      that you can see with one of these foretelling rolls. You must choose to do so before the roll,
      and you can replace a roll in this way only once per turn. Each foretelling roll can be used only
      once. When you finish a Long Rest, you lose any unused foretelling rolls.
    level: 3
    class_id: wizard
  expertdivination:
    title: Expert Divination
    text: Casting Divination spells comes so easily to you that it expends only a fraction of your spellcasting
      efforts. When you cast a Divination spell using a level 2+ spell slot, you regain one expended spell
      slot. The slot you regain must be of a level lower than the slot you expended and can't be higher
      than level 5.
    level: 6
    class_id: wizard
  thethirdeye:
    title: The Third Eye
    text: You can increase your powers of perception. As a Bonus Action, choose one of the following benefits,
      which lasts until you start a Short or Long Rest. You can't use this feature again until you finish
      a Short or Long Rest. Darkvision. You gain Darkvision with a range of 120 feet. Greater Comprehension.
      You can read any language. See Invisibility. You can cast See Invisibility without expending a spell
      slot.
    level: 10
    class_id: wizard
  greaterportent:
    title: Greater Portent
    text: The visions in your dreams intensify and paint a more accurate picture in your mind of what
      is to come. Roll three d2Os for your Portent feature rather than two. DIvVINER SUBCLASS EVOKER Create
      Explosive Elemental Effects Your studies focus on magic that creates powerful elemental effects
      such as bitter cold, searing flame, rolling thunder, crackling lightning, and burning acid. Some
      Evokers find employment in military forces, serving as artillery to blast armies from afar. Others
      use their power to protect others, while some seek their own gain.
    level: 14
    class_id: wizard
  evocationsavant:
    title: Evocation Savant
    text: Choose two Wizard spells from the Evocation school, each of which must be no higher than level
      2, and add them to your spellbook for free. In addition, whenever you gain access to a new level
      of spell slots in this class, you can add one Wizard spell from the Evocation school to your spellbook
      for free. The chosen spell must be of a level for which you have spell slots.
    level: 3
    class_id: wizard
  potentcantrip:
    title: Potent Cantrip
    text: Your damaging cantrips affect even creatures that avoid the brunt of the effect. When you cast
      a cantrip at a creature and you miss with the attack roll or the target succeeds on a saving throw
      against the cantrip, the target takes half the cantrip’s damage (if any) but suffers no additional
      effect from the cantrip.
    level: 3
    class_id: wizard
  sculptspells:
    title: Sculpt Spells
    text: You can create pockets of relative safety within the effects of your evocations. When you cast
      an Evocation spell that affects other creatures that you can see, you can choose a number of them
      equal to 1 plus the spell’s level. The chosen creatures automatically succeed on their saving throws
      against the spell, and they take no damage if they would normally take half damage on a successful
      save.
    level: 6
    class_id: wizard
  empoweredevocation:
    title: Empowered Evocation
    text: Whenever you cast a Wizard spell from the Evocation school, you can add your Intelligence modifier
      to one damage roll of that spell.
    level: 10
    class_id: wizard
  overchannel:
    title: Overchannel
    text: You can increase the power of your spells. When you cast a Wizard spell with a spell slot of
      levels 1-5 that deals damage, you can deal maximum damage with that spell on the turn you cast it.
      The first time you do so, you suffer no adverse effect. If you use this feature again before you
      finish a Long Rest, you take 2d12 Necrotic damage for each level of the spell slot immediately after
      you cast it. This damage ignores Resistance and Immunity. Each time you use this feature again before
      finishing a Long Rest, the Necrotic damage per spell level increases by 1d12. ILLUSIONIST Weave
      Subtle Spells of Deception You specialize in magic that dazzles the senses and tricks the mind,
      and the illusions you craft make the impossible seem real.
    level: 14
    class_id: wizard
  illusionsavant:
    title: Illusion Savant
    text: Choose two Wizard spells from the Illusion school, each of which must be no higher than level
      2, and add them to your spellbook for free. In addition, whenever you gain access to anew level
      of spell slots in this class, you can add one Wizard spell from the Illusion school to your spellbook
      for free. The chosen spell must be of a level for which you have spell slots.
    level: 3
    class_id: wizard
  improvedillusions:
    title: Improved Illusions
    text: You can cast Illusion spells without providing Verbal components, and if an Illusion spell you
      cast has a range of 10+ feet, the range increases by 60 feet. You also know the Minor IIlusion cantrip.
      If you already know it, you learn a different Wizard cantrip of your choice. The cantrip doesn’t
      count against your number of cantrips known. You can create both a sound and an image with a single
      casting of Minor Illusion, and you can cast it as a Bonus Action.
    level: 3
    class_id: wizard
  phantasmalcreatures:
    title: Phantasmal Creatures
    text: You always have the Summon Beast and Summon Fey spells prepared. Whenever you cast either spell,
      you can change its school to Illusion, which causes the summoned creature to appear spectral. You
      can cast the Illusion version of each spell without expending a spell slot, but casting it without
      a slot halves the creature's Hit Points. Once you cast either spell without a spell slot, you must
      finish a Long Rest before you can cast the spell in that way again.
    level: 6
    class_id: wizard
  illusoryself:
    title: Illusory Self
    text: 'When a creature hits you with an attack roll, you can take a Reaction to interpose an illusory
      duplicate of yourself between the attacker and yourself. The attack automatically misses you, then
      the illusion dissipates. Once you use this feature, you can’t use it again until you finish a Short
      or Long Rest. You can also restore your use of it by expending a level 2+ spell slot (no action
      required). LEVEL |4: ILLUSORY REALITY You have learned to weave shadow magic into your illusions
      to give them a semi-reality. When you cast an Illusion spell with a spell slot, you can choose one
      inanimate, nonmagical object that is part of the illusion and make that object real. You can do
      this on your turn as a Bonus Action while the spell is ongoing. The object remains real for 1 minute,
      during ae ILLUSIONIST which it can''t deal damage or give any conditions. We 23s Suacass For example,
      you can create an illusion of a bridge over a chasm and then make it real and cross it. Not EVEN
      A WHITE DRAGON''S WRATH CAN CHILL THESE HEROES OF THE FORGOTTEN REALMS: LAERAL SILVERHAND, Drizzt
      Do’URDEN, ANO VAURA SAFAHR. CHAPTER 4 CHARACTER ORIGINS neti, ‘ HIS CHAPTER DESCRIBES THE TWO ''
      components of an adventurer’s origin: back- -.. ground and species. Together, these elements suggest
      your character''s early experience and family origin before taking up the adventuring life and learning
      the capabilities of a class (described in chapter 3). ORIGIN COMPONENTS Each part of your character’s
      origin reflects facets of your character, their life, and the circumstances that started them on
      the path to adventure. If you choose a background or a species from an older book, see the sidebar
      “Backgrounds and Species from Older Books” in chapter 2 for how to use them with the options here.
      CHARACTER BACKGROUNDS Your character’s background is a collection of char- acteristics that represent
      the place and occupation that were most formative before your character embarked on a life of adventure.
      Each background includes a brief narrative of what your character''s past might have been like.
      Alter the details of this narrative however you like. PARTS OF A BACKGROUND A background includes
      the following parts. Ability Scores. A background lists three of your character''s ability scores.
      Increase one by 2 and another one by 1, or increase all three by 1. None of these increases can
      raise a score above 20. Feat. A background gives your character a specified Origin feat (described
      in chapter 5). Skill Proficiencies. A background gives your character proficiency in two specified
      skills. Tool Proficiency. Each background gives a character proficiency with one tool—either a specific
      tool or one chosen from the Artisan’s Tools category. Tools are detailed in chapter 6. Equipment.
      Each background offers a choice between a package of equipment and 50 GP. CHARACTER SPECIES When
      you choose your character''s species, you determine whether your character is a human or a member
      of a fantastical species, such as dragonborn or gnome. The peoples of the D&D multiverse hail from
      different worlds and include many kinds of sapient life forms. A player character’s species is the
      set of game traits that an adventurer gains from being one of those life forms. Some species can
      trace their origin to a single world, plane of existence, or god, while other species first appeared
      in multiple realms at once. Whatever a Species’ genesis, its members have spread across the multiverse
      and contribute to many different cultures. Members of most species live for about 80 years, with
      exceptions noted in the text about the species in this chapter. Regardless of life span, members
      of all species reach physical maturity at about the same age. Your character can be any age that
      isn''t beyond their species’ normal life span. PARTS OF A SPECIES A species includes the following
      parts. Creature Type. A character''s species determines the character’s creature type, which is
      described in the rules glossary. Every species in this chapter is Humanoid; playable non-Humanoid
      species appear in other D&D books. Size. Your character’s species determines the character''s size.
      Individuals within a species cover a wide range of heights, and some species include such diversity
      of size that you can choose whether your character is Small or Medium. Speed. Your character’s species
      determines the character''s Speed. Special Traits. Each species gives a character special traits—unique
      characteristics based on the species’ physiology or magical nature. When you choose a species, your
      character gets all the special traits listed for it. Some traits involve making a choice from a
      handful of options. BACKGROUND DESCRIPTIONS Sixteen backgrounds are presented in this section in
      alphabetical order: Acolyte Guard Sailor Artisan Guide Scribe Charlatan Hermit Soldier Criminal
      Merchant Wayfarer Entertainer Noble Farmer Sage CHAPTER 4 | CHARACTER ORIGINS 177 —_— - a. ACOLYTE
      Ability Scores: Intelligence, Wisdom, Charisma Feat: Magic Initiate (Cleric) (see chapter 5) Skill
      Proficiencies: Insight and Religion Tool Proficiency: Calligrapher’s Supplies Equipment: Choose
      A or B: (A) Calligrapher’s Supplies, Book (prayers), Holy Symbol, Parchment (10 sheets), Robe, 8
      GP; or (B) 50 GP ARTISAN Ability Scores: Strength, Dexterity, Intelligence Feat: Crafter (see chapter
      5) Skill Proficiencies: Investigation and Persuasion Tool Proficiency: Choose one kind of Artisan’s
      Tools (see chapter 6) Equipment: Choose A or B: (A) Artisan’s Tools (same as above), 2 Pouches,
      Traveler’s Clothes, 32 GP; or (B) 50 GP You devoted yourself to service in a temple, either nestled
      in a town or secluded in a sacred grove. There you performed rites in honor of a god or pantheon.
      You served under a priest and studied religion. Thanks to your priest''s instruction and your own
      devotion, you also learned how to channel a modicum of divine power in service to your place of
      worship and the people who prayed there. You began mopping floors and scrubbing counters in an artisan’s
      workshop for a few coppers per day as soon as you were strong enough to carry a bucket. When you
      were old enough to apprentice, you learned to create basic crafts of your own, as well as how to
      sweet-talk the occasional demanding customer. Your trade has also given you a Keen eye for detail.
      CHARLATAN Ability Scores: Dexterity, Constitution, Charisma Feat: Skilled (see chapter 5) Skill
      Proficiencies: Deception and Sleight of Hand Tool Proficiency: Forgery Kit Equipment: Choose A or
      B: (A) Forgery Kit, Costume, Fine Clothes, 15 GP; or (B) 50 GP CRIMINAL Ability Scores: Dexterity,
      Constitution, Intelligence Feat: Alert (see chapter 5) Skill Proficiencies: Sleight of Hand and
      Stealth Tool Proficiency: Thieves’ Tools Equipment: Choose A or B: (A) 2 Daggers, Thieves’ Tools,
      Crowbar, 2 Pouches, Traveler’s Clothes, 16 GP; or (B) 50 GP Once you were old enough to order an
      ale, you soon had a favorite stool in every tavern within ten miles of where you were born. As you
      traveled the circuit from public house to watering hole, you learned to prey on unfortunates who
      were in the market for a comforting lie or two—perhaps a sham potion or forged ancestry records.
      You eked out a living in dark alleyways, cutting purses or burgling shops. Perhaps you were part
      of a small gang of like-minded wrongdoers who looked out for each other. Or maybe you were a lone
      wolf, fending for yourself against the local thieves’ guild and more fearsome lawbreakers. CHAPTER
      4 | OHARACTER ORIGINS 179 Ability Scores: Strength, Dexterity, Charisma Feat: Musician (see chapter
      5) Skill Proficiencies: Acrobatics and Performance Tool Proficiency: Choose one kind of Musical
      Instrument (see chapter 6) Equipment: Choose A or B: (A) Musical Instrument (same as above), 2 Costumes,
      Mirror, Perfume, Traveler''s Clothes, 11 GP; or (B) 50 GP FARMER Ability Scores: Strength, Constitution,
      Wisdom Feat: Tough (see chapter 5) Skill Proficiencies: Animal Handling and Nature Tool Proficiency:
      Carpenter’s Tools Equipment: Choose A or B: (A) Sickle, Carpenter’s Tools, Healer’s Kit, lron Pot,
      Shovel, Traveler’s Clothes, 30 GP; or (B) 50 GP You spent much of your youth following roving fairs
      and carnivals, performing odd jobs for musicians and acrobats in exchange for lessons. You may have
      learned how to walk a tightrope, how to play a lute in a distinct style, or how to recite poetry
      with impeccable diction. To this day, you thrive on applause and long for the stage. You grew up
      close to the land. Years tending animals and cultivating the earth rewarded you with patience and
      good health. You have a keen appreciation for nature’s bounty alongside a healthy respect for nature''s
      wrath. GUARD Ability Scores: Strength, Intelligence, Wisdom Feat: Alert (see chapter 5) Skill Proficiencies:
      Athletics and Perception Tool Proficiency: Choose one kind of Gaming Set (see chapter 6) Equipment:
      Choose A or B: (A) Spear, Light Crossbow, 20 Bolts, Gaming Set (same as above), Hooded Lantern,
      Manacles, Quiver, Traveler’s Clothes, 12 GP; or (B) 50 GP GUIDE Ability Scores: Dexterity, Constitution,
      Wisdom Feat: Magic Initiate (Druid) (see chapter 5) Skill Proficiencies: Stealth and Survival Tool
      Proficiency: Cartographer’s Tools Equipment: Choose A or B: (A) Shortbow, 20 Arrows, Cartographer’s
      Tools, Bedroll, Quiver, Tent, Traveler’s Clothes, 3 GP; or (B) 50 GP Your feet ache when you remember
      the countless hours you spent at your post in the tower. You were trained to keep one eye looking
      outside the wall, watching for marauders sweeping from the nearby forest, and your other eye looking
      inside the wall, searching for cutpurses and troublemakers. You came of age outdoors, far from settled
      lands. Your home was anywhere you chose to spread your bedroll. There are wonders in the wilderness—
      strange monsters, pristine forests and streams, overgrown ruins of great halls once trod by giants—
      and you learned to fend for yourself as you explored them. From time to time, you guided friendly
      nature priests who instructed you in the fundamentals of channeling the magic of the wild. HERMIT
      Ability Scores: Constitution, Wisdom, Charisma Feat: Healer (see chapter 5) Skill Proficiencies:
      Medicine and Religion Tool Proficiency: Herbalism Kit Equipment: Choose A or B: (A) Quarterstaff,
      Herbalism Kit, Bedroll, Book (philosophy), Lamp, Oil (3 flasks), Traveler’s Clothes, 16 GP; or (B)
      50 GP MERCHANT Ability Scores: Constitution, Intelligence, Charisma Feat: Lucky (see chapter 5)
      Skill Proficiencies: Animal Handling and Persuasion Tool Proficiency: Navigator''s Tools Equipment:
      Choose A or B: (A) Navigator’s Tools, 2 Pouches, Traveler’s Clothes, 22 GP; or (B) 50 GP You spent
      your early years secluded in a hut or monastery located well beyond the outskirts of the nearest
      settlement. In those days, your only companions were the creatures of the forest and those who would
      occasionally visit to bring news of the outside world and supplies. The solitude allowed you to
      spend many hours pondering the mysteries of creation. You were apprenticed to a trader, caravan
      master, or shopkeeper, learning the fundamentals of commerce. You traveled broadly, and you earned
      a living by buying and selling the raw materials artisans need to practice their craft or finished
      works from such crafters. You might have transported goods from one place to another (by ship, wagon,
      or caravan) or bought them from traveling traders and sold them in your own shop. Ability Scores:
      Strength, Intelligence, Charisma Feat: Skilled (see chapter 5) Skill Proficiencies: History and
      Persuasion Tool Proficiency: Choose one kind of Gaming Set (see chapter 6) Equipment: Choose A or
      B: (A) Gaming Set (same as above), Fine Clothes, Perfume, 29 GP; or (B) 50 GP Ability Scores: Constitution,
      Intelligence, Wisdom Feat: Magic Initiate (Wizard) (see chapter 5) Skill Proficiencies: Arcana and
      History Tool Proficiency: Calligrapher’s Supplies Equipment: Choose A or B: (A) Quarterstaff, Calligrapher’s
      Supplies, Book (history), Parchment (8 sheets), Robe, 8 GP; or (B) 50 GP LE TR. TENNESSE = peel
      Seer ee ee: You were raised in a castle, surrounded by wealth, power, and privilege. Your family
      of minor aristocrats ensured that you received a first-class education, some of which you appreciated
      and some of which you resented. Your time in the castle, especially the many hours you spent observing
      your family at court, also taught you a great deal about leadership. You spent your formative years
      traveling between manors and monasteries, performing various odd jobs and services in exchange for
      access to their libraries. You whiled away many a long evening studying books and scrolls, learning
      the lore of the multiverse—even the rudiments of magic—and your mind yearns for more. CHAPTER 4
