      Divine Word Etherealness Fire Storm Plane Shift Power Word Fortify Regenerate Resurrection Symbol
      LEVEL 8 CLERIC SPELLS Spell Antimagic Field Control Weather Earthquake Holy Aura Sunburst LEVEL
      9 CLERIC SPELLS Spell Astral Projection Gate Mass Heal Power Word Heal True Resurrection School
      Special Conjuration C Evocation — Conjuration — Evocation — Conjuration M Enchantment —— Transmutation
      — Necromancy M Abjuration M School Special Abjuration C Transmutation C Transmutation C Abjuration
      C,M Evocation —- School Special Necromancy M Conjuration C,M Abjuration - = Enchantment — Necromancy
      M CLERIC SUBCLASSES A Cleric subclass is a specialization that grants you features at certain Cleric
      levels, as specified in the subclass. Each Cleric subclass is named after a domain of existence
      that is favored by a god, pantheon, or religious order. This section presents the Life Domain, Light
      Domain, Trickery Domain, and War Domain subclasses. LIFE DOMAIN Soothe the Hurts of the World The
      Life Domain focuses on the positive energy that helps sustain all life in the multiverse. Clerics
      who tap into this domain are masters of healing, using that life force to cure many hurts. Existence
      itself relies on the positive energy associated with this domain, so a Cleric of almost any religious
      tradition might choose it. This domain is particularly associated with agricultural deities, gods
      of healing or endurance, and gods of home and community. Religious orders of healing also seek the
      magic of this domain.
  discipleoflife:
    title: DISCIPLE OF LIFE
    level: 3
    text: When a spell you cast with a spell slot restores Hit Points to a creature, that creature regains
      additional Hit Points on the turn you cast the spell. The additional Hit Points equal 2 plus the
      spell slot’s level.
  lifedomainspells:
    title: LIFE DOMAIN SPELLS
    level: 3
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the Life Domain Spells table, you thereafter always have the listed
      spells prepared. LIFE DOMAIN SPELLS Cleric Level Prepared Spells 3 Aid, Bless, Cure Wounds, Lesser
      Restoration Mass Healing Word, Revivify Aura of Life, Death Ward 9 Greater Restoration, Mass Cure
      Wounds
  preservelife:
    title: PRESERVE LIFE
    level: 3
    text: As a Magic action, you present your Holy Symbol and expend a use of your Channel Divinity to
      evoke healing energy that can restore a number of Hit Points equal to five times your Cleric level.
      Choose Bloodied creatures within 30 feet of yourself (which can include vou), and divide those Hit
      Points among them. This feature can restore a creature to no more than half its Hit Point maximum.
      CHAPTER 3 | CHARACTER CLASSES 72 See Hine.
  blessedhealer:
    title: BLESSED HEALER
    level: 6
    text: The healing spells you cast on others heal you as well. Immediately after you cast a spell with
      a spell slot that restores Hit Points to one or more creatures other than yourself, you regain Hit
      Points equal to 2 plus the spell slot's level.
  supremehealing:
    title: SUPREME HEALING
    level: 17
    text: When you would normally roll one or more dice to restore Hit Points to a creature with a spell
      or Channel Divinity, don't roll those dice for the healing; instead use the highest number possible
      for each die. For example, instead of restoring 2d6 Hit Points to a creature with a spell, you restore
      12. Se 7 ae _——— -t- +> ~ - =< — — = aes = + LIGHT DOMAIN Bring Light to Banish Darkness The Light
      Domain emphasizes the divine power to bring about blazing fire and revelation. Clerics who wield
      this power are enlightened souls infused with radiance and the power of their deities’ discerning
      vision, charged with chasing away lies and burning away darkness. The Light Domain is associated
      with gods of truth, vigilance, beauty, insight, and renewal. Some of these gods are identified with
      the sun or as charioteers who guide the sun across the sky. Others are sentinels who pierce deception.
      Some are deities of beauty and artistry who teach that art is a vehicle for the soul’s improvement.
  lightdomainspells:
    title: LIGHT DOMAIN SPELLS
    level: 3
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the Light Domain Spells table, you thereafter always have the
      listed spells prepared. LiGHT DOMAIN SPELLS Cleric Level Prepared Spells 3 Burning Hands, Faerie
      Fire, Scorching Ray, See Invisibility 5 Daylight, Fireball Arcane Eye, Wall of Fire 9 Flame Strike,
      Scrying
  radianceofthedawn:
    title: RADIANCE OF THE DAWN
    level: 3
    text: As a Magic action, you present your Holy Symbol and expend a use of your Channel Divinity to
      emit a flash of light in a 30-foot Emanation originating from yourself. Any magical Darkness—such
      as that created by the Darkness spell—in that area is dispelled. Additionally, each creature of
      your choice in that area must make a Constitution saving throw, taking Radiant damage equal to 2d10
      plus your Cleric level on a failed save or half as much damage on a successful one.
  wardingflare:
    title: WARDING FLARE
    level: 3
    text: When a creature that you can see within 3O feet of yourself makes an attack roll, you can take
      a Reaction to impose Disadvantage on the attack roll, causing light to flare before it hits or misses.
      You can use this feature a number of times equal to your Wisdom modifier (minimum of once). You
      regain all expended uses when you finish a Long Rest.
  improvedwardingflare:
    title: IMPROVED WARDING FLARE
    level: 6
    text: You regain all expended uses of your Warding Flare when you finish a Short or Long Rest. In
      addition, whenever you use Warding Flare, you can give the target of the triggering attack a number
      of Temporary Hit Points equal to 2d6 plus your Wisdom modifier.
  coronaoflight:
    title: CORONA OF LIGHT
    level: 17
    text: As a Magic action, you cause yourself to emit an aura of sunlight that lasts for 1 minute or
      until you dismiss it (no action required). You emit Bright Light in a 60-foot radius and Dim Light
      for an additional 30 feet. Your enemies in the Bright Light have Disadvantage on saving throws against
      your Radiance of the Dawn and any spell that deals Fire or Radiant damage. You can use this feature
      a number of times equal to your Wisdom modifier (minimum of once), and you regain all expended uses
      when you finish a Long Rest. TRICKERY DOMAIN Make Mischief and Challenge Authority The Trickery
      Domain offers magic of deception, illusion, and stealth. Clerics who wield this magic are a disruptive
      force in the world, puncturing pride, mocking tyrants, freeing captives, and flouting hollow traditions.
      They prefer subterfuge and pranks to direct confrontation. Gods of trickery are mischief-makers
      and instigators who stand as a constant challenge to the accepted order among both gods and mortals.
      They embody the forces of change and social upheaval, and they're patrons of thieves, scoundrels,
      gamblers, rebels, and liberators. Religious orders that operate in secret, especially those that
      seek to undermine oppressive governments or hierarchies, also draw on the power of the Trickery
      Domain.
  blessingofthetrickster:
    title: BLESSING OF THE [TRICKSTER
    level: 3
    text: As a Magic action, you can choose yourself or a willing creature within 30 feet of yourself
      to have Advantage on Dexterity (Stealth) checks. This blessing lasts until you finish a Long Rest
      or you use this feature again.
  invokeduplicity:
    title: INVOKE DUPLICITY
    level: 3
    text: As a Bonus Action, you can expend one use of your Channel Divinity to create a perfect visual
      illusion of yourself in an unoccupied space you can see within 30 feet of yourself. The illusion
      is intangible and doesn’t occupy its space. It lasts for 1 minute, but it ends early if you dismiss
      it (no action required) or have the Incapacitated condition. The illusion is animated and mimics
      your expressions and Fa LIGHT DOMAIN ; iA _ Suspciass * gestures. While it persists, you gain the
      following benefits. Cast Spells. You can cast spells as though you were in the illusion’s space,
      but you must use your own senses. Distract. When both you and your illusion are within 5 feet of
      a creature that can see the illusion, you have Advantage on attack rolls against that creature,
      given how distracting the illusion is to the target. Move. As a Bonus Action, you can move the illusion
      up to 30 feet to an unoccupied space you can see that is within 120 feet of yourself.
  trickerydomainspells:
    title: TRICKERY DOMAIN SPELLS
    level: 3
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the Trickery Domain Spells table, you thereafter always have the
      listed spells prepared. TRICKERY DOMAIN SPELLS Cleric Level Prepared Spells 3 Charm Person, Disguise
      Self, Invisibility, Pass without Trace Hypnotic Pattern, Nondetection Confusion, Dimension Door
      9 Dominate Person, Modify Memory
  tricksterstransposition:
    title: TRICKSTER’S TRANSPOSITION
    level: 6
    text: Whenever you take the Bonus Action to create or move the illusion of your Invoke Duplicity,
      you can teleport, swapping places with the illusion.
  improvedduplicity:
    title: IMPROVED DUPLICITY
    level: 17
    text: The illusion of your Invoke Duplicity has grown more powerful in the following ways. Shared
      Distraction. When you and your allies make attack rolls against a creature within 5 feet of the
      illusion, the attack rolls have Advantage. Healing Illusion. When the illusion ends, you or a creature
      of your choice within 5 feet of it regains a number of Hit Points equal to your Cleric level. WAR
      DOMAIN Inspire Valor and Smite Foes War has many manifestations. It can make heroes of ordinary
      people. It can be desperate and horrific, with acts of cruelty and cowardice eclipsing instances
      of excellence and courage. Clerics | TRICKERY DOMAIN | SUBCLASS who tap into the magic of the War
      Domain excel in battle, inspiring others to fight the good fight or offering acts of violence as
      prayers. Gods of the War Domain watch over warriors and reward them for their great deeds. They
      include champions of honor and chivalry as well as gods of destruction and pillage. Other war gods
      take a more neutral stance, promoting war in all its manifestations and supporting warriors in any
      circumstance.
  guidedstrike:
    title: GUIDED STRIKE
    level: 3
    text: When you or a creature within 30 feet of you misses with an attack roll, you can expend one
      use of your Channel Divinity and give that roll a +10 bonus, potentially causing it to hit. When
      you use this feature to benefit another creature's attack roll, you must take a Reaction to do so.
  wardomainspells:
    title: WAR DOMAIN SPELLS
    level: 3
    text: Your connection to this divine domain ensures you always have certain spells ready. When you
      reach a Cleric level specified in the War Domain Spells table, you thereafter always have the listed
      spells prepared. WAR DOMAIN SPELLS Cleric Level Prepared Spells 3 Guiding Bolt, Magic Weapon, Shield
      of Faith, Spiritual Weapon 5 Crusader’s Mantle, Spirit Guardians 7 Fire Shield, Freedom of Movement
      9 Hold Monster, Steel Wind Strike
  warpriest:
    title: WAR PRIEST
    level: 3
    text: As a Bonus Action, you can make one attack with a weapon or an Unarmed Strike. You can use this
      Bonus Action a number of times equal to your Wisdom modifier (minimum of once). You regain all expended
      uses when you finish a Short or Long Rest.
  wargodsblessing:
    title: WAR GOD'S BLESSING
    level: 6
    text: You can expend a use of your Channel Divinity to cast Shield of Faith or Spiritual Weapon rather
      than expending a spell slot. When you cast either spell in this way, the spell doesn’t require Concentration.
      Instead the spell lasts for 1 minute, but it ends early if you cast that spell again, have the Incapacitated
      condition, or die.
  avatarofbattle:
    title: AVATAR OF BATTLE
    level: 17
    text: 'You gain Resistance to Bludgeoning, Piercing, and Slashing damage. WaR DOMAIN SUBCLASS ALEXANDER
      MOKHOV CorE DRUID TRAITS Wisdom D8 per Druid level Intelligence and Wisdom Primary Ability Hit Point
      Die Saving Throw Proficiencies Choose 2: Arcana, Animal Handling, Insight, Medicine, Nature, Perception,
      Religion, or Survival Skill Proficiencies Weapon Proficiencies Simple weapons Herbalism Kit Light
      armor and Shields Choose A or B: (A) Leather Armor, Shield, Sickle, Druidic | Focus (Quarterstaff),
      Explor- Tool Proficiencies Armor Training Starting Equipment er’s Pack, Herbalism Kit, and a 9 GP;
      or (B) 50 GP RUIDS BELONG TO ANCIENT ORDERS THAT call on the forces of nature. Harnessing _ «the
      magic of animals, plants, and the four elements, Druids heal, transform into animals, and wield
      elemental destruction. Revering nature above all, individual Druids gain their magic from nature,
      a nature deity, or both, and they typically unite with other Druids to perform rites that mark the
      passage of the seasons and other natural cycles. Druids are concerned with the delicate ecological
      balance that sustains plant and animal life and with the need for people to live in harmony with
      nature. Druids often guard sacred sites or watch over resions of unspoiled nature, but when a significant
      danger arises, Druids take a more active role as adventurers who combat the threat. BECOMING A DRUID...
      AS A LEVEL 1 CHARACTER - Gain all the traits in the Core Druid Traits table. - Gain the Druid’s
      level 1 features, which are listed in the Druid Features table. AS A MULTICLASS CHARACTER - Gain
      the following traits from the Core Druid Traits table: Hit Point Die and training with Light armor
      and Shields. - Gain the Druid’s level 1 features, which are listed in the Druid Features table.
      See the multiclassing rules in chapter 2 to determine your available spell slots. ~ Druip CLASS
      FEATURES As a Druid, you gain the following class features when you reach the specified Druid levels.
      These features are listed in the Druid Features table.'
  primalorder:
    title: PRIMAL ORDER
    level: 1
    text: You have dedicated yourself to one of the following sacred roles of your choice. Magician. You
      know one extra cantrip from the Druid spell list. In addition, your mystical connection to nature
      gives you a bonus to your Intelligence (Arcana or Nature) checks. The bonus equals your Wisdom modifier
      (minimum bonus of +1). Warden. Trained for battle, you gain proficiency with Martial weapons and
      training with Medium armor. CHAPTER 3 | CHARACTER CLASSES
  wildshape:
    title: WILD SHAPE
    level: 2
    text: 'The power of nature allows you to assume the form of an animal. As a Bonus Action, you shape-shift
      into a Beast form that you have learned for this feature (see “Known Forms” below). You stay in
      that form for anumber of hours equal to half your Druid level or until you use Wild Shape again,
      have the Incapacitated condition, or die. You can also leave the form early as a Bonus Action. Number
      of Uses. You can use Wild Shape twice. You regain one expended use when you finisha Short Rest,
      and you regain all expended uses when you finish a Long Rest. You gain additional uses when you
      reach certain Druid levels, as shown in the Wild Shape column of the Druid Features table. Known
      Forms. You know four Beast forms for this feature, chosen from among Beast stat blocks that have
      a maximum Challenge Rating of 1/4 and that lack a Fly Speed (see appendix B for stat block options).
      The Rat, Riding Horse, Spider, and Wolf are recommended. Whenever you finish a Long Rest, you can
      replace one of your known forms with another eligible form. When you reach certain Druid levels,
      your number of known forms and the maximum Challenge Rating for those forms increases, as shown
      in the Beast Shapes table. In addition, starting at level 8, you can adopt a form that has a Fly
      Speed. When choosing known forms, you may look in the Monster Manual or elsewhere for eligible Beasts
      if the Dungeon Master permits you to do so. BEAST SHAPES Druid Known Max Fly Level Forms CR Speed
      2 4 1/4 No 4 6 1/2 No 8 8 1 Yes Rules While Shape-Shifted. While in a form, you retain your personality,
      memories, and ability to speak, and the following rules apply: Temporary Hit Points. When you assume
      a Wild Shape form, you gain a number of Temporary Hit Points equal to your Druid level. Game Statistics.
      Your game statistics are replaced by the Beast’s stat block, but you retain your creature type;
      Hit Points; Hit Point Dice; Intelligence, Wisdom, and Charisma scores; class features; languages;
      and feats. You also retain your skill and saving throw proficiencies and use your Proficiency Bonus
      for them, in addition to gaining the proficiencies of the creature. If a skill or saving throw modifier
      in the Beast’s stat block is higher than yours, use the one in the stat block. No Spellcasting.
      You can''t cast spells, but shapeshifting doesn’t break your Concentration or otherwise interfere
      with a spell you''ve already cast. Objects. Your ability to handle objects is determined by the
      form''s limbs rather than your own. In addition, you choose whether your equipment falls in your
      space, merges into your new form, or is worn by it. Worn equipment functions as normal, but the
      DM decides whether it’s practical for the new form to wear a piece of equipment based on the creature''s
      size and shape. Your equipment doesn’t change size or shape to match the new form, and any equipment
      that the new form can’t wear must either fall to the ground or merge with the form. Equipment that
      merges with the form has no effect while you''re in that form.'
  wildcompanion:
    title: WILD COMPANION
    level: 2
    text: You can summon a nature spirit that assumes an animal form to aid you. As a Magic action, you
      can expend a spell slot or a use of Wild Shape to cast the Find Familiar spell without Material
      components. When you cast the spell in this way, the familiar is Fey and disappears when you finish
      a Long Rest.
  druidsubclass:
    title: DRUID SUBCLASS
    level: 3
    text: You gain a Druid subclass of your choice. The Circle of the Land, Circle of the Moon, Circle
      of the Sea, and Circle of the Stars subclasses are detailed after this class’s description. A subclass
      is a specialization that grants you features at certain Druid levels. For the rest of your career,
      you gain each of your subclass’s features that are of your Druid level or lower.
  wildresurgence:
    title: WILD RESURGENCE
    level: 5
    text: Once on each of your turns, if you have no uses of Wild Shape left, you can give yourself one
      use by expending a spell slot (no action required). In addition, you can expend one use of Wild
      Shape (no action required) to give yourself a level 1 spell slot, but you can’t do so again until
      you finish a Long Rest.
  elementalfury:
    title: ELEMENTAL FURY
    level: 7
    text: The might of the elements flows through you. You gain one of the following options of your choice.
      Potent Spellcasting. Add your Wisdom modifier to the damage you deal with any Druid cantrip. Primal
      Strike. Once on each of your turns when you hit a creature with an attack roll using a weapon or
      a Beast form’s attack in Wild Shape, you can cause the target to take an extra 1d8 Cold, Fire, Lightning,
      or Thunder damage (choose when you hit).
  improvedelementalfury:
    title: IMPROVED ELEMENTAL FURY
    level: 15
    text: The option you chose for Elemental Fury grows more powerful, as detailed below. Potent Spellcasting.
      When you cast a Druid cantrip with a range of 10 feet or greater, the spell’s range increases by
      300 feet. Primal Strike. The extra damage of your Primal Strike increases to 2d8.
  beastspells:
    title: BEAST SPELLS
    level: 18
    text: While using Wild Shape, you can cast spells in Beast form, except for any spell that has a Material
      component with a cost specified or that consumes its Material component.
  archdruid:
    title: ARCHDRUID
    level: 20
    text: The vitality of nature constantly blooms within you, granting you the following benefits. Evergreen
      Wild Shape. Whenever you roll Initiative and have no uses of Wild Shape left, you regain one expended
      use of it. Nature Magician. You can convert uses of Wild Shape into a spell slot (no action required).
      Choose a number of your unexpended uses of Wild Shape and convert them into a single spell slot,
      with each use contributing 2 spell levels. For example, if you convert two uses of Wild Shape, you
      produce a level 4 spell slot. Once you use this benefit, you can’t do so again until you finish
      a Long Rest. Longevity. The primal magic that you wield causes you to age more slowly. For every
      ten years that pass, your body ages only one year. DRUID SPELL LIST This section presents the Druid
      spell list. The spells are organized by spell level and then alphabetized, and each spell’s school
      of magic is listed. In the Special column, C means the spell requires Concentration, R means it’s
      a Ritual, and M means it requires a specific Material component. Spell Druidcraft Elementalism Guidance
      Mending Message Poison Spray Produce Flame Resistance Shillelagh Spare the Dying Starry Wisp Thorn
      Whip Thunderclap LEVEL 1 DRUID SPELLS Spell Animal Friendship Charm Person Create or Destroy Water
      Cure Wounds CANTRIPS (LEVEL O DRUID SPELLS) School Transmutation Transmutation Divination Transmutation
