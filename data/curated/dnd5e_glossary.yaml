  slotsandhasthreeremaining:
    title: slots and has three remaining.
    text: 'Finishing a Long Rest restores any expended spell slots. CASTING WITHOUT SLOTS There are several
      ways to cast a spell without expending a spell slot: Cantrips. A cantrip is cast without a spell
      slot. Rituals. Certain spells have the Ritual tag in the Casting Time entry. Such a spell can be
      cast following the normal rules for spellcasting, or it can be cast as a Ritual. The Ritual version
      of a spell takes 10 minutes longer to cast than normal, but it doesn’t expend a spell slot. To cast
      a spell as a Ritual, aspellcaster must have it prepared. Special Abilities. Some characters and
      monsters have special abilities that allow them to cast specific spells without a spell slot. This
      casting is usually limited in another way, such as being able to cast the spell a limited number
      of times per day. CHAPTER 7 | SPELLS 235 =< = 236 Magic Items. Spell Scrolls and some other magic
      items contain spells that can be cast without a spell slot. The description of such an item specifies
      how many times a spell can be cast from it. USING A HIGHER-LEVEL SPELL SLOT When a spellcaster casts
      a spell using a slot that is of a higher level than the spell, the spell takes on the higher level
      for that casting. For instance, if a Wizard casts Magic Missile using a'
    level: 1
    class_id: wizard
  slotthat:
    title: slot, that
    text: 'Magic Missile is level 2. Effectively, the spell expands to fill the slot it is put into. Some
      spells, such as Magic Missile and Cure Wounds, have more powerful effects when cast at a higher
      level, as detailed in a spell’s description. SCHOOL OF MAGIC Each spell belongs to a school of magic.
      The schools are listed in the Schools of Magic table. These categories help describe spells but
      have no rules of their own, although some other rules refer to them. SCHOOLS OF MAGIC School Typical
      Effects Abjuration Prevents or reverses harmful effects Conjuration Transports creatures or objects
      Divination Reveals information Enchantment Influences minds Evocation Channels energy to create
      effects that are often destructive Illusion Deceives the mind or senses Necromancy Manipulates life
      and death Transmutation Transforms creatures or objects CLASS SPELL LISTS If a spell is on a class''s
      spell list, the class’s name appears in parentheses after the spell’s school of magic. Some features
      add a spell to a character’s spell list even if the character isn’t a member of a class in the parentheses.
      CASTING TIME Most spells require the Magic action to cast, but some spells require a Bonus Action,
      a Reaction, or 1 minute or more. A spell’s Casting Time entry specifies which of those is required.
      ONE SPELL WITH A SPELL SLOT PER TURN On a turn, you can expend only one spell slot to cast a spell.
      This rule means you can''t, for example, cast a spell with a spell slot using the Magic action and
      another one using a Bonus Action on the same turn. CHAPTER 7 | SPELLS REACTION AND BONUS ACTION
      [TRIGGERS A spell that has a casting time of a Reaction is cast in response to a trigger that is
      defined in the spell’s Casting Time entry. Some spells that have a casting time of a Bonus Action
      are also cast in response to a trigger defined in the spell. LONGER CASTING TIMES Certain spells—including
      a spell cast as a Ritual— require more time to cast: minutes or even hours. While you cast a spell
      with a casting time of 1 minute or more, you must take the Magic action on each of your turns, and
      you must maintain Concentration (see the rules glossary) while you do so. If your Concentration
      is broken, the spell fails, but you don’t expend a spell slot. To cast the spell again, you must
      start over. RANGE A spell’s range indicates how far from the spellcaster the spell’s effect can
      originate, and the spell’s description specifies which part of the effect is limited by the range.
      A range usually takes one of the following forms: Distance. The range is expressed in feet. Touch.
      The spell’s effect originates on something the spellcaster must touch, as defined in the spell.
      Self. The spell is cast on the spellcaster or emanates from them, as specified in the spell. If
      a spell has movable effects, they aren''t restricted by its range unless the spell’s description
      says otherwise. COMPONENTS A spell’s components are physical requirements the spellcaster must meet
      to cast the spell. Each spell’s description indicates whether it requires Verbal (V), Somatic (S),
      or Material (M) components. If the spellcaster can’t provide one or more of a spell’s components,
      the spellcaster can’t cast the spell. VERBAL (V) A Verbal component is the chanting of esoteric
      words that sound like nonsense to the uninitiated. The words must be uttered in a normal speaking
      voice. The words themselves aren’t the source of the spell’s power; rather, the particular combination
      of sounds, with specific pitch and resonance, sets the threads of magic in motion. Thus, a creature
      who is gagged or in an area of magical silence can’t cast a spell with a Verbal component. SomartIia
      (S) A Somatic component is a forceful gesticulation or an intricate set of gestures. A spellcaster
      must use at least one of their hands to perform these movements. MATERIAL (M) A Material component
      is a particular material used in a spell’s casting, as specified in parentheses in the Components
      entry. These materials aren''t consumed by the spell unless the spell’s description states otherwise.
      The spellcaster must have a hand free to access them, but it can be the same hand used to perform
      Somatic components, if any. If a spell doesn’t consume its materials and doesn’t specify a cost
      for them, a spellcaster can use a Component Pouch (see chapter 6) instead of providing the materials
      specified in the spell, or the spellcaster can substitute a Spellcasting Focus if the caster has
      a feature that allows that substitution. To use a Component Pouch, you must have a hand free to
      reach into it, and to use a Spellcasting Focus, you must hold it unless its description says otherwise
      (see chapter 6 for descriptions). OO, SS... j_»j" CREATING VERBAL COMPONENTS If you''d like to say
      a spell’s Verbal component, you may make up the words. However you make them, the goal is to create
      something that’s easy to say and that doesn’t mean anything in the real world. Consider this method:
      take the name of the spell, keep only one instance of each of its letters, and rearrange the remaining
      letters into words. For example, remove the second ! from Fireball and rearrange the remaining letters
      to create Ber Fila or Fel Bira. SR AN AASIMAR WIZARD USES A CRYSTAL MATERIAL COMPONENT TO FOCUS
      THE MAGIC OF CONE OF COLD. DURATION A spell’s duration is the length of time the spell persists
      after it is cast. A duration typically takes one of the following forms: Concentration. A duration
      that requires Concentration follows the Concentration rules (see the rules glossary). Instantaneous.
      An instantaneous duration means the spell’s magic appears only for a moment and then disappears.
      Time Span. A duration that provides atime span specifies how long the spell lasts in rounds, minutes,
      hours, or the like. For example, a Duration entry might say “1 minute,” meaning the spell ends after
      1 minute has passed. While a time-span spell that you cast is ongoing, you can dismiss it (no action
      required) if you don’t have the Incapacitated condition. EFFECTS The effects of a spell are detailed
      after its duration entry. Those details present exactly what the spell does, which ignores mundane
      physical laws; any outcomes beyond those effects are under the DM’s purview. Whatever the effects,
      they typically deal with targets, saving throws, attack rolls, or all three, each of which is detailed
      below. ‘TARGETS A typical spell requires the caster to pick one or more targets to be affected by
      the spell’s magic. A spell’s description says whether the spell targets creatures, objects, or something
      else. CHAPTER 7 | SPELLS 227 238 CUBE EMANAT ION AND SPHERE * POINT OF ORIGIN A Clear Path to the
      Target. To target something with a spell, a caster must have a clear path to it, so it can''t be
      behind Total Cover. Targeting Yourself. If a spell targets a creature of your choice, you can choose
      vourself unless the creature must be Hostile or specifically a creature other than you. Areas of
      Effect. Some spells, such as Thunderwave, cover an area called an area of effect, which is defined
      in the rules glossary. The area determines what the spell targets. The description of a spell specifies
      whether it has an area of effect, which is typically one of these shapes: Cone, Cube, Cylinder,
      Emanation, Line, or Sphere. Awareness of Being Targeted. Unless a spell has a perceptible effect,
      a creature doesn’t know it was targeted by the spell. An effect like lightning is obvious, but a
      more subtle effect, such as an attempt to read thoughts, goes unnoticed unless a spell’s description
      says otherwise. Invalid Targets. If you cast a spell on someone or something that can’t be affected
      by it, nothing happens to that target, but if you used a spell slot to cast the spell, the slot
      is still expended. If the spell normally has no effect on a target that succeeds on a saving throw,
      the invalid target appears to have succeeded on its saving throw, even though it didn''t attempt
      one (giving no hint that the creature is an invalid target). Otherwise, you perceive that the spell
      did nothing to the target. SAVING THROWS Many spells specify that a target makes a saving throw
      to avoid some or all of a spell’s effects. The spell specifies the ability that the target uses
      for CHAPTER 7 | SPELLS the save and what happens on a success or failure. Here’s how to calculate
      the DC for your spells: Spell save DC = 8 + your spellcasting ability modifier + your Proficiency
      Bonus ATTACK ROLLS Some spells require the caster to make an attack roll to determine whether the
      spell hits a target. Here’s how to calculate the attack modifier for your spells: Spell attack modifier
      = your spellcasting ability modifier + your Proficiency Bonus COMBINING SPELL EFFECTS The effects
      of different spells add together while their durations overlap. In contrast, the effects of the
      same spell cast multiple times don’t combine. Instead, the most potent effect—such as the highest
      bonus—from those castings applies while their durations overlap. The most recent effect applies
      if the castings are equally potent and their durations overlap. For example, if two Clerics cast
      Bless on the same target, that target gains the spell’s benefit only once; the target doesn''t receive
      two bonus dice. But if the durations of the spells overlap, the effect continues until the duration
      of the second Bless ends. eames“ IDENTIFYING AN ONGOING SPELL You can try to identify a non-instantaneous
      spell by its observable effects if its duration is ongoing. To identify it, you must take the Study
      action and succeed on a DC 15 Intelligence (Arcana) check. eR . ™. SPELL DESCRIPTIONS The spells
      are presented in alphabetical order. ACID SPLASH Evocation Cantrip (Sorcerer, Wizard) Casting Time:
      Action Range: 60 feet Components: V, S Duration: Instantaneous You create an acidic bubble at a
      point within range, where it explodes in a 5-foot-radius Sphere. Each creature in that Sphere must
      succeed on a Dexterity saving throw or take 1d6 Acid damage. Cantrip Upgrade. The damage increases
      by 1d6 when you reach levels 5 (2d6), 11 (3d6), and 17 (4d6). AID'
