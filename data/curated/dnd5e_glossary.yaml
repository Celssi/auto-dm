      Sanctuary Abjuration —- Shield of Faith Abjuration a CHAPTER 3 | CHARACTER CLASSES 71 72 LEVEL 2
      CLERIC SPELLS Spell Aid Augury Blindness/Deafness Calm Emotions Continual Flame Enhance Ability
      Find Traps Gentle Repose Hold Person Lesser Restoration Locate Object Prayer of Healing Protection
