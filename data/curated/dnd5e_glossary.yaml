    level: 3
    class_id: druid
  starryform:
    title: Starry Form
    text: As a Bonus Action, you can expend a use of your Wild Shape feature to take on a starry form
      rather than shape-shifting. While in your starry form, you retain your game statistics, but your
      body becomes luminous, your joints glimmer like stars, and glowing lines connect them as on a star
