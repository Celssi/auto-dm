  warbond:
    title: War Bond
    text: You learn a ritual that creates a magical bond between yourself and one weapon. You perform
      the ritual over the course of 1 hour, which can be done during a Short Rest. The weapon must be
      within your reach throughout the ritual, at the conclusion of which you touch the weapon and forge
