      or Charisma score by 1, to a maximum of 20. Minor Telekinesis. You learn the Mage Hand spell. You
      can cast it without Verbal or Somatic components, you can make the spectral hand Invisible, and
      its range increases by 30 feet when you cast it. The spell’s spellcasting ability is the ability
      increased by this feat. Telekinetic Shove. As a Bonus Action, you can telekinetically shove one
      creature you can see within 30 feet of yourself. When you do so, the target must succeed on a Strength
      saving throw (DC 8 plus the ability modifier of the score increased by this feat and your Proficiency
      Bonus) or be moved 5 feet toward or away from you. ‘
  telepathic:
    title: Telepathic
    category: 'General Feat (Prerequisite: Level 4+)'
    text: You gain the following benefits. Ability Score Increase. Increase your Intelligence, Wisdom,
      or Charisma score by 1, to amaximum of 20. Telepathic Utterance. You can speak telepathically to
      any creature you can see within 60 feet of yourself. Your telepathic utterances are in a language
      you know, and the creature understands you only if it knows that language. Your communication doesn't
      give the creature the ability to respond to you telepathically. Detect Thoughts. You always have
      the Detect Thoughts spell prepared. You can cast it without a spell slot or spell components, and
      you must finish a Long Rest before you can cast it in this way again. You can also cast it using
      spell slots you have of the appropriate level. Your spellcasting ability for the spell is the ability
      increased by this feat.
