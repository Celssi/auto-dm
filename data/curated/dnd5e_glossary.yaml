    title: Studied Attacks
    text: You study your opponents and learn from each attack you make. If you make an attack roll against
      a creature and miss, you have Advantage on your next attack roll against that creature before the
      end of your next turn.
    level: 13
    class_id: fighter
  threeextraattacks:
    title: Three Extra Attacks
    text: You can attack four times instead of once whenever you take the Attack action on your turn.
      —_—“ FIGHTER SUBCLASSES A Fighter subclass is a specialization that grants you features at certain
      levels, as specified in the subclass. This section presents the Battle Master, Champion, Eldritch
      Knight, and Psi Warrior subclasses. BATTLE MASTER Master Sophisticated Battle Maneuvers Battle Masters
      are students of the art of battle, learning martial techniques passed down through generations.
      [he most accomplished Battle Masters are well-rounded figures who combine their carefully honed
      combat skills with academic study in the fields of history, theory, and the arts.
    level: 20
    class_id: fighter
  combatsuperiority:
    title: Combat Superiority
    text: Your experience on the battlefield has refined your fighting techniques. You learn maneuvers
      that are fueled by special dice called Superiority Dice. ——_ A FIGHTER STANDS BETWEEN AN ALLY AND
      THE ONSLAUGHT OF A BLACK ORAGON. Maneuvers. You learn three maneuvers of your choice from the “Maneuver
      Options” section later in this subclass’s description. Many maneuvers enhance an attack in some
      way. You can use only one maneuver per attack. You learn two additional maneuvers of your choice
      when you reach Fighter levels 7, 10, and 15. Each time you learn new maneuvers, you can also replace
      one maneuver you know with a different one. Superiority Dice. You have four Superiority Dice, which
      are d8s. A Superiority Die is expended when you use it. You regain all expended Superiority Dice
      when you finish a Short or Long Rest. You gain an additional Superiority Die when you reach Fighter
      levels 7 (five dice total) and 15 (six dice total). Saving Throws. If a maneuver requires a saving
      throw, the DC equals 8 plus your Strength or Dexterity modifier (your choice) and Proficiency Bonus.
      CHAPTER 3 | CHARACTER CLASSES 92 BATTLE MASTER SUBCLASS
    level: 3
    class_id: fighter
  studentofwar:
    title: Student Of War
    text: You gain proficiency with one type of Artisan’s Tools of your choice, and you gain proficiency
      in one skill of your choice from the skills available to Fighters at level 1.
    level: 3
    class_id: fighter
  knowyourenemy:
    title: Know Your Enemy
    text: As a Bonus Action, you can discern certain strengths and weaknesses of a creature you can see
      within 30 feet of yourself; you know whether that creature has any Immunities, Resistances, or Vulnerabilities,
      and if the creature has any, you know what they are. Once you use this feature, you can’t do so
      again until you finish a Long Rest. You can also restore a use of the feature by expending one Superiority
      Die (no action required).
    level: 7
    class_id: fighter
  improvedcombatsuperiority:
    title: Improved Combat Superiority
    text: Your Superiority Die becomes a d10.
    level: 10
    class_id: fighter
  relentless:
    title: Relentless
    text: Once per turn, when you use a maneuver, you can roll 1d8 and use the number rolled instead of
      expending a Superiority Die.
    level: 15
    class_id: fighter
  ultimatecombatsuperiority:
    title: Ultimate Combat Superiority
    text: Your Superiority Die becomes a d12. MANEUVER OPTIONS The maneuvers are presented here in alphabetical
      order. Ambush. When you make a Dexterity (Stealth) check or an Initiative roll, you can expend one
      Superiority Die and add the die to the roll, unless you have the Incapacitated condition. Bait and
      Switch. When you're within 5 feet of a creature on your turn, you can expend one Superiority Die
      and switch places with that creature, provided you spend at least 5 feet of movement and the creature
      is willing and doesn’t have the Incapacitated condition. This movement doesn't provoke Opportunity
      Attacks. Roll the Superiority Die. Until the start of your next turn, you or the other creature
      (your choice) gains a bonus to AC equal to the number rolled. Commander's Strike. When you take
      the Attack action on your turn, you can replace one of your attacks to direct one of your companions
      to strike. When you do so, choose a willing creature who can see or hear you and expend one Superiority
      Die. That creature can immediately use its Reaction to make one attack with a weapon or an Unarmed
      Strike, adding the Superiority Die to the attack’s damage roll on a hit. Commanding Presence. When
      you make a Charisma (Intimidation, Performance, or Persuasion) check, you can expend one Superiority
      Die and add that die to the roll. Disarming Attack. When you hit a creature with an attack roll,
      you can expend one Superiority Die to attempt to disarm the target. Add the Superiority Die roll
      to the attack’s damage roll. ‘he target must succeed on a Strength saving throw or drop one object
      of your choice that it’s holding, with the object landing in its space. Distracting Strike. When
      you hit a creature with an attack roll, you can expend one Superiority Die to distract the target.
      Add the Superiority Die roll to the attack’s damage roll. The next attack roll against the target
      by an attacker other than you has Advantage if the attack is made before the start of your next
      turn. Evasive Footwork. As a Bonus Action, you can expend one Superiority Die and take the Disengage
      action. You also roll the die and add the number rolled to your AC until the start of your next
      turn. Feinting Attack. As a Bonus Action, you can expend one Superiority Die to feint, choosing
      one creature within 5 feet of yourself as your target. You have Advantage on your next attack roll
      against that target this turn. If that attack hits, add the Superiority Die to the attack’s damage
      roll. Goading Attack. When you hit a creature with an attack roll, you can expend one Superiority
      Die to attempt to goad the target into attacking you. Add the Superiority Die to the attack’s damage
      roll. The target must succeed on a Wisdom saving throw or have Disadvantage on attack rolls against
      targets other than you until the end of your next turn. Lunging Attack. As a Bonus Action, you can
      expend one Superiority Die and take the Dash action. If you move at least 5 feet in a straight line
      immediately before hitting with a melee attack as part of the Attack action on this turn, you can
      add the Superiority Die to the attack’s damage roll. Maneuvering Attack. When you hit a creature
      with an attack roll, you can expend one Superiority Die to maneuver one of your comrades into another
      position. Add the Superiority Die roll to the attack’s damage roll, and choose a willing creature
      who can see or hear you. That creature can use its Reaction to move up to half its Speed without
      provoking an Opportunity Attack from the target of your attack. ——— — Menacing Attack. When you
      hit a creature with an attack roll, you can expend one Superiority Die to attempt to frighten the
      target. Add the Superiority Die to the attack’s damage roll. The target must succeed on a Wisdom
      saving throw or have the Frightened condition until the end of your next turn. Parry. When another
      creature damages you with a melee attack roll, you can take a Reaction and expend one Superiority
      Die to reduce the damage by the number you roll on your Superiority Die plus your Strength or Dexterity
      modifier (your choice). Precision Attack. When you miss with an attack roll, you can expend one
      Superiority Die, roll that die, and add it to the attack roll, potentially causing the attack to
      hit. Pushing Attack. When you hit a creature with an attack roll using a weapon or an Unarmed Strike,
      you can expend one Superiority Die to attempt to drive the target back. Add the Superiority Die
      to the attack’s damage roll. If the target is Large or smaller, it must succeed on a Strength saving
      throw or be pushed up to 15 feet directly away from you. Rally. As a Bonus Action, you can expend
      one Superiority Die to bolster the resolve of a companion. Choose an ally of yours within 30 feet
      of yourself who can see or hear you. [That creature gains Temporary Hit Points equal to the Superiority
      Die roll plus half your Fighter level (round down). Riposte. When a creature misses you with a melee
      attack roll, you can take a Reaction and expend one Superiority Die to make a melee attack roll
      with a weapon or an Unarmed Strike against the creature. If you hit, add the Superiority Die to
      the attack’s damage. Sweeping Attack. When you hit a creature with a melee attack roll using a weapon
      or an Unarmed Strike, you can expend one Superiority Die to attempt to damage another creature.
      Choose another creature within 5 feet of the original target and within your reach. If the original
      attack roll would hit the second creature, it takes damage equal to the number you roll on your
      Superiority Die. The damage is of the same type dealt by the original attack. Tactical Assessment.
      When you make an Intelligence (History or Investigation) check or a Wisdom (Insight) check, you
      can expend one Superiority Die and add that die to the ability check. Trip Attack. When you hit
      a creature with an attack roll using a weapon or an Unarmed Strike, you can expend one Superiority
      Die and add the die to the attack’s damage roll. If the target is Large or smaller, it must succeed
      on a Strength saving throw or have the Prone condition. CHAPTER 3 | CHARACTER CLASSES 95 CHAMPION
      SUBCLASS CHAMPION Pursue Physical Excellence in Combat A Champion focuses on the development of
      martial prowess in a relentless pursuit of victory. Champions combine rigorous training with physical
      excellence to deal devastating blows, withstand peril, and garner glory. Whether in athletic contests
      or bloody battle, Champions strive for the crown of the victor.
    level: 18
    class_id: fighter
  improvedcritical:
