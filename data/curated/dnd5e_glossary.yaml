  telekineticadept:
    title: Telekinetic Adept
    text: You have mastered new ways to use your telekinetic abilities, detailed below. Psi-Powered Leap.
      As a Bonus Action, you gain a Fly Speed equal to twice your Speed until the end of the current turn.
      Once you take this Bonus Action, you can’t do so again until you finish a Short or Long Rest unless
