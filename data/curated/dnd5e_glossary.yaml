    class_id: druid
  improvedcircleforms:
    title: Improved Circle Forms
    text: While in a Wild Shape form, you gain the following benefits. Lunar Radiance. Each of your attacks
      in a Wild Shape form can deal its normal damage type or Radiant damage. You make this choice each
