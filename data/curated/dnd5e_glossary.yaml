      Special C C,M Special C,M M Special C Special 63 7? ee BARD SUBCLASSES A Bard subclass is a specialization
      that grants you features at certain Bard levels, as specified in the subclass. Bards form loose
      associations, which they call colleges, to preserve their traditions. This section presents the
      College of Dance, College of Glamour, College of Lore, and College of Valor subclasses. COLLEGE
      OF DANCE Move in Harmony with the Cosmos Bards of the College of Dance know that the Words of Creation
      can’t be contained within speech or song; the words are uttered by the movements of celestial bodies
      and flow through the motions of the smallest creatures. These Bards practice a way of being in harmony
      with the whirling cosmos that emphasizes agility, speed, and grace.'
  dazzlingfootwork:
    title: DAZZLING FOOTWORK
    level: 3
    text: While you arent wearing armor or wielding a Shield, you gain the following benefits. Dance Virtuoso.
      You have Advantage on any Charisma (Performance) check you make that involves you dancing. Unarmored
      Defense. Your base Armor Class equals 10 plus your Dexterity and Charisma modifiers. Agile Strikes.
      When you expend a use of your Bardic Inspiration as part of an action, a Bonus Action, or a Reaction,
      you can make one Unarmed Strike as part of that action, Bonus Action, or Reaction. Bardic Damage.
      You can use Dexterity instead of Strength for the attack rolls of your Unarmed Strikes. When you
      deal damage with an Unarmed Strike, you can deal Bludgeoning damage equal to a roll of your Bardic
      Inspiration die plus your Dexterity modifier, instead of the strike’s normal damage. This roll doesn't
      expend the die.
  inspiringmovement:
    title: INSPIRING MOVEMENT
    level: 6
    text: When an enemy you can see ends its turn within 5 feet of you, you can take a Reaction and expend
      one use of your Bardic Inspiration to move up to half your Speed. Then one ally of your choice within
      30 feet of you can also move up to half their Speed using their Reaction. None of this feature’s
      movement provokes Opportunity Attacks.
  tandemfootwork:
    title: TANDEM FOOTWORK
    level: 6
    text: When you roll Initiative, you can expend one use of your Bardic Inspiration if you don’t have
      the Incapacitated condition. When you do so, roll your Bardic Inspiration die; you and each ally
      within 30 feet of you who can see or hear you gains a bonus to Initiative equal to the number rolled.
  leadingevasion:
    title: LEADING EVASION
    level: 14
    text: When you are subjected to an effect that allows you to make a Dexterity saving throw to take
      only half damage, you instead take no damage if you succeed on the saving throw and only half damage
      if you fail. If any creatures within 5 feet of you are making the same Dexterity saving throw, you
      can share this benefit with them for that save. You can’t use this feature if you have the Incapacitated
      condition. COLLEGE OF GLAMOUR Weave Beguiling Fey Magic The College of Glamour traces its origins
      to the beguiling magic of the Feywild. Bards who study this magic weave threads of beauty and terror
      into their songs and stories, and the mightiest among them can cloak themselves in otherworldly
      majesty. Their performances stir up wistful longing for forgotten innocence, evoke unconscious memories
      of longheld fears, and tug at the emotions of even the most hard-hearted listeners.
  beguilingmagio:
    title: BEGUILING MAGIO
    level: 3
    text: You always have the Charm Person and Mirror Image spells prepared. In addition, immediately
      after you cast an Enchantment or Illusion spell using a spell slot, you can cause a creature you
      can see within 60 feet of yourself to make a Wisdom saving throw against your spell save DC. On
      a failed save, the target has the Charmed or Frightened condition (your choice) for 1 minute. The
      target repeats the save at the end of each of its turns, ending the effect on itself on a SUCCESS.
      Once you use this benefit, you can’t use it again until you finish a Long Rest. You can also restore
      your use of it by expending one use of your Bardic Inspiration (no action required).
  mantleofinspiration:
    title: MANTLE OF INSPIRATION
    level: 3
    text: You can weave fey magic into a song or dance to fill others with vigor. As a Bonus Action, you
      can expend a use of Bardic Inspiration, rolling a Bardic Inspiration die. When you do so, choose
      a number of other creatures within 60 feet of yourself, up to a number equal to your Charisma modifier
      (minimum of one creature). Each of those creatures gains a number of Temporary Hit Points equal
      to two times the number rolled on the Bardic Inspiration die, and then each can use its Reaction
      to move up to its Speed without provoking Opportunity Attacks.
  mantleofmajesty:
    title: MANTLE OF MAJESTY
    level: 6
    text: You always have the Command spell prepared. As a Bonus Action, you cast Command without expending
      a spell slot, and you take on an unearthly ‘ ‘i, a | 4 if “a | Lf ae jt ae . Ui Ps 4 f beh Bk ~s
      * = - g . 7 ) — —! * COLLEGE OF GLAMOUR , 4 SUBCLASS © Aaa os -_ —— > % appearance for 1 minute
      or until your ConcentraBaits. Ni tion ends. During this time, you can cast Command “Se ee 7 as a
      Bonus Action without expending a spell slot ) \ Any creature Charmed by you automatically fails
      ‘ | its saving throw against the Command you cast with this feature. Once you use this feature,
      you can’t use it again until you finish a Long Rest. You can also restore your use of it by expending
      a level 3+ spell slot (no action required).
  unbreakablemajesty:
    title: UNBREAKABLE MAJESTY
    level: 14
    text: As a Bonus Action, you can assume a magically majestic presence for 1 minute or until you have
      the Incapacitated condition. For the duration, whenever any creature hits you with an attack roll
      for the first time on a turn, the attacker must succeed on a Charisma saving throw against your
      spell save DC, or the attack misses instead, as the creature recoils from your majesty. Once you
      assume this majestic presence, you can't do so again until you finish a Short or Long Rest. COLLEGE
      OF LORE Plumb the Depths of Magical Knowledge Bards of the College of Lore collect spells and secrets
      from diverse sources, such as scholarly tomes, mystical rites, and peasant tales. The college's
      members gather in libraries and universities to share their lore with one another. They also meet
      at festivals or affairs of state, where they can expose corruption, unravel lies, and poke fun at
      self-important figures of authority.
  bonusproficiencies:
    title: BONUS PROFICIENCIES
    level: 3
    text: You gain proficiency with three skills of your choice.
  cuttingwords:
    title: CUTTING WORDS
    level: 3
    text: You learn to use your wit to supernaturally distract, confuse, and otherwise sap the confidence
      and competence of others. When a creature that you can see within 60 feet of yourself makes a damage
      roll or succeeds on an ability check or attack roll, you can take a Reaction to expend one use of
      your Bardic Inspiration; roll your Bardic Inspiration die, and subtract the number rolled from the
      creature’s roll, reducing the damage or potentially turning the success into a failure. \ \ N =aeeeees
      | 236
  magicaldiscoveries:
    title: MAGICAL DISCOVERIES
    level: 6
    text: 'ae ie Ya — ee You learn two spells of your choice. These spells can Coutece or Lod aa : =",
      come from the Cleric, Druid, or Wizard spell list or hice vm = \alAios any combination thereof (see
      a class''s section for its : -- Se ~—SCsppeell list). A spell you choose must be a cantrip or a
      spell for which you have spell slots, as shown in the Bard Features table. You always have the chosen
      spells prepared, and whenever you gain a Bard level, you can replace one of the spells with another
      spell that meets these requirements.'
  peerlessskill:
    title: PEERLESS SKILL
    level: 14
    text: When you make an ability check or attack roll and fail, you can expend one use of Bardic Inspiration;
      roll the Bardic Inspiration die, and add the number rolled to the d20, potentially turning a failure
      into a success. On a failure, the Bardic Inspiration isn’t expended. COLLEGE OF VALOR Sing the Deeds
      of Ancient Heroes Bards of the College of Valor are daring storytellers whose tales preserve the
      memory of the great heroes of the past. These Bards sing the deeds of the mighty in vaulted halls
      or to crowds gathered around great bonfires. They travel to witness great events firsthand and to
      ensure that the memory of these events doesn't pass away. With their songs, they inspire new generations
      to reach the same heights of accomplishment as the heroes of old.
  combatinspiration:
    title: COMBAT INSPIRATION
    level: 3
    text: You can use your wit to turn the tide of battle. A creature that has a Bardic Inspiration die
      from you can use it for one of the following effects. Defense. When the creature is hit by an attack
      roll, that creature can use its Reaction to roll the Bardic Inspiration die and add the number rolled
      to its AC against that attack, potentially causing the attack to miss. Offense. Immediately after
      the creature hits a target with an attack roll, the creature can roll the Bardic Inspiration die
      and add the number rolled to the attack’s damage against the target.
  martialtraining:
    title: MARTIAL TRAINING
    level: 3
    text: You gain proficiency with Martial weapons and training with Medium armor and Shields. In addition,
      you can use a Simple or Martial weapon as a Spellcasting Focus to cast spells from your Bard spell
      list.
  battlemagic:
    title: BATTLE MAGIC
    level: 14
    text: 'After you cast a spell that has a casting time of an action, you can make one attack with a
      weapon as a Bonus Action. COLLEGE OF VALOR SUBCLASS CORE CLERIC TRAITS Wisdom D8 per Cleric level
      Primary Ability Hit Point Die Saving Throw Proficiencies Wisdom and Charisma Skill Proficiencies
      Choose 2: History, Insight, Medicine, Persuasion, or Religion Weapon Proficiencies Simple weapons
      Light and Medium armor and Shields Armor Training Choose A or B: (A) Chain Shirt, Shield, Mace,
      Holy Symbol, Priest’s Pack, and 7 GP; or (B) 110 GP Starting Equipment LERICS DRAW POWER FROM THE
      REALMS ( of the gods and harness it to work miracles. ~ Blessed by a deity, a pantheon, or another
      immortal entity, a Cleric can reach out to the divine magic of the Outer Planes—where gods dwell—and
      channel it to bolster people and battle foes. Because their power is a divine gift, Clerics typically
      associate themselves with temples dedicated to the deity or other immortal force that unlocked their
      magic. Harnessing divine magic doesn''t rely on specific training, yet Clerics might learn prayers
      and rites that help them draw on power from the Outer Planes. Not every member of a temple or shrine
      is a Cleric. Some priests are called to a simple life of temple service, carrying out their devotion
      through prayer and rituals, not through magic. Many mortals claim to speak for the gods, but few
      can marshal the power of those gods the way a Cleric can. BECOMING A CLERIC ... AS A LEVEL 1 CHARACTER
      - Gain all the traits in the Core Cleric Traits table. - Gain the Cleric’s level 1 features, which
      are listed in the Cleric Features table. AS A MULTICLASS CHARACTER - Gain the following traits from
      the Core Cleric Traits table: Hit Point Die and training with Light and Medium armor and Shields.
      - Gain the Cleric’s level 1 features, which are listed in the Cleric Features table. See the multiclassing
      rules in chapter 2 to determine your available spell slots. CLERIC CLASS FEATURES SS —E—— sao As
      a Cleric, you gain the following class features when you reach the specified Cleric levels. These
      features are listed in the Cleric Features table.'
  spellcasting:
    title: SPELLCASTING
    level: 3
    text: 'You have learned to cast spells. See chapter 7 for the rules on spellcasting. The information
      below details how you use those rules as an Arcane / , Trickster. ( ~ | / Cantrips. You know three
      cantrips: Mage Hand and two other cantrips of your choice i from the Wizard spell list (see that
      class''s sec- ej e | tion for its list). Mind Sliver and Minor Illusion are * recommended. . —~\,
      Whenever you gain a Rogue level, you can replace ‘A ~s | one of your cantrips, except Mage Hand,
      with another Wizard cantrip of your choice. When you reach Rogue level 10, you learn another Wizard
      cantrip of your choice. Spell Slots. The Arcane Trickster Spellcasting table shows how many spell
      slots you have to cast your level 1+ spells. You regain all expended spell slots when you finish
      a Long Rest. Prepared Spells of Level 1+. You prepare the list of level 1+ spells that are available
      for you to cast with this feature. To start, choose three level 1 Wizard spells. Charm Person, Disguise
      Self, and Fog Cloud are recommended. The number of spells on your list increases as you gain Rogue
      levels, as shown in the Prepared Spells column of the Arcane Trickster Spellcasting table. Whenever
      that number increases, choose additional Wizard spells until the number of spells on your list matches
      the number in the Arcane Trickster Spellcasting table. The chosen spells must be of a level for
      which you have spell slots. For example, if youre a level 7 Rogue, your list of prepared spells
      can include five Wizard spells of level 1 or 2 in any combination. f '' “< ARCANE TRICKSTER SUBCLASS
      = ARCANE TRICKSTER SPELLCASTING Rogue Prepared —Spell Slots per Spell Level— Level Spells T 2 3
      4 3 3 2 -— —- _- A 4 3 _- —. — 5 4 3 = th 6 4 3 -- os — 7 5 4 2 —- —- 8 6 4 2 —- -— 9 6 4 2 —- —
      10 ] 4. 3 — —- 1 8 4 3 —- ~— 12 8 4 c — = 13 9 4 3 2 — 14 10 A 3 2 — 15 10 4 3 2 _. 16 1 4 3 3 —
      17 1 4 3 3 -= 18 11 4 3 3 _- 19 12 A 3 3 1 20 13 4 3 3 | Changing Your Prepared Spells. Whenever
      you gain a Rogue level, you can replace one spell on your list with another Wizard spell for which
      you have spell slots. Spellcasting Ability. Intelligence is your spellcasting ability for your Wizard
      spells. Spellcasting Focus. You can use an Arcane Focus as a Spellcasting Focus for your Wizard
      spells.'
  channeldivinity:
    title: CHANNEL DIVINITY
    level: 3
    text: 'You can channel divine energy directly from the Outer Planes, using it to fuel magical effects.
      You start with one such effect: Divine Sense, which is described below. Other Paladin features give
      additional Channel Divinity effect options. Each time you use this class’s Channel Divinity, you
      choose which effect from this class to create. You can use this class''s Channel Divinity twice.
      You regain one of its expended uses when you finish a Short Rest, and you regain all expended uses
      when you finish a Long Rest. You gain an additional use when you reach Paladin level 11. If a Channel
      Divinity effect requires a saving throw, the DC equals the spell save DC from this class’s Spellcasting
      feature. Divine Sense. As a Bonus Action, you can open your awareness to detect Celestials, Fiends,
      and Undead. For the next 10 minutes or until you have the Incapacitated condition, you know the
      location of any creature of those types within 60 feet of yourself, and you know its creature type.
      Within the same radius, you also detect the presence of any place or object that has been consecrated
      or desecrated, as with the Hallow spell.'
  clericsubclass:
    title: CLERIC SUBCLASS
    level: 3
    text: You gain a Cleric subclass of your choice. The Life Domain, Light Domain, Trickery Domain, and
      War Domain subclasses are detailed after this class’s description. A subclass is a specialization
      that grants you features at certain Cleric levels. For the rest of your career, you gain each of
      your subclass’s features that are of your Cleric level or lower.
  searundead:
    title: SEAR UNDEAD
    level: 5
    text: Whenever you use Turn Undead, you can roll a number of d8s equal to your Wisdom modifier (minimum
      of 1d8) and add the rolls together. Each Undead that fails its saving throw against that use of
      Turn Undead takes Radiant damage equal to the roll’s total. This damage doesn’t end the turn effect.
  blessedstrikes:
    title: BLESSED STRIKES
    level: 7
    text: Divine power infuses you in battle. You gain one of the following options of your choice (if
      you get either option from a Cleric subclass in an older book, use only the option you choose for
      this feature). Divine Strike. Once on each of your turns when you hit a creature with an attack
      roll using a weapon, you can cause the target to take an extra 1d8 Necrotic or Radiant damage (your
      choice). Potent Spellcasting. Add your Wisdom modifier to the damage you deal with any Cleric cantrip.
  divineintervention:
    title: DIVINE INTERVENTION
    level: 10
    text: You can call on your deity or pantheon to intervene on your behalf. As a Magic action, choose
      any Cleric spell of level 5 or lower that doesn’t require a Reaction to cast. As part of the same
      action, you cast that spell without expending a spell slot or needing Material components. You can't
      use this feature again until you finish a Long Rest.
  improvedblessedstrikes:
    title: IMPROVED BLESSED STRIKES
    level: 14
    text: The option you chose for Blessed Strikes grows more powerful. Divine Strike. The extra damage
      of your Divine Strike increases to 2d8. Potent Spellcasting. When you cast a Cleric cantrip and
      deal damage to a creature with it, you can give vitality to yourself or another creature within
      60 feet of yourself, granting a number of Temporary Hit Points equal to twice your Wisdom modifier.
  ep1cboon:
    title: Ep1c BOON
    level: 19
    text: You gain an Epic Boon feat (see chapter 5) or another feat of your choice for which you qualify.
      Boon of Fate is recommended.
  greaterdivineintervention:
    title: GREATER DIVINE INTERVENTION
    level: 20
    text: You can call on even more powerful divine intervention. When you use your Divine Intervention
      feature, you can choose Wish when you select a spell. If you do so, you can't use Divine Intervention
      again until you finish 2d4 Long Rests. CLERIC SPELL LIST This section presents the Cleric spell
      list. The spells are organized by spell level and then alphabetized, and each spell’s school of
      magic is listed. In the Special column, C means the spell requires Concentration, R means it’s a
      Ritual, and M means it requires a specific Material component. CANTRIPS (LEVEL O CLERIC SPELLS)
      Spell School Special Guidance Divination C Light Evocation — Mending Transmutation — Resistance
      Abjuration C Sacred Flame Evocation — Spare the Dying Necromancy _ Thaumaturgy Transmutation — Toll
      the Dead Necromancy — Word of Radiance Evocation -- LEVEL 1 CLERIC SPELLS Spell School Special Bane
      Enchantment C Bless Enchantment C,M Command Enchantment = Create or Destroy Water Transmutation
      — Cure Wounds Abjuration — Detect Evil and Good Divination C Detect Magic Divination CR Detect Poison
      and Disease _ Divination CR Guiding Bolt Evocation -- Healing Word Abjuration -- Inflict Wounds
