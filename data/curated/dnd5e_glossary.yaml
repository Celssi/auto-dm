features:
  character:
    title: Character
    text: '- Gain all the traits in the Core Barbarian Traits table. - Gain the Barbarian''s'
    level: 1
  featureswhichare:
    title: features, which are
    text: 'listed in the Barbarian Features table. AS A MULTICLASS CHARACTER - Gain the following traits
      from the Core Barbarian Traits table: Hit Point Die, proficiency with Martial weapons, and training
      with Shields. - Gain the Barbarian’s'
    level: 1
  rage:
    title: Rage |
    text: 'You can imbue yourself with a primal power called Rage, a force that grants you extraordinary
      might and resilience. You can enter it as a Bonus Action if you arent wearing Heavy armor. You can
      enter your Rage the number of times shown for your Barbarian level in the Rages column of the Barbarian
      Features table. You regain one expended use when you finish a Short Rest, and you regain all expended
      uses when you finish a Long Rest. While active, your Rage follows the rules below. Damage Resistance.
      You have Resistance to Bludgeoning, Piercing, and Slashing damage. Rage Damage. When you make an
      attack using Strength—with either a weapon or an Unarmed Strike—and deal damage to the target, you
      gain a bonus to the damage that increases as you gain levels as a Barbarian, as shown in the Rage
      Damage column of the Barbarian Features table. Strength Advantage. You have Advantage on Strength
      checks and Strength saving throws. No Concentration or Spells. You can’t maintain Concentration,
      and you can''t cast spells. Duration. The Rage lasts until the end of your next turn, and it ends
      early if you don Heavy armor or have the Incapacitated condition. If your Rage is still active on
      your next turn, you can extend the Rage for another round by doing one of the following: - Make
      an attack roll against an enemy. - Force an enemy to make a saving throw. - Take a Bonus Action
      to extend your Rage. Each time the Rage is extended, it lasts until the end of your next turn. You
      can maintain a Rage for up to 10 minutes.'
    class_id: barbarian
  barbarian_weaponmastery:
    title: Weapon Mastery
    text: Your training with weapons allows you to use the mastery properties of two kinds of Simple or
      Martial Melee weapons of your choice, such as Greataxes and Handaxes. Whenever you finish a Long
      Rest, you can practice weapon drills and change one of those weapon choices. When you reach certain
      Barbarian levels, you gain the ability to use the mastery properties of more kinds of weapons, as
      shown in the Weapon Mastery column of the Barbarian Features table.
    level: 1
    class_id: barbarian
  dangersense:
    title: Danger Sense
    text: You gain an uncanny sense of when things aren't as they should be, giving you an edge when you
      dodge perils. You have Advantage on Dexterity saving throws unless you have the Incapacitated condition.
    level: 2
    class_id: barbarian
  recklessattack:
    title: Reckless Attack
    text: You can throw aside all concern for defense to attack with increased ferocity. When you make
      your first attack roll on your turn, you can decide to attack recklessly. Doing so gives you Advantage
      on attack rolls using Strength until the start of your next turn, but attack rolls against you have
      Advantage during that time. CHAPTER 3 | CHARAQTER OLASSES
    level: 2
    class_id: barbarian
  barbariansubclass:
    title: Barbarian Subclass
    text: You gain a Barbarian subclass of your choice. The Path of the Berserker, Path of the Wild Heart,
      Path of the World Tree, and Path of the Zealot subclasses are detailed after this class’s description.
      A subclass is a specialization that grants you features at certain Barbarian levels. For the rest
      of your career, you gain each of your subclass’s features that are of your Barbarian level or lower.
    level: 3
    class_id: barbarian
  primalknowledge:
    title: Primal Knowledge
    text: 'You gain proficiency in another skill of your choice from the skill list available to Barbarians
      at level 1. In addition, while your Rage is active, you can channel primal power when you attempt
      certain tasks; whenever you make an ability check using one of the following skills, you can make
      it as a Strength check even if it normally uses a different ability: Acrobatics, Intimidation, Perception,
      Stealth, or Survival. When you use this ability, your Strength represents primal power coursing
      through you, honing your agility, bearing, and senses. St - ee ee'
    level: 3
    class_id: barbarian
  abilityscoreimprovement:
    title: Ability Score Improvement
    text: You gain the Ability Score Improvement feat (see chapter 5) or another feat of your choice for
      which you qualify. You gain this feature again at Barbarian levels 8, 12, and 16.
    level: 4
    class_id: barbarian
  barbarian_extraattack:
    title: Extra Attack
    text: You can attack twice instead of once whenever you take the Attack action on your turn.
    level: 9
    class_id: barbarian
  fastmovement:
    title: Fast Movement
    text: Your speed increases by 10 feet while you aren't wearing Heavy armor.
    level: 9
    class_id: barbarian
  feralinstinct:
    title: Feral Instinct
    text: Your instincts are so honed that you have Advantage on Initiative rolls.
    level: 7
    class_id: barbarian
  instinctivepounce:
    title: Instinctive Pounce
    text: As part of the Bonus Action you take to enter your Rage, you can move up to half your Speed.
    level: 7
    class_id: barbarian
  brutalstrike:
    title: Brutal Strike
    text: If you use Reckless Attack, you can forgo any Advantage on one Strength-based attack roll of
      your choice on your turn. The chosen attack roll mustn't have Disadvantage. If the chosen attack
      roll hits, the target takes an extra 1d10 damage of the same type dealt by the weapon or Unarmed
      Strike, and you can cause one Brutal Strike effect of your choice. You have the following effect
      options. Forceful Blow. The target is pushed 15 feet straight away from you. You can then move up
      to half your Speed straight toward the target without provoking Opportunity Attacks. Hamstring Blow.
      The target's Speed is reduced by 15 feet until the start of your next turn. A target can be affected
      by only one Hamstring Blow at a time— the most recent one.
    level: 9
    class_id: barbarian
  relentlessrage:
    title: Relentless Rage
    text: Your Rage can keep you fighting despite grievous wounds. If you drop to O Hit Points while your
      Rage is active and don't die outright, you can make a DC 10 Constitution saving throw. If you succeed,
      your Hit Points instead change to anumber equal to twice your Barbarian level. Each time you use
      this feature after the first, the DC increases by 5. When you finish a Short or Long Rest, the DC
      resets to 10.
    class_id: barbarian
  improvedbrutalstrike:
    title: Improved Brutal Strike
    text: You have honed new ways to attack furiously. The following effects are now among your Brutal
      Strike options. Staggering Blow. The target has Disadvantage on the next saving throw it makes,
      and it can’t make Opportunity Attacks until the start of your next turn. 4 t hai —* & z = }. + Sundering
      Blow. Before the start of your next turn, the next attack roll made by another creature against
      the target gains a +5 bonus to the roll. An attack roll can gain only one Sundering Blow bonus.
    level: 13
    class_id: barbarian
  persistentrage:
    title: Persistent Rage
    text: When you roll Initiative, you can regain all expended uses of Rage. After you regain uses of
      Rage in this way, you can't do so again until you finish a Long Rest. In addition, your Rage is
      so fierce that it now lasts for 10 minutes without you needing to do anything to extend it from
      round to round. Your Rage ends early if you have the Unconscious condition (not just the Incapacitated
      condition) or don Heavy armor.
    level: 15
    class_id: barbarian
  indomitablemight:
    title: Indomitable Might
    text: If your total for a Strength check or Strength saving throw is less than your Strength score,
      you can use that score in place of the total.
    level: 18
    class_id: barbarian
  epicboon:
    title: EpIc BOON
    text: You gain an Epic Boon feat (see chapter 5) or another feat of your choice for which you qualify.
      Boon of Irresistible Offense is recommended.
    level: 19
    class_id: barbarian
  primalchampion:
    title: Primal Champion
    text: You embody primal power. Your Strength and Constitution scores increase by 4, to a maximum of
      25.
    level: 20
    class_id: barbarian
  frenzy:
    title: Frenzy
    text: If you use Reckless Attack while your Rage is active, you deal extra damage to the first target
      you hit on your turn with a Strength-based attack. To determine the extra damage, roll a number
      of d6s equal to your Rage Damage bonus, and add them together. The damage has the same type as the
      weapon or Unarmed Strike used for the attack.
    level: 3
    class_id: barbarian
  mindlessrage:
    title: Mindless Rage
    text: You have Immunity to the Charmed and Frightened conditions while your Rage is active. If you're
      Charmed or Frightened when you enter your Rage, the condition ends on you.
    level: 6
    class_id: barbarian
  retaliation:
    title: Retaliation
    text: When you take damage from a creature that is within 5 feet of you, you can take a Reaction to
      make one melee attack against that creature, using a weapon or an Unarmed Strike.
    level: 10
    class_id: barbarian
  intimidatingpresence:
    title: Intimidating Presence
    text: As a Bonus Action, you can strike terror into others with your menacing presence and primal
      power. When you do so, each creature of your choice in a 40-foot Emanation originating from you
      must make a Wisdom saving throw (DC 8 plus your Strength modifier and Proficiency Bonus). On a failed
      save, a creature has the Frightened condition for 1 minute. At the end of each of the Frightened
      creature's turns, the creature repeats the save, ending the effect on itself on a success. Once
      you use this feature, you can’t use it again until you finish a Long Rest unless you expend a use
      of your Rage (no action required) to restore your use of it. PATH OF THE WILD HEART Walk in Community
      with the Animal World Barbarians who follow the Path of the Wild Heart view themselves as kin to
      animals. These Barbarians learn magical means to communicate with animals, and their Rage heightens
      their connection to animals as it fills them with supernatural might.
    level: 14
    class_id: barbarian
  animalspeaker:
    title: Animal Speaker
    text: You can cast the Beast Sense and Speak with Animals spells but only as Rituals. Wisdom is your
      spellcasting ability for them.
    level: 3
    class_id: barbarian
  rageofthewilds:
    title: Rage Of The Wilds
    text: Your Rage taps into the primal power of animals. Whenever you activate your Rage, you gain one
      of the following options of your choice. Bear. While your Rage is active, you have Resistance to
      every damage type except Force, Necrotic, Psychic, and Radiant. Fagle. When you activate your Rage,
      you can take the Disengage and Dash actions as part of that Bonus Action. While your Rage is active,
      you can take a Bonus Action to take both of those actions. Wolf. While your Rage is active, your
      allies have Advantage on attack rolls against any enemy of yours within 5 feet of you.
    level: 3
    class_id: barbarian
  aspectofthewilds:
    title: Aspect Of The Wilds
    text: You gain one of the following options of your choice. Whenever you finish a Long Rest, you can
      change your choice. Owl. You have Darkvision with a range of 60 feet. If you already have Darkvision,
      its range increases by 60 feet. Panther. You have a Climb Speed equal to your Speed. Salmon. You
      have a Swim Speed equal to your Speed.
    level: 6
    class_id: barbarian
  naturespeaker:
    title: Nature Speaker
    text: You can cast the Commune with Nature spell but only as a Ritual. Wisdom is your spellcasting
      ability for it.
    level: 10
    class_id: barbarian
  powerofthewilds:
    title: Power Of The Wilds
    text: Whenever you activate your Rage, you gain one of the following options of your choice. Falcon.
      While your Rage is active, you have a Fly Speed equal to your Speed if you aren't wearing any armor.
      Lion. While your Rage is active, any of your enemies within 5 feet of you have Disadvantage on attack
      rolls against targets other than you or another Barbarian who has this option active. Ram. While
      your Rage is active, you can cause a Large or smaller creature to have the Prone condition when
      you hit it with a melee attack. — PatH oF THE WILD HEART. a eed SUBCLASS ——_ PATH OF THE WoRLD TREE
      SUBCLASS PATH OF THE WORLD [REE Trace the Roots and Branches of the Multiverse Barbarians who follow
      the Path of the World Tree connect with the cosmic tree Yggdrasil through their Rage. This tree
      grows among the Outer Planes, connecting them to each other and the Material Plane. These Barbarians
      draw on the tree's magic for vitality and as a means of dimensional travel.
    level: 14
    class_id: barbarian
  vitalityoftheree:
    title: Vitality Of The [Ree
    text: Your Rage taps into the life force of the World Tree. You gain the following benefits. Vitality
      Surge. When you activate your Rage, you gain a number of Temporary Hit Points equal to your Barbarian
      level. Life-Giving Force. At the start of each of your turns while your Rage is active, you can
      choose another creature within 10 feet of yourself to gain Temporary Hit Points. To determine the
      number of Temporary Hit Points, roll a number of d6s equal to your Rage Damage bonus, and add them
      together. If any of these Temporary Hit Points remain when your Rage ends, they vanish.
    level: 3
    class_id: barbarian
  branchesofthetree:
    title: Branches Of The Tree
    text: 'Whenever a creature you can see starts its turn within 30 feet of you while your Rage is active,
      you can take a Reaction to summon spectral branches of the World Tree around it. The target must
      succeed on a Strength saving throw (DC 8 plus your Strength modifier and Proficiency Bonus) or be
      teleported to an unoccupied space you can See within o feet of yourself or in the nearest unoccupied
      space you can see. After the target teleports, you can reduce its Speed to O until the end of the
      current turn. LEVEL10: BATTERING ROOTS During your turn, your reach is 10 feet greater with any
      Melee weapon that has the Heavy or Versatile property, as tendrils of the World Tree extend from
      you. When you hit with such a weapon on your turn, you can activate the Push or Topple mastery property
      in addition to a different mastery property youre using with that weapon.'
    level: 6
    class_id: barbarian
  travelalongthetree:
    title: Travel Along The [Tree
    text: When you activate your Rage and as a Bonus Action while your Rage is active, you can teleport
      up to 60 feet to an unoccupied space you can see. In addition, once per Rage, you can increase the
      range of that teleport to 150 feet. When you do so, you can also bring up to six willing creatures
      who are within 10 feet of you. Each creature teleports to an unoccupied space of your choice within
      10 feet of your destination space. PATH OF THE ZEALOT Rage in Ecstatic Union with a God Barbarians
      who walk the Path of the Zealot receive boons from a god or pantheon. These Barbarians experience
      their Rage as an ecstatic episode of divine union that infuses them with power. They are often allies
      to the priests and other followers of their god or pantheon.
    level: 14
    class_id: barbarian
  divinefury:
    title: Divine Fury
    text: You can channel divine power into your strikes. On each of your turns while your Rage is active,
      the first creature you hit with a weapon or an Unarmed Strike takes extra damage equal to 1d6 plus
      half your Barbarian level (round down). The extra damage is Necrotic or Radiant; you choose the
      type each time you deal the damage.
    level: 3
    class_id: barbarian
  warriorofthegods:
    title: Warrior Of The Gods
    text: A divine entity helps ensure you can continue the fight. You have a pool of four d12s that you
      can spend to heal yourself. As a Bonus Action, you can expend dice from the pool, rol] them, and
      regain a number of Hit Points equal to the roll’s total. Your pool regains all expended dice when
      you finish a Long Rest. The pool’s maximum number of dice increases by one when you reach Barbarian
      levels 6 (5 dice), 12 (6 dice), and 17 (7 dice).
    level: 3
    class_id: barbarian
  fanaticalfocus:
    title: Fanatical Focus
    text: Once per active Rage, if you fail a saving throw, you can reroll it with a bonus equal to your
      Rage Damage bonus, and you must use the new roll.
    level: 6
    class_id: barbarian
  zealouspresence:
    title: Zealous Presence
    text: As a Bonus Action, you unleash a battle cry infused with divine energy. Up to ten other creatures
      of your choice within 60 feet of you gain Advantage on attack rolls and saving throws until the
      start of your next turn. Once you use this feature, you can't use it again until you finish a Long
      Rest unless you expend a use of your Rage (no action required) to restore your use of it.
    level: 10
    class_id: barbarian
  rageofthegods:
    title: Rage Of The Gods
    text: 'When you activate your Rage, you can assume the form of a divine warrior. This form lasts for
      1 minute or until you drop to O Hit Points. Once you use this feature, you can''t do so again until
      you finish a Long Rest. While in this form, you gain the benefits below. Flight. You have a Fly
      Speed equal to your Speed and can hover. Resistance. You have Resistance to Necrotic, Psychic, and
      Radiant damage. Revivification. When a creature within 30 feet of you would drop to O Hit Points,
      you can take a Reaction to expend a use of your Rage to instead change the target’s Hit Points to
      a number equal to your Barbarian level. PATH OF THE ZEALOT SUBCLASS ; . 4 ; . f | y : = ‘ “wn Inspiring
      Performer of Music, Dance, and Magic EVYN FONG ——+ a. = — t | : a” Core BARD TRAITS Primary Ability
      Charisma Hit Point Die Saving Throw Proficiencies D8 per Bard level Dexterity and Charisma Choose
      any 3 skills (see chapter 1) Skill Proficiencies Weapon Proficiencies Simple weapons Choose 3 Musical
      Instruments (see chapter 6) Tool Proficiencies Light armor Choose A or B: (A) Leather Armor, 2 Daggers,
      Musical Instrument of your choice, Entertainer’s Pack, and 19 GP; or (B) 90 GP Armor Training Starting
      Equipment NVOKING MAGIC THROUGH MUSIC, DANCE, I and verse, Bards are expert at inspiring others,
      ._» soothing hurts, disheartening foes, and creating illusions. Bards believe the multiverse was
      spoken into existence and that remnants of its Words of Creation still resound and glimmer on every
      plane of existence. Bardic magic attempts to harness those words, which transcend any language.
      Anything can inspire a new song or tale, so Bards are fascinated by almost everything. They become
      masters of many things, including performing music, working magic, and making jests. A Bard''s life
      is spent traveling, gathering lore, telling stories, and living on the gratitude of audiences, much
      like any other entertainer. But Bards’ depth of knowledge and mastery of magic sets them apart.
      BECOMING A BARD... AS A'
    level: 14
    class_id: barbarian
  bardicinspiration:
    title: Bardic Inspiration
    text: You can supernaturally inspire others through words, music, or dance. This inspiration is represented
      by your Bardic Inspiration die, which is a d6. Using Bardic Inspiration. As a Bonus Action, you
      can inspire another creature within 60 feet of yourself who can see or hear you. That creature gains
      one of your Bardic Inspiration dice. A creature can have only one Bardic Inspiration die at a time.
      Once within the next hour when the creature fails a D20 Test, the creature can roll the Bardic Inspiration
      die and add the number rolled to the d20, potentially turning the failure into a success. A Bardic
      Inspiration die is expended when it’s rolled. Number of Uses. You can confer a Bardic Inspiration
      die a number of times equal to your Charisma modifier (minimum of once), and you regain all expended
      uses when you finish a Long Rest. At Higher Levels. Your Bardic Inspiration die changes when you
      reach certain Bard levels, as shown in the Bardic Die column of the
    level: 1
    class_id: bard
  bard_spellcasting:
    title: Spellcasting
    text: You have learned to cast spells through your bardic arts. See chapter 7 for the rules on spellcasting.
      The information below details how you use those rules with Bard spells, which appear in the Bard
      spell list later in the class's description. Cantrips. You know two cantrips of your choice from
      the Bard spell list. Dancing Lights and Vicious Mockery are recommended. Whenever you gain a Bard
      level, you can replace one of your cantrips with another cantrip of your choice from the Bard spell
      list. When you reach Bard levels 4 and 10, you learn another cantrip of your choice from the Bard
      spell list, as shown in the Cantrips column of the
    level: 1
    class_id: bard
  spellsfrom:
    title: spells from
    text: the Bard spell list. Charm Person, Color Spray, Dissonant Whispers, and Healing Word are recommended.
      CHAPTER 3 | CHARACTER CLASSES 59 ES <seee 60
    level: 1
    class_id: bard
  bardyourlistofpreparedspellscanincludesixspellsoflevels1and2in:
    title: Bard, your list of prepared spells can include six spells of levels 1 and 2 in
    text: any combination. If another Bard feature gives you spells that you always have prepared, those
      spells don’t count against the number of spells you can prepare with this feature, but those spells
      otherwise count as Bard spells for you.
    level: 3
    class_id: bard
  bard_expertise:
    title: Expertise
    text: You gain Expertise (see the rules glossary) in two of your skill proficiencies of your choice.
      Performance and Persuasion are recommended if you have proficiency in them. At Bard level 9, you
      gain Expertise in two more of your skill proficiencies of your choice.
    level: 2
    class_id: bard
  jackofalltrades:
    title: Jack Of All Trades
    text: You can add half your Proficiency Bonus (round down) to any ability check you make that uses
      a skill proficiency you lack and that doesn’t otherwise use your Proficiency Bonus. For example,
      if you make a Strength (Athletics) check and lack Athletics proficiency, you can add half your Proficiency
      Bonus to the check.
    level: 2
    class_id: bard
  bardsubclass:
    title: Bard Subclass
    text: You gain a Bard subclass of your choice. The College of Dance, College of Glamour, College of
      Lore, and College of Valor subclasses are detailed after this class’s description. A subclass is
      a specialization that srants you features at certain Bard levels. For the rest of your career, you
      gain each of your subclass’s features that are of your Bard level or lower. ee ESSE A BARD’S REPERTOIRE
      Does your Bard beat a drum while chanting the deeds of ancient heroes? Strum a lute while crooning
      romantic tunes? Perform arias of stirring power? Recite dramatic monologues from classic tragedies?
      Use the rhythm of a folk dance to coordinate the movement of allies in battle? Compose naughty limericks?
      When you play a Bard, consider the style of artistic performance you favor, the moods you might
      invoke, and the themes that inspire your own creations. Are your poems inspired by moments of natural
      beauty, or are they brooding reflections on loss? Do you prefer lofty hymns or rowdy tavern songs?
      Are you drawn to laments for the fallen or celebrations of joy? Do you dance merry jigs or perform
      elaborate interpretive choreography? Do you focus on one style of performance or strive to master
      them all? 7 aE
    level: 3
    class_id: bard
  fontofinspiration:
    title: Font Of Inspiration
    text: You now regain all your expended uses of Bardic Inspiration when you finish a Short or Long
      Rest. In addition, you can expend a spell slot (no action required) to regain one expended use of
      Bardic Inspiration.
    level: 5
    class_id: bard
  countercharm:
    title: Countercharm
    text: You can use musical notes or words of power to disrupt mind-influencing effects. If you or a
      creature within 30 feet of you fails a saving throw against an effect that applies the Charmed or
      Frightened condition, you can take a Reaction to cause the save to be rerolled, and the new roll
      has Advantage.
    level: 7
    class_id: bard
  magicalsecrets:
    title: Magical Secrets
    text: You've learned secrets from various magical traditions. Whenever you reach a Bard level (including
      this level) and the Prepared Spells number in the
    level: 10
    class_id: bard
  superiorinspiration:
    title: Superior Inspiration
    text: When you roll Initiative, you regain expended uses of Bardic Inspiration until you have two
      if you have fewer than that. A BARD SHAPES INSPIRATION tr « -” AND IMAGINATION INTO MAGIC. ee
    level: 18
    class_id: bard
