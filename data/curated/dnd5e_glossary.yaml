      to the total. Woe (Odd). Whenever a creature you can see within 30 feet of you is about to make
      a D20 Test, you can take a Reaction to roll 1d6 and subtract the number rolled from the total. You
      can use this Reaction a number of times equal to your Wisdom modifier (minimum of once), and you
      regain all expended uses when you finish a Long Rest.'
    level: 6
    class_id: druid
