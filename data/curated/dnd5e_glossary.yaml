      them. Whenever you gain a Ranger level, you can replace one of these cantrips with another Druid
      cantrip.
    level: 2
    class_id: ranger
  rangersubclass:
    title: Ranger Subclass
    text: You gain a Ranger subclass of your choice. The Beast Master, Fey Wanderer, Gloom Stalker, and
      Hunter subclasses are detailed after this class’s description. A subclass is a specialization that
      grants you features at certain Ranger levels. For the rest of your career, you gain each of your
      subclass's features that are of your Ranger level or lower.
    level: 3
    class_id: ranger
  ranger_extraattack:
    title: Extra Attack
    text: You can attack twice instead of once whenever you take the Attack action on your turn.
    level: 9
    class_id: ranger
  roving:
    title: Roving
    text: Your Speed increases by 10 feet while you aren't wearing Heavy armor. You also have a Climb
      Speed and a Swim Speed equal to your Speed.
    level: 6
    class_id: ranger
  ranger_expertise:
    title: Expertise
    text: Choose two of your skill proficiencies with which you lack Expertise. You gain Expertise in
      those skills.
    level: 9
    class_id: ranger
  tireless:
    title: Tireless
    text: Primal forces now help fuel you on your journeys, granting you the following benefits. Temporary
      Hit Points. As a Magic action, you can give yourself a number of Temporary Hit Points equal to 1d8
      plus your Wisdom modifier (minimum of 1). You can use this action a number of times equal to your
      Wisdom modifier (minimum of once), and you regain all expended uses when you finish a Long Rest.
      Decrease Exhaustion. Whenever you finish a Short Rest, your Exhaustion level, if any, decreases
      by 1.
    level: 10
    class_id: ranger
  relentlesshunter:
    title: Relentless Hunter
    text: Taking damage can't break your Concentration on Hunter’s Mark.
    level: 13
    class_id: ranger
  naturesveil:
    title: Nature'S Veil
    text: You invoke spirits of nature to magically hide yourself. As a Bonus Action, you can give yourself
      the Invisible condition until the end of your next turn. You can use this feature a number of times
      equal to your Wisdom modifier (minimum of once), and you regain all expended uses when you finish
      a Long Rest.
    level: 14
    class_id: ranger
  precisehunter:
    title: Precise Hunter
    text: You have Advantage on attack rolls against the creature currently marked by your Hunter's Mark.
    level: 17
    class_id: ranger
  feralsenses:
    title: Feral Senses
    text: Your connection to the forces of nature grants you Blindsight with a range of 30 feet.
    level: 18
    class_id: ranger
  foeslayer:
    title: Foe Slayer
    text: The damage die of your Hunter’s Mark is a d10 rather than a dO. RANGER SPELL LIST This section
      presents the Ranger spell list. The spells are organized by spell level and then alphabetized, and
      each spell’s school of magic is listed. In the Special column, C means the spell requires Concentration,
      R means it’s a Ritual, and M means it requires a specific Material component.
    level: 20
    class_id: ranger
  rangerspells:
    title: Ranger Spells
    text: Spell Alarm Animal Friendship Cure Wounds Detect Magic Detect Poison and Disease Ensnaring Strike
      Entangle Fog Cloud Goodberry Hail of Thorns Hunter’s Mark Jump Longstrider Speak with Animals
    level: 1
    class_id: ranger
  primalcompanion:
    title: Primal Companion
    text: 'You magically summon a primal beast, which draws strength from your bond with nature. Choose
      its stat block: Beast of the Land, Beast of the Sea, or Beast of the Sky. You also determine the
      kind of animal it is, choosing a kind appropriate for the stat block. Whatever beast you choose,
      it bears primal markings indicating its supernatural origin. The beast is Friendly to you and your
      allies and obeys your commands. It vanishes if you die. The Beast in Combat. In combat, the beast
      acts during your turn. It can move and use its Reaction on its own, but the only action it takes
      is the Dodge action unless you take a Bonus Action to command it to take an action in its stat block
      or some other action. You can also sacrifice one of your attacks when you take the Attack action
      to command the beast to take the Beast’s Strike action. If you have the Incapacitated condition,
      the beast acts on its own and isn''t limited to the Dodge action. Restoring or Replacing the Beast.
      If the beast has died within the last hour, you can take a Magic action to touch it and expend a
      spell slot. The beast returns to life after 1 minute with all its Hit Points restored. Whenever
      you finish a Long Rest, you can summon a different primal beast, which appears in an unoccupied
      space within 5 feet of you. You choose its stat block and appearance. If you already have a beast
      from this feature, the old one vanishes when the new one appears.'
    level: 3
    class_id: ranger
  exceptionaltraining:
    title: Exceptional Training
    text: When you take a Bonus Action to command your Primal Companion beast to take an action, you can
      also command it to take the Dash, Disengage, Dodge, or Help action using its Bonus Action. In addition,
      whenever it hits with an attack roll and deals damage, it can deal your choice of Force damage or
      its normal damage type.
    level: 7
    class_id: ranger
  bestialfury:
    title: Bestial Fury
    text: When you command your Primal Companion beast to take the Beast’s Strike action, the beast can
      use it twice. In addition, the first time each turn it hits a creature under the effect of your
      Hunter’s Mark spell, the beast deals extra Force damage equal to the bonus damage of that spell.
    class_id: ranger
